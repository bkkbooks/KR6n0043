body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮修習位中解釋頌意分四一廣明轉依二修斷證義分三一問答標數二依數別釋分四一明十聖地二修十勝行三斷十重障分二一正釋十種九卷竟此中第二二障所攝此十一障二障所攝至八地以上畢竟不行總舉煩惱所知二障攝前諸障前標十障今舉十一者為前十地斷障之後復有著礙二愚名有餘障故有十一深密經云善男子此諸地中有二十二種愚癡十一種麤重瑜伽云永斷最極微細煩惱及所知障無著無礙於一切種所知境界現正等覺故第十一說名佛地煩惱障中分別起者是見所斷以真見道能頓斷故彼現起時從無始來直至地前加行漸伏現行初地已斷種子若俱生者是修所斷直至等覺金剛喻定現前頓斷彼現起時亦從無始乃至地前起四加行唯得漸伏初地以上至第八地能頓伏盡如阿羅漢者喻此煩惱永不行義問云既如羅漢令永不行何前七地猶起貪等答云前七地中雖亦暫起貪等煩惱為度眾生故意而起起不為失八地以上畢竟不行者以八地中無功用故於九地中心自在故若登十地法自在故故後三地化利有情已得任運及二自在不由故意起貪瞋等故說煩惱畢竟不行所知障中見所斷種至而三位顯是故偏說釋所知障分別起者是見所斷以真見道能頓斷故彼現起時從無始來直至地前加行漸伏現行初地已斷種子若俱生者是修所斷彼十無明名不染汙故於十地漸次斷滅乃至等覺金剛喻定現前頓斷彼現起時亦從無始至於地前加行漸伏登初地來漸伏漸斷乃至十地方永伏盡八地下釋所知障於後三地隨識有無謂第六俱所知障種於後三地不起現行無漏觀心智及無漏真如果相續無間能違彼故第七識俱細所知障猶可現行於第十地得法自在法空智起彼障方伏前五轉識相應心品雖未轉依成所作智於後三地是無漏位障伏不起問云二障體同何不同斷答云雖修道中不斷煩惱而彼種子亦漸斷滅三位斷二障者一見道位頓斷分別二障種子二修道位漸次伏斷俱生煩惱所知種現三金剛定能永斷盡二障種子問前說十地各斷一障二愚及彼麤重何唯三位斷耶答云雖於十地漸伏漸斷然三斷道名相顯勝故偏說之斷二障種漸頓云何至一剎那中三界頓斷問答以明斷障漸頓先釋第七識俱二障俱是頓斷無漸斷義無學果者二乘出三界菩薩第八地以不動地名無學故故說三乘無學果時頓斷三界煩惱障種又第七俱所知障種唯菩薩斷故成佛時一切頓斷任運內起無麤細者謂第七識煩惱所知俱無分別無見所斷純是俱生唯修所斷任運內起是俱生義無分別起故名無麤對麤說細既無麤名細亦不說故云無麤細故餘六下次釋前六識俱煩惱障種頓漸斷義若見所斷唯是頓斷故云三乘見位真見道中一切頓斷若修所斷隨其所應二乘有利鈍菩薩一剎那故隨所應有頓漸故二乘見道同在欲界於欲界中即證初果菩薩見道加行無間即登初地故於初地得證人空初一類下釋鈍根漸出離者於三界中共有九地欲界唯有五趣雜居一地色界四禪名為四地無色四空亦名四地地各九品分輭中上預流果人斷欲界修所斷惑至第五品即中中品名一來向至第六品即中輭品證一來果以有餘惑必一來生名一來果斷至第八即輭中品名不還向至第九品即輭輭品證不還果欲界惑盡必不來生故名不還此第三果居色淨居斷上八地各九品思至七十一即第九地輭中品惑名羅漢向斷最後品名輭輭品證羅漢果以盡煩惱名阿羅漢次一類下釋利根頓出離者謂於三界九地煩惱合為一聚共作九品從上中輭九品別斷雜集十三卷云復次如說預流補特伽羅此有二種一漸出離二頓出離漸出離者如前廣說頓出離者謂入現觀已依止未至定發出世間道頓斷三界一切煩惱品品別斷唯立二果謂預流果阿羅漢果品品別斷者謂先頓斷欲色無色界修所斷上上品隨眠如是乃至輭輭品頓斷三界者謂如見道所斷非如世間道界地品品別斷此義以何為證如指端經說諸所有色乃至識若過去若未來若現在廣說乃至若遠若近總此一切略為一分一團一積一聚如是略已應觀一切皆是無常一切皆苦乃至廣說依如是義但可建立初後二果不立第二第三名頓出離菩薩下釋菩薩乘於餘六識相應煩惱亦唯頓斷無漸斷義謂彼煩惱初地頓伏至金剛定頓斷彼種又餘六識相應煩惱二乘見修二位隨斷無金剛位菩薩見道及金剛斷無修道斷以永伏故所知障種初地初心至前後相望皆容具有釋餘六識俱所知障唯菩薩斷見所斷者緣外境麤是分別起見道頓斷修所斷者緣內境細是俱生故修道方斷通緣下總結前頓漸斷有多種二乘下別釋鈍根漸斷障時必各別起無間解脫因時望果名無間道以近果故果時望因名解脫道以離因故為由此道證斷煩惱所得解脫加行勝進或總起或別起所有順決擇分善根名加行道所有前前望後後進名勝進道菩薩下釋彼根利漸斷障位智起惑除分證真理非要別起無間解脫以加行等四種斷道剎那前後皆容具故故不別起二二障所攝竟通上三斷十重障竟下四證十真如十真如者一徧行真如至非如眼等類有異故總牒前科文中別釋徧是周徧行是行相謂此真如徧一切處而顯行相故於初地頓斷分別二障所顯真如極喜證故最勝真如二地所證以二地中具淨尸羅名道共戒戒為德本故云具無邊德於一切法最為勝故勝流真如三地所證以三地中勝定總持流出無邊妙慧故於餘法極為勝故梁攝論云從真如流出正體智正體智流出後得智後得智流出大悲大悲流出十二部經名為勝流法界無攝受者無執取義以四地中分證菩提名出世道無界繫屬遠離身見故無我執所依取故世親菩薩云於此如中無計我所無攝我所如北州人無繫屬故應知此如非是我執我慢我愛無明邊執見等所依取故無別真如五地所證以五地中真俗兩智合令相應故名無別六無染淨真如謂此真如至總持定門皆自在故無染淨者根本智也以六地中深觀緣起引無分別本智現前故云本性無染亦不可說後方淨故無性菩薩云由緣起智令無分別智得現前悟一切法無染無淨法無別者七地所證妙無相道即相無相名妙無相故云種種安立而無異故慈恩大師云雖諸教法依如建立如無異故又於教中立種種名法界實相等而如無異不增減真如即八地所證以八地中不隨淨增不隨染減亦名相土所依者亦八地中無功用道任運現身及現土相俱得自在亦是此中不增減義無性菩薩云法外無用所以不增法體不壞所以不減世親菩薩云於諸相中而得自在隨其所欲即能現故如欲令土成金寶等隨意成故相約現身土約器界智自在者即心自在故九地中證此真如得心自在成就四種無礙解故業自在等等諸法業即十地中證此真如得法自在故於神通作業總持定門皆得自在雖真如性實無差別至為令圓滿後後建立設有問云真如一體何有十耶故此答云雖真如等又問云既是假立一達一切何後建立餘九種耶故又答云雖初地中等古德引慈恩疏有展轉多難文繁不錄四證十真如竟通上二依數別釋竟下三總結修證如是菩薩於十地中至於二轉依便能證得總結廣辯十地十行及斷十障證十真如四科之義顯二轉依由此證得三總結修證竟通上二修斷證義竟下三轉依六位轉依位別略有六種至多令非真不顯現故總標六種文中別釋力即勢力能謂功能謂於資糧加行二位已悟唯識相性名為勝解已發大菩提心名為慚愧學修現觀漸伏麤惑名損染種勢力勤修六度發三勇猛名益淨種功能問地前三賢未登聖位何名轉依答雖未斷障等以真見道得根本智親緣真如故名通達斷分別起二障種盡得證二空俱生猶存故云一分修謂修持初心不退習謂習學淨行隨增故於十地數修施等十種勝行漸斷俱生煩惱所知分證十地十種真如名真實轉引攝大乘釋二轉依通十地義彼以前六有無相通釋通達轉後四地中無相修習釋修習轉多令非真不顯現者不無有少所以前云第七所知於八地中猶可現行四果圓滿轉謂究竟位至捨二麤重而證得故前所轉依但名分證此中究竟故名圓滿由三大下牒前因行金剛下釋斷惑證果等覺位中普光明等十大三昧名金剛定俱生二障極微細種名本來麤重修因歷多劫證果一剎那故名頓證來際可窮果終不退恒化有情利樂無盡怖大樂小故名下劣以彼二乘樂獨善寂唯證人空於利生事心不喜樂速斷煩惱證真擇滅名下劣轉堪紹佛位任度有情故名廣大謂菩薩乘欣大悲心利生為事故於生死無出離心又於涅槃不欣靜想二空俱證二障頓除菩提涅槃不求自得名廣大轉此中下釋此頌中說轉依意唯取第六廣大轉依不同二乘獨斷煩惱故云捨二麤重而證得故三轉依六位竟下四轉依四義分四一能轉道轉依義別略有四種至所證所引未成辦故總標四種文中別釋能轉即智智能轉妄復真故名能轉先伏後斷故又分二一能伏者謂二障種有生現行勢力以修六度及加行等智伏之故云令不引起二障現行此通下釋通有漏無漏及頓漸伏惑義謂六行漸伏唯通有漏加行後得亦唯漸伏通漏無漏根本頓伏唯通無漏故云隨其所應漸頓伏彼能斷道者謂起根本無分別智方能永斷二障隨眠故說此道定非有漏及加行智有漏下釋成謂第七識念念執我令第六識所行施等不能忘相故名曾習相執雖有漏道常起現行而不為損亦無所益故能斷道唯取無漏又加行智即勤勇樂欲求所證果所引發故但能伏惑及至斷時唯本後智故能斷道不用加行有義根本無分別智至根本後得俱能正斷初義謂後得智不斷隨眠理猶未盡次義正理謂根本智迷理迷事二種隨眠俱能正斷後得但斷迷事隨眠相觀分明無倒證故分別迷心名迷理任運迷境名迷事是二別義故瑜伽下引證上義出世斷道即根本智世出世斷道即後得智純世間道即前所除有漏加行以有漏道是曾習故相執引故又加行智地前伏除分別二執未能永斷亦是世間故云無純世間道能永害隨眠雜集云從初靜慮乃至非想唯是世間不明了想恒現前故由斯下總結二智俱能斷惑義有別故迷理隨眠通見修者六卷云分別起惑及細俱生皆迷理也一能轉道竟下二所轉依二所轉依此復有二至而非根本故此不說所轉即是漏無漏種種必有依名所轉依依有真妄復分為二一持種依者謂有虗妄分別本識能持一切染淨法種故為所依修聖道時轉令捨染得淨法故問依他起性豈非染淨依耶答餘依他等迷悟依者謂有真實真如性故能作迷悟生起根本故染淨法依之得生修聖道時轉令捨染得淨法故問餘依他起豈非迷悟依耶答餘雖亦作等二所轉依竟下三所轉捨三所轉捨此復有二至第八淨識非彼依故所轉同前漏無漏種二非真實可斷可棄名所轉捨前斷後棄復分為二一所斷捨者真智除惑名斷永不成就名捨彼種下謂斷二障種子不起我法現行無現行故不對妄情由此便捨徧計所執所棄捨者勝法圓明劣法自遠所依純淨染不能依名所棄捨餘有漏法即異熟果劣無漏者即變易死二種捨已彼二現行畢竟不生亦說為捨既捨種子亦捨現行由此下明變易生死為劣分段生死為勝初義未正謂有漏種及劣無漏金剛喻定現前捨故次義正理謂金剛定時但斷二障極微細種猶未捨彼漏無漏法與無間道不相違者無間在因不違因種意顯果位方與因違菩薩應無生死法者謂變易生死從有漏與劣無漏種生此種若斷無變易故此位應無所熏識者以無間道猶有持種異熟識故住無間道應名佛者謂無間道既無諸種何不名佛後解脫道應無用者前既成佛後起解脫復何所用由此下結成正義三所轉捨竟下四所轉得分二一所顯得分五一總標涅槃四所轉得此復有二至故體即是清淨法界所轉即前所斷二障障盡得果名所轉得得由生顯復分為二一所顯得者謂大涅槃問涅槃自性本來清淨何名所顯答此雖本來等問既有障染何名本來自性清淨答此依等一總標涅槃竟下二別釋四種涅槃義別略有四種至用而常寂故名涅槃謂此涅槃是圓寂理一切法中同一實相由聖凡位有差別故分為四種文中別釋本來自性者不簡凡望及色心等皆具圓寂真如性故故云一切法相真如理雖有下釋本來清淨平等共有義與一切法下釋名涅槃義梵語涅槃此云圓寂寂則不與諸法一以諸法相各顯現故圓則不與諸法異異諸法者不圓滿故離一切相一切分別者釋體清淨尋思路絕名言道斷者釋離分別唯真見道入聖位者自內所證其性本寂非使能寂故云本來自性涅槃有餘依者謂有分段生死苦所依也以諸聖者最後苦身未曾滅故唯煩惱障種現永寂即名涅槃瑜伽云住有餘依墮在眾數猶有眾苦所得轉依猶與六處而共相應言眾數者即五蘊身身為苦聚故名眾苦有微苦者彼雖出障未離最後分段生死故有微苦無餘依者無最後身苦所依也故云真如出生死苦障盡苦滅顯真如體圓滿寂滅故名涅槃瑜伽云住無餘依不墮眾數永無眾苦而於六處永不相應無住處者不住生死及涅槃故若住涅槃無度生用若住生死無斷障用又能斷障及能度生故名無住雖有無涯利生大用其體本寂名為涅槃不同二乘住涅槃義二別釋四種竟下三凡聖有無一切有情皆有初一至唯我世尊可言具四此簡凡聖涅槃有無一切有情無後三者未斷障故二乘唯三無後一者住涅槃故唯我世尊具四種者圓滿證故三凡聖有無竟下四問答廣辯分三一如來涅槃如何善逝有有餘依至是故世尊可言具四善逝者如來十號之一也善入塵勞故曰善逝此問世尊遠離二種生死何有餘苦所依答云世尊雖無實苦所依而現比丘同斷煩惱似有苦依故說有餘或苦依盡可說二乘入無餘依非苦依在方說如來有有餘依以現似苦亦可說為有餘依也是故世尊於四涅槃圓滿具足一如來涅槃竟下二聲聞涅槃若聲聞等有無餘依至非如一類入無餘依若聲聞下問也謂於餘處有二說異一說聲聞唯有餘依無無餘依以無餘依是佛果故二說聲聞都無涅槃豈有下答上問中第二說義謂盡煩惱者豈彼無涅槃有餘涅槃亦定有故然聲下釋有有餘依涅槃身即最後身智即能斷智煩惱雖斷身智猶存故令無餘圓寂義隱說彼無有無餘涅槃非彼都無有餘義故爾時下答上問中第一說無無餘依義爾時者即煩惱障盡證有餘涅槃時也此時未證無餘圓寂說無無餘非彼後時身智俱滅眾苦永盡無有無餘涅槃義故或說下又作一意解釋問中第二說義謂依佛果故說都無不依前三而言無也又說下亦別一意釋上問中第一說義不定性者不是定要斷苦入圓寂之種性也故說剛纔證得有餘涅槃決定迴心求證菩提入菩薩道由彼決定願樂力故留身久住隨願度生非如定性一類聲聞定要斷苦入於圓寂依此種故故說聲聞無無餘依問有餘無餘二種涅槃如何證得下文答釋謂有二乘深樂圓寂至故復說彼與佛有異此是釋詞謂有下釋證有餘涅槃深樂圓寂者顯是定性聲聞也彼能下釋證無餘涅槃現苦者現在生死苦也有為者色心等有作用法也身智俱捨名無餘依是涅槃義問既無身智誰證涅槃答云爾時雖是無有最後身智顯依圓寂入無餘依由彼身智證可說有身智八卷云依變化身證無上覺非業報身故不違理問無餘涅槃與佛無差何故二乘與佛有異答云依真如體說無差依真如用說有異故知聲聞有體無用以彼無有利生用故唯佛世尊體用圓具二聲聞涅槃竟下三二障涅槃諸所知障既不感生至初後即真如中二擇滅攝諸所知下問所知障是無記性不能正感生死如何斷彼亦得涅槃彼能下答謂所知障障法空智不生悲願利樂有情故斷障時顯法空理即無住處生死涅槃俱不住故若所知下復問云既斷所知得無住處是所知障亦障涅槃何斷所知不得擇滅彼說擇滅是涅槃義擇滅離縛彼非縛故者答也謂擇滅無為離煩惱縛而證得故彼所知障性非有縛故斷彼時不得擇滅既爾斷彼寧得涅槃者外人又問非諸下論主答謂諸涅槃有擇滅攝有非擇滅攝故云非諸涅槃皆擇滅攝不爾下謂若不許非擇滅攝者本性清淨應非涅槃能縛下釋擇滅義諸所知下釋斷所知不得擇滅義然斷彼下釋無住涅槃非擇滅為性故四下釋四涅槃於六無為有攝不攝初即自性清淨涅槃後即無住處涅槃唯真如無為攝中二者即有餘涅槃無餘涅槃唯擇滅無為攝若唯斷縛得擇滅者至理實俱能通障二果問六無為中不動滅無為受想滅無為於四圓寂中是誰所攝答中非擇滅者不同中二涅槃究竟永滅不動等二說暫離故問擇滅法中有非擇滅否答擇滅無為唯究竟滅有非擇滅非永滅故或無下又作一意解無住處亦擇滅攝問既後涅槃亦擇滅攝豈不濫同中二耶答中謂雖名擇滅有二義別有餘無餘是滅縛得斷感生死煩惱得故無住涅槃是滅障得斷盡餘障而證得故故四下釋四涅槃於六無為攝不攝義不動等二無為非擇滅攝例顯後三涅槃是擇滅攝既所知下外人難說煩惱下論主答引煩惱障例明所知聖教依勝名說障一理實二障通障二果三二障涅槃竟通上四問答廣辯竟下五通結所顯如是所說四涅槃中唯後三種名所顯得總結四涅槃中唯後三種所顯得攝非第一者以彼自性本清淨故五通結所顯竟通上一所顯得竟下二所生得分二一總標菩提二所生得謂大菩提至此即四智相應心品二所生得謂大菩提者牒科標舉問菩提自性既是本有何名所生答此大覺體雖是本來有能生種而所知障礙故不生由諸聖者以修道力斷彼障故令從種起名得菩提相續無盡又所知障是心心所分別而生菩提智種亦心心所無分別起今轉所知證菩提者以智為體故云此即四智相應心品一總標菩提竟下二別釋智品分六一四種智體云何四智相應心品至如大圓鏡現眾色像云何下標問言鏡智者從喻得名佛地經云復次妙生大圓鏡智者如依圓鏡眾像影現如是依止如來智鏡諸處境識眾像影現唯以圓鏡為譬喻者當知圓鏡如來智鏡平等平等是故智鏡名圖鏡智謂此心品離諸分別者顯此智體一切煩惱所知障垢永出離故所緣行相微細難知者非愚昧等智可知故不妄不愚一切境相者莊嚴論云大圓鏡智普於一切所知障境不愚迷故性相清淨離諸雜染者智體光明鑑淨無垢故純淨圓德現種依持者唯無漏德所依止故能現能生身土智影者一切身土此智能現餘三種智是此智影故云能生無間無斷窮未來際者顯寂常義如大圓鏡現眾色像者顯光明義二平等性智相應心品至一味相續窮未來際言平等者從所證得名佛地經云復次妙生平等性智者由十種相圓滿成就所謂證得諸相增上喜愛平等一切領受緣起平等遠離異相非相平等弘濟大慈平等無待大悲平等隨諸眾生所樂示現平等一切眾生敬愛所說平等世間寂靜皆同一味平等世間諸法苦樂一味平等修植無量功德究竟平等證此十相故名平等故論云謂此心品等妙觀察智不共所依者所依即根以智各有所依之根名不共依妙觀智以平等智為不共依平等亦以圓鏡為依故云無住涅槃之所建立一味相續窮未來際者顯常住義三妙觀察智相應心品至令諸有情皆獲利樂妙觀察者從攝持所觀境立名佛地經云如是如來妙觀察智住持一切陀羅尼門三摩地門無礙辯說諸佛妙法又云能為頓起一切所知無礙妙智種種無量相識因緣又云種種可翫波羅蜜多菩提分法十力無畏不共佛法之所莊嚴甚可愛樂言攝觀者攝者藏也觀即觀察以此智品於總持門善能觀察亦能攝藏不忘失故言功德珍寶者即六度道品等作用差別者即神通妙用等四成所作智相應心品至成本願力所應作事成所作者從作三業得名佛地經云由是如來勤身化業示現種種工巧等處摧伏諸技傲慢眾生以是善巧方便力故引諸眾生令入聖教成熟解脫由是如來慶語化業宣揚種種隨所樂法文義巧妙小智眾生初聞尚信以是善巧方便力故引諸眾生令入聖教成熟解脫由是如來決意化業決擇眾生八萬四千心行差別以是善巧方便力故引諸眾生令入聖教成熟解脫餘身語意文繁不引一四種智體竟下二心品名智如是四智相應心品至故說轉八識而得此四智總結四智轉心品得二十二者謂此四智能轉心品各二十二即徧行五別境亦五善位十一尋伺位中隨取一法為二十二故此下通明八識相應心品即此四智以前五識共轉一智即成四種故此意云若不以二十二法為體者則於佛地有為功德攝不能盡而總攝盡佛功德者是轉八識相應心品如次而得四種智故問他處言轉八識成四智何云相應心品耶答云智雖非識漏無漏位強劣相反欲令有情依智捨識說識轉得二心品名智竟下三轉智位次大圓鏡智相應心品至持無漏種令不失故通釋四智心品轉依位次初有義下未正謂圓鏡智金剛定時即初現起以異熟種及所知種同時捨故相應心品亦轉鏡智若謂爾時鏡智不起異熟識種亦未轉依染障既盡淨種漸增爾時何識能持淨種次有義下正理謂此心品直至後時解脫道起種識俱空鏡智方起即成佛道故云此品解脫道時初成佛故乃得現起異熟識種金剛道時種未頓捨者以異熟種與無間道不相違故又無間道金剛喻定非障有漏異熟識種及劣無漏諸法種故此有漏種及劣無漏但與佛果定相違故金剛下難破前執謂金剛定若斷識種應無所熏若無所熏無漏淨法應不得增法不增減應成佛果豈無間道即成佛耶故說此品從解脫道初成佛故盡未來際相續不斷平等性智相應心品至相依相續盡未來際此智因中相應第七恒執我故名不平等於轉依位恒無我故得平等名見道現前違二執者是第六識彼真見道斷分別種顯二空智名下品轉以第七識恒內執我無分別惑唯是俱生由第六識初轉依時帶起第七轉一分智以是第六所依根故後十地中執未斷者謂第七識俱生二執猶未永滅智有間斷至十地後得究竟轉盡未來際相續不斷妙觀察智相應心品至或無心時皆容現起妙觀察智相應第六意識因中分別我法二執入諸生死故見道時斷二種障得證二空轉二種智生空觀品二乘見位得初起者謂彼唯斷分別我執入真見道即證一分無分別智名生空觀此後展轉至無學者謂見道後於九地中斷俱生時漸斷漸證斷盡惑種無所斷故名無學位以二乘人不斷所知無法空智或至下明菩薩乘解行地者資糧加行共名解行解行地終即入見道或至上位即是地上若非有漏即無漏時或無心時即無分別已上諸處皆容現起生空觀智法空觀品菩薩見位得初起者謂所知障唯菩薩斷故於見道亦斷法執分別一分轉一分智此後下釋法空智現起分位上位等名釋義同前成所作智相應心品至而數間斷作意起故成所作智因中相應前五轉識能作諸業轉依後得能起化用得所作名初義未正謂由第六識之後得智引故前五識因中初轉次義正理謂成佛時方得初起以十地中異熟有漏所變眼等根亦是有漏與眼等識為不共所依俱起同境有漏五根發無漏識理不相應何以故有漏於境昧無漏於境明故成佛時異熟與眼根俱轉成無漏成所作智方容現起不同前三相續長時此數間斷作意方起設問云此四種性為是本有為是熏生若是本有應一切時皆有四智若是熏生應四智體亦有增減下文答釋此四種性雖皆本有至勿前佛德勝後佛故此是答詞謂此四智雖本有種由二障故成染分別若悟唯識於解行位加行熏習入真見道方起現行漸至圓滿盡未來際但從種生不熏成種者謂但熏長現行不熏生起種子故無增減若四智種復熏成種則後佛智現熏前佛前佛智德應勝後佛三轉智位次竟下四四智所緣大圓鏡智相應心品至餘一分二準此應知釋鏡智所緣初義未正謂圓鏡智但緣真如以無後得智故不緣一切唯是根本說不可知次義正理謂此智品緣一切法以圓鏡智照一切故莊嚴下證緣一切境佛地下證現一切影又此下釋成此品緣一切法行緣下破前執義釋通二智謂彼行相所緣微細說不可知非獨緣真如名不可知故如阿賴耶緣一切境此圓鏡智亦緣一切世俗境故緣真如境是無分別若緣餘境後得智攝問原是一體何得有二答其體是一隨用分二問何名後得答了俗由證真故說為後得謂由證真而後起者名後得智餘分二者平妙二智各分為二準此應知平等性智相應心品至二智所攝於理無違釋平等智所緣之境前二義俱偏一唯緣淨識一但緣真如謂真如體是一切法平等實性故緣真如名平等智第三義正理謂平等智徧緣真俗二諦為境佛地下引證能緣真俗境義十種平等前四智章中已釋莊嚴下證能徧緣及能現身由斯下結通二智妙觀察智相應心品至皆無障礙二智所攝釋妙觀智通緣一切自相共相者色心等法名為一切各別有體名為自相同是無常苦空等義名為共相一切通緣故無障礙緣真俗諦二智所攝成所作智相應心品至起化業故後得智攝釋成事智所緣之境初義未正謂但緣於現在五境不緣過去未來境故莊嚴下引證但緣現境次義正理謂成事智徧緣三世佛地經下引證徧緣三世義若不徧緣無佛地經所說功能然此下釋前所引莊嚴論義謂成事智緣一緣多及緣一切故莊嚴論且說五根於五境轉不言此智唯緣五境故不相違隨作下結成此智唯是後得謂前三智皆依心根二智俱通此依色根唯後得智奘大師云變相觀空唯後得果中猶自不詮真四四智所緣竟下五四智用別此四心品雖皆徧能至如是等門差別多種此四下結前所緣起後用別謂鏡下釋此四智用各別義頌曰鏡平二智現身土自受用兮他受用成事智現變化身妙觀說法開疑眾五四智用別竟下六通結前科此四心品名所生得至非已證得因位攝故此四心品名所生得者謂所轉得中分為二科一所顯得二所生得此所生得總名菩提者謂此一科攝四種智合此四智總名菩提故前章云二所生得謂大菩提乃至此即四智相應心品及前涅槃名所轉得者前所顯得顯涅槃今所生得生菩提雖有菩提涅槃之別唯是所轉得中所攝雖轉依義總有四種者謂轉依位中科為四分一能轉道二所轉依三所轉捨四所轉得而今但取二所轉得者唯取所顯所生二是所轉得也何以故頌說證得轉依言故此修下明已證未證以修習位非已證故六通結前科竟通上四修習位竟下五究竟位分三一牒科標問後究竟位其相云何雜集云何等究竟道謂依金剛喻定一切麤重永已息故一切戲論永已斷故永證一切離繫果故從此次第無間轉依證得盡智及無生智十無學法等一牒科標問竟下二舉頌總答頌曰此即無漏界至安樂解脫身大牟尼名法頌初此字即前二轉依果無漏界及後三句皆顯二果多種名故多名之義論中自釋二舉頌總答竟下三解釋頌意分二一釋第一句分二一正釋頌意論曰前修習位所得轉依至世出世間利樂事故釋初句中此即無漏四字論曰下謂前位中轉依即此位中行相此謂下釋頌言此字是牒前位二轉依果故云即是究竟無漏界攝諸漏下釋轉名無漏言非漏者即是無漏界是下釋頌中界字有二義別含容眾德即是藏義出生五乘即是因義人乘天乘聲聞緣覺及菩薩乘名為五乘一正釋頌意竟下二問答廣明清淨法界可唯無漏攝至而實無漏道諦所攝清淨下問涅槃真如是清淨界可唯無漏菩提智品原是色心何無漏耶道諦攝故唯無漏攝者總答四智心品是無漏義謂佛下釋成以四智品攝盡佛地一切功德有漏法種已永捨故者顯四智品皆是無漏雖有下釋利有情事亦是無漏道諦所攝此下三師及四問答皆不應理集論等說十五界等至論說五識性散亂故第一師引集論難謂如來同是有漏十五界攝故云如來豈無五根五識五外界等第二師謂佛身土非有非無非十五界故與集論理不相違第三師謂如來十五界妙定生故麤細異故不同有漏十五界攝非佛五識者謂集論說有漏五識定非佛有雖依下釋上五境雖依有漏五境變現從妙定生故說為細非同有漏麤五境攝如來五識非同有漏五識界攝故引經證佛心在定顯集論說五識散亂成所作智何識相應至是故於此不應為難成所作智何識相應者論主問第六相應起化用者外人答與觀察智性有何別者論主又問彼觀下外人答謂觀察智觀自共相成所作智唯起化用故有差別此二下論主難謂二智品若是一類同依一識起一品時無第二用若依二識識體各別起不同時故於二義皆不並生外人釋云許不並起於理無違同體用分俱亦非失或與下外人復謂成事智不但與第六相應亦與第七淨識相應雖依眼等緣色等境是平等智作用差別謂淨下釋差別用論主質云成事智品豈不攝得前五識耶非轉彼得等外人釋義如文此中論主當有破詞今試補云生死涅槃雖與識智轉依彷彿而義有別識智轉依各別有體心所轉智識轉淨識能依所依染淨俱有生死涅槃原為一體輪生死時定無涅槃證涅槃時必無生死何有生死同涅槃攝故知此釋亦不應理有義如來功德身土至皆悉具足而純無漏此義正理謂佛身土如其所應攝在世間五蘊十二處十八界中而此三科生佛共有如來所得名為無漏眾生所得名為有漏集論下釋第一師引集論中意謂彼論說眼等五根五識色等五塵是十五界唯有漏者彼論唯依二乘麤淺境說不依如來故云非說一切謂餘下謂諸有所得十八界中唯後意根意識及法塵界通無漏攝故餘十五名為有漏佛成就下謂佛所得十八界中雖皆無漏非二乘知故集論說十五界等唯是有漏然餘下牒第二師執詞理必應爾者縱也所以者何徵起上非同界等之義引聖言難破謂聖言說佛有為法皆五蘊故說佛一切法是十八界十二處攝故十九界等聖所遮故以一切法不出蘊處界等若離此三是十八界外有十九界十二處外有十三處五蘊之外有第六蘊故十九界等聖賢所遮若絕下復牒執詞彼謂蘊處界等不離名言皆是戲論難云若絕戲論便非界等頌不應說此即無漏界不思議善常安樂解脫身應知無漏菩提涅槃皆是名言戲論種攝但不執著戲論遠離又處處下釋第三師意彼說如來十五界妙定生故麤細異故不同有漏十五界攝故此破之界處亦然者謂轉無常界得常界轉無常處得常處既許蘊處界法皆常寧說如來非蘊處界故言非佛根塵識者是密意說及餘所成故佛下結成正義二問答廣明竟通上一釋第一句竟下二釋後三句分二一正釋頌意此轉依果又不思議至窮未來際無斷無盡此段釋不思議善常此轉下釋不思議三字謂轉依果不但名無漏菩提涅槃又名不思議超過下釋成此又下釋善字清淨下釋涅槃四智下釋菩提二種下總釋二果皆名善義論說下外人難處等即十二處十八界也論說不唯無記應通三性則知如來五根三境亦通三性何說清淨法界四智心品唯是善性此中下論主釋謂此善中三種釋義廣說如前者前正義云如來功德身土如應攝在蘊處界中彼三皆通有漏無漏又云故佛身中十八界等皆悉具足而純無漏即此中云一切如來下是第一釋說佛土等非苦集故是第二釋佛識所變等是第三釋此又下釋常字清淨下釋涅槃性常四智下釋菩提性常所依者八識體也非自下外人難謂菩提果既從因生非如涅槃自性常義四智心品既屬色心未有色心不無常者然四智下論主答謂雖色心皆是無常然四智品由願力故利生無盡故說為常此又安樂無逼惱故至二轉依果皆此攝故此段釋安樂解脫身大牟尼名法清淨下釋涅槃安樂四智下釋菩提安樂永離體害者離體自無逼惱離害安樂有情此二下總釋二果俱名安樂解脫身二乘所得斷盡煩惱而解脫故以無利生事業故云無殊勝法梵語牟尼此云寂默得寂默法名大牟尼此牟尼下釋法身體依下釋身義言五法者佛地經云清淨真如及四智品名為五法清淨法界涅槃也四智心品菩提也菩提涅槃通為法身故云非涅槃界獨名法身二轉依果法身攝故一正釋頌意竟下二別明三身分八一正明三身如是法身有三相別至大功德法所依止故此明法身攝二身義佛地經頌云自性法受用變化差別轉彼經論云雖諸如來所依清淨法界體性無有差別而有三種種相異故轉變不同故名差別佛地論云頌言自性法者即是如來初自性身體常不變故名自性力無畏等諸功德法所依止故亦名法身故今論中謂諸如來下釋自性身是受用變化二身所依具無邊下釋成亦名法身義二受用身此有二種至合此二種名受用身佛地論云頌言受用即是次受用身能令自他受用種種大法樂故故今論中分為二種一自受用謂諸如來三無數劫修集無量福慧資糧者從久遠來修習此身故所起無邊真實功德者莊嚴此身故及極圓淨常徧色身者得證此身故相續湛然盡未來際者顯此身常故恒自受用廣大法樂者釋唯自利故二他受用謂諸如來乃至居純淨土者顯此身土唯變化故為住十地乃至決眾疑網者釋轉法輪唯為菩薩故令彼受用大乘法樂者釋唯利他故合此二種名受用身者總上自他俱名受用身故三變化身謂諸如來至令各獲得諸利樂事佛地論云頌言變化即是後變化身為欲利益安樂眾生示現種種變化事故故今論云謂諸如來乃至居淨穢土者謂隨眾生種類若干現若干身及若干土故所居土淨穢不等為未登地乃至現通說法者顯變化身三乘普被六趣均霑故云稱彼機宜隨類說法令各獲得諸利樂事者釋唯利他前受用身自他俱利此變化身唯是利他一正明三身竟下二五法三身以五法性攝三身者至故知三身皆有實智佛地經云有五種法攝大覺地何等為五所謂清淨法界大圓鏡智平等性智妙觀察智成所作智有義下未正謂初二法即清淨真如大圓鏡智攝自性身復引經論證此二法攝自性身妙觀平等為中二智攝受用身平等下釋現身自在妙觀下釋說法自在說轉諸轉下顯得受用身後一智品成所作智攝變化身成事下釋變化義又智下引證三身皆證實智有義初一攝自性身至四智品中真實功德此義正理正釋五法攝三身義初一即真如攝自性身經說自性身本性真常故又說佛法身無生無滅故說證因得非生因故者因中本具故名證因從緣起者說名生因以自性身一切眾生平等共有不同報化從因緣生又說法身諸佛共有者影顯眾生亦共有故徧一切下點破鏡智色心不與法身相應然說下釋前師引證義謂彼經說轉滅第八識中二障種子所顯法身不說法身即圓鏡智智殊勝下說四智品依止法身不說三身皆有實智自性法身下重破前師以圓鏡智攝法身義鏡智所起常徧色身至實有色心皆受用攝此明智攝自他變化三身非法身義從智所起者顯實智為體依智所現者顯體非智問云何知鏡智攝自受用答說圓鏡智是受用佛轉諸轉識得受用故外人又問既云鏡智是受用佛何不云轉藏識而說轉諸轉識得受用耶答云雖轉藏識等又說下論主推明法身相違鏡智顯此智品屬受用身故云若非受用屬何身攝又受用下明唯一身攝四智品以佛功德通攝四智自受用故又他受用及變化身至而有化現心心所法釋他受用及變化身似智所起假說智名體非實智故彼經中但說二智能現二身不說二身即是二智由此二智自受用攝問若此二身似智所起名無實心實智云何說法利生答云然變化等謂此二身唯用化現心心所法說法利生設又問云心事無形何得化現下文答無上覺者神力難思至無根等用故不說有此是釋詞謂證無上菩提者神力難思能化無形心心所法若不化現云何如來現貪嗔等如來貪嗔久已斷故又諸聲聞及傍生等知如來心或慈或威生敬生畏皆是化現何以故如來實心等覺菩薩尚不知故況諸聲聞及傍生等由此下引證化現心心所義化無量類令有心者證能化心故化作三業者亦證有心故化依他心者依他實心託為本質自變為所緣故問既能化心如何論說化身無心心所法答云雖論中說變現化身無根心等依餘劣智所起者說不依如來實智所起佛地經論七卷云如論說言心無形故不可變化又說化身無心心法此就二乘及諸異生定力而說彼定力劣不能化現無形質法諸佛菩薩不思議定皆能化現心心所故又化下釋成劣智所起謂彼劣智所化根心無根心用故論不說有所化心佛地論云但諸化色同實色用化根及心但有相現不同實用彼就下類故作是說應知彼說無根心用亦依餘說不依如來二五法三身竟下三身德同異如是三身雖皆具足至利樂他用化相功德謂佛功德一一無邊然於三身德各有異謂自性身唯有真實常樂我淨者體具四德故離諸雜染者性本清淨故眾善所依無為功德者以具功德無所為故無色心等差別相用者體純一故自受用者二障永斷二死永亡二智圓明二果親證唯自受用名受用身真實功德有作為故若他下釋他受用及變化身隨意願力現身現土及現心等利樂他故故名化相功德三身德同異竟下四三身二利又自性身正自利攝至唯屬利他為他現故自性法身二利兼具自利為正寂靜安樂無動作故利他為兼為增上緣攝有情故以報化身利樂有情為正因緣法身唯是所依法故為增上緣故說法身自他俱利餘利自他如文次第四三身二利竟下五身土相依又自性身依法性土至亦可說言徧一切處法身所依依法性土問唯一法性寧分身土答能依義邊名之為身所依義邊名之為土又此法性與身為性名法性身與土為性名法性土即三土三身之真性耳自性法性佛與眾生平等本具眾生雖具未得證因佛既轉依已能親證故云雖此身土體無差別而屬佛法相性異故佛地論云就能證因有差別故又此身土俱屬真如故云俱非色攝雖無小大以真如性徧一切法故云然隨事相其量無邊淨土有三謂法性土受用土變化土受用分二一自受用二他受用還依自土者即自受用土謂圓鏡下釋變土因緣周圓下釋莊嚴住持如淨下釋身土量等功德下釋身及土徧一切處他受用身亦依自土至能依身量亦無定限亦依自土者即依他受用土也謂平等下釋變土因緣由隨所宜土有勝劣身無定限隨意願力現起身土故名變化謂成事下釋變土因緣以變化身及變化土普利有情均霑法界故土有淨穢身亦無定限五身土相依竟下六身土同異自性身土一切如來至一佛能益一切生故自性身土俱屬真如是諸如來同所證故佛地論云法身實性一切如來皆共有故無有差別自受用下謂諸如來各別因緣各別身土雖變不同而諸佛土各各無邊不相妨礙餘二身土即他受用及變化身隨化有情共不共者義不定故是故如來底沙佛時曾與慈氏同為弟子佛觀釋迦所化有情善根先熟慈氏所化善根後熟又觀慈氏因行先滿釋迦後滿遂於一處入火光定令釋迦見七曰七夜不下一足一頌讚歎令超慈氏在前成佛又佛將欲入涅槃時作如是言我所應度皆已度訖又契經說佛涅槃時觀一所化現在非想非非想處當生此間應受佛化留一化身潛住此界先所受身現入涅槃彼從非想非非想沒來生此間佛所留化為說妙法成阿羅漢爾時化身方沒不現又諸經中處處宣說能化所化相屬決定是故諸佛所化不共如實義者有共不共所化共者下釋共變義令所化生自識變現者謂所當化生各第八識有共相種故與諸佛互相變現雖於諸佛各變身土而於有情謂於一土有一佛身為現神通說法饒益於不共者唯一佛變謂不共者唯是一佛令所化生自識變現諸有情下總結二變或多屬一者謂多眾生屬一佛化或一屬多者反上故所化生有共不共者結成上義不爾者謂若一向共一向不共之意故難云多佛久住世間各事劬勞實為無益何以故一佛能益一切生故佛地論七卷有釋文繁不引六身土同異竟下七身土淨穢此諸身土若淨若穢至一性因緣雜引生故無漏章中原是不必今改亦必者據佛地論無漏五蘊亦必同無漏識也佛地論云十地菩薩自心所變淨土有二若第八識所變淨土是有漏識相分攝故是有漏身所依處故雖無漏善力所資熏其相淨好而是有漏苦諦所攝隨加行等所現亦爾若隨後得無漏心變淨土影像是無漏識相分攝故從無漏善種子生故體是無漏道諦所攝言蘊等者即無漏五蘊一無漏淨戒名為戒蘊二無漏定名為定蘊三無漏慧名為慧蘊四無漏勝解名解脫蘊五無漏正見名解脫智見蘊前三是因後二是果五蘊法界一切三乘功德所依通學無學無學圓滿戒定慧三法因緣雜引生故學位分得戒定慧三隨用一性所引生故據佛地論一性雜引當作所引蘊等同異類此應知至不爾真如亦應非實例前所說變身變土能所同異義類於此第八有漏所變身土亦是有漏後得無漏所變身土亦是無漏故言同也第八所變不同後得後得所變不同第八故言異也不爾者牒前一往所談身土皆是隨機變現若不變現應無五蘊及十二處等者等餘十八界故然相下重釋假有謂前化種身土相分依識變現非如識性依他中實依他即蘊等言化身土不如蘊等是實不爾者謂若不以蘊等為實有唯識理應不成何以故許識內境俱實有故謂識與內境俱是實有故立唯識或識下重釋依他起義前說內境唯依相分釋依他起今兼見分故云相見等從緣生俱依他起虗實如識者見分是虗妄分別相分是實有之境二皆如識故立唯識唯言遣外者謂遣外執離心有境者立唯識言不遮內境者不遣內色實有之境不爾者謂若不是不遮內境真如亦應非實何以故以真如是根本智所緣名內境故七身土淨穢竟下八問答總結內境與識既並非虗至心與心所定相應故內境下是問詞謂心境俱實何不言唯境識而言唯識耶識唯下境亦通外者不離於心名為內境執離心有名為外境境通內外故立唯識不立唯境或諸下謂執境迷心沉淪生死觀心解脫能證涅槃令自觀心故立唯識非言唯識內境都無或相分下明相分真如皆不離識謂內相分必以識為體性由熏習力似外所執多分生故真如亦是識之實性者謂第八識依真如起含藏雜染故名為識故知若內若外有為無為皆不離識除識性外無別有法此中下復明見分心所法等皆不離識以全內外一切色心成唯識義此論三分成立唯識至乃得圓滿非增減故釋論題名成唯識者是以相分見分及自證分合成唯識故云三分合成名成唯識此依事立事外無理故說為成亦說下謂復有名淨唯識者顯唯識理最極明淨名淨唯識此依理立理外無事故名為淨謂此本論原為天親菩薩撮取瑜伽要義成三十頌今此論文由三十頌顯示唯識道理於相於性若因若果是真是妄或假或實有為無為內外等法究竟成就故云乃得圓滿雖三十頌約此妙理理不為減十卷論文演斯妙義義不為增故云非增減故八問答總結竟通上第二依教廣成分竟下第三釋結施願分已依聖教及正理至願共速登無上覺已依聖教及正理者此是護法等菩薩依前所引聖教及比量正理也分別唯識性相義者謂依聖教正理分別解釋唯識理中若性若相之義所獲功德施羣生者謂此解釋唯識大義令諸有情悟入唯識性相妙理所獲功德實非淺淺以此深大功德盡施羣生願共速登無上覺者願諸有情或悟唯識妙理或霑唯識功勛速疾共證無上菩提耳
