body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮科從二卷中廣辨唯識分二一三種能變至七卷中竟二五種外問分五一假説我法二種種分別中解釋頌意分三一正釋頌意二別釋緣義分五一廣明緣義七卷末竟二依處立因如是四緣依十五處至便顯此因是語依處問答以明依處立因也如是下標舉云何下問一語下釋依語依處立第一隨説因謂法名想者釋語依處以有法故依法立名以有名故尋名注想言語隨生故法名想是語依處謂依下釋隨説因語即能説義即所説隨説即義語處即因故即能説之語為所説義之因也復引集論證此隨説是名想見名字即名取相即想執著即見若依彼論説名想見便顯此中立隨説因是語依處瑜伽云三界法施設名為先故想轉想為先故語轉由語故隨見聞覺知起諸言説是故依語依處施設隨説因二領受依處至或成或得此是彼觀待因釋依領受依處立第二觀待因宗鏡云觀待此故此為因故於彼彼事若求若取此名彼觀待因如觀待手故手為因故有親持業觀待足故足為因故有往來業謂所下釋領受依處以能受為果所受為因以果必受因家功能然後成果故云能所受性謂觀下釋觀待因瑜伽云諸有欲求欲界樂者彼觀待此於諸欲具或為求得或為受用或有欲求色無色界樂者彼觀待此於諸所緣或為求得或為受用乃至諸有不欲苦者彼觀待此於彼生緣於彼斷緣或為遠離或為受用是依領受依處立觀待因大都以觀此受此此即所觀所受為因彼觀彼受彼即能觀能受為果三習氣依處至謂能牽引遠自果故釋依習氣依處立第三牽引因謂內下釋習氣依處習氣即種子以不能即生現行果故名未成熟謂能下釋牽引因宗鏡云一切種子望後自果名牽引因瑜伽云由淨不淨業熏習諸行於愛不愛趣中牽引愛不愛自果四有潤種子依處至謂能生起近自果故釋依有潤種子依處立第四生起因謂內下釋有潤依處即是潤生貪種既沃潤已即得能生現行果故謂能下釋生起因宗鏡云即諸種子望初自果名生起因瑜伽云愛名能潤種子是所潤由此所潤諸種子故先所牽引各別自體當得生起五無間滅依處至具攝受六辨無漏故釋依六處立第五攝受因前之三處即三種緣第八作用即所作法第九士用即能作人所作業如作殿堂作具如斧斤等作用如人受用器具等二俱除種子者即除親因緣第十真實見即無漏見除引自種者亦除因緣謂攝下釋攝受因總攝六種受為一因故名攝受除真實見依處攝受五辨有漏法兼真實見依處攝受六辨無漏法宗鏡云除種子外所餘諸緣名攝受因瑜伽云由欲繫諸法無間滅攝受故境攝受故根攝受故作用攝受故士用攝受故諸行轉如欲繫法如是色無色繫法亦爾或由真實見攝受故餘不繫法轉是故依六依處施設攝受因十一隨順依處至及能引得無為法故釋依隨順依處立第六引發因謂無下釋隨順依處三性種果各有隨順功能以一引多以劣引勝皆隨順故謂能下釋引發因宗鏡云即初種子所生起果望後種子所牽引果名引發因瑜伽云謂欲界善能引欲界勝善亦能引色無色界及出世善色界善能引色界勝善亦能引無色界及出世善無色界善能引自地勝善及引出世善出世善能引出世勝善及無為法十二差別功能依處至及各能得自界果故釋依差別功能依處立第七定異因謂有下釋差別依處功能即色心等法各各種子謂根塵識及善染等各有種子勢力引生因果相稱如十善業定引人天不引三塗十不善業定引三塗不引人天以善不善功能各別性不相稱故謂各下釋定異因宗鏡云種種異類各別因緣名定異因瑜伽云由欲界諸法自性功能有差別故能生種種自性功能色無色界亦爾十三和合依處至皆同生等一事業故釋依和合依處立第八同事因謂從領受下釋和合依處即前諸處唯除語依處餘十一處生等事業各各皆同名為和合謂從觀待下釋同事因即前諸因唯除隨説因餘之六因生等和合故名同事宗鏡云從觀待因至定異因如是諸因總攝為一名同事因瑜伽云謂由獲得自生和合故欲色無色及出世法生如生法和合住異滅法亦爾十四障礙依處至謂彼能違生等事故釋依障礙依處立第九相違因謂於下釋障礙依處即違損法能違能損生等事故謂彼下釋相違因宗鏡云於所生法能障礙因名相違因瑜伽云由欲色無色及出世法將得生事若障礙現前便不得生住異滅法亦爾十五障礙依處至謂彼不違生等事故釋依不障礙依處立第十不相違因謂於下釋不障礙依處即無違損法於生等事無違損故謂彼下釋不相違因宗鏡云此障礙因若闕若離名不相違因瑜伽釋義翻上應知二依處立因竟下三二因攝十如是十因二因所攝至彼二因亦有非因緣種故牒科標舉引論證十因二因所攝菩薩地者瑜伽十七地中名也彼謂第三率引第四生起名能生因所餘諸因即隨説等八方便因攝彼中約勝偏説將牽引生起二因分屬能生餘八分屬方便此説下論主發菩薩地中隱義謂彼能生因不但偏攝牽引生起二因猶有引發定異同事不相違四因中已成未成種子皆屬能生因故方便一因不獨餘八即牽引生起二因中有非因緣種亦是方便因攝問引發等四既許能生何故菩薩地中略此不説答云雖有現起等謂六因內四因現起雖有能生因義如六因外四因自種而多間斷故菩薩地略此不説又立種名以親辦果如穀麥等所餘因即方便因也謂方便因不但八種總十因中非因緣法皆名方便即初隨説二觀待五攝受九相違以上四因及六因中非因緣法總説為方便皆是生熟因緣種餘者即前成熟未成熟外非因緣法方便因攝問菩薩地説二因為能生所餘為方便此中何以六因為能生十因為方便答云非牽引生起二種唯屬彼二因餘之引發定異同事不相違中有因緣故非唯初二五九引發定異同事不相違之八因名所餘因而彼牽引生起二因中亦有非因緣種故有尋等地説生起因至彼生起因中有非因緣故復引論證十因二因所攝有尋等地者謂有尋有伺地無尋唯伺地無尋無伺地此亦瑜伽十七地中名也彼論中謂生起一因是能生因所餘九因方便因攝此文下論主發彼論中隱義謂彼論説生起因者亦説六因現行種子有因緣義皆名生起除因緣外非因緣法皆方便攝問有尋地説生起一因為能生餘九為方便何故復説六因為能生耶答非此生起唯屬生起一因彼餘牽引引發定異同事及不相違五因中亦有因緣義故非唯彼九非因緣義名所餘因即彼生起一因中亦有非因緣義或菩薩地所説牽引至餘方便攝準上應知此釋菩薩地隨勝偏説義非能生因即方便因也以二因中因緣義勝唯説二因為能生不説有方便非方便因即能生因也以餘因內增上義多偏説餘八為方便不説有能生問菩薩地説牽引生起二因為能生因有尋等地何故只説生起為能生不説牽引答云有尋等地等雖生起下釋成非因緣種即方便因也以生起因去果相近親生現行義顯偏説生起是能生因有因緣種即能生因也以牽引因去果疏遠親生現行義隱故不説牽引是能故因餘方便攝準前釋義三二因攝十竟下四緣處攝因所説四緣依何處立至而少隱故略不説之所説下問上四緣於十五處如何建立十因二因如何相攝論説下引菩薩地論文答上緣依處立之問謂依第三習氣種子依處第四有潤種子依處立因緣依第五無間滅依處立等無間緣依第六境界依處立所緣緣依所餘十一依處立增上緣此中下論主發論中種子隱義謂論説種子不唯第三第四依處亦攝十一隨順十二差別十三和合十五不障礙總上六依處中有因緣義皆名種子問既許六處共名因緣菩薩地中何故不説答云謂雖現起隨順差別和合及不障礙四依處中亦有因緣而多間斷故菩薩地略此不説或彼下釋彼論中立種子名或種下釋有尋等地唯以第四為種子義親疏取捨義如前釋言無間滅下釋等無間及所緣緣依處隱義謂此二緣不唯第五無間滅依處第六境界依處餘十三處亦有中間二緣義故但少而隱故彼論中略不説也論説因緣能生因攝至初能生攝進退如前引論答上四緣攝十因二因之問謂二因中能生因即十因中牽引生起二因攝因緣二因中方便因即十因中餘八因攝增上緣十因中攝受因攝中間二緣以攝受因中有六依處故問若增上緣方便因攝方便因即餘八因中間二緣何通攝受以攝受因方便因之餘八攝故若許方便攝後三緣是餘八因攝後三緣何唯攝受攝中二緣答云雖方便內具後三緣而增上緣隨多分説等無間緣及所緣緣攝受因中名相顯故故亦偏説初能生攝進退如前者菩薩地以牽引生起為能生有尋等地唯説生起為能生前以親疏隱顯辨明故云進退如前四緣處攝因竟下五因緣生果所説因緣必應有果至謂除前四餘所得果問答以明因緣生果有五種名義異熟果者業報身也宗鏡釋云有漏善者簡無漏善自相續者簡他身及非情若但言異熟不攝別報今言異熟生無記攝總別報主以善惡業為因招無記性為果因果不同性故名異熟果等流果者同類果也宗鏡云等謂平等流謂流類如第八識中三性種子各生三性現行果與因性同故即心種子生心現行色種子生色現行有漏無漏亦爾離繫果者聖所證也宗鏡云以擇滅無為為體體是無漏能斷道之所證得名離繫果以離障染所繫縛故士用果者作事成也瑜伽云一類於現法中依止隨一切工巧業處起士夫用所謂士農商賈書算占卜等事由此士夫之用成就諸稼穡財利等果增上果者四果之餘也宗鏡云增上殊勝名增上果但除四果外餘一切所得果者皆是此增上果收此增上果最廣如四緣中增上緣五見中邪見不簡有漏無漏有為無為但有所得果於前四果中所不攝皆是增上果中攝如眼識為眼根增上果類瑜伽等説習氣依處至不爾便應太寬太狹引論答上依處得果隨勝偏説謂第三依處及第十一第十第九此四依處得前四果所餘十一依處得增上果習氣處言下釋論中隱義以習氣處言顯諸依處感異熟果一切功能皆攝在習氣處中凡言諸字即餘十四依處故結云不爾便應太寬太狹謂若不是舉一攝諸而唯取一者太狹廣取諸者太寬或習氣者唯屬第三至餘已顯餘故此偏説釋論中隨勝偏説之義或習氣下謂異熟因雖餘處亦有此習氣依處亦有非異熟因而異熟因去果相遠習氣依處亦爾故論偏説習氣依處得異熟果隨順下謂等流果雖餘處亦得而隨順依處之引發因招等流果義相顯勝故偏説之真見士用俱如此釋所餘下釋論偏説餘十一處得增上果之義謂前四果雖各依一處而十一處亦得四果雖於四處亦得增上而十一處招增上果行相顯現故偏説之如是即説此五果中至十因四緣一切容得如是十因四緣配屬五果總答前問因緣生果之義先明五因一緣得異熟果牽引為正餘因為助七因二緣得等流果引發為正餘因為助言初後者初即因緣後即增上五因一緣得離繫果攝受為正餘因為助士用果中雖二義別釋皆以攝受為正但助因緣多少不同若以士用依處觀之彼處除種子即不得用牽引生起二因及與因緣當以前義唯用增上緣者為善唯增上果因無正助緣非增減故云十因四緣一切容得五因緣生果竟通上二別釋緣義竟下三正釋緣起傍論已了應辨正論至五識唯託第八相故結前傍論已竟起後緣生分別答前種種分別問義本識即第八識中種即八識各親種也以種子生現分別時一生則已無重生義故無等無間謂各下釋上容作三緣義謂八種分別現識各有親生種子是彼因緣種既生識識即緣種為所緣緣若諸種子於所生識有能助力或不障礙是增上緣染位種生緣既如此生淨現行亦唯三緣故云亦爾現起分別展轉相望容作三緣者明現行八識互相緣義非同前種生現故無因緣謂有情類自八識聚與他八識相望唯有所緣增上以非自類前後生滅故無等無間緣又自八識互相望時有相助義故有增上亦非前後滅生時説故無等無間緣所緣緣義有無不定八於七有下釋成謂第八識與前七識為所緣緣以前七識必仗第八為本質故前七於八無所緣緣以餘七識非第八識所仗質故又第七識於前六識前五無所緣第六有所緣以前五識不緣內故又餘六識於彼第七無所緣緣以第七識恆緣第八不緣外故又第六識於前五識無所緣緣以前五識唯託相分為所緣故餘五於彼第六識前有所緣緣以第六識內外色心自在緣故自類前後第六容三至能熏成彼相見種故釋上現起分別三緣皆具義自類前後者即各識自類前滅後生時也第六容三者謂前滅後生時有等無間緣即緣前念為所緣緣諸識同聚為增上緣餘除所緣者謂餘七種識各有定境第八緣三境第七緣第八前五緣相分故云取現境故五雖唯緣相分若於自類後念生時亦許緣前念為所緣者則前五第七如第六識亦有三緣前七於八所緣容有者雖則第八因中不緣前七而所緣相見種子是前七識能熏成種故云容有以緣種子能熏前七氣分有在同聚異體展轉相望至勿見分境不同質故此明心所互不相緣故無所緣唯有增上同聚異體者諸心所也所仗質同者於境同緣也此義未盡或依下別顯有相緣義謂諸心所於一相分互為質起故名緣相如識中種觸等五所共為相質是相緣義不爾者謂若不許共緣種子無色界中無所緣境以無色界唯緣種故設許變起定果色時第八王所亦定緣種勿謂見分所緣之境不同質故故於相分有相緣義同體相分為見二緣至但説現起互為緣故此明四分互緣義謂一識中雖有四分唯是一體故名同體為見二緣者相能引生見分是增上緣見分即緣相分為所緣緣見分於彼但有增上者以相分非能緣故無所緣緣見與自證相望亦爾者見有分別引生自證是增上緣自證即緣見分為境是所緣緣自證於彼但有增上者以見分不緣同體自證故無所緣緣餘二展轉俱作二緣者謂自證分證自證分互引互緣故有所緣亦有增上此中下結成前説現起分別展轉相望之義淨八識聚自他展轉至相分理無能緣用故此明轉依位中所緣皆有不同前説未轉依位有無不定唯除見分非相所緣者相非能緣無所緣義既現分別緣種現生至於非親種亦但增上躡前問辨謂現分別許緣種子現行方生種亦理應許緣現行種子方起故問云現行與種於各親種能作幾緣答云種必不由中二緣起謂種子位中必不由所緣緣等無間緣起何以故得心心所時立彼二緣故現於親種具作二緣者親生現行為因緣相助引生為增上與非親種但有增上者種既非親不生現行無因緣義種望親種同前現行依斯內識互為緣起至如餘論中具廣分別依斯下結前緣起牒破外執分別言者牒前頌中彼彼分別生之言也隨勝立名有多種別或説為二者謂墮意不墮意界內墮意是識界外不墮意是智三者心意識也四者善等四性也五者因果苦樂捨五位分別也如瑜伽論中廣明三正釋緣起竟通上二種種分別竟下三生死相續分三一牒義標問雖有內識而無外緣由何有情生死相續雖有內識而無外緣者牒大乘唯識正義由何有情生死相續者問也謂無外緣內心不起心不起故業自不生既無業種世間有情由何而有生死相續一牒義標問竟下二舉頌總答頌曰由諸業習氣至前異熟既盡復生餘異熟前二句頌三種習氣諸業即有支習氣二取即我執名言二種習氣後二句頌生死相續意謂由三習氣生死相續何假外緣方成生死二舉頌總答竟下三解釋頌意分四一業果相續論曰諸業福非福不動至業招生顯故頌先説福業即有漏善思為體自體及果俱可愛樂相殊勝故非福反上具業多少住一境性不移動故名不動業即上二界定地之業以定能令住一境故業之眷屬亦立業名者謂引業為種滿業為眷屬故云同招滿引異熟果故設問云業起即滅何能招果答云業雖無義能招當果而熏本識起自功能名為習氣是業下釋習氣名簡曾現者從熏習成簡非曾有既名種子簡非現起如是下釋業習氣招異熟果是增上緣非因緣故二取習氣皆屬能取所取有四一取相見二取名色三取心及心所四取本末本即總報末即別報言彼取者彼上四種所取皆是我執名言二取所攝彼所下謂彼種子從熏習生故名習氣此顯下釋二取習氣於異熟果心心所法為因緣種非增上故俱謂下釋俱字謂有支業種及二取種和合名俱是踈親緣互相助義者謂二取種為親因緣有支業種為疏增上由有因緣方顯增上由有增上助發因緣問論言業種但疏增上何頌先説答由業能招趣生顯勝故先説之前異熟者謂前前生至心心所法為彼性故釋後二句頌以答生死相續問也問既以二取為正因緣果報無窮何有前後異熟果耶答云雖二取等謂生死相續由三習氣有恆有間有難有易互相資助生死義成由業習氣受果有盡而性別難招者前前異熟盡矣由二取種受果無窮而性同易感者後後異熟生矣是為生死相續言有盡者業如香臭力有盡故言性別者果與業種性不同故果唯無記業屬善惡言難招者以業招果異世方熟等流增上二果合説者以增上義寬有等流處必有增上等流故性同增上故易感由感下牒釋正義破外執情此頌下結顯頌中説唯識義謂三習氣皆是心心所法為自性故故不離識一業果相續竟下二習氣相續復次生死相續由諸習氣至作有為法各別因緣總標三種習氣以為生死相續之因也名言習氣者習氣即種子此名言種即所知障種於境取像安立名言是所知義有為即生住異滅色心法也蘊處界三色心等法皆以名言所知為親種故名言下復開二種釋成上義以顯色心差別能詮音聲是相分色法了境王所是見分心法由依境故而起言説依言説故而能了境皆是色心妄織成種故云隨二名言別熏成種作有為法各別因緣以色與心義各別故二我執習氣謂虗妄執至令有情等自他差別我執習氣即煩惱種也於自他處執我我所煩惱隨生熏成種故我執下復開為二釋成上義以顯俱生分別見修所斷煩惱異故由我執故故有自他種種差別三有支習氣謂招三界至於差別果是增上緣有支習氣即業種也十二緣中行有二支俱名業故不説行支者行乃過去因此顯現熏成種故説有支等有支下復開二種釋成上義以顯善不善業愛非愛果諸趣別故應知下結顯三習氣中唯説我執有支於善惡果是增上緣以顯名言習氣是親因緣此頌所言業習氣者至俱等餘文義如前釋會通頌論所説三種習氣名義俱等餘文義如前釋者前説業種二取種俱及前前後後異熟等義二習氣相續竟下三業苦相續分二一親疏緣義復次生死相續由惑業苦至俱等餘文義如前釋釋生死相續由惑業苦無明一支發業愛取二支潤生此三煩惱總名為惑行有二支名諸業識等五支及生等二支總名為苦惑業苦三攝三習氣無明愛取識等生等即是我執名言二習氣行有二支是業習氣前二下明惑業苦三屬二種緣前二習氣者即上惑業二種也以業煩惱唯能助感名增上緣第三習氣者即上苦種也以此苦種親生苦果故名因緣頌三習氣如應當知者惑苦二種即是二取業種即是諸業習氣惑苦下釋三習氣名義有別惑即無明愛取名能取苦是苦界名所受故惑與苦俱名為取業不名取無著義故一親疏緣義竟下二惑等攝支分四一牒前標舉此惑業苦應知總攝十二有支至如論廣釋十二支者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死無明以行蘊中癡為體行以身語意思為體識以八種識為體名色以五蘊為體六入以六根為體觸體即遍行中觸受體即遍行中受愛體即三界貪取體通取煩惱有體即識等五及行支種生體即識等五現老死體即生支變滅一牒前標舉竟下二能所各二然十二支略攝為四至別助當業皆非行支無明與行是過去二支因故名能引能引識名色六入觸受五種果故此中無明能發行故行為業者有善惡故即彼下別釋行支名正感義謂行感後世故非順現受業行既名正感故非別助當業二所引支謂本識內至潤未潤時必不俱故此是現在五支果故名所引即識名色六入觸受五支是前無明與行所引發故此中下明識五種有攝不攝義此中識種謂本識因者以異熟有三謂異熟識異熟生異熟色異熟識種望識現行名本識因除後三因餘因皆是名色種攝者謂餘異熟生異熟色名餘因名種攝異熟生色種攝異熟色後三因者即六入觸受故云如後三種或名色種總攝五因者未正名攝識觸受三因色攝六處一因兼名色支共成五因所言因者即種子義於中隨勝立餘四種者隨六處支色中義勝隨識觸受三支名中義勝六處與識總別亦然者總即名色支別開色為六處支名為識支集論下執者引證名色種攝識支義論説識為能引者謂行業種即是識故識中業種既名識支則異熟識種不屬識支而當名色所攝展轉遷變理必應然經説下論主引緣起經以通集論之妨業為能引識為所引由業熏識招於當識故説業種識種俱名識故以此觀之不同集論唯是能引無識支義識是名色依非名色攝故者論主破前執名色支攝識支義問經説業識俱名為識亦可業識俱名為業以同時故豈不互名識等下答謂識等五由業熏發雖實同時而依主伴等相各異故謂識是主是總是勝是因名色等四是伴是別是劣是果相各有異以顯行業一支體非前後因果等別何名識支即業種耶或依下重解識等有差別義由斯下復明識等是現行行支在因時無現行義何執業種名為識支復由下重明識非業種謂業是能引因名未潤識等是所生果名已潤以果不同因故云潤未潤時必不俱故三能生支謂愛取有至親生當來識等種故此是現在三支因故名能生瑜伽十卷依二種緣建立緣起次第文繁不録今詳此論是從無明發起諸行由行引發識等五果又於果上復起無明於所緣境領受生愛愛後執取愛取合潤即前能引行業及所引識等五果轉名為有以行及識名色六入觸受六支俱能近有後有生等果故故後章云已潤六支合為有故又四取者一欲取二見取三戒取四我語取有處下二義釋有支雖未盡理亦不相違四所生支謂生老死至老非定有附死立支此是未來二支果故名所生謂從下釋成生老死位次第離脫前身未投後陰名為中有後身已生名為本有二能所各二竟下三問答廣明病何非支不遍定故至經説非有非彼全無病何非支問也不遍定故答也謂病不遍亦不定有故不立支問老不定有何故立支答老雖不定容有遍義故附死立諸界下釋成老有遍義名色不遍何故立支者質也以無色界無色支故故云不遍定故立支者釋也謂名色支一定有故故別立支以名色支在六處前六處未滿皆屬名色又名色支亦遍有故言未名六處及未名意處者顯是名色支攝由斯下引證十二有支遍三界有則名色支亦遍三界愛非下問以據不愛惡趣故云非遍定故別立下答謂唯不求者無有愛故若生善趣定有愛支問第三果人不起貪愛何非不遍答不還果人雖不起愛然取潤生定有愛種又愛下答愛支亦遍有也謂生惡趣於順我境亦生愛故依無下釋經中意何緣所生立生老死至分位相生説識等五問答以明因果位別也謂在因時難知當今果位顯了故立五支令其易曉以在果位易了差別相故立生老死令生厭故謂續生下釋立五支二支次第名義名五因者以有續生後果功能故言三苦者生即行苦老即苦苦死即壞苦然所生下結上二世生果立名未來名三苦令生厭故現在分五支令易知故何緣發業總立無明至而愛潤勝説是愛增問答以明發業潤業別義發業者業初起也以無明懵重故能發業潤業者業成就也以愛取情沈故能沃潤十一殊勝事者一所緣二行相三因緣四等起五轉異六邪行七相狀八作業九障礙十隨轉十一對治且依初後者謂數數溉灌必有初後取是著義以初於境唯立愛名後於境中有取著義故依初後分愛取二無明發業一發則已故無二義問既分愛取何云愛力偏增答云雖取支中等諸緣起支皆依自地至若現若種於理無違釋無明緣行等義如下無明發上行者例無明發行必依他地不爾下引辨謂伏下地無明能起上地定行若不許依他無明能發行者彼上地定應非行支若謂自地無明發自地行彼地無明猶未起故何有所伏能起彼定問從上生下下生上者緣何地受而起愛支答云亦緣當生地受者例同無明依他地義此十二支十因二果至或應過此便致無窮釋上因果同世異世謂無明至有為十因是現在生與老死為二果是未來故云定不同世因中前七與愛取有已潤則受現報現報定是同時故云或同未潤則受後報後報便成異世故云或異若二三七各定同世者二即生老死同屬未來三即愛取有同屬現在七即無明等亦同現在故各同世如是下結顯一重因果輪轉義成離斷常過謂果生非斷因滅非常施設兩重者過去二支因現在五支果現在三支因未來二支果意在顯輪轉離斷常立一因果則已故云兩重實為無用或應過此便致無窮者顯因果之多三問答廣明竟下四分屬諸門有十五章此十二支義門別者至七分位中亦起善染第一假實門謂有生老死三支是假餘九是實已潤六支即行識名色六入觸受是已潤果合為有者業從己潤和合妄造故説業有是假即識等五三相位別名生等故者亦顯生等二支依識等五支假立三相別者即生老死增長名生衰變名老壞位名死五是下第二一非一門瑜伽云幾是一事為自性謂五故今論云無明識等一見分事餘非一事者即行等七支是也三唯下第三染不染門三者無明愛取是煩惱性故名唯染七者識等五支生等二支是異熟果屬無記性名為不染若容起染假説通二餘通二種者行有二支染不染故無明下第四獨相雜相門無明愛取純是染故名為獨相行等九支通善染故名為雜相六唯下第五色非色門非色即心故無明等六唯屬心法識是心王無明愛取是染心所觸受二支遍行心所餘通二種者行等六支通色心故皆是下第六漏無漏門無明下第七四性門無明愛取是染心所唯通不善有覆無記行是業種故唯善惡有雖亦業以是行支及識等五支合為有故依行支故通説善惡依識等五説無覆無記言餘七者即識等五生等二是異熟果唯無覆性若起善染亦通三性雖皆通三界而有分有全至生淨居等於理無違雖皆下第八三界門謂欲界中一切支全色無色界一切支分上地下釋上二界一切支一分義六行相者一苦謂身中所起心數緣於貪欲不能出離是因苦欲界俱身飢渴寒熱病痛刀杖等種種所逼是果苦二粗謂欲界五塵能起衆惡是因粗此身為三十六物屎尿臭穢之所成就是果粗三障謂煩惱障覆蔽真性不能顯發是因障此身質礙不得自在是果障四勝亦曰淨謂厭欲界下劣貪欲之苦即欣初禪上勝禪定之樂是因勝復厭欲界飢渴等苦即欣初禪禪味之樂是果勝五妙謂既厭欲界貪欲五塵之樂心亂馳動為粗即欣初禪禪定之樂心定不動是因妙復厭欲界臭穢之身為粗即欣受得初禪之身如鏡中像雖有形色無有質礙是果妙六出亦曰離謂既厭欲界煩惱蓋障即欣初禪心得出離是因出復厭欲界之身質礙不得自在即欣初禪獲得五通之身自在無礙是果出所謂厭下苦粗障欣上勝妙出是求上生者所起六種行相也一切下第九學無學門謂十二支非是學與無學聖人所有彼有漏善以明為緣即與有支相違不造後業故於苦果亦不迷求問不感後有何生上界答雜修等有漏天中修無漏名為雜修言故業者乃無雲福生廣果三天之業有義無明唯見所斷至餘九皆通見修所斷第十見修門此義未正謂無明支唯見道斷無修道斷要迷下釋諸聖者無有無明不迷諦理不發行業故於後有亦不迷造愛取二支唯修斷者顯是俱生無見所斷引九種心證唯俱生雜集論云相續力者有九種命終心與自體愛相應於三界中各令欲色無色界生相續一者從欲界沒還生欲界即以欲界自體愛相應命終心結生相續二者從欲界沒若生色界即以色界自體愛相應命終心結生相續三者從欲界沒若生無色界即以無色界自體愛相應命終心結生相續如是欲界沒有三種色界無色界沒各有三種共成九種有義一切皆通二斷至唯修所斷助者不定正義破前謂十二支通見修斷論説下引瑜伽證若無下破唯見斷若愛下破唯修斷又説下復引論意證前無明正發行者唯見所斷不説愛取唯修斷也全界即三界也謂三界中一切煩惱皆能結生往惡趣行唯分別起無明能發不言潤生愛取煩惱唯修所斷復釋云謂論中説感後有行皆見所斷無明能發由此下結顯正義二斷俱通然無明下釋無明愛取有正有助若依正發正潤故有唯見唯修二斷今據助者不定亦通見修又染污法自性應斷至於前諸斷如應當知又染下明染法應斷一切下明淨法理不應斷然有二義説之為斷一離縛下謂前六識中所起施等有漏善法被第七識念念執我不能亡相名縛斷彼名離故釋云謂斷緣彼雜彼煩惱二彼字俱指不染污法即第八無覆無記性并前六識中有漏善法被第七識緣而執我故既緣彼無記之法受染法熏故曰雜彼二不生下謂善與無覆無記法以諸趣為依斷彼依時自不生矣依離下釋不染亦通二種斷善與無覆等覺方斷故唯修斷惡趣無想是彼所依一真見道永不生故故見所斷説十二下結顯前説十二有支一切皆通見修所斷十樂捨俱受不與受至五亦集諦攝業煩惱性故十樂捨下十一三受門謂除受支及老死支餘十俱通樂捨二受以受不與受俱故老死位中雖能容捨多無樂受故亦除之又除受支餘十一支苦受俱故觀此論文十二支中唯除受支非三受俱又老死支雖非樂受俱然通苦捨受其餘十支三受俱通十一少分下十二三苦門謂除老死餘十一支各有少分是壞苦攝問何除老死支答壞苦因樂以樂壞時其苦必至名為壞樂之苦依樂立壞不説老死以老死支多無樂故又十二支各有少分苦苦所攝以一切支非全苦故又十二支全分俱是行苦所攝以諸有漏是行苦故依捨受説者謂此三苦同上三受壞苦同樂受苦苦同苦受行苦同捨受以彼捨受不違苦樂則此行苦總前二苦各攝少分合為全分又説苦苦是苦果雜集云苦受即用苦體為自相故名苦苦性壞苦是苦因雜集云此中樂受及隨順樂受法於變壞位能生憂惱故樂變壞是壞苦因行苦是苦種以行是業名業種故雜集云謂苦壞二苦粗重所隨故以粗重言即種子義十一少分除老死支如壞苦説者謂此行苦單隨壞苦故亦除老死唯十一少分實義下結前教意如文皆苦諦下十三四諦門謂十二支屬流轉門是取蘊性唯苦諦攝五亦集諦攝者行有二支無明愛取合有五支是業煩惱亦通集諦諸支相望增上定有至依現愛取唯業有説十四四緣門謂十二有支相望增上定有以彼增上緣體寬故故緣起經唯説有一餘之三緣有無不定者以餘三緣其義局故故略不説問何名因緣有無不定文中答釋有三一答實有二明不定三例餘支愛望下釋因緣有無不定義愛望於取有因緣者愛增為取也以初愛時愛是種子愛後方取取是現行故愛是取家之種子取是愛家之現行有因緣義有望於生有因緣者識增為有也以彼有支元無別體由愛取潤識等五種成有支故有即識種生即識現識種有支生生識現有因緣義此一答實有也若説下謂若以識種為識支則行望於識但有增上今以業種為識支則行望於識有因緣義此二明不定也餘支相望無因緣者謂無明名色六處觸受老死諸支相望俱非因緣此三例餘支也問餘既無因緣何故論説無明望行有因緣義答云而集論説無明望行等謂無明時行業習氣與無明俱假説無明實是行種與行為因立因緣故問既愛望取及有望生有因緣者何故論説諸支相望無因緣耶答云瑜伽依現愛取唯業有説依現愛取者會上愛望於取得有因緣今以現行之愛望現行取非彼自種故非因緣唯業有説者會上有望於生得有因緣今唯業種望生現行業非識故但有增上無因緣理問因緣已辨云何所緣及等無間有無不定下文答釋無明望行愛望於取至諸聰慧者如理應思釋等無間及所緣緣有無不定義無明望行愛望於取生望老死有二緣者此據現行望現行也以無明發行行即無明無明心滅引生行心愛增為取取即是愛前愛心滅引生後取生及老死但是識與名色增長衰變增長心滅引生衰變故此三位有等無間又行心生得緣無明取即緣愛老死緣生則無明支與愛及生為行取二及老死支所緣緣故此明三位具二緣也有望於生受望於愛無等無間有所緣緣者此據種子望現行也有支業種望生現行及樂受種望愛現行無等無間者以無間緣唯是現行引生現行非種子故又生現行從有種生得緣種子愛現亦然故有種受種與生現愛現為所緣緣此明二位具一緣也餘支相望二俱非有者此據種子望種子也謂行望於識識望名色名色望六入六入望觸觸望受支取望有支此中六位相望共有八支俱是種子謂行為識因識等五支皆是種子取為有因有亦種子既非現行引生現行無等無間種無能緣無所緣緣此明餘支無二緣也總上具二具一及與不具故此二緣有無不定此中下總結十二有支於四緣中唯依四義立緣起義一日鄰近即無明鄰行行近識等二曰順次即無明乃至老死三日不雜即無明唯是無明不雜行業行不雜識等四日實説唯據各支實種現説無假借説異此相聖為緣不定者異上四義為四種緣義多不定異上鄰近則為隔越如於一支越一越二越多支故異上順次則為逆次如從老死乃至無明異上不雜則為雜亂如説業種名識支故異上實説則為假説如集論説無明俱時思業習氣實是行種假説無明此上隔越逆次雜亂假説四義清涼疏中詳明文繁不引故復結云諸聰慧者如理應思惑業苦三攝十二者至故此能令生死相續十五惑業苦門無明愛取是染心所故惑所攝行有二支招感後果故業所攝問有支何唯一分答有通業苦故各一分識等生等及有一分是取蘊性故苦所攝又説有支是已潤六支合為有故一分隨業一分隨苦有處下釋餘論中義謂彼説業全攝有者依業有説不依苦有又説識支是業所攝非苦攝者彼依論説識中業種名識支故惑業能招苦是所招為令生厭故立苦名由惑下結答前問生死相續義四分屬諸門竟通上三業苦相續竟下四因緣相續分三一正明因緣復次生死相續至轉令異本如變化故立內因緣破彼執外顯續生死不離唯識因謂下釋內因緣感生死苦故以二業為親因名為正感二障為疏緣名為助感所以者何徵釋上義生死有二者總標文中別釋分段生死者有漏業因煩惱障緣有定限故變易生死者無漏業因所知障緣無定限故有分別業即悲願思也以悲願心分別衆生度非度理由悲願下釋變易名問改轉身命唯名變易何名生死耶答覺知力盡名死入定還資名生無漏定下釋不思議名或以變易生死名意成身隨彼度生意願成故此中二果二業為正感之因二障為助感之緣者唯依等流果説若依異熟果必以二障為正因緣二業但為助感增上緣也如契經下引證二種生死各有三種身取即煩惱障故説為緣三有即三身謂本有身中有身後有身無明習地即所知障亦説為緣三種意成身者謂阿羅漢得三昧樂意成身獨覺得覺法自性意成身已得自在菩薩得俱生無作意成身一正明因緣竟下二問答廣辨如有論説聲聞無學至無能發業潤生用故如有下問也謂無學人身智俱泯云何能證菩提依變化下答也業報身最後身也既盡後有依變化身證無上覺不違理故若所知下小乘難問無餘涅槃二乘極果也謂二乘人既有所知障在常感生死如諸異生拘煩惱性應不永入無餘涅槃如何聖道二乘實能感苦誰言實感者論主質辨不爾如何者小乘復問無漏定願資有漏業者論主釋地上菩薩異熟識中善染種子名有漏業故以所知障願資助假説名感如是下釋但助感然所下釋不能感總此三義釋所知障不能實感生死何用資感生死苦為至乃至證得無上菩提何用下外人問自證下論主答謂不定性等者釋自證菩提及利樂他義不定性者回向大乘獨覺聲聞得自在者九地菩薩得心自在十地菩薩得法自在回心聲聞煩惱永斷自在菩薩煩惱永伏無由發潤當分段身恐廢下釋資變易生死宗鏡云成二利故更須資身勝定願力者定即無漏業願即所知障資變易身為因令彼長時與果不絶數數資助得證菩提彼復何須所知障助至出三界者隨助因説彼復下外人問既未圓證下論主釋宗鏡云既未圓證無相大悲一味平等之解若不執菩提可求有情可度無有因由發起猛利大悲及猛利願以所知障可求可度執為先方能發起無漏有分別業故説與業為因應知執有菩提及有有情名所知障即所知障發起悲願轉名為業又所知下釋所知障有大助力六七法執名所知障念念起執令異熟法成有漏故故所知障為有漏依助有漏法令身久住若所留身下釋所知障通二種身四禪四空有漏定願即所知障與煩惱障資有漏業感分段身有學二乘未離界繫與諸異生共所知故無學聲聞自在菩薩無漏定願亦所知障資無漏業感變易身非彼有學異生知境由此下結成所知障通二種果即二種身謂所知障雖感無漏變易生死為增上果而能感之性即所知障原是有漏異熟果中正因緣攝故云於無漏業是增上果聖説所知出三界者是隨助感善無漏業增上緣説若所知障作正因緣感異熟果界內界外俱得通故如阿羅漢斷盡煩惱出於三界而有所知資無漏業感變易身名異熟果是有漏性故通界外二問答廣辨竟下三牒釋頌意頌中所言諸業習氣至轉識間斷非異熟故牒上頌詞以合論意二業即有漏無漏業也二障即煩惱所知障也俱字等義前已釋過問既名變易生死還有前後異熟果否答云變易生死乃至亦有前盡餘復生者以釋頌中後二句義問生死相續是現行義何故頌中唯説習氣種子答云雖亦由現生死相續而三習氣種子定有故頌偏説真異熟者即第八識謂或唯顯第八為因不説現起前七轉識問第八現識亦可為因何偏説種答現異熟因不即與果以前滅已後果方生問既名轉識相續義成答轉識有間斷非異熟因故故頌説種子與現果為因有生死相續前中後際生死輪回至由此應知唯有內識前中後際下謂染生死不待外緣淨法相續亦由內識謂無始下釋上淨法相續亦由內識不待外緣以顯染淨皆唯識義四因緣相續竟通上三生死相續竟下四經説三性分三一牒義標問若唯有識何故世尊處處經中説有三性若唯有識者牒大乘唯識義何故下引聖言證之經説有三性而言唯識者與教相違故發此問一牒義標問竟下二總答舉頌應知三性亦不離識至如無常等性非不見此彼初句頌能計之心第二句頌所計之境第三四句頌能所俱空第五六句頌依他起性即見相二分從虗妄分別為緣生故第七八句頌圓成實於依他起上常遠離前遍計所執能取所取即彼二空所顯之性名圓成實九句十句頌圓成實與依他起不即不離第十一句喻上非異非不異義第十二句謂非不證見此圓成實性而能了彼依他起性如幻事等二總答舉頌竟下三解釋頌意分三一正釋頌意分五一釋前四句分二一釋頌意論曰周遍計度故名遍計至已廣顯彼不可得故此中總釋前四句頌周遍下釋第一句名虗妄心為能遍計即由下牒第一句義復釋第二句為所遍計即是五蘊十二處十八界等或執為法或執為我是遍計自性別執為斷別執為常是遍計差別此所下釋第三四句總顯能所取空不可得故或初下復略別釋前四句頌謂遍計性前總釋文中已廣顯不可得義一釋頌意竟下二辨能所初能遍計自性云何至曾無有執非能熏故問答以明能遍計之心也初義即安慧師未正謂八種識及諸心所皆能遍計在有漏位皆以虗妄分別為自性故皆似妄執所取能取現故復引經説阿賴耶識以遍計性妄執識中種子為所緣故次義護法師正理謂第六七及彼心所執我執法為能遍計唯説下引證意即第七意識即第六計度分別能遍計者顯是第六執我法者必是慧故兼顯第七六七二識俱慧心所故能起執二執下謂第六七識執我執法必無明俱既諸心所皆能遍計諸心所中有善心所故破云不説無明有善性故問何名善性答謂無癡等復難云癡無癡等不相應故導空智即是行捨名為寂靜故破云不見有執是導空智執有執無即是有執無執導空既無執不與有執俱起非能熏者即是所熏破執第八是能遍計意云曾無有執是所熏故有漏心等不證實故至遍計不同故言彼彼釋前師執有漏心等虗妄分別皆能遍計義謂有漏位心心所法不證圓成實理故名虗妄雖似妄執能所相現而非一切皆能遍計意顯亦有不遍計者在前師據似能所取執心心所皆能遍計故此難云勿無漏心亦有執故如來後得應有執故以後得智亦有似能所義經説下引證後得智中似能所現如鏡等者謂雖現像不執實有若謂如來無能所緣應非有智及所緣境雖説下謂彼經中雖説藏識緣遍計執所熏之種不説唯緣種子不緣餘境故非誠證由斯下結顯能遍計正義謂唯六七相應心品有能遍計餘識不能應知有四料揀一有遍非計如無漏心有漏善識能遍廣緣而非計執二有計非遍如有漏第七唯緣第八非遍起我法執有計三亦遍亦計謂衆生心即第六識通緣內外曰遍恆起我法曰計四非遍非計即有漏五識及第八識各了自境非遍不起分別非計識品雖二而有二乃至十等言二者一名二義三者一分別戲論所依緣二見及慢三貪瞋癡四者一自相二差別三所取相四能取相五者一依名遍計義二依義遍計名三依名遍計名四依義遍計義五依二遍計二六者一自性二差別三覺悟四隨眠五加行六名七者即前第六名遍計中所攝一有為二無為三常四無常五善六不善七無記八者一自性二差別三總持四我五我所六愛七不愛八愛不愛俱違九者亦前第六名遍計中所攝一此為何物二云何此物三此是何物四此物云何五或為色蘊六或為受蘊七或為想蘊八或為行蘊九或為識蘊十者即前六種遍計中前五種及五加行遍計中復有五種一貪愛二瞋恚三合會四別種五隨捨通為十也次所遍計自性云何至而非所緣緣故非所遍計問答以明所遍計之境也圓成下外人問真非下論主答謂圓成是真遍計是妄非彼所緣依展轉下是縱詞謂圓成實與依他起不即不離若依他起是遍計性之所執則圓成實亦可為遍計所執復奪破云雖是彼境而非所緣緣故非所遍計以真必不引生妄故二辨能所竟通上一釋前四句竟下二釋第五句遍計所執其相云何至二取名為遍計所執遍計所執前云謂所妄執蘊處界等蘊等即依他故問何別有義下是安慧答詞未正謂見相分虗妄熏習情有理無此相説為遍計所執者相即見相二分之相遍計即見分所執即相分二所依下釋依他起二即見相二分所依之體即自證分實託緣生名依他起問云何知然答諸聖教説虗妄分別等有義一切心及心所至不許應知有漏亦爾正義破前謂見相分皆是一切心心所法熏習所變從衆緣生亦依他起何執見相為遍計性又遍許性依見相分妄執有無一異等此有無二及一異等二方名遍計所執豈以見相二分名為遍計所執諸聖下引證依他起非唯一種義攝論云云何成立諸識為唯識略説有三相一者唯量義無所有故二者唯二謂有相及見識故三者唯種種謂種種相生起故天親釋云唯量者唯是識量一切諸識皆唯識量由所識義無所有故唯二者成立有相及見故即此一識一分成相第二分成見此是眼等識二分故唯種種者即此一識所起六塵識為相意識為見意識境不定故説唯種種是故一識能別為見所別為相總不離識得成唯識復引論證難破前執相等四法即相見自證及證自證分也十一識等者一身識謂眼等五界二身者識謂染污識三受者識謂意界四應受識謂色等六外界五正受識謂六識界六世識謂生死相續不斷識七數識謂從一至阿僧祇八處識謂器世間九言説識謂見聞覺知四種言説此等九識皆是依止見聞等名言熏習差別為因十自他差別識謂依止身差別以我見熏習為因十一善惡兩道生死識謂生死趣無量種從有支熏習種子生已上諸相論皆説為依他起攝曾不説為遍計所執故不爾者謂若不以見相為依他必為遍計者故難云無漏等以無漏心亦有二分許智二分是遍計執應聖智不緣二分生緣二分智應非道諦不許智品二分是遍計執應知有漏二分亦非遍計既非遍計豈不為依他又若二分是遍計所執至依他衆緣而得起故此以喻破遍計非實以相分色為見分所緣緣有實體故豈同兔角非實又應下復以種子義破謂若二分是遍計性遍計虗妄不熏成種既無前種後亦不生故云後識等生應無二分又習氣種是相分攝豈如兔角非有之法能作因緣若緣下以安慧執唯自證分是依他起非相見分故此破云謂相見分必以自證為因生能依相見既非依他所依自證亦非依他故云無異因故由斯下結顯依他起正義二釋第五句竟下三釋第六句頌言分別緣所生者至皆是此中依他起攝謂頌中言分別緣所生者唯染分依他起法淨分依他亦圓成實無分別故或諸下又作一解謂染淨等心心所法皆名分別以能緣慮故皆攝在此依他起中三釋第六句竟下四釋第七八句二空所顯圓滿成就至真如離有離無性故二空下標名顯此下釋義自相諸法各別體也共相同是無常性也虗空我等妄所執也依他妄計皆非圓成故俱簡之無漏有為者涅槃菩提二種果也故云離倒究竟勝用周遍亦得圓成實名説初非後者初約理説即二空等後約果説即無漏等今頌中説圓成實者是約理説非談果故此即下此字即圓成總釋頌中圓成實於彼常遠離前性義説於下別釋於彼二字以畢第七句頌義常遠離下釋第八句作三節別釋一常遠離言顯離遍計二前言顯離依他三性言顯圓成實故言離有者即離依他離無者即離遍計以顯性字是圓成實體四釋第七八句竟下五釋後四句由前理故此圓成實至勝義世俗相待有故由前下略總釋二句頌意異應真如下辨非異非不異義真如即圓成彼即依他起若異者應圓成實非是依他起之實性以依他起必圓成為性若不異即應是同圓成同依他圓成應是無常以依他起無常義故依他反上彼此下難境智不別謂依他是不淨境後得智所緣圓成是淨境根本智所緣若不異者俱應無別云何二性非異非一者問也非一即非不異也謂此依他圓成二性云何非異又非不異如彼下舉喻答如諸聖教説彼色心有為行法皆是無常苦空無我之法以色心法各別有體是為自相同屬無常等是為共相若無常等性與行等法異應彼行法非無常等以行等法無常性故若不異者此無常性應是彼行法之自相不應是共相而言共者無常自無常行法自行法方顯共義豈得不異耶由斯下以喻合法結顯九十十一三句頌義法即諸法喻依他起名世俗諦性即無常等喻圓成實名勝義諦二俱不即不離云相待有故理必應然非不證見此圓成實至皆如幻事等雖有而非真非不下略標頌義此即圓成遍計彼即依他圓成遍計共是依他起所顯無分別下釋上非不證見下二句無分別智即根本智得證真如圓成實已方起後得了依他起如幻事等若不證真於依他起妄執為實問從無始來心心所法緣相見等已能了達何待後得智方能了耶答中釋上未達遍計下二句謂心心所從無始來雖緣相見分等而我法執恆俱行故故不能知自心心所虗妄變現如幻事等非有似有猶如下以八種喻喻虗妄不實此中八喻各別之義清涼疏中詳明文繁不引依如是下引證上義初一句引證前頌非不見此四字之義後三句引證頌中彼字以前頌中所言彼字即指依他諸行法故五釋後四句竟通上一正釋頌意竟下二結明三性此中意説三種自性至是故此三不離心等此中下標舉三性皆不離心謂心心所下釋依他起從心變故愚夫下釋遍計性亦不離心以彼亦從自心法上妄所執故依他下釋圓成實亦不離心以圓成實即心心所真實性故故總結云如是此三不離心等二結明三性竟下三分屬諸門有十四章虗空擇滅非擇滅等至無顛倒故圓成實攝一無為門虗空下問也三皆容攝者答也心等下釋成謂從心生顯是依他若執實有即遍計性唯假施設是圓成實有漏下第二漏無漏門謂漏無漏唯通二性依他起性通漏無漏圓成實性唯無漏攝何非遍計要起妄執方有彼故如是三性與七真如至皆有妄執緣生理故三七真如門如是下問也答中先明七種真如名此七種名即真如相七種實性即真如體言安立者即蘊處界以能安立諸有情故名為苦諦又邪行者即業煩惱以有漏故名為集諦餘義如文此七下答上相攝義謂七種性是真如體故皆容與圓成實攝二三六七根本智攝一四及五後得智攝七種相共攝三性流轉安立及邪行三遍計依他二性所攝俱有妄執雜染故實相唯識清淨正行四皆容與圓成實攝第四六法門三性下問也答中謂五蘊無為名為六法皆具三性妄執即遍計緣生即依他理即圓成故三性五事相攝云何至四從緣生皆依他攝五五事門三性下問也相名分別真如正智名為五事瑜伽云若欲了知真實義者常先了知略有五事一相二名三分別四真如五正智何等為相謂若略説所有言談安足處事何等為名謂即於相所有增語何等為分別謂三界行中所有心心所何等為真如謂法無我所顯聖智所行非一切言談安足處事何等正智謂略有三種一分別所攝智名世間智二根本所攝智名出世間智三後得所攝智名世出世間智諸聖教説相攝不定者答也文中別釋相攝不定義謂或下論主引教謂依他起攝相名分別正智四種圓成實性攝一真如遍計不攝瑜伽云初自性五法中幾所攝答都非所攝第二自性幾所攝答四所攝第三自性幾所攝答一所攝彼此相順引而證之彼説下論主釋教中意言有漏者染依他也故説所詮是相能詮即名能變之心名為分別言無漏者淨依他也故説正智離戲論故不攝能所四事從緣生皆依他起攝不釋第五義顯現故遍計不攝非妄執故或復有處説依他起至二無倒故圓成實攝第二引教依他起攝相及分別相見分故遍計攝名妄有名故正智真如攝圓成實無顛倒故彼説下論主釋教中意如次應知或有處説依他起性至隨情立為名相二事第三引教三性攝五事如文彼説下論主釋謂教中説相見二分總名分別故説分別為依他起妄執相名為能所詮故攝遍計餘義顯現論主不釋復有處説名屬依他起性至體實非有假立義名第四引教名即依他之名是所執之境依相見分等立故屬依他義即遍計之義是能執之心妄有分別故屬遍計彼説下論主釋謂有漏位心心所法相見分等立依他名由名勢力引能計心起計度故成所遍計故説此名屬依他起遍計之心隨依他名橫計度故則名上之義體實非有故説此義屬遍計執此順初義不許五事遍計所攝遍計雖執名而名自屬依他唯名中義是所妄執餘不言者同前義故諸聖教中所説五事至如瑜伽論廣説應知總結教義皆不相違然初所説者即一往所談之意不相雜亂者釋無違也又聖教中説有五相至無漏智等為自性故六五相門又聖下問也顯揚論云復次如前所説有五種相謂能詮相所詮相此二相屬相執著相不執著相又有三相謂遍計所執相依他起相圓成實相為五攝三為三攝五耶頌曰依三相應知建立五種相彼如其所應別別有五業當知依三自相建立五相所以者何初及第二依三自相第三依遍計所執相第四依依他起相第五依圓成實相所詮能詮下論主答前二相各具三性義所詮下總答謂妄下別釋所詮能詮是五事章中義故前章云心心所法變似所詮説名為相似能詮現施設為名能變心等立為分別今説妄計屬初性者是妄想上能詮所詮二相屬初遍計又相名分別三事隨應能所屬依他起以名分別應能詮相相是所緣應所詮相真如應所正智應能俱屬圓成以根本智遠離能所故云後得變似能詮相故二相屬下答後三種相如次配三性二相屬者二即義名謂遍計心隨名勢力橫計度故唯屬初性下二配釋如次應知又聖教中説四真實至後二真實唯屬第三七四真實門世間真實者謂世俗名言熏習所成境如金非木木非水等是真實義道理真實者謂諸正智比量推度所知境如瓶等無常實非是常空等是常實非無常是道理真實義煩惱障盡智所行真實者謂諸聲聞獨覺所行境如彼歷觀四諦境時入人空觀不起我執智得清淨境非虗妄是無漏智所行真實義所知障盡智所行真實者謂諸菩薩諸薄伽梵所行之境如彼正智觀真如時已入法空最極清淨智與真如真實平等是一切智所行真實義顯揚第六廣明此義世間道理下以四真實攝三種性謂前二真實依他起攝於五事中相名分別三事攝故後二真實圓成實攝於五事中正智真如二事攝故辨中下復引他論相攝別義謂世間真實唯攝遍計是諸有情共所執故道理真實三性通攝有執攝遍計雜染攝依他無執清淨圓成實攝煩惱所知二障盡智唯屬圓成三性四諦相攝云何至無我所顯為自相故八四諦門問答以明三性通攝四諦義也且苦下別標苦諦有無常等四各通三性無常三者下一無性者性本無故屬初遍計二起盡者盡即是滅法有起滅屬依他起三垢淨者垢染既淨即圓成實下文三性俱如次配苦有三者下一所取苦者妄執我法故名遍計二言三苦者生苦苦苦壞苦為三即蘊處界或生老死故屬依他三和合苦者三苦和合三相俱泯屬圓成實空有三者下性非有者遍計無體故與妄所執自性異者依他如幻遍計本無故説有異二空所顯者即妄明真故三空三性如次配釋無我三者下三種無我與此三性如次配釋苦諦竟集諦三者一習氣集至或假或實如理應知集諦三者下言習氣者謂遍計性執習氣種立習氣名言等起者謂業煩惱依他心等有起滅故言未離繫者圓成真如同界繫故滅諦三相俱屬圓成但於所滅通餘二性自性不生者遍計自性永不生故二取不生者見相二取依他性故滅即真如故名本性道諦三者下如次配釋三性遍知道中亦通後二者三性俱通故永斷遍知通依他作證遍知通圓成言七三者苦諦有四三集滅道有三三故有七三於三性中如次配釋三解脫門所行境界至如次此三是彼境故第九解脫門三解脫門者謂空解脫門無願解脫門無相解脫門今舉問答以明攝義謂若據理三解脫門皆通三性故於三性皆攝三門若隨相攝各通一種謂此三性能縛有情聖智治之得三解脫由遍計執有以空治之而得解脫依他色心是諸欲本以無願治之而得解脫圓成實體真實有故以無相治之而得解脫若執圓成真實有者亦是法執故亦治之緣此下第十三忍門謂緣三性復生三忍三無生者三性之境不生也三境不生得證三智故名三忍由觀遍計自性本空名本性無生忍依他從緣不同外執自然生故名自然無生忍惑即遍計苦即依他圓成離彼名惑苦無生忍此三云何攝彼二諦至圓成實性唯聖智境十一二諦門問答以明三性攝真俗二諦也應知下總標俗諦通三真諦唯一世俗下釋世俗三種如次攝三性勝義下釋成勝義亦有三種總攝圓成義勝義者勝義中勝義諦也故曰真如勝之義故者勝即真如為所依義即勝義為能依能所依彰依主釋也得勝義者謂義體上能持所得圓滿寂滅之業用故曰涅槃勝即義故者勝即涅槃義即是體體持業用持業釋也三行勝義亦名持業釋十二二智門問云如是三性何智所行答中二義釋遍計初義都非智行次義亦通二智謂愚執遍計實有聖者通達本無餘義如文此三性中幾假幾實至妄執緣起真義別故十三假實門此三下問也答中先釋遍計亦可假説亦非假實次釋依他有假有實聚集如瓶盆相續如三世分位即不相應行故説為假色心之法既從緣生對假説實若無下通釋前二遍計無實故亦無假依他實有復立假名圓成下釋圓成實唯是實義十四異不異門應説俱非者非異非不異也無別體故釋非異真如門也妄執即遍計緣起即依他真義即圓成三種別故釋非不異生滅門也如是三性義類無邊恐厭繁文略示綱要總結三性諸門相攝若依瑜伽義類無邊此中略示綱要三分屬諸門竟通上四經説三性竟
