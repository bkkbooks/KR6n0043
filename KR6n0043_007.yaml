body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前第三能變中舉頌總答分三一能變本識二相應心所分三一略標六位二廣顯差別分五一遍行別境五卷中竟二善位三根惑位四隨惑位六卷中竟此中第五不定位分三一結前標問已説二十隨煩惱相不定有四其相云何一結前標問竟下二舉頌總答頌曰不定謂悔眠尋伺二各二總頌不定位中四種心所名一悔二眠三尋四伺二各二者有二義一釋名悔眠為一尋伺為一是為二悔與眠是二尋與伺亦二是為各二此言名之二各有二也二釋義者謂悔與眠各具善染二義是為二各二至尋與伺亦爾此言義之二各有二也二舉頌總答竟下三解釋頌意分二一正釋頌意論曰悔眠尋伺於善染等至如餘蓋纏心相應故論曰下釋初句頌中不定位名非如下引定位顯不定謂觸等定遍心欲等定遍地此不如彼故名不定悔謂惡作下釋悔心所體性業用以悔多掉舉故能障止問既名為悔何又名惡作答此即於果假立因名又言先惡後悔者惡憎惡也謂悔是果惡作是因故可假立先惡所作業者作不善業也以不善業憎惡起故悔先不作者不作善業也以不作善故追悔言我先不作如是善業是惡我先不曾作故眠謂睡眠下釋眠心所體性業用性既昧略故能障觀謂睡眠位身不自在者釋不自在及昧略義一門轉者是意識暗劣門顯五識不行故昧簡在定者定心一境略而不昧此顯睡眠性暗昧故略別窹時者窹時廣緣不得稱略此顯睡眠性是忽略故云令顯睡眠非無體用有無心位假立此名者謂他處云無心位睡眠者乃是假立其名非實有體以顯此中睡眠必有體故如餘蓋纏心相應故者蓋有五蓋瑜伽二十四卷云蓋謂貪欲蓋及與瞋恚蓋沉睡眠蓋掉舉惡作蓋第五是疑蓋纏有八纏十纏俱舍云纏八無慚愧嫉慳并悔眠及掉舉惛沉或十加忿覆有義此二唯癡為體至隨癡相説名世俗有有義此二唯癡為體者未正謂悔與眠唯是染分及無體故有義謂癡及無癡為體者亦偏雖通善染執無體故有義思慧為體者猶未正雖説悔眠是無記性不同前師説癡無癡二性所攝然説惡作思慧為體又説睡眠思想為體俱非理故復引論説世俗有者是説悔眠即思慧想無別體故彼染汙下釋前二義中引證之文有義各別有體正理纏約也猶言束也謂非思慧約束為悔又非思想約束為眠應説悔眠各別有體説世俗有是隨他相此釋第三引論執無實體尋謂尋求令心忽遽至體類差別不可得故釋尋伺二心所體性業用匆遽者速疾也意言境者意所取境多依名言名意言境粗轉者散行外境於法淺推細轉者略行外境於法深推故身心安是細轉義身心不安是粗轉義並用下釋體是假依思慧立問思者徐而細慧者急而粗何為並用答通照大師釋有兼正若正用思急慧隨思能令心安若正用慧徐思隨慧令心不安若如是説不違並用二各二者有義尋伺至故置此言深為有用此中三義釋二各二唯後義為正一義唯説尋伺各有染淨者未善盡理故二義質云悔眠亦有染淨二故應説下立義亦偏謂如煩惱及隨煩惱名之為二各有不善及無記性名為各二或復各有纏及隨眠亦名各二彼謂纏是煩惱現行隨眠是種有義彼釋亦不應理者正義破前不定四後有此言故者謂悔眠尋伺俱通二各二言應知皆具染淨二義應言下自釋正義謂後二言顯前二中各二種義一謂悔眠二謂尋伺是前二種此前二種亦各有二一悔二眠一尋二伺此後二種種類各別復自結云故一二言顯二二種謂一悔眠言二尋伺言顯此前二各有後二已上釋名此各有二下釋義謂後二言各有二種謂染不染即此惡作通善通染眠與尋伺亦善染故非如信等唯是善故非如貪等唯是染故故二各二通染不染或唯簡染故説此言為二各二何唯簡染答有説此為隨煩惱故故此簡之故置此言深為有用者釋名釋義簡善簡染唯此言故一正釋頌意竟下二分屬諸門門有十二章四中尋伺定是假有至而論亦説世俗有故一假實門尋伺假有此是正義悔眠假有此義未正謂悔與眠體是實有唯説尋伺是假有故論説世俗是依他處如説內種為世俗有豈內種子體非實耶四中尋伺定不相應至前二亦有互相應義二相應門謂尋與伺不相應者以彼行相粗細有異故不俱生而説無尋唯有伺者名第二地謂九地中依於尋伺有染無染立為三地不依尋伺種子現起尋伺現行或有或無立三地別若依現行有無立三地者成大雜亂瑜伽釋云未離欲者由作意力亦無尋伺已離欲者或初生彼或出彼定亦有尋伺故不依種起現唯依有染無染意取粗染細染至於無染立三地別俱字即尋伺二心所也與前悔眠容互相應悔眠亦有互相應義四皆不與第七八俱至由此五識定無尋伺三八識門四皆不與第七八俱者謂惡作追悔先業而第七任運恆緣現境非先業故故無惡作睡眠必依身心重昧外衆緣力而第七識一類內執不假外緣故無睡眠尋伺俱依外門而轉第七一類執我故無尋伺又此四法無記性者有間斷故皆與第八不相應也悔眠唯六非五法者謂悔與眠唯第六俱非是前五相應法故有義尋伺亦五識俱未正七分別者謂有相分別無相分別任運分別尋求分別染汙分別不染汙分別伺察分別有義尋伺唯意識俱正理論説尋伺元是意識不共法故又説下復以所緣辨尋伺不與五識相應然説下釋前師所引論義謂此尋伺由五識起非五相應以意識同五緣境然後方起尋伺五識是意明了門故集論説七分別中任運分別即是五識瑜伽説此是五識俱起分別意識相應之尋伺故各有異今以集論是依瑜伽中集出論主但依瑜伽不依集論故彼下結破前義又説尋伺憂喜相應至純苦趣中意苦俱故四五受門又説下六十四字南北藏錯安前章不共法故下今從義改正又説者前章引瑜伽説也何緣下問也答云雖有苦樂似憂喜故總名憂喜不説苦樂有義下謂惡作戚行通憂無記通捨故二受俱又説睡眠歡時喜受戚時憂受中庸捨受故三受俱又説尋伺四俱除苦初禪天中意有樂故已上二義都未盡理唯第三義方正前義尋伺無苦樂受第二義中尋伺增樂此中苦受四心所俱觀此論文唯有惡作無喜樂受彼悔惱時喜不生故樂亦應無餘三心所五受皆俱於睡眠時亦有樂故瑜伽五卷云那洛迦尋伺唯是戚行觸非愛境引發於苦與憂相應常求脫苦嬈心業轉如那洛迦尋伺一向受苦之餓鬼尋伺亦爾乃至傍生人趣大力餓鬼所有尋伺多分憂苦少分喜樂欲界諸天所有尋伺多分喜樂少分憂苦初禪天中所有尋伺一向喜樂無憂苦故此證尋伺通苦樂受四皆容與五別境俱行相所緣不相違故五別境門行相者能緣心所也所緣者所樂決定曾習所觀四境也不相違者欲等悔等俱善染故悔眠但與十善容俱至初靜慮中輕安俱故六善品門悔眠唯欲界欲界無輕安故云十善俱尋伺到初禪許輕安俱故故説容十一悔但容與無明相應至此彼展轉不相違故七煩惱門悔唯癡俱性迷暗故此粗貪等細理不相應故餘三與十展轉不違者十煩惱中俱通昧略粗細轉故三心所中亦有俱生分別義故悔與中大隨惑容俱至眠等位中皆起彼故八隨惑門惡作容與中大隨俱悔通不善諸染心故非忿等十者惡作追悔時不隨他忿等各別為主故睡眠尋伺二十俱者睡眠與尋伺容起染性故小中大隨俱有昧略淺深推故此四皆通善等三性至不能尋察名等義故九三性門問悔先所作善業惡業唯得通二悔何通三答於四無記亦追悔故前通根隨是不善性故此唯辨善與無記通善性者初二唯生等雜集論云何等生得善謂即彼諸善法由先串習故感得如是報由此自性即於是處不由思惟任運樂住何等加行善謂依止親近善丈夫故聽聞正法如理作意修習淨善生得善即俱生善也加行善即分別起善謂悔與眠粗鄙昧略是俱生義名生得善後二尋伺亦通者謂通生得及加行故聞所成等是分別義名加行善有義初二亦通加行善正理二種無記後三俱者有染淨故惡作粗猛無淨義故染淨者有覆無覆二無記也四無記者一異熟二威儀三工巧四變化悔唯中二者威儀工巧也非定果者簡前後故變化即定異熟即果異熟生心即前六識問眠何除第四答云非定引生心亦得睡眠故尋伺除初者無異熟故謂異熟心行解微劣不能尋伺名句文等惡作睡眠唯欲界有至夢能普緣所更事故十三界門四於九地唯初二地上七妙靜故不相通悔眠下釋上下生起義尋伺上下相緣者正理悔眠不緣上者未正正義云悔修定者是悔緣上也夢所更事是眠緣上也悔非無學離欲捨故至有為善法皆無學故十一三學門悔唯欲界無學離欲故不相應求解脫者有學人也學究竟者無學人也眠及尋伺俱有生滅故名有為通學無學故名善法又異生無記法學者無記法無學者無記法并無為法是非學非無學法睡眠尋伺一一皆通悔眠唯通見修所斷至餘門準上如理應思十二三斷門悔眠唯通見修所斷者以邪見等通見修斷由彼引生故亦通之問悔眠何不名非所斷答云悔眠若是無漏親所引生亦如憂根深求解脫是非所斷今既不然非非所斷以無漏道及解脫道非所斷故若謂見道已斷分別於修道中已斷俱生執無學眠名非所斷然無學眠見修斷故問尋伺非無漏何通見修及非所斷答云尋伺非無漏能引生無漏尋伺不自生從無漏引生故通非所斷有義下言五法者一相二名三分別或名妄想四正智五如如既名分別顯非無漏意在不許非所斷攝有義正理謂此尋伺於五法中不唯分別亦通正智故正思惟及言説因後得智攝未究竟者菩薩位中也藥即言説病即二障菩薩於此未能遍知於説法時必假尋伺非如佛地無功用説故此尋伺通無漏道是正智攝雖説下牒釋前師引證義謂論雖説必是分別而不定説唯屬第三顯此尋伺攝屬第三名為妄想攝屬第四亦名正智何執唯第三而無正智義二分屬諸門竟通上相應心所下第二廣顯差別竟下三問答顯理如是六位諸心所法至或似於信等無別染善法此中問答先辨心所有無方顯唯識正理若離心體下釋離心有過謂若別有心所論何説唯有識又如何説心遠獨行遊歷六塵名心遠行無別心所名心獨行又説染淨由心無心所故又説士夫名為作者喻心能作無心所故四大空識名為六界三大名色風空名動識名為心説色動心三為最勝能成有情不説心所莊嚴論説似二現者見相二分也似貪等者染心所也似信等者善心所也雖説二分及善染所皆似假現無別實體故云無別染善法若即是心分位差別至因緣無別故與聖教相違釋即心有過若即是心何聖又説與心相應説相應者必他性故心與心所如日與光亦別性故瑜伽論説五種性者即五蘊也若即是心則五蘊中受想二位不成差別是有過失以彼受想即心所故心王是因心所是緣若即是心故説因緣無有差別俱與聖教所説相違應説離心有別自性至是謂大乘真俗妙理前是遮詞此是顯理理應離心別有自性以心勝故釋前遮詞非彼即心釋莊嚴頌又識心言下結顯真俗正義若世俗諦心王心所相見分等各有體性故諸聖教説識説心必攝心所是相應義故前所引唯識等言及現似彼皆無有失若勝義諦心言路絶戲論遠離故心與心所非離非即識與諸識亦非即離大乘真俗妙理如是三問答顯理竟通上二相應心所竟下三現起分位分三一結前標問已説六識心所相應云何應知現起分位一結前標問竟下二舉頌總答頌曰依止根本識至及無心二定睡眠與悶絶八句頌有三門初句六識共依門以六轉識俱依第八根本識故次三句五識俱轉門以前五識種類同故後四句意識有無門唯除五處常現起故無想以下名五處故二舉頌總答竟下三解釋頌意分三一正釋頌意分二一釋前四句論曰根本識者阿陀那識至故無緣礙令總不行論曰下釋初句阿陀那云執持能持染淨諸法故名根本轉識以根本識為共親依故名依止共即六識親即種子依即根本五識者下釋第二句謂前五識同依相分為五色根同緣外色為五塵境故云種類相似隨緣現言以五取境有合有離故所依緣有多有少所以頌云眼識九緣生耳識唯從八鼻舌身三七謂作意下釋衆緣名即作意緣根緣境緣空緣明緣根本依染淨依分別依種子依眼識具此九緣耳識除明唯八鼻舌身三除空明緣故唯有七由衆緣合五識方現由此下釋第三四句顯非常起謂由此緣有頓有漸故前五識有俱不俱如水濤波喻隨緣現廣説如經者即解深密經云廣慧如大暴流水若有一浪生緣現前唯一浪轉乃至若多浪生緣現前有多浪轉諸識亦爾由五下總牒八識互相例明引後三識無緣為礙以顯五識緣礙間斷一釋前四句竟下二釋後四句分三一意識常起又五識身不能思慮至由斯不説此隨緣現先牒前五例明第六常起謂前五識起藉多緣斷多現少而第六識斷少現多謂第六識內隨第七執我外與前五同緣故名內外門轉除空明緣染淨分別染淨即根緣分別即本身唯五緣生故云不藉多緣唯除下顯現起多不同前五故此不説隨緣現言一意識常起竟下二五位不行分三一釋無想天五位者何生無想等至如餘本有初必有轉識故問答總標五位也無想等者等於二無心定睡眠悶絶無想天下釋立無想天名不恆行者前六識也以有間斷故以能取相安立名言説名粗想故修定者得生彼天諸想皆滅名無想天有義彼天常無六識者理未盡唯説中間長無六識不説兩頭有識無六識者名無心地唯存色身名有色支有義唯説命終有識者理亦未盡以彼唯説滅時有心謂彼天中轉識滅時為正果報果報盡時轉識現起必起下地潤生煩惱然後命終瑜伽下引證然説下釋前師所引教意有義生時亦有轉識者理方究竟謂彼兩頭俱有轉識中間長時方名無想彼中有者謂彼天人天報盡時現中有身而潤生故餘本有者現在身也以喻初生必有轉識瑜伽論説若生於彼至能感彼天異熟果故瑜伽下引證兩頭有識彼本有下論主推明論意牒破前失決擇下復引論證初生有心此言意顯下釋上論意謂彼天中初生本有天報身時必有異熟識上生的前六轉識暫起由先修定宿因緣力後不復生由不生故引起異熟無記分位差別説名無想以無想名因異熟識及六轉識諸心所等分位差別顯此名故善心心所引生二定定亦名善不爾者翻上義謂上初生無轉識如何決擇分説心心所唯生得滅故彼初位轉識暫起彼天唯在第四靜慮者下四地中想粗難斷上四空天無色支故以異熟處必有色支問何能感果答即能引發無想定思以思即業故能感果一釋無想天竟下二釋二無心定及無心二定者至令身安和故亦名定標釋二定總名無心文中別釋無想定下釋無想定謂修此定必生彼天彼無想天在遍淨天上第四定中故伏下貪未伏上染由彼作意求證涅槃故名出離不恆行者前六識也滅六想心身得安和名無想定修習此定品別有三至窮滿壽量後方殞沒集論説三品修者謂於諸定入住出相未能了達是下品雖已了達未善串習是中品既了達已復善串習是上品下品修者現法必退即定法不專注也以未了達入住出相其定必退不速現前修定如此後生彼天光不甚淨形色不甚廣大壽不滿五百劫中品上品修義同前此定唯屬第四靜慮至故唯有漏非聖所起釋定所屬界地及業謂修此定於色界中唯第四地善心所引定亦名善於四業中通前三業四業者流轉門中有三業謂善業不善業無記業還滅門中有一業謂無漏業無想非無漏故通前三業除順現受者謂業果有二一順現受即現修因現受果也二順生受即今修無想定當來生無想天是順生受故云除順現受前義釋定初起無想作涅槃乃外道所説此定亦名善唯人中能修後義釋修定界地除無想天至究竟者修定在因彼天是果上天未伏故總除之色界餘天容起此定由此下結顯凡定簡非聖者滅盡定者謂有無學至由偏厭受想亦名滅彼定釋滅盡定無所有貪者無色界中第三定也即九地中第八地思彼地思惑無學遠離有學已伏上貪不定者有學出定還起現行由彼作意唯在滅想故名止息不恆同前恆行染汙即第七識六七俱滅身得安和名滅盡定由偏厭受想亦名滅彼定者釋成別名滅受想定修習此定品別有三至似涅槃故三品別義亦同上釋顯揚論云從第四靜慮已上離色貪故無方處差別雖有修習下中上因然不建立生果差別此定初修謂色界頂有五不還天是無漏道依彼天中遊觀加行方入此定四禪四空名為次第此定必依非想定起故居最後合為九種設問云餘地心中何無此定故此答云初修此定未得自在必依有頂若得自在餘地心後亦得現前問既名無漏已證滅否答云雖屬道諦而是非學非無學攝似涅槃故謂入此定已超有學故名非學未證涅槃名非無學似涅槃者涅槃道也以未證故若真涅槃即名無學此定初起唯在人中至隨應後得所引發故謂此定起唯在人道中者佛及弟子説法之力起此定故人中慧解猛利解修於人中修已後上二界亦得現前塢陀夷經誠證此説問無色界中既無色相將何為定又入定者是何等人答云無色亦名意成天者答以意成身能為此定藏識教者唯識教也若悟唯識於無色界得起此定此答能入此定人也設有問云若信藏識得起此定今異生類聞藏識教決信無疑起此定否答云要斷三界等謂此聖定非凡夫能起必得斷惑證空方能引發有義下八地修所斷惑中至生上五地皆得後起通釋此定位次謂除非想地下八地修所斷惑中要全斷欲界餘所伏惑盡然後方能初起此定何以故欲界惑種不善有覆二性繁雜障定強故唯説五不還天能起此定三乘下明無學不同有學唯在不還無學聲聞及諸菩薩但除欲界上八地中隨生後起有義要斷下之四地者前義據能斷人此義據所斷惑雖各據一端俱不違理前説斷欲九品惑盡即證那含名雖超上地惑由次第斷待下三禪惑已斷盡方起此定故無伏下退生上失以那含果斷欲證故説唯斷欲初起此定此據斷惑説下四地惑障斷盡初起此定上五地中隨生後起變異受者欲界下三禪苦樂受也故二所説語勢似別意味原同若伏下惑能起此定至故無生上却斷下失此是難詞謂若伏下三禪修惑已離喜樂退生上地已得清淨豈斷下惑重起喜樂耶斷亦無失下據三乘人縱答第十卷云第七識俱煩惱障種三乘將得無學果時一剎那中三界頓斷豈非生上却斷下耶然不還下據三果人實答謂第三果人觀力強勝於潤生時煩惱亦不起現行唯有種子助業潤生豈伏下地不即斷耶雖所下釋不還者無前難失若諸菩薩先二乘位至亦能現起滅盡定故若諸菩薩下釋二乘回心者一切位中皆起此定上明已斷惑者下明伏惑不斷者若不爾下釋漸伏煩惱漸登地者不同聲聞直超八地故云不爾雖未下謂惑未斷亦起此定論説下謂永伏惑方起此定遠地即第七地前説退生上地却斷下惑者亦有之有從初地下釋頓伏煩惱漸登地者初地起定經説下引證十地皆起此定二二無心定竟下三睡眠悶絶無心睡眠與悶絶者至除斯五位意識恆起總釋此二亦名無心者俱無六識疲極等緣釋睡眠位謂有極重疲勞等緣引於身位諸門交合則違六識現行不起故名睡眠此睡眠時雖無睡眠之體而由彼似彼故假説彼名言似彼者似不定位中睡眠也以彼有體顯此假立風熱等緣釋悶絶位謂由所感風熱等緣亦引身位諸門交合亦違六識現行不起故名悶絶或此俱是觸處少分者謂疲極風熱於十二處俱是觸處彼與身根共為緣引生睡眠悶絶一分是身故云少分除斯五位意識恆起者通結無想等位意識不行餘位恆起正死生時亦無意識至由此不説入無餘依正死生下問也答義未正謂死生時別是一位頌中及與言顯頌云及無心二定睡眠與悶絶論主云但説六時名無心故言但説者唯説六時若及與言攝正死生應説七時六時者即前五位及無餘依應説下答前問意説及與下釋顯五位無雜謂此五位俱是六識斷已還起若無餘依無復起義故唯顯五不説六名二五位不行竟下三位通凡聖此五位中異生有四至唯得存一無睡悶故此以五位分屬凡聖異生有四者滅定聖所起故聖唯後三者無想定報屬凡夫故於中如來自在菩薩唯得存一者比前聖位無有睡眠及悶絶故三位通凡聖竟通上一正釋頌意竟下二通識俱轉是故八識一切有情至是謂略説識俱轉義言是故者牒前依止根本識五識隨緣現意識常現起即顯七八二識常相續義故總釋之心即第八末那第七二無間斷故恆俱轉第六前五俱起增數乃至八俱二通識俱轉竟下三問答顯理若一有情多識俱轉至彼俱恆時唯有一故若一下問也彼以一識為一有情故發此問若立下論主牒執難破若謂識多名有情多少名少者應無心時即非有情又他心現前可名自有情汝以有一識立一有情故然立下釋立有情正義命根第八識之種子也異熟第八識之現在也名雖有種現其體無二立為有情俱不違理一身唯一等無間緣至如散意識緣久滅故外人以一緣唯生一識為難論主展轉縱奪以理推明既許下論主縱答謂諸心所等無間緣依自識説即如意識等無間緣引生後念緣善境時相應善等十一心所齊起故説引多心所寧不能引多心又誰下奪破執一又欲下推明謂若不許多識俱起則彼多境現前寧不頓取若謂境雖齊現識前後生無俱起義故復破云諸根境等和合力齊識前後生不應理故又心所下以心所例明識俱起義又如浪像者喻明識俱轉也又若下復以同時意識證破若無意識同緣五塵取彼五塵應不明了以前五識無分別故若許意識能緣五塵而不俱起故復難云如散意識緣久已滅獨影境故豈得明了如何五俱唯一意識至如五根識互不相應如何下外人難謂一意識何取五塵多境如眼等下論主釋且如眼識緣色法時或緣一色或緣多色故一意識緣多種境亦無過失相見俱有下外人問謂相有種種一識能取見有種種何不同來共取一境謂一識能取多境一境應供多識於自所緣下論主答謂見雖種種各有所緣於自識所緣唯一識能了餘識無用故若爾下外人難五俱意識下論主釋意識是五識生起之緣助五令起意識明了取境異眼等識聖説意有分別五識不爾豈虗言哉多識俱轉何不相應者外人問謂既俱轉何不似心王與心所有相應義非同下論主答謂相應者必得同時同境同根同體具此四義故名相應今諸識雖同時起而不同境又不同根依即根也體即體事數即心所俱不同故如五根識所依不同無相應義設問云如是八識為是一耶為是異耶故下答云八識自性不可言定一至相所相無故答明八種識非定言一以彼行相所依所緣相應心所生滅熏習俱各異故亦非定異如水與波及因果性豈定異耶復總喻云如幻事等無有定一及定異故如前下結顯真俗妙理前説識差別者即前三種能變八個心王五十一個心所俱各別有體性業用種子現行皆依世俗顯示非真勝義真勝義中心不可思言不可議豈有形名種類之異如伽陀下引證相所相無故者謂真勝義能變所變二相俱寂故曰真如三問答顯理竟通上一明三能變竟下二答五外問分五一假説我法分三一結前標問已廣分別三能變相至由斯一切唯有識耶已廣下結前三種能變為自所變見相二分所依云何下復問謂一切法汝大乘説是識所變既是識變能變所變各自有體何説諸法非別實有唯有識耶一結前標問竟下二舉頌總答頌曰是諸識轉變至由此彼皆無故一切唯識前二句明能所變相成能所取後二句明內外皆空顯唯識性頌中此字即相見二分是如幻有彼字即妄所執實我實法決定非有彼此二體俱空故云皆無二舉頌總答竟下三解釋頌意分二一正釋頌意論曰是諸識者謂前所説至非不離識心所法等先以緣生二分解釋第一句頌八識心王五十一心所名能變見相二分名所變以見相分是識所變從因緣生名依他起但似外執實能所現故説為似所變下釋第二句頌中能所俱名所變義由此下釋第三句頌謂由大乘能變所變緣起正理則知餘執實我實法決定非有以離見相非實物故是故下釋第四句頌謂色心等一切諸法若於現在有實作用名為有為若法已滅或未生時無作用故名為無為又一切法因緣變故名為實有分別變故名為假有故一切法皆不離識唯言下宗鏡云唯遮境有識簡心空唯遮薩婆多部執心外有境識簡清辨等執惡取空故我大乘立唯識義非遮不離識之心所法等或轉變者謂諸內識至唯識義成契會中道次以緣生我法解釋頌意或轉下釋前一句半頌以能變之心即能分別三界心法皆虗妄故此所下釋次一句半頌此所執境者即所轉變也頌名所分別即所妄執實我法性皆依識變假我法相而妄執故故云決定皆無前一卷二卷中廣引教理已破我法決定無故是故下釋第四句頌虗妄分別有者是契經中頌言謂三界中虗妄分別之心是有則真如心亦有以破小乘等執心是無故曰極成唯既下謂唯遮境有不遮不離識之心所法等故真空等勝義諦法亦是有性由唯識義無心外法是遮境有遠離增益有虗妄心是簡心空遠離減損故立唯識契會中道一正釋頌意竟下二小乘九難第一唯識所因難由何教理唯識義成至應更確陳成此教理宗鏡云小乘以九難難心外無法唯心之旨第一難云離心之外現見色法是所緣實境論主何故包羅歸心總説唯識一乃色心有異二又能所不同豈不已説下論主答謂前廣引教理已説唯識之義雖為汝説汝尚未了非破下論主自白己意謂非是特破他義顯己義成意在廣明唯識利樂有情故應更與確實指陳聖教正理成唯識義宗鏡答云只此外邊色境一是有情緣心所變二是有情之心所持根本由心是故唯識如契經説三界唯心至能隨悟入唯識無境先引四種皆契經所説以證唯識無心外境十地經及華嚴經説三界唯心解深密經又説所緣唯心所現楞伽經中又説諸法皆不離心無垢稱經又説有情隨心垢淨次引阿毗達麼經中説成就四智悟入唯識者即地前小菩薩雖未證唯識之理而依佛説及見地上菩薩成就四般唯識之智遂入有漏觀觀彼十地菩薩所變大地為黃金攪長河為酥酪化肉山魚米等事即云如是所變金銀寶等皆不離十地菩薩能變之心更無外境作觀已亦能隨順悟入真唯識理一相違識相智謂於一處至境若實有此云何成謂四類有情能緣之識各別所變相分亦相違故即天見寶嚴地魚龍見窟宅人見清冷水鬼見膿河猛火所言相者非遍計相但是相分之相由四有情先業之力共於一處各變相分不同故名相違識相所言智者即是十地菩薩能緣之智智能了彼四類有情各自業識所變相分不同更無心外差別四境問其四有情為是各變相分為是本質亦別答相質皆別謂由四有情業差別故第八所變相分亦別第八相分為本質故前六所變相分亦別故知更無外境唯有識也奘大師云境非一者為所變相分隨四類有情能變之心境亦成四一處解成差證知唯有識二無所緣識智至彼境既無餘亦應爾無所緣識者即是一切異生將自第六獨生散意識緣過去未來水月鏡像等變起假相分無心外實境名無所緣識言智者即是十地菩薩能緣之心菩薩云此等異生所變假相分皆不離彼能變之心是其唯識即以此例一切實境亦不離一切有情能緣之心離心之外更無一物故云彼境既無餘亦應爾三自應無倒智至不由功用應得解脫即十地菩薩起智觀察一切衆生妄執自身為常樂我淨菩薩云但是凡夫執心倒見離却妄執心外其凡夫身上實無常樂我淨之境必若有者應異生不假修行而得解脫既不爾者明知唯有妄識亦是唯識四隨三智轉智至境若實有如何可變前之三智觀凡夫境此第四智觀聖者境而合三智為一智者以三皆是聖所行故一隨自在者智轉智即是菩薩起智觀自所變境皆不離我能變之心是其唯識為八地以去菩薩能任運變大地為黃金攪長河為酥酪此是境隨真智轉所變事皆成轉者改換舊質義即隨轉大地山河舊質成金銀等鍛鍊作諸器具衆生實得受用若離心外有實境者如何山河等境相分本質皆悉轉變故知一切諸境皆不離菩薩能變之心乃至異生亦能變火為水變畫為夜點鐵成金此等皆是境隨智轉所變皆成亦是唯識凡變金銀宮殿者是實定果色從初地以去作意方變八地以上菩薩於相及土皆自在變彼上品定心有大勢力所變金銀宮殿等皆得成就作諸器具實得受用皆不離菩薩內心是其唯識若諸聲聞及地前小菩薩等變金銀宮殿時即託菩薩所變金銀宮殿為本質第六識所變金銀等不能作諸器具無實作用然所變者是假定果色不離內心是其唯識二隨觀察者智轉智至境若是真寧隨心轉無性菩薩云謂諸聲聞獨覺菩薩等若修苦空等觀得相應者或作四諦觀時隨觀一法之上唯有無常苦空無我等衆相顯然非是諸法體上有無常等義但是能變心上有無常等義則令諸法成無常等故知諸法皆不離識三隨無分別智轉智至境若是實何容不現為菩薩根本智證真如時真如境與智冥合能所一如離本智外更無別境境隨智轉故説唯心汝小乘執有心外實境即證真如持一切境相何不現前菩薩成就四智者至此等聖教誠證非一總結菩薩得此四智方能悟入唯識正理又伽陀下引證謂第八名心第七名意餘六名識各有所緣皆從心變心為自性故云不離自性一切有為無為皆從心顯故説無餘此等下總結聖教明唯識義竟下文復以正理立四比量明唯識理極成眼等識五隨一故如餘不親緣離自色等此立第一比量宗在喻中宗鏡云極成眼識是有法定不親緣離自識色是宗因云極成五識隨一攝故如餘極成四識今云極成眼等識者宗鏡且將眼識為前陳故云眼識是有法五隨一故者是五識中隨攝一識即名因義如餘不親緣離自色等謂此眼識定不親緣離自識色是宗如餘耳等四識不親緣離自識聲等四塵意謂所緣者皆不離自識故此比量宗在喻中據宗鏡立三支皆用極成二字俱是寄言簡過且前陳言極成眼識者簡兩宗不極成眼識如大乘許他方佛眼識及佛無漏眼識小乘不許是一宗不極成小乘許佛有漏眼識及最後身菩薩染汙眼識大乘不許是一宗不極成今取兩宗不許之外共許眼識為宗依故云極成也又因云極成五識中隨一攝故乃至喻云如餘極成四識者俱是簡兩宗不極成之眼識及耳等四識故若不安極成言於宗則犯所別不極成過於因則犯自他隨一不成之過於喻則犯能立所立法不成之過餘識識故如眼識等亦不親緣離自諸法此立第二比量四分俱全宗鏡云極成餘識是有法亦不親緣離自識法是宗因云是識性故同喻如極成五識今云餘識者是除前五立後三識為前陳識故者由後三識與前五同名見分故宗鏡以是識性故為因此中喻云如眼識等以識性同故亦不親緣離自諸法是宗者謂前五如餘識不親緣離自識色等後三識亦如前五亦不親緣離自識之諸法問何不言六七八識為有法而言餘識耶答若言六七八識為有法他不許七八二識即犯他一分所別不極成過若但立意識為有法因中更犯不定過被他將七八二識為異喻量犯共中自不定過今但總言餘言陳第六意兼七八即暗成立七八於餘識之中矣此説所緣定非離此二隨一故如彼能緣此第三比量四分俱全宗鏡云六識親所緣緣是有法定不離六識體是宗因云見相分中隨一攝故如彼能緣見分今云此説所緣者是立所緣相分為前陳定非離此者謂相分定不離能緣識是宗二隨一故者是因謂於二分中隨一相分故如彼能緣者是喻以相分如見分互不相離所緣法故如相應法決定不離心及心所此立第四比量因在有法中宗鏡云一切隨自識所緣是有法決定不離我之能緣心及心所是宗因云以是所緣法故同喻如相應法今云所緣法故者是以一切識之所緣為有法即説所緣法故為因如相應法者是喻謂所緣之法不離能緣如相應心所不離心王決定不離心及心所者是宗謂所緣法必以心王心所為能緣故不相離設問云何故後陳云我之能緣耶答若不言我之能緣者便犯一分相扶之過謂小乘亦許他心智所緣之境不離能緣心故為簡此過故言我之能緣即簡他之能緣也此等正理誠證非一至理實亦有淨分依他此中比量雖則有四皆以不離為義總顯唯識正理故云此等正理誠證非一應深信受我法非有者破外所執空識非無者顯自立宗空即真空識即唯識此唯識義離有離無契會中道慈尊下引證空識非無等義虗妄分別有者即有三界虗妄分別心也於此二都無者謂於虗妄心中都無所執實我實法此中唯有空者謂此處妄心中唯有真空於彼亦有此者謂於真空中亦有虗妄之心故説一切法者有為無為法也非空非不空者謂真心妄心即圓成依他二性名為非空實我實法即遍計性名非不空有無及有故者妄心曰有我法曰無真中有妄妄中有真名及有故是則契中道者結上諸義遠離斷常耳此頌下論主釋頌意謂此二頌依染分説顯唯識義以理推之亦有淨分顯唯識理第一難竟下第二世事乖宗難若唯內識似外境起至如夢境等應釋此疑若唯內識至定不定轉者宗鏡謂經部師難云若言唯有內識無外境者如何現見世間情與非情等物有處定時定身不定作用不定今云若唯內識似外境起者牒大乘唯識義寧見下是難詞謂見世間情與非情處時有定身與作用而又不定即如東處非南此時非彼是處時有定又一切人有患翳無患翳所見種種差別不同是身不定亦如所見一切男女及刀杖等實有作用夢中所見便無實用是作用不定如夢境等應釋此疑者論主引二十唯識頌云處時定如夢身不定如鬼同見膿河等如夢損有用答上問義顯唯識理處時定如夢者謂於夢中緣此處餘處及緣時不緣時皆是夢心所現可名唯識者則我覺時境色處定時定亦是唯識身不定如鬼者謂如餓鬼同見一水變為膿河猛火等異皆是餓鬼業識所現可名唯識者則知我宗身有患翳及無翳等所見不同亦是唯識如夢損有用者謂如夢中刀杖飲食無實作用遺失等事實有作用皆是夢心所現可名唯識者則知我宗覺時夢時俱成唯識餘義詳宗鏡六十三卷文繁不引第二難竟下第三聖教相違難何緣世尊説十二處至令知外法亦非有故何緣下宗鏡謂小乘難云若言一切皆是唯識無心外實境者何故世尊於阿含經中説有十二處若一切皆唯識者世尊只合説意處法處即不説有十色處今世尊既説有十二處者明知離却意法處外別有十色處是心外有何言一切皆是唯識論主答處有三一假答此中無論文謂假將五識種子為五色根答經部師之義二十唯識頌云識從自種生似境相而轉為成內外處佛説彼為十此頌宗鏡有解文繁不引二正答者即今論説依識所變非別實有此依大乘自宗正解謂五塵本質色是第八識之親相分相分不離第八識亦是唯識三喻答者即今論云如遮斷見説續有情是佛密意破衆生一合相我假説有十二處名令衆生觀十二處法都無有我便入我空次依唯識能觀一切諸法之上皆無實軌持勝性等用既除法執便成法空第三難竟下第四唯識成空難此唯識性豈不亦空至由此慈尊説前二頌宗鏡謂小乘難云既言一切諸法皆無實軌持自在勝性等用成法空觀者即此唯識之體豈不亦空論主答云不爾者謂唯識性亦不空小乘又問如何不空論主又答非所執故謂我前言空者但是空其一切法上妄執實有軌持勝性等用遍計虗妄之法是空非空離名種等根本智所證唯識性故説為空也此識若無下重釋不可空之所以撥無二諦下引諸佛責詞以警之應知下結牒前頌證有可空不可空之義第四難竟下第五色相非心難若諸色處亦識為體至及與非色識若無餘亦無宗鏡謂小乘難云若言一切外色皆心為體何故所變外色皆得顯現能變之心即不顯現且如外色山河大地即千年萬年無改變相續不斷得多時住能變之心不爾明知離心有外實色何言一切皆是唯識今云若諸色處亦識為體者是牒大乘唯識義何緣下是難詞名言熏習下論主答宗鏡釋云但由一切有情無始時來前後相傳以名言虗妄熏習作心外堅住相續等解由此勢力有此相現與染淨法為依處故謂染淨法皆從色相上起外人又問既言唯識有情何要變似外色而現答云謂此若無應無顛倒染淨等如有頌言下引攝論證唯識義宗鏡釋云亂相者即所變色相亂體者即能變心體應許為色識者所變亦是心故云色識及與非色識者能變本乎心故云非色識若無餘亦無者若無所變似外色境為亂相者亦無能變之識體故知須變似外境現所以諸色皆不離心總是唯識第五難竟下第六現量相違難色等外境分明見證至不可執為是實外色宗鏡云且如心外五塵色境分明五識現證是現量所得大小乘皆共極成何故撥無總言唯識現量證時下論主答宗鏡釋云現量五識緣五塵境時得法自性不帶名言無籌度心不執為外但是後念意識妄生分別便執為外別實有境故現量下釋成答意宗鏡釋云五識各有四分其五塵境是五識之親相分由五識自證分變似色等相分境現其相分又不離見分皆是唯識若後分別意識起時妄執心外有其實境此即是無不稱境體故又色等下結勸餘乘勿執為外謂相分從心變故曰非色相分似本質故曰似色內色非外色故曰非外內色如外現故曰似外如夢中境皆唯識變云何執為心外實色第六難竟下第七夢覺相違難若覺時色皆如夢境至由斯未了色境唯識宗鏡釋云小乘躡上難云若覺時色皆如夢境不離識者何緣夢境人人皆知唯心所變覺時之境不知唯識耶如夢未覺下引喻答覺時下以法合喻故佛下引證宗鏡釋云即第七識是生死長夜根本能令起惑造業三界輪回直須至真覺位時方知一切皆是唯識昔娑剌拏王容貌端正後從迦旃延出家往阿槃地國中修道阿槃地王將宮人入山遊戲宮人見王形貌端正圍繞瞻視阿槃地王瞋怒鞭之幾死至夜方蘇語迦旃延曰我從師乞暫還本國舉軍破彼阿槃地國殺其王已從師修道迦旃延從請語曰汝若欲去且停一宿迦旃廷安置好處令眠欲彼感夢夢見舉軍征阿槃地國自軍破敗身被他獲堅縛手足赤華插頂嚴鼓欲殺王大恐怖呌喚失聲迦旃延呼名令寤語之曰汝若征彼必當破敗如夢所見王曰願師為除毒意迦旃延為説一切諸法譬如國土假名無實離舍屋等無別國土乃至廣説種種因緣至一極微亦非實事無此無彼無怨無親王聞法已得預流果後漸獲得阿羅漢果故知萬法唯識夢覺一如覺中所見即明了意識夢中所見即夢中意識分別之意既同差別之境何異迷悟若此曷疑慮焉昏覺如斯可洞達矣第七難竟下第八外取他心難外色實無可非內識境至如緣他心色等亦爾宗鏡難云且如此人心若親緣得他人心著即離此人心別有心為境若此人心緣他人心不著即有境而不緣若緣著即乖唯識義若緣不著何成他心智今云外色實無可非內識境是縱詞他心實有寧非自所緣是難詞誰説下論主答宗鏡釋云雖説他人心非此人境若此人親緣他人心即不得若託他人心為質自變相分緣亦有他心智但變相分緣時即不得他人本質他人影像相分是自心上現名了他心即知他心相分不離自心亦是唯識謂識下釋非親所緣義宗鏡釋云此人心緣他人心時變起相分當情相分無實作用非如手等執物亦非如日舒光親照其境緣他人心時但如鏡中影似外質現鏡中像亦無實作用緣他人心亦復如是非親能了何名親了親所了者謂自變故故契經下引證唯識義謂能取是心所取亦是心成唯識理故云無有少法能取餘法又謂所緣相分但從自識上生似他人心現名取彼物他人如此色等亦然是謂萬法唯識第八難竟下第九異境非識難既有異境何名唯識至故定應信一切唯識宗鏡謂小乘難云唯識之義離心之外更無一物方名唯識既他人心異此人心為境何成唯識耶奇哉下論主責云汝小乘何以堅固執著處處生疑豈唯識言但説一人之識不爾如何者小乘又問汝應諦聽下論主答若言唯有一識則無凡聖尊卑因果等別若無諸佛衆生何求若無衆生佛為誰説應知我説唯識之言有深意趣識言下釋立唯識之所以謂立識言總顯一切有情各有八識各有六位心所各有相分見分各有分位差別二十四種不相應行法各有空理所顯六種真如無為各有八識者識自相故六位心所者識相應故所變相見者心王心所二所變故分位差別者是前三法分位顯故所顯真如者是前四法各實性故如是上來五位諸法皆不離識總立識名故有深意唯言下謂立唯言但遮遍計執不遮依他起故亦有深意若如是知下結勸應信謂知唯識者能悟心外無法即入法空諸法既空證無上覺復能救拔有情生死非空見人違背教理而能成就如是大因緣事是故欲修無上乘者應信一切唯識教義二小乘九難竟通上一假説我法竟下二種種分別分三一牒義標問若唯有識都無外緣由何而生種種分別若唯有識都無外緣者牒大乘唯識義由何而生種種分別者是問詞謂若唯識無境由何而得種種心生既無境牽心妄心由何起一牒義標問竟下二舉頌總答頌曰由一切種識至以展轉力故彼彼分別生由一切種識者即根本識能持一切種子故如是如是變者指下展轉力也謂從種如是生現從現如是熏種是展轉義故論中云謂從生位轉至熟時宗鏡謂自證分轉變起見相二分以展轉力故者論中謂八現識及相見等相助力故宗鏡謂即餘緣是展轉力彼彼分別生者論中謂現識等總名分別分別類多故言種種宗鏡謂由彼見相二分上妄執外有實我法等分別而生二舉頌總答竟下三解釋頌意分三一正釋頌意論曰一切種識謂本識中至非持種識後當廣説釋第一句頌本識即第八功能即種子差別顯種多此生下釋種唯生四果餘非種故等流果者果似因故異熟果者果異因故士用果者因果俱有故士用謂作者所作事成名士用果增上果者助因共感故除離繫者下釋第五果非種生義現起道即能斷智道也斷結得者斷惑所證非從種生展轉義者謂離雜染繫縛之法方得證彼離繫果故非此所説者謂彼離繫果非此種子位中所説也問既名一切種何又名識答謂此所説生分別種識為體故兼説識名非別説識種識下簡別有識非種者簡前七識種非識故者簡外種子又種下簡第八識謂此頌中雖兼識言意唯在種故云顯識中種非持種識後當廣説者下文因緣中廣説種子義釋第一句頌竟此識中種餘緣助故至淨種現行為緣生故此識下至識種盡故者釋第二句頌餘緣助者即第三句頌中展轉力也以八種識俱有助力故曰餘緣由緣助故分別之法如是而生三熏習者謂名言習氣我執習氣有支習氣或云名言煩惱色識如次皆同與共相種及不共種則識中種方得盡故展轉下釋第三句頌如文可知即現下釋第四句頌現識等者即八種識及諸心所也分別類多者如言一二乃至八九十等分別也此頌下牒頌意總釋謂由種子及現行識展轉與力分別自生何執外緣分別方起又諸淨法亦非外緣同前染法亦由淨種及淨現行展轉生故一正釋頌意竟下二別解緣義分五一廣明緣義分二一問答標數所説種現緣生分別云何應知此緣生相緣且有四問答以明四種緣義謂前種子現行俱可為緣能生種種分別云何應知何法為何緣之相答中緣有四種者種子一法説為因緣餘之三緣在現行展轉力上説故即種子現行為四緣也一問答標數竟下二別釋四緣分四一釋因緣一因緣謂有為法至此唯望彼是因緣性此釋因緣又開為二宗鏡釋云若一切煩惱種被加行智折伏已永無生現行用不得名因緣又如將心種望色現亦不名因緣若心種生心現色種生色現等皆是因緣雙通新本二類種子種子者下釋種子為因緣謂此種子義通三性三界九地各具功能別故能引次後自類功能者是從種生種也及起同時自類現果者是從種生現行識也此唯望彼是因緣性者謂此種子望彼引生種子及彼同時現果是因緣性現行下釋現行為因緣謂此現行義通心王心所及所變相見性界地等皆名現行唯除佛果位中善法及微劣無記非是能熏餘七王所及界地等熏第八識生自類種此前七等望彼第八是因緣性第八心品無所熏故至展轉相望為因緣故此釋非因緣義謂第八識相應五所無所熏義非是因緣設問云心所非所熏心王亦非所熏耶答云非是簡去所依第八獨用能熏前七必得第八因緣義成無記之法極微劣故佛果中善是圓滿故二無增減不熏成種無因緣義現行同類展轉相望皆非因緣者謂前現引生後現雖是同類非前現生乃自種生故非因緣一切異類展轉相望非因緣者即後現望前種後種望前現雖曰異類而不同時親所生故亦非因緣有説下通釋餘義皆非盡理何者盡理答聖説轉識望阿賴耶是因緣義一釋因緣竟下二等無間二等無間緣謂八現識至等無間法故非此緣此釋標中第二緣義八識心王及諸心所總名現識簡色不相應種子無為非此緣性論説一切等無間緣唯望一切心心所説前聚於後者簡俱時及後為前緣非開導故自類者顯非他識為緣無間者顯前為後緣非中間隔等而開導者顯緣義令彼定生者即顯後果雖經久遠如八萬劫前眼識望後亦為此緣以彼後果當定生故此簡入無餘最後心無果定生故非此緣多同類下明心所共開導義同類種者各識相應心所也心所非一故名為多與識相應故名同類以心生時心所隨生故云俱時轉故如不相應非此緣攝者謂雖名心所若不與相應如餘色等不共此緣由斯八識非互為緣者此簡八識互不相應心與心所下宗鏡云心與心所既非自類如八種識恆時俱轉體用各殊如何俱起望後并得互為緣義答云心與心所和合似一同一所緣及同一依同一時轉同一性攝不可離別令其殊異故互為緣問入無餘依心有此緣否答彼極微劣無此緣義言思路絶故微不能生果故劣已滅不復更生名無當起等無間義云何知然論有誠説至善與無記相望亦然問答明前等無間緣義謂論中説若前識等滅時無間彼後識等決定生起即説此前是彼後識等無間緣故即依下論主依論意立八種識各具等無間緣義阿陀那云執持此明第八識等無間緣三界九地皆容互作何以故下上死生相開等故謂下生上者下地死時心即作上地生心等無間緣上生下者亦爾故云互作有漏下謂有漏心滅時與當生無漏心作等無間緣無漏不與有漏為緣何以故鏡智起已必無斷故謂第八無漏時心品轉成大圓鏡智盡未來際永無間斷既無間斷不得為緣善與無記相望亦然者謂有染無記容生無染善法無染善法定無生有染無記同漏無漏故曰亦然此何界後引生無漏至經不説彼發大心故問答以明引生無漏界地也謂諸下釋色界引生無漏者二乘下釋欲界引生無漏者有義下破前二乘唯於欲界引生無漏義此明回趣大乘者於色界中亦得引生設問云經不説彼天回趣大乘何得引第八無漏現前答云然而經説五淨居天無回趣者唯説定性聲聞應知彼天亦有發大心者在第七轉識三界九地至地上菩薩不生彼故此明第七識等無間緣三界九地亦容互作下上死生亦如第八以隨第八生於何處即繫第八執為我故有漏下謂此第七因中轉智不同第八唯在果上故十地中有漏無漏相間而起得互引生如五卷云滅定既是聖道等流極寂靜故此亦非有由未永斷此種子故從滅定聖道起已此復現行乃至未滅此即無漏引生有漏也又善等性同漏無漏互相引生故曰亦然生空智起名為不染智不起時亦名染故故前後位得互引生此欲下釋漏無漏互相引生唯下二界地上菩薩不生無色界故第六轉識三界九地至決擇分善唯色界故此明第六識等無間緣界地漏等各容互作以彼轉智亦因位故故潤生位得互相引初起無漏唯色界者以決擇分善欲界無故六七二識有漏無漏容互相生者謂此二識有三品轉智初地下品轉八地中品轉等覺上品轉下品初轉未純無漏故與有漏互相引發若前五第八唯上品轉智故得無漏時更不生有漏以彼智起必無斷故眼耳身識二界二地至此二於境明昧異故此明前五識等無間緣各分界地眼耳身三識二界二地者欲界五趣雜居地色界離生喜樂地鼻舌二識一界一地者唯在欲界五趣雜居地自類互生及善等相望釋義同前有義有漏無漏互作等無間緣者未正有義無漏有漏後起非無漏後容起有漏者正理謂佛有無漏五識豈佛亦生有漏耶未成佛時五種色根定有漏故謂異熟識有漏相分為五色根與前五識俱生同境有漏色根發無漏識理不相應有漏境昧無漏境明豈於一境明昧齊生雜集論云等無間緣者謂中無間隔等無間故同分異分心心所生等無間故是等無間緣義中無間隔等無間者不必剎那中無間隔雖隔剎那但於中間無異心隔亦名中無間隔若不爾者入無心定心望出定心應非等無間緣然是彼緣是故於一相續中前心望後心中間無餘心隔故是等無間緣如心望心當知心所亦爾同分異分心心所生等無間者謂善心心所望同分善異分不善無記無間生心心所為等無間緣如是不善無記心心所望同分異分無間生心心所亦爾又欲界心心所望欲色無色界及無漏無間生心心所為等無間緣如是色界等心心所各各別望色界等及欲界等無間生心心所如其所應盡當知二等無間竟下三所緣緣三所緣緣謂若有法至離外所慮託亦得生故此釋標中第三緣義有親疏故開為二種所緣緣者必是有體本質法名緣託質變起自己相分名所緣相質合説名所緣緣謂若有法者宗鏡釋云即有體法簡於假法及遍計相分無體法無體法但是所緣不成緣夫為緣須是有體實法有力用故能牽生識即實圓成依他是有體法言是帶己相者帶有二義一者變帶即八箇識有踈所緣緣本質是為託此有體境為本質變似質之相起名為變帶二者挾帶即一切親所緣緣實相分是為此相分不離能緣心故其能緣心親挾此相分而緣名為挾帶言己相者亦有二義且第一於變帶踈所緣上説者即變似質之己相二於挾帶親所緣上説者即能緣心上親挾所緣相分之己相此是境相之相即不同於踈所緣緣帶本質家之己相起言心或相應者慈恩大師云此辨所緣緣果也以所緣為緣是因生得心心所是果言心者是八識心王言相應者是五十一心所有起不起故置或言所慮所託者為識所緣名所慮能引生識名所託此體下分二文中別釋若與能緣體不相離者釋親所緣緣義若與能緣體雖相離者釋踈所緣緣義一親二踈者親是逼附義近義即如相分親逼附近於見分更無餘分間隔踈是遠義被相分隔故即本質法是若與能緣體不相離者能緣是見分體是自證分謂相分是見分親所緣緣見分是自證分親所緣緣皆不離自證分體此正簡疏所緣緣本質法望能緣見分有相離義亦簡他人所變相分及自身八識各各所變相分更互相望皆不是親今唯取自識所變相分望能變見分體不相離中間更無物隔礙方是親義言是見分等內所慮託者等即等取自證分及第四分并本智緣如等此皆成親所緣緣親所緣緣八識分四類一有親所緣緣從質及心而變起故即五識緣五塵境所緣相分是二有親所緣緣但從心變不仗質起即第八識緣三境相分是三有親所緣緣不由心變亦不由質起即根本智證真如是四有親所緣緣而非相分即內二分互相緣是疏所緣緣與能緣心相離法是謂即他識所變及自身中別識所變仗為質等是親所緣緣體是挾帶必不相離離內所慮託之境必不生能緣之心疏所緣緣體是變帶不變則無故云離外所慮託之境能緣之心亦得生故宗鏡云親所緣緣但是能緣之心皆有離內所慮託之相分一切心等必不行故即大乘云若緣無法不生心也疏所緣緣能緣之心或有或無者境是心外法如執實我法雖無本質然離彼法心亦生故第八心品有義唯有至一切位中有無不定此明第八識所緣緣前二義俱偏一唯自變為親一唯仗質為踈第三正義兼二謂第八所緣種子身土為境若論身土互相受用可説仗質自方變故若諸有情各有種子非互相緣故云非諸有情自內種子等身土故應説下自立正義第八踈所緣緣已轉未轉有無不定第七心品未轉依位至緣過未等無外質故第七第六所緣緣義俱如文釋前五轉識所緣緣義據宗鏡有親無踈以前五無分別雖有本質不起質想唯以自變相分為所緣故名為親此據五塵非自所變唯在本質上説故名為踈若論八識未轉依位踈所緣緣第七前五決定有故以彼緣境必仗質故餘轉未轉有無不定又諸識互緣者唯第八與前七為所緣緣即第八相分與前五為所緣緣第六識緣第八識四分為所緣緣第七唯託第八見分為所緣緣此皆第八識之四分為本質前七見分變相分緣是踈所緣也唯第八不緣前七以第八不託前七生故唯以自三境為所緣緣故即八卷中八於七有七於八無之義三所緣緣竟下四增上緣四增上緣謂若有法至生住成得四事別故釋上標中第四緣義宗鏡釋云謂若有法者亦是有體法此簡所執無體法故有勝勢用者謂即有為無為有勝用故此用非是與果等用但不障礙是增上用簡非因緣能於餘法者簡其自體顯不同前所緣緣故或順或違者顯與順違俱能為緣與後生異法為緣非前滅法簡非等無間緣謂十因中前後是順第九是違亦是此緣問增上緣約逆順有力無力都有幾種答古釋有四種一順增上如水土與青草等六波羅蜜與佛果等為順增上緣愛取二支與五果種子亦為順增上緣二違增上即如霜雹與青草等作違增上緣又如智與惑亦違增上即一念間智起惑斷時有二增上智於惑作違增上與二空理作順增上三有力增上亦名親增上如五根發生五識等四無力增上即此人五根望彼人五識是無力增上亦名踈增上如燈𦦨正生時一切大地等法不礙此𦦨生名踈增上但取不障礙義邊名增上緣雖前三緣下釋四緣各別復顯順違俱能為緣然增上用隨事雖多至及善念等而為自性此中總標文中別釋名數體性前五色根者即五浮塵勝義根以本識變起相質淨色為體性瑜伽云依止端嚴增上義故建立五根雜集為境界增上男女二根者即男女隱密處以身根少分為體性瑜伽云依止出生增上義故建立二根雜集名為産生增上共前五根有七命根者即第八識種子分位假立命根瑜伽云依止安住增上義故建立一根雜集名為住持增上共前七根有八意根者即第六意根以八現識皆隨意轉即以八識為其體性瑜伽云能令依止隨自在轉增上義故建立一根雜集亦名境界增上問豈非等無間意耶答既屬增上緣必非等無間共前八根有九五受根者即苦樂憂喜捨受為體性瑜伽云依止損益增上義故建立五根雜集名為受用果增上共前九根有十四信等五根者即信勤念定慧根及善念等為體性瑜伽云依止世間清淨增上義故建立五根雜集名為世間離欲清淨增上共前十四有十九加後三根有二十二前十九根依世間道説後之三根依出世道説故名無漏下文廣釋未知當知根體位有三種至但説地前以時促故未知當知根者位有三種一根本位謂在見道者此根唯以見道為根本除後剎那者謂見道後一剎那時亦名已知根故云無所未知可當知故意在未見道時名未知當知根既見道已名已知根二加行位者四種加行近能引發見道亦是此根之體位三資糧位謂從下四句明資糧位邊際能遠一句顯是此根體位於此下結顯三位所有信等無漏九根為此未知當知根體性設問云善位無苦根可不待説何無憂根加行等位下答上問意前三下通釋傍修正攝此根相義前三無色者除非非想空無邊等傍修見道亦有未知可當知義回心二乘求證法空地前菩薩求證地上生空無漏俱有未知可當知義菩薩見道正屬此根但説地前有未知義以見道後一剎那心名已知故言時促者見道唯在一念發明無二念故始從見道最後剎那至諸餘門義如論應知始從下釋已知根也既見道體無所當知故名已知最後剎那者已知根之初心也金剛喻定者等覺位之後心也中間所有信等無漏九根是已知根體性問何無憂根答云未離欲等諸無學位下釋具知根也謂無學人證無漏果非從外得故云具知即以無學位中無漏九根為具知根體性問既後三根皆名無漏有頂無漏何非此根答云有頂雖有等瑜伽云依止出世清淨增上義故建立三根以此觀之有頂無漏非出世故謂有頂天中於所觀境定力勝故煩惱現行得解脫已令彼諸根成無漏性而不見道故曰不明未斷種子故曰不利觀力盡時復生餘處故非出世此三無漏根雜集總名出世清淨離欲增上二十二根下結成根義諸餘業用依處界繫三學三性及所斷等一一差別廣如瑜伽五十七卷故曰如論應知四釋增上竟通上一廣明緣義竟
