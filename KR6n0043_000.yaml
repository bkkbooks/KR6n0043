body:
  text: 成唯識論俗詮序慈恩所譯大乘經論六百五十七部如大般若迦等經其文多遠暢流便讀之無鉤棘喉吻者獨成唯識論以百卷之梵文蕞為十卷辭約意豐曲折要眇讀者即鑽厲歲月研味字句如乍入回溪復徑中第見窈窕柴池之形猝未遽了細心尋而躡之迄不能遽諳其處也前代耆舊多所紬繹疏抄而外實繁有人乃義學寢微遺文墜典泯而不出嘗舉以質之導師深以為憾今何幸有高原昱公開此線徑使人人涉羊腸之詰曲頑履康莊哉公起自潼川挂錫吳越清跱絶俗靈悟鮮倫三藏聖文詮解略遍至其一往破的導滯闡幽即使迦葉復生當亦為之破顏微笑矣曰以宇泰先生之請詮釋此論批却導曲暢旁通開卷粲然了無疑滯天親護法之頌論得慈恩而梵夾始通慈恩之譯得高原而真文逾顯豈非識海之津涉知藏之鍵鈐也與或謂公之所詮啓牖聖文得未曾有何以云俗余謂真人相遇目擊道存何煩言説以真人聽真文聲入心通矣又何煩注解一切文字建立分疏總為俗間設耳三藏十二部皆詮俗也非詮真也知有詮之皆俗即了真詮能回俗而依真不昧俗詮矣公頃住法華庵謂余夙好此書出以相示余為之大快因書所讚歎者附諸末簡若唯識之意則頌論與公之詮具在學者求之自有如顯處視月水中擇乳者又何俟為性相二宗立調人而平生互諍者哉萬曆癸丑秋日江寧寶林居士𮨇起元和南書成唯識論俗詮序夫宗有正眼焉不以識識也不以論論也不以詮詮也何無何有何拋何存攝相歸性如滴投海現性于相如月映川但可以雙圓亦可以單揭可以兩拋亦可以獨指是以唯以遮無識以表有亦表亦遮拋外而存內別滿別分融識以入性緣夫大千有情莫非俗士我執等之軍林散則成無法執猶之石女質何曾有內蘊外蘊孰分緣緣之親踈比量現量莫測法法之假實冥念斯宗良可悲憫而論不得詮將味如嚼蠟詮不通俗亦步若走險徒淺嘗而輒止終線徑以難通昱公論師所以忘詮而有詮也第詮以詮識也識則有相從何依起相則有分寧妨互異串引有神也轉智有轂也光光相雜于一室而承光自殊影影各現于兩柱而發影無兩一經指撥就裏躍然通茲詮也性相雙圓而言思盡斷九十五種還歸烏有一十三宗總名亡是即謂護法菩薩已多一番舌本可矣雙如居士遊士任撰成唯識論俗詮序衆生念念執我在在執法古佛語之曰無勞執也此唯識耳遮執之談何關表識而逐影伺聲之流乃至望識幢而生執又多乎哉夫識真如之病與夢也病與夢誠非無顧何得言誠是有吾求之始大覺湛澄識於何生吾求之終佛智歷然識向何滅言思路絶擬議道窮坐見八識恍然墮矣墮即名轉義不等於斡旋轉即是智境非立於待對未轉通智全體是識病外無身既轉通識全體是智覺來無夢故曰若執唯識真實有者如執外境亦是法執遮唯識也如是則天親不得已以有頌而護法不得已以有論高原上人亦不得已而有俗詮乎俗表非真詮表非實以非真非實之談顯非真非實之識正復衮衮乃得無過明夫治病者即倩病之精神醒夢者不離夢之餘境雖鈍根滯器莫施數沙之能未許粗禪拂以狂慧矣浮渡居士吳用先撰成唯識論俗詮序成唯識論是奘大師最後糅譯囊括諸論淵涵義海融暢奧博無與為儔自基師以來有疏有鈔疏鈔之外又有掌中樞要唯識鏡等諸著述不知何緣不入藏中宋南渡後禪宗盛極空談者多實踐者少排擯義學輕蔑相宗前舉諸典漸以散失然開蒙之作出於元人爾時慈恩疏鈔似猶在也余始聞唯識宗旨於紫柏大師授以此論命之熟究茫無入處求古疏鈔已不可得後閲開蒙及檢宗鏡華嚴疏鈔遇談此論處輒録之簡端於是漸有一隙之明繼聞巢松緣督諸師留神此論結侶焦山博究大藏將為解釋亟移書招之二師各出其所標點之本互相印證余是以有正訛標義之刻於是四方學者始以此論為可究而求刻本者源源來矣然闕疑尚多意猶未愜聞王太古言相宗之精無如高原法師者觀所緣緣論釋曾不可以句而師釋之如指諸掌則其他可知也時東禪無主余遂虗席以延師師鑒余誠率其徒至余因囑以略釋此論承承首肯不逾年而俗詮稿成余因是有證義之作丙午夏余蒙恩起官南曹師亦來開講此論于鷲峯寺學者千衆莫不聳聽得未曾有己酉夏師又開講於瓦官寺時聞臺山師子窩澄法師曾解此論欲往參訪余固止之師不可冒暑北邁是年冬余亦以考績入朝無何師亦至寓北闕下之龍華寺又受彌勒菴請為諸方講演此論法席甚盛而余南還矣明年夏既訪澄師不契而南余亦從南宮乞假歸田間師辭余為武林遊又明年而余始病病中聞師講演此論於淨慈之宗鏡堂余且驚且喜時且瀕死不及與師相聞即師有書來不能答也又明年夏而師以俗詮新刻來澄余序矣病甚不能即副師指初秋始少間而後盥手發函讀之嘻師之為是也難哉基師以來承授有自其為疏鈔述而不作而師以無師智尋影略之文繹深微之旨一難也凡預講筵孰不蹙頞相宗詫為絶學而師無所因襲締搆會釋如作家報二難也巢松諸師以三四人之心目結三年期考究此論然余翻閲其本止前二卷有所標録餘並缺略而師以一人之力不逾年而成三難也因丘凌者易為高因川澤者易為卑古疏鈔已亡矣後之學此論者即他有所師承可忘師締搆之勞哉巢松之俗一雨法師集解此論刻已垂就余之證義亦且災木矣不妨為俗詮左輔右弼師其許之否乎時萬曆壬子秋七月朔旦金壇念西居士王肯堂力疾書成唯識論俗詮序原夫識者心之光也日月之光自明以流神慧之識繇心而現識分為九心則唯一天親授之無著即識付心無著暢于彌勒因心開識頌宣論衍成立無殊相現性摹虗空非假故不知萬法惟識法等執筌不知三界惟心識同逐影識殽則匪論不彰論晦而匪詮不釋末俗與法以俱沈上智併識而俱墮此法師昱公俗詮之所以作也乃知心光分于衆識如寶燭之出明諸識闡于羣論如通衢之然燭而真論剖于俗詮又如秉燭之徹衢護法之證天親慈恩之朗玄鑑昱師之續慈恩可謂並融一宗頓超三界鈞天合響海水一味又何差殊覩乎故知永明宗鏡攝性相以雙圓彌勒闡宗依一真而摹相善乎無著之語其弟天親曰汝昔用舌善巧毀謗大乘還用此舌善巧讚歎大乘故知讚嘆等于毀謗善巧亦為空華假令心空識空則三十為綴識滅論滅即九大焉依説性如滓太清指相愈添蛇足心行圓成言詮何有昱師密意神而明之信哉存乎其人矣壬子春月寓庸居士黃汝亨稽首撰成唯識論俗詮序己酉秋豫會師于清源舟中相對終日結世外交已而寫般若經一卷而別嗣後豫既南還師亦往五臺山參禮文殊大士蹤迹茫茫越四裘葛矣今年春負笈湖上覔靜室于南屏僧舍行至禪堂履未及戶而遙見是師也豫固識師師亦識豫兩人相視喜出望外頃之出所詮唯識論示豫是日師登法座宣揚妙論賢愚讚嘆得未曾有誠禪門之津筏而末學之指南哉豫不敏烏知奧義姑就今之識師者粗陳其解則神識在心人人自具蓋識為現量隨心應用如鏡光普照胡漢俱現故曰三界唯心萬法唯識三藏十二部無非為此識而設藉令強識歸心攝心附識前見非今見矣而何前之識師者不改于今今見非前見矣而何今之識師者仍同于前心既不增識亦不減識師于清源與識師于今日無以異以至會後復別別後復會識師于異日與識師于今日亦無以異即心是識即識是心心識不二一體互融凡有言説皆成戲論則雖謂師之不必詮不必講可也雖然此亦謂利根上乘言耳凡夫含藏其識終日迷于塵網中不得善知識一發其覆則以遍計為性不以圓成實性為性逗出逗沒而不覺所謂琴瑟箜篌雖有妙音不得妙指終不能發故必待語言文字以證本來則師雖詮之講之而豫聽之亦可也何戲論之非實論也雲間金雲鵬撰成唯識論俗詮序往讀禪宗語見其直截痛快犁然有當於心謂吾性果可一超直入也比見近時談禪者動稱當下即是而察其實行殊又未然則心竊疑之或吾性鈍劣不足承當此乎今春高原上人應方伯吳本如公之請演成唯識論於南屏因出唯識俗詮豫讀之卒業得未曾有乃始知不明性宗者必失之鈍不明相宗者必失之狂理雖頓悟事必漸修行解要當雙圓而岐而二之者悉外道也高原上人律峻守恬不輕於世作偶其於唯識也又寧獨解語已哉詮成本如公捐俸授梓敬題其簡若此錢塘葛寅亮題成唯識論俗詮跋我聞三性法門是諸佛密意所説諸識起處教經根由緣識起於真如性體法法是識識識是性以故識能顯性亦能覆性能遍計能依他亦能圓成古德云妄起於真而能覆真真因妄顯而能奪妄故顯真必由於妄顯性必由於識因是諸佛菩薩密意方便權巧成就三分論唯識義第論密意深非深於密意者了難究竟壬子春西蜀昱師高原開席於杭郡淨寺發明此論復作詮注自題曰俗詮此詮出則本論之前提後掇散句重條者整整如獨繭描絲明珠成串讀者不勞駐目停想了然義融識解使客亭遊子人人認得路頭捷徑到家回視他鄉熟識所識一向非親令得安隱快樂無涯如是師詮人天當為踴躍三藏寶詮相應為第一義云萬曆壬子春弟子秦舜友謹跋法因一切唯心一切唯識貪者識取廉者識捨道者識忘忘與道鄰捨與忘鄰忘不遽忘請自捨始高原法師詮唯識論以開衆識是謂捨法浮渡居士助刻資參拾金以倡衆緣是謂捨財唯心與識含生皆具唯法與財有識可捨浮渡能倡善知識宜和識捨為取亦不唐捐者矣寓庸居士黃汝亨題浮渡居士吳用先雲棲比丘袾宏寓庸居士黃汝亨錢塘葛寅亮苕溪沈羯磨居士顧嗣衍霅川韓敬楚中遊士任朗士吳之鯨長興周常寂周承積太倉楊之翰弟子性源新安方如騏弟子如蓮武林柴世基柴世埏海昌郭大登弟子任思忠淨慈明廣海成唯識論俗詮敘原夫三界唯心師心乘時應物萬法唯識因識觸妄迷真是識是心識海澄而心水靜即真即妄真源寂而妄波寧心德既均語默行藏成化識情有異禪律性相分宗隨機之別至聖善巧於名言入道之通此方獨利於聲教是以諸佛菩薩肇世興緣貴在語而不在默也蓋補處慈尊祖於深密説十七地經親授無著而無著昆仲相承天親約為三十頌頌詞雖略理貫瑜伽故始破我法二執次明能變三名唯一頌半大義了然罄矣況三十頌耶第緣義豐文儉披者易於記誦難於解釋故護法等衍頌造論間有成淨唯識兩名出而譯師諱淨標成者以相見自證和合成立唯識故也唯遮境有識簡心空較言指歸審明要會故總命名成唯識論焉良由凡小妄執聖者立宗顧片言隻字遏競者之橫流半偈全機起當人之正信至於分徽漫演抑謬揚真引事發明盤根究短延促之機足徵神頴復明諸識隨緣有喻濤奔浪斂法喻兩陳令人易曉更興五種問答執辨風馳成立宗因精研相性導引多方終歸唯識漸亡百計始悟玄猷即彰五位使知趨進創修六度積為資糧次運四心通為加行剎那見道分別二障頓除歷劫修因俱生無明漸伏斷十重障證十真如因盡果圓名為究竟然頌論之作廣約隨機會理因言豈容默也愚昔乍尋茲義文墮齟齬旨更依違展轉數行如重九譯由是竭思群經窮研衆論支瞪目振逸忘勞更訊大方漸通線徑歲癸卯金沙念西居士王太史召住東禪書云成唯識論慨其古疏已亡玄宗幾絶𢬵師數載之勞釋明梗槩務令簡顯以曉後人惟師以弘化為心當弗吝余所請也因而隨講隨録漫集垂成未及就緒今春持錫南屏學者偶集更屬諸大檀那同時勸宣及秋乃竟其帙即索稿梓行第愧見無超卓詞多蹇澀題云俗詮也者非謂折揚皇華便乎里耳脫以郢雪為求則本論斯在萬曆歲次辛亥仲秋二日西蜀輔慈沙門明昱書於南屏松壽堂成唯識論俗詮科將釋此論科文分五一釋論題成唯二造頌人按婆三造論人梵語四翻譯人唐者五釋論文分三一宗前敬敘分二一陳頌詞稽首二釋頌意分二一總釋今造二別釋分三一舉凡外又為二舉四師復有三結前意為遮二依教廣成分三一辨相唯識分二一略辨唯識分三一牒義標問若唯二舉頌總答頌曰三解釋頌意分二一釋前三句頌分二一略辨我法論曰二廣辨我法分二一總問總答云何二別問別答分四一別問我執分五一外道三種如何二餘乘三種又所三論主總辨又諸四總舉通執分二一標數然諸二正釋分三一俱生我執俱生二分別我執分別三總結內外如是五外難內破實我二別問法執分二一總問答如何二別問答分四一別問外道分六一數論神我分五一敷論執詞外道二現量所得彼執三是實非假又大四三事合成又三五妄情計度故彼二勝論六句分五一勝論執詞勝論二總破六句彼執三兼破三句又彼四別破三句又彼五結破能所然彼三天能生物有執四聲能詮表有餘五四大能生有外六總舉通執然諸二別問餘乘分二一問答標舉餘乘二正釋所執分三一色法分二一正舉對無對色分二一標數且所二正釋分二一破有對分四一能成極微彼有二正義識變五識三牒執辨破汝執四極微假立為執二破無對餘無二傍問表無表色分二一有表表無二無表表既二不相應分三一牒執總破不相二依執別破分六一得非得且彼二衆同分復如三命根復如四二無復如五三有為分五第二卷一問答總破復如二別破能所非能三三世難破又去四正明假立然有五問答明表如何六名句文分二一問答廣破復如二正明假立然依三舉執結餘有執三無為法分三一總破諸無二別破又虗三引經然契三總破前執外道四總舉通執分二一標數然諸二正釋分三一俱生法執俱生二分別法執分別三總結內外如是三總結我法如是四外難內釋分二一舉難詞有作二破難意分五一總破彼難二依類破依類三依實破依實四依真破又假五結正義然依二釋後三句頌二廣辨唯識二顯性唯識三行位唯識三釋結施願二釋後三句分三一標舉三數識所二別釋三名一謂三因果能變分二一標數此三二正釋一因一釋前三句竟二廣辨唯識分二一明三能變分三一初能變分三一結前標問雖已二舉頌總答頌曰三廣釋頌意分三一正釋頌意分八一釋三名分二一總釋三名論曰二別釋種子分四一正明種子一切二舉執辨破分二一舉二偏執分二一執本有分二一立義引證此中二以理自推又諸二執熏生分二一立義引證有義二牒破前執有情二正兼二類分二一自立正義有義二舉執難破分二一破唯本有若唯二破唯始起分三一以理正破若唯二引教辨破分五一彼部正義分別二展轉難破而心三釋彼正義然契四釋教熏習諸聖五牒釋依障依障三六義明種分二一正明六義然種二簡別外種外穀四能所熏習分四一問答標數依何二正釋所熏何等三正釋能熏何等四通結前義如是二釋行相分二一問答標名此識二正釋行相分二一執受處了分二一略釋了謂二廣釋分四一廣釋了字分二一正釋了字此中二偏正互辨分三一三師立義分三一難陀二分然有二陳那三分執有三護法四分又心二內外能所此四三結歸唯識如是二廣釋處字分二一正釋處義所言二問答辨明雖異三廣釋執受分二一執受種子諸種二執受根身有根四結顯二變前來二釋不可知不可三釋相應分三第三卷一問答總釋此識二別釋五所分六一釋觸心所分二一體性業用觸謂二經論差別故集二作意心所作意三釋受心所受謂四釋想心所想謂五釋思心所思謂六總結五所此五三問答簡別如何四釋捨受此識五釋無覆法有六釋同性分二一正釋同性觸等二廣辨失錯有義七釋引喻分二一問答正釋阿賴二外難內釋過去八釋捨位分三一正釋捨位此識二廣辨執疑分二一問答疑辨云何二執辨七地有義三結顯有體然何二別顯多名分二一正釋多名然第二傍通二位然第三證有識體分二一問答標定云何二引聖教理分三一引聖教分三一大乘四頌謂有二慈氏七因又聖三小乘四部餘部二引正理分二一結前標科已引二正釋引理分十一引持種心分二一引經比量謂契二牒執辨破分四一同類受熏有説二前為後種有執三三世因果有説四遣相空理有執二引異熟心又契三界趣生體又契四有色根身又契五壽暖識三又契六生死時心分二一總明生死又契二別明生死有説七引緣起依又契八引識食分二第四卷一正釋識食又契二牒執難破諸有九引滅定心分二一引經正破又契二牒計辨破分三一牒計總破若謂二有識有所又若三有識無所若無十引染淨心又契三勸信受證此二二能變三三能變二答五外問第二能變分三一結前標問如是二舉頌總答頌曰三解釋頌宣分三一總釋頌意分八一總釋名論曰二釋所依分三一正釋所依依彼二傍通餘論分二一略釋三種諸心二廣釋三種分三一釋種子依初種二釋俱有依分二一三師辨破次俱二正義破前有義三釋開導依分二一舉執辨破後開二總破前非有義三正釋頌意傍論三釋所緣分二一問答正釋如是二舉執辨破分二一三師辨破有義二正義破前有義四釋性相頌言五釋相應分三一根本煩惱分二一問答正釋此意二問答簡別彼有二餘及觸等分二一問答總標此意二偏正互辨分五一執唯九所分二一正明執義有義二牒破餘義有義二執十五所