body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前第二能變中正釋頌意分為八科一總釋名二釋所依三釋所緣四釋性相五釋相應分三一根本煩惱二餘及觸等已上諸科四卷中竟此中第三傍通捨受分二一問答偏執此染污意何受相應至緣唯捨地善業果故初義未正以據愛我唯喜受俱次義亦偏以理破前謂此第七遍三界故若喜受俱喜隨第七乃至有頂又違聖說喜唯二禪應說下自立義地獄鬼畜名為惡趣緣惡業果心常憂故人中欲界六種諸天色界初禪及第二禪俱得喜受以此九處業果善故第三禪名離喜妙樂故彼地中樂受相應第四禪天乃至有頂兼四空處總有五地俱名捨受以彼天中苦樂二境無由現故故唯捨受一問答偏執竟下二正義破前有義彼說亦不應理至恆於所緣平等轉故此義正理破前二執喜憂樂三變異受攝決不與此染意相應又此下據頌不別說證此第七識必同捨受七八二識雖性俱無記有覆無覆異頌別說之今此受義既不別說必與彼同故唯捨受復明已轉未轉諸心所法同義別義例顯第七與第八識同是捨受第八因中唯五心所轉依位中具二十一第七因中唯十八心所轉依亦二十一又第八識已轉未轉唯捨受俱第七亦爾任運平等轉者釋捨受相應義二正義破前竟通上五釋相應竟下六釋有覆末那心所何性所攝至若已轉依唯是善性問答以明唯是有覆無記性攝非餘三性攝也此意下釋有覆無記性四煩惱等等餘隨惑俱蓋覆故非善不善者謂非是善非是不善名為無記復引色界及無色界喻明心所同是無記謂上二界所有煩惱雖是不善性由定力伏故同無記性攝此第七識相應染法亦爾以其所依末那細故任運轉故亦無記性攝若得轉依唯善性攝六釋有覆竟下七釋界地末那心所何地繫耶至若已轉依即非所繫問答以明第七所居界地亦隨第八生處繫也彼字即第八識謂隨第八生在何地即於彼地所繫執我謂生下總釋隨彼所生彼地所繫謂第八識從欲界生乃至有頂則第七識心王心所亦從欲界乃至有頂恆執為我非他地故若起下別釋隨彼所生也染污下別釋彼地所繫也或為下又作一解謂諸煩惱隨地有無故隨何地有何煩惱所繫縛故亦名彼繫若已轉依即非所繫者轉依位中煩惱已滅亦不執我故非所繫七釋界地竟下八釋捨位分二一問答正釋此染污意無始相續至俱暫伏滅故說無有問此第七無始恆轉無間斷故何位永斷何位暫斷答於三位皆無有故一羅漢位二滅定位三出世道阿羅漢下總標永斷阿羅漢者此云無生以彼煩惱永不生故此名通三乘者聲聞有二一者根鈍漸斷煩惱為緣覺乘二者根利頓斷煩惱為獨覺乘菩薩唯一於八地中方永斷故故無學位染意煩惱種現俱滅名阿羅漢學位滅定出世道中總標暫斷謂染污意無始時來至此復現行乃至未滅釋出世道中暫伏滅義謂染污意唯是俱生必無漏道方有伏義真無我解見道之心也以見道時起根本智能伏彼故真見道後無漏觀心現在前時同無我解故名等流此時染意亦伏滅故真無我解及後所得無漏觀心總名出世道滅定下釋滅盡定中暫伏滅義謂此滅定行同聖道故名等流由極寂靜故此染意亦應非有此種子者第七相應煩惱種也謂入定時但伏現行若出定已煩惱現行復從種起乃至未滅恆執我故然此染意相應煩惱至應義等故不別說之釋無學聲聞永斷煩惱義謂修所斷有九九品第九地中第九品者名為下下今染污意相應煩惱最極微細與彼品同云勢相等必起根本最堅利智現在前時此種方斷證阿羅漢故說無學永斷不起二乘下釋回向大乘者亦永斷故從初發心求菩提故實是菩薩以盡煩惱等阿羅漢故此頌中不別說菩薩唯說阿羅漢滅定出世道無有一問答正釋竟下二辨識有無此中有義末那唯有至爾時藏識定二俱轉安慧言唯染位有第七識體故說滅定滅六盡七唯有煩惱乃至雜染依者皆顯染位有第七識又言聖道等三位無者是說第七不通淨位有義下護法師引經證破復以理推謂無染時第六意識如有染時定有第七為所依根此顯三位有淨第七論說下復引論文證有第七恆俱藏識若住下牒計難破顯滅定位恆有第七復明聖道亦有第七謂住聖道必有意識作無漏中聖定觀主故此難云若無第七爾時藏識唯意識俱如何瑜伽論說若起意識定有六七二識俱轉以此觀之聖道亦有第七識俱何執三位無第七識顯揚論說末那恆與至許佛恆行如鏡智故復引論證染淨位中俱有第七識體恃舉為行者染污位中我慢心所也以恃所執我故自心高舉陵懱於他故有自他不平等義若翻彼行即得平等故名轉依平等行故由此論證應知第七染淨有體若由下以正理例顯謂論中說無染污意及無藏識但無其名非無其體故復難云彼八不無此七何然復推智識相應證有第七為智所依謂平等智如餘三智各有所依淨識為體若無第七平等性智亦應無有非離所依第七識體而有能依平等智故又不可說平等性智依六轉識以彼各有智相應故論許諸佛恆行平等如圓鏡智依自識故又無學位若無第七識至彼未證得法無我故復推根義證無學位必有第七謂第八識染淨位中必有根種若無學位無第七識則彼第八應無有根然同識性必有根故又如下復以理推我法二執證無學位必有第七梵音補特伽羅此云數取趣以諸有情數數造業取善惡趣即是人義應云未證人無我者彼我執恆行此乃異生有學以第七識念念執我故名恆行有學既爾亦應無學未證法無我故法我執恆行以無學位雖斷煩惱不起我執然有所知法執恆起若無學位無第七識彼法我執依何恆行又不可說依第八識彼無慧心所不起法執故由此下結顯三位第七非無然說法執恆行者由此第七而有故又諸論中以五同法至非無第八此亦應爾復以根義證有第七謂諸論說前五轉識有所依根第六轉識亦應有根故以第七為第六根若上三位無第七識為第六根所立宗因便俱有失如立宗言第七識是有法能為第六所依宗因云識從緣生故喻如五同法若無第七是無有法能為第六所依則宗有失若彼第六無第七識而自生者是無緣自生則因有失故云所立宗因便俱有失言亦有無依者或有時亦無依也謂前五識與第六識同名轉識六若無依五有時無五恆有依六亦應爾故諸論中以五同法證第七識為第六依即此義故是故下總結三位必有第七聖教說彼三位無者但無染名非無識體如說下喻上但無染名之義言四位者即聲聞緣覺菩薩如來雖說四位無阿賴耶但無含藏之名非無第八識體故此第七但無染名耳二辨識有無竟通上一總釋頌意竟下二別釋差別此意差別略有三種至異熟識等起平等性智總標第七有三種相應名然後釋義初通下謂異生位我見煩惱相應第七則諸異生念念恆起人我見故故名相續上明恆起下明間起有學聲聞及前七地一類菩薩有漏心位彼緣藏識起人我見無漏心時亦伏不起次通下謂諸異生聲聞獨覺所知障種初未曾伏相應第七念念恆緣異熟識體起法我見故名相續上釋恆起下釋間起從登地來至等覺位名為一切若諸菩薩法空智果不現前位亦緣異熟起法我見以阿羅漢八地菩薩無藏識故故緣異熟後通下謂諸如來二障永斷二智圓明相應第七亦淨無染念念恆緣真如諸法證無我理故名相續上明果位下明因位若諸菩薩斷伏所知法空智起彼亦得緣無垢異熟識起平等性智以智起時所依之識暫現無垢故此名焉補特伽羅我見起位至不相違故此亦應然此明二執現起位次謂有我執必有法執以諸我執依法起故如迷杌為人者杌喻法執人喻我執古德云有人必有法有法未必有人以斷我執法猶在故法執若斷人執定無我法下明二執用別體同執是取著義故以慧為體如眼緣色境是了別義故以識為體雖緣青等多用不同於一識體不相違故喻如我法二執不同於一慧體亦不相違故云此亦應然二乘有學聖道滅定至不爾煩惱亦應在故此明二執伏斷位次聖道滅定有學二乘也頓悟漸悟有學菩薩也我執已伏種子未斷唯以在道在定及智現前方得伏故餘時我執現行還起無學二乘獨斷煩惱證羅漢果說彼我執已永斷故未斷所知故唯法執漸悟菩薩法智不前唯起法執我執已斷故不復起設問云漸悟菩薩所有我執前說已伏今何名斷答云八地以上等謂漸悟菩薩前七地中皆名有學已得二空初轉二智未常在觀唯得間起故彼我執說名已伏有時還起若登八地漸悟菩薩皆名無學捨含藏識我執永伏決定不行故名已斷二乘回心行同此地彼之我執亦永不行名已永斷彼煩惱種已永斷故唯法空智不現前時猶起法執以智不前不相違故如有下引證前義唯有所依所知障在者以煩惱障依所知障起故斷煩惱所知猶在是現非種者證前猶起法執現行非是種子不爾者謂若非我執永斷永伏彼所依所知障在煩惱亦應在故法執俱意於二乘等至餘不攝者皆入此攝明大小乘於此法執有差別義二乘獨斷煩惱唯證人空故於法執不名為染亦不名有覆以不障彼智故菩薩雙斷二障雙證二智於法執意名有覆無記以障彼智故是異熟生下明第七識同轉識故名異熟生不同第八及前六識同招引滿名異熟果此顯第七從彼轉生名異熟生問何名異熟生答此異熟名通而不局色心諸法皆可名故如增上緣餘緣不攝者皆入此攝二別釋差別竟下三證有識體分二一問答總標云何應知此第七識至聖教正理為定量故由彼小乘執唯第六未來名心過去名意現在名識無別第七別名為意故有此問答中先總標舉下文別引教理為證一問答總標竟下二引正教理分二一引聖教謂薄伽梵處處經中至前已廣說故不重成謂小乘說未來名心過去名意現在名識雖種種別唯一第六無第七故是故論主引經中語證有第七如是下釋上三名雖通八識而隨勝顯各定一名故以第八別名為心以具積集集起義故第七名意是思量義以彼因中恆思執我無漏位中恆思無我及緣真如於果位中恆緣諸法平等轉故故云緣藏識等餘六名識者是了別義以前六識易了名粗轉易名動不續名間六識各有所緣名別如入下引經證三名別義又大乘下總結諸大乘經說此第七皆別有體大乘至教前已廣說者謂初能變識中已廣引過故不重成解脫經中亦別說有至恐厭廣文故不繁述復引小乘經中頌言證有第七識前二句頌有漏謂第七識恆時染污皆由諸惑與俱生滅後二句頌無漏若解脫者謂染第七識由對治道斷盡煩惱得其解脫諸惑下謂斷種子曾為過去當為未來彼經下復引解脫經中自解之詞言無自性者是無種子也若彼煩惱不斷種子滅現行時名為過去未起現行名為未來今云三世無者是永斷彼自性種故現無者滅現在行也亦無見在下謂不見在過去未來種子皆滅矣如是下總結引教證有第七識者大乘小乘諸部皆有文繁不引一引聖教竟下二引正理分二一結前標科已引聖教當顯正理謂前已引大小乘教證有第七別名末那復當顯理推明第七別有實體一結前標科竟下二正釋引理分七一引不共無明分二一正釋不共謂契經說不共無明至許有末那便無此失緣起經說有四無明一現二種三相應四不相應或有為二共及不共今言不共者謂此微細恆行行相難知覆無我理蔽無漏見名覆真實謂諸下釋成覆蔽真實義一切分者攝論云是善不善無記位中常隨縛處又彼念念執我迷無我理故名迷理不共無明如伽陀說者引證前義謂真實義及真如心一切衆生平等共有以有染法故常能為障礙使真義不生問何法能為障礙答謂不共無明於善等一切分位與第七識俱故能為障礙復引經證不共無明令諸有情恆處長夜曾無醒覺故異生位有暫不起或行不行便違經義此依下謂此恆行不共依第六識皆不得成恆染污義應此恆行依第六識反成間斷彼第六識依此無明反恆染污許有末那無此過失一正釋不共竟下二問答廣辨染意恆與四惑相應至如無明故許亦無失問此意俱共有四惑何獨無明名為不共初有義下未正次有義下正理破前既非根本何隨煩惱不說此三又三心所十煩惱攝處處說意四惑俱故何非根本應說下答上問意謂此四中無明是主獨名不共言從無始際者顯此無明長夜常起恆內迷者明一切時不了空理曾不省察者彰恆執我無循返時癡增上故者總顯癡主有自在義故名不共此俱下謂見等三由非主義應名相應若得為主時亦應名不共亦如無明許亦無失有義此癡名不共者至對餘癡故且說無明有義下非理若爾下正義破前若唯此有名不共者唯彼有者亦名不共故不共名依殊勝立非互所無名為不共謂第七下釋殊勝義餘識非有唯依第七立不共名既爾下執者難謂既依第七有殊勝義名不共者此見等三亦依第七何獨無明為不共耶論主答云以依主義獨名不共或許餘三亦得不共以對餘識相應癡故且說無明有不共義不共無明總有二種至獨行不共此彼俱有此明不共有二恆行不共者唯第七有故曰恆行以第七識無間斷故餘識所無故曰不共獨行不共者不共餘九煩惱起故曰獨行此識非有亦名不共復引瑜伽二義差別顯於貪等有俱不俱立此相應及獨行名故他處言不共無明有三一獨行不共不與貪等俱二相應不共恆與貪等俱三恆行不共不與第六間斷者俱唯與第七俱獨行無明復開二種言是主者自能分別也故見所斷復引經證諸聖有學斷見所斷分別起惑不造業者即是斷此是主獨行不共無明惑故言非主者不自為主也無分別義顯是俱生故修所斷言亦修所斷者意兼見所斷故以共小隨是分別起故說忿等通見所斷言餘部者即是主非主二部也以非恆行不共故曰所無言此彼者此即非主彼即是主以獨行不共即此彼二故云此彼俱有也又古德云獨行有二一者是主獨行二者非主獨行不與小隨俱名為是主不與貪等餘九俱名為獨行若與小隨俱名為非主以小隨十自類不俱各自為主既與彼俱不得主故亦不與餘九俱亦名獨行是主獨行唯見所斷非主獨行通見修斷以共小隨見所斷故二問答廣辨竟通上一不共無明竟下二眼色為緣又契經說眼色為緣至極六識隨一攝故引經推義證第七識名為意根謂若無此第七識者彼經中說意法為緣生於意識彼意非有以彼意根必第七故復以五識各有所依根法證第六識亦必有根此識若無彼第六識根法寧有恐彼轉計胸中肉團狀如蕉蕾名為意根故此抑云不可說色為彼所依意非色故又若以色為依者意識應無根之隨念識之計度二種分別以彼色法無分別故亦不可下反覆比例顯有第七為意根義由此下結顯意識有根證有第七顯自名者以意識名依意根立如前五識依五根立各自有名識不相濫設問云等無間意豈非六識所依之根耶答云等無間緣不攝增上緣以增上緣是生識之根等無間緣是前滅之識已上所論六種根者極成六種識各隨一根所攝二眼色為緣竟下三思量名意又契經說思量名意至已滅依此假立意名引經推義證第七識是思量意謂若有云思量名意豈非等無間意耶釋云意識現前等無間意已滅已滅名過去故云理非有故體既非有彼思量用定不得成如何經說思量名意若謂下破轉計假說不成以無正思量不得立假說依正假立義文中故知別有下自釋復轉計云謂現在時思量曾有經說名意以遮上節過去非有之失論主破云若謂現在思量過去事爾時名為識彼經寧說思量名意故知下釋成有正思量依之假立意名由此末那恆審無間故諸八識前已滅念依此假立無間意名以取前後生滅中無間耳三思量名意竟下四無想滅定又契經說無想滅定至是故定應別有此意引經推義證第七識無想恆有謂彼二定俱滅六識心及心所體數無異者體即心王數即心所以俱滅故故曰無異若無下顯凡聖無差別義意在反顯有染意故於二定中一有染意名為凡定一無染意名為聖定若無此識二定何別餘乘轉計謂加行等有差別故二定有別論主破云彼差別因由第七有若無染意彼因亦無雜集論云二無心定具足五門一所依故初起處所二自體故各別有體三假立故各立假名四作意故各有加行五地故所居界地論云加行者即彼作意故界地者即彼地故依等所依自體及假立故二無心定於彼五門各有異者由第七故若無第七五門差別俱不得成是故下結顯必有第七識義四無想滅定竟下五無想有情又契經說無想有情至由斯賢聖同訶厭彼引經推義證有第七染污義成言一期者一報終始也謂彼天中五百劫來心心所滅而名有染者以有此意恆起執故若無此意彼天長時無六轉識我執便無何名有染非於下復以理推我執必有攝論云曾不見有具煩惱者一期生中都無我執彼無下亦以理推我執必有謂彼天人滅六識時作涅槃想自謂已得阿羅漢果報盡壽終六識還起俱生貪現謂阿羅漢身遭後有故諸聖者同所訶厭設彼轉計第六意識能起我執何須第七方得起耶故難云初後有故等謂彼天中初生起時半劫有識然後方滅最後半劫六識還起果報方盡故云初後有識而起我執無如是失中間長時四百九十九劫無第六識而起我執是有過失設彼救云去來既有意識何必第七復破云去來有故等謂前初生即滅名過去非是常有最後未生名未來非是現在彼去來世非同現在長時而此長時無六識故恆起我執是有過失所得無故下攝論云非生剎那現起意識我執所依為識引故名有我執我執所依俱謝滅故勢引亦無意以所得為六識能得為我執故破云所得無故能得亦無不相應等恐彼轉計故先抑之藏識無故下攝論云我執習氣在身相續亦不應理色法受熏不應理故無堪能故意謂餘乘執無藏識何得受熏若不受熏寧有熏習故破云藏識無故等故應下結成彼天定有染意五無想有情竟下六異生善染又契經說異生善染至此意未滅時識縛終不脫引經推義證有第七恆起我執謂諸有情善染無記三性心時恆帶我執於染淨法不能忘相謂異生下釋上恆帶我執謂有情類於善等三性心時前六轉識在外門轉作善染業而內第七念念執我能作善染令六識中所起施等六種善業及貪等染業俱不亡相故瑜伽下證有末那不得解脫謂前六識無始時來恆以第七為染淨依故名依止由斯依止念念執我令前六識了境相時不得解脫末那滅已不起我執前六於境方得解脫言相縛者於境不達如幻事等由有末那念念執我令前六識與念相應於諸境相明記不忘由斯見分緣相分時境相所拘不得解脫不自在者無解脫義故名相縛依如是下引證上義前二句頌第七識與前六識作所依止後二句頌七執我令前六識終不解脫又善無覆無記心時至勿學無漏心亦成有漏故復以理推善無記心若無第七恆起我執彼二種心應非有漏因中無漏亦唯善與無記心故設彼轉計云六識中俱煩惱現行即成有漏何要第七故此釋云善與煩惱更互生滅名自相續善心起時必無煩惱故知煩惱與彼善等不俱起故由彼煩惱已滅名過去未生名未來故又難云去來煩惱必不現前若為緣縛理非有故非由他惑者顯是第七念念執我故成有漏勿由他解者顯是第七念念無我故成無漏應知有漏無漏皆由末那若無第七二俱不成恐彼轉計別有一法名不相應現相續起善無記心成有漏法故先抑云又不可說等何則彼不相應非實有體已極成故何更執為亦恐轉計有漏法生從有漏種得有漏名故復抑云亦不可說等何以故彼種先無因可成有漏故謂有漏種必第七識執我為因若無第七因尚先無何得漏種生有漏法非由漏種彼成有漏者牒上已破意也勿學無漏心亦成有漏故者抑彼轉計也謂勿以學者無漏心亦得成有漏故設若有云有漏善心是煩惱引故可為因下文答釋雖由煩惱引施等業至故知別有此第七識此是釋詞謂煩惱時受諸苦惱由苦惱故發起善心行施等業名引施等又煩惱時善不生故善心起時煩惱滅故故云而不俱起故非有漏正因意顯第七為彼正因故又云以有漏言表漏俱故有漏正因文中自釋又無記下釋上無記不同善心由煩惱引若無第七如何說彼得成有漏然諸有漏下釋成有漏正因必第七識謂第七識與自相應現行煩惱俱生俱滅由第七故煩惱恆行由見等故第七執我名互增益於念念中互相增益由此熏成有漏法種後時從種現起有漏故有漏種第七為因異生既然有學亦爾者例明凡聖初起有漏義同無學下例顯無學有漏亦同謂無學人雖非漏俱先有漏時亦由第七念念執我熏成漏種成有漏故復從有漏引起無漏證無學果於理無違由有下結成有漏必因末那顯第七識各別有體六異生善染竟下七結成證義證有此識理趣甚多至而識類別實有八種釋上所引經語皆是攝大乘中論意理雖甚多略述六種以開來學令有智者隨喜信受然有下牒釋經義謂有據經唯說六識而起執者應知彼是隨世間說隨世流轉唯六根故故依六根唯說六識而識類別實有八種豈執六識無第七耶七結成證義竟通上二能變竟下三能變分二一牒科標問如是已說第二能變第三能變其相云何此中結前第二能變復問第三能變故云其相云何一牒科標問竟下二舉頌酬答分三一能變本識分二一舉頌答頌曰次第三能變至了境為性相善不善俱非此陳頌本答前問意前二句謂第六識必同前五緣粗顯境而有觸受及愛取生能成後有故合六種為一能變了境為性相者謂前六識自性了境即能了境是彼行相善不善俱非者俱非即無記謂此六識三性皆具故一舉頌答竟下二解頌意分三一六種本識論曰次中思量能變識後至故六識名無相濫失此中總標第三能變六種合成識雖一體而隨根境種類差別立六種名謂名下釋上六名隨六根立乃至者略其詞也謂眼識耳識鼻識舌識身識意識眼等是根識即自體故此六名隨根建立具五義故五謂依發屬助如根者釋立名五義也謂依根之識者依根處所識得生故屬根之識者由識種子隨逐根故助根之識者由識有無根損益故如根之識者俱有情數之所攝故已上四義皆依主釋唯根所發識又為一例名依士釋士即子也根雖發識根得父名根唯照境故劣識雖名子識能了境故勝依勝立名名依士釋六離合釋云父取子名名為依士所依劣故設問云前六轉識俱依意轉何獨第六名為意識故下答云雖六識身皆依意轉然隨不共所依之根立意識名由前五識依五色根則第六識唯依於意以取六識無相濫失或唯下重釋上義第六依意獨名意識不同前五兼依色根然名意識辨識得名非彼心及意識之例彼心意識各具一義心持種故意思量故識了別故今言意識唯了別境故不為例或名色識下復釋隨境亦立六名乃至者亦略詞也謂名色識聲識香識味識觸識法識隨境立者順識所了六境義故謂於下釋上六識了境別義謂前五識各別了境第六意識同五所了以法塵者即是色法乃至觸法名為法法故說法識通能了別一切諸法各別了境名不相濫此後隨境立六識名至此所緣境義便當說釋上依境立六識名唯有漏位以未轉依各別緣故若已轉依一根發識緣一切境色識等名互相溷濫故但隨根立六種名已轉未轉俱不相濫莊嚴論下引證諸根互用義復有難思妙力故云且依粗顯以五根境相粗顯故佛地下引證難思化力三業化合有十種身化有三一現神通化二現受生化三現業果化語化亦三一慶慰語化二方便語化三辨物語化意化有四一決擇意化二造作意化三發起意化四領受意化領受化中復有四記一一向記如人問天亦答於天二分別記如人問天答云清氣為天三反詰記如人問天詰云何者為天四默置記如有人問默然不答設問云第二能變中頌說依彼轉緣彼此頌何不言依緣耶故答云然六轉識所依六根所緣六塵粗顯極成故此頌中不說依緣然前論中隨根義便已說所依下文境便亦當解說有所緣義一六種本識竟下二了境性相次言了境為性相者至餘所依了如前已說此釋第三能變自性行相也釋義有三一以了境正釋自性謂六種識各各所有自證分體性能了境故說了境為識自性二以了境正釋行相即六轉識各有見分為自性行行能了境復說了境為行相故三以了境兼釋別名以心意識各別有名集起名心思量名意別說了境名為識故如契經下引證六識之名皆以了別自境而立彼經下釋契經說眼等諸識各別緣境者是未轉依義不共所依者五色根也未轉依者有漏位也見分了者識所緣境各別義也餘所依了者即轉依位中諸根互用如前章已說謂彼經說一根唯緣一境是未轉依若已轉依諸根互用二了境性相竟下三三性相應分二一正釋三性此六轉識何性攝耶至俱不相應無記性攝問答以明六種轉識三性俱通故先標數言俱非者無記性也謂是非善及非不善以顯三性三種別名三種別義文中自釋初能為下釋善性此世他世皆順益者善性易世不改也樂果此世非他世者果隨業轉業有盡故不名善性唯名善果次能為下釋不善不善自性及惡趣果釋義同前於義不善下釋無記以不記善不記不善名無記故此六下謂前六識元非善染由與善染心所相應成善染性俱不相應名無記性應知識體本淨由與善染心所相應不相應故立三性名一正釋三性竟下二舉執辨破有義六識三性不俱至非一生滅無相違過此意未正謂前六種識三性不俱起以同外門故互相違五識下舉一識不能齊起三性為難謂前五生必由第六為分別依生則俱生所緣同境成善成染亦由第六若許前五體性各別三性俱者六既同五亦通三性豈不違理瑜伽下牒釋論說諸識一時俱起三性是依多念前後起說即如一心非一生滅亦前後起故此於彼無相違過有義六識三性容俱至前所設難於此唐捐此義正理謂前六識三性俱起言率爾者瞥然起也等流者念念同類也或多或少者有起未起也謂此五識瞥然起時眼或緣善耳緣不善餘或無記是三同起率爾等流有五種心一率爾心謂聞法創初遇境便起二尋求心於境未達方有尋求三決定心知有法體而起決定四染淨心法詮欣厭而起染淨五等流心念念緣境前後等故又解深密經及決擇分說五識同時必有分別意識俱時而轉故眼俱意名率爾心初率墮境故此既初緣未知為善為惡為了知故次起尋求與欲俱轉希望境故既尋求已識知先境次起決定印解境故既決定已識界差別取正因等相於怨住惡於親住善於中住捨染淨心生由此染淨意識為先引生眼識同性善染順時而起名等流心如眼識生耳等識生亦爾此五種心於八識中前五識有四除尋求心無分別故第六具五心第七無率爾尋求心有決定染淨等流三心第八有率爾決定等流三心或說前五唯率爾等流二心義猶未盡以前五識既與定俱宜有決定心又通三性宜有染淨心故云有四五識與意下釋不同性唐虗也捐棄也謂五與六雖定俱生而善等性不定同五則汝前難一識三性虗棄其功矣故瑜伽說若遇聲緣至亦緣五境不說同性引證不與前五同三性義謂出定者若遇聲緣引定起時意識既同定起是通善性餘耳識生於性不定故六與五性必不同非唯彼定下釋成等持位中耳識領受音聲非意識故等持位中五識有故非取聲時下釋成等引位中意識引定此定不獨意識導引亦起相應樂欲心所然後方出在定耳識下明定中瞥然聞聲心必散亂乃大隨煩惱之一名不善性未轉依者即有漏位瞥然墮心是無記性以有漏位心昏昧故故五與六性不定同由此下結顯五六不同性義雜集論說等引位中至已永滅除戲論種故釋論中所說定有三位謂入住出三住名等持出入二位名等引論說多分即是入定出定二分意顯在定一分亦有五識故上文說在定耳識率爾聞聲又下論云遮等引故說性散動非遮等持故容有定若五識下釋上三性同起言偏注者但隨一性也不隨彼善染唯是無記故故六轉識三性容俱者結顯有漏前六轉識三性同起無漏位中唯是善性設問云自在位中亦有色心既有色心宜通三性何唯善性答云佛色心等道諦攝故道諦攝者釋唯是善離戲論種顯無不善無記種故二舉執辨破竟通上一能變本識竟下二相應心所分三一略標六位分二一問頌答六識與幾心所相應至隨煩惱不定三受共相應舉頌總答問意以標六位及受相應故前三句總頌心所有六位別第四句別頌三受亦共相應一問頌答竟下二解頌意分二一釋六位分二一釋相應義論曰此六轉識總與六位至皆於所緣兼取別相總與六位心所相應者言總意別此中以能變論之故將八識分三即合前六為一能變是為言總若以轉智言之即將八識分四故分前五第六為二心品是為意別此言總與六位相應者依意識言若依五識止具三十四心所餘十七心所不與相應不可據此違害餘義恆依心起下釋相應義謂諸心所是我心之所有立我所名心於所緣下釋依義立心所名也以心取總相心所取別相助成心王所不能取之別事故得所名又言亦取者顯心所法取總別故如畫下喻上王所助成師喻心王資即弟子喻心所法模喻總相彩喻別相故瑜伽下引論中意釋上遍行位中五所能了總別相義言此所未了者謂此心王未了之事心所能了故總釋云即諸心所取所別相以該觸等四所了別相也餘處復說者釋別境位五種心所緣總別義定慧雙釋者以彼同一所觀境故一釋相應義竟下二釋位數名雖諸心所名義無異至由此五位種類差別此釋六位合五十一所差別名數一切心中下六句釋上六位差別之義如次應知然瑜伽下釋彼論不立六位以根隨二合一染位故唯有五復引瑜伽辨五位中義有差別四一切者謂一切性一切地一切時一切俱俱者即八識俱通也遍行具四者三性皆具九地皆在一切時有八識俱通別境初二者以通三性及九地故善唯一者唯一切地皆通善故染四皆無者於三性中唯不善故於上八地伏不起故染法是有間斷非一切時有故染於八識不俱通故不定唯一者由善不善性方名不定故故不定位唯通一切性由此下總結五位義有差別二釋位數名竟通上一釋六位竟下二釋三受分四一正釋三受此六轉識易脫不定至非逼非悅名不苦樂受總標六識三受相應文中別釋言易脫者是間斷轉變義不定者於欣厭捨不專一故故皆容與三受相應以彼三受恆轉變故皆領下釋三受名義非二中容非逼悅等皆釋捨受義及名故違境順境釋苦樂受一正釋三受竟下二總別各分如是三受或各分二至苦受亦由無漏起故此明三受各分二義即如苦受有身苦受心苦受樂捨亦然三皆屬身心故各分為二別依身者以前五識別依五根總名身故唯依心者以一意識唯依意根亦是心分故唯依心又三下復以三受各分有漏及無漏受名為二故謂有漏苦無漏苦樂捨亦然設難云既稱無漏何名為苦故釋云苦受亦由無漏起故以修無漏時方知世諦苦或各分三謂見所斷至又學無學非二為三或各分三者如說見所斷苦修所斷苦非所斷苦樂捨亦然又學無學下復別分三如有學樂及無學樂并非二樂苦捨亦然非學非無學名非二故學者無記法無學無記法名為非學非無學法或總分四謂善不善至故知三受各容有四總分四者善即樂受不善苦受有覆無覆二無記受唯以捨受分為二種各分四者謂善捨受不善捨受有覆無記捨受無覆無記捨受苦樂亦然五識下明有覆無記通苦根義謂五識中俱生貪癡純苦趣中俱生煩惱不發業者但名有覆無記非是不善以不發業故彼皆容與苦根相應者顯是有覆無記苦也瑜伽下引證有覆無記通三受義謂有覆無記苦樂捨亦然若通下牒前身心二受證成無覆無記善與不善有覆無記四法皆與三受根相應言一切識身者謂前五識取五塵境名為身受身是異熟果名無覆無記性言遍與一切根相應者一切根即苦樂捨根謂無覆無記苦無覆無記樂無覆無記捨證容各分四法中一法通三受也不通一切識身者是除去身受意地一切根相應者意地是心取法塵境名為心受通善不善有覆無記各與三受相應謂善苦受善樂受善捨受不善苦受不善樂受不善捨受有覆無記苦受有覆無記樂受有覆無記捨受此證容各分四法中三法各通三受也雜集下復引證不善苦有覆無記苦受之義故知下結上引證各分四義或總分五謂苦樂憂喜捨至無分別故平等轉故總分五者以苦分憂樂分喜故三中下釋苦樂各分義謂逼身名苦受悅身為樂受以無分別及尤重故逼心名憂受悅心名喜受者以有分別及輕微故不苦不樂下釋上捨受不分義如文可知二總別各分竟下三苦樂有無諸適悅受五識相應至尚名為憂況餘輕者先明樂受於身於心有差別義言近分者謂初二禪各有三天每前二天未得遍滿故名近分言根本者每第三天悅身名樂悅心名喜彼初二禪雖唯名喜以悅身故亦可名樂三禪近分同初二禪雖未滿彼妙樂地中以欣慕彼安靜尤重亦可名樂諸逼迫下次明苦受身心別義五識名苦於理無違意識無苦此義未正苦樂侵心亦可通故諸聖教下引證唯憂無苦根義瑜伽下復引論證異熟即第八異熟生者即前六識言無間者第八前六不相離故前五苦受意識唯憂故云相續又說地獄尋求伺察必與憂俱鬼趣傍生亦有憂故言一分者鬼有純苦及分苦故傍生亦爾故知下結顯經論尤重戚受尚不名苦況餘輕者不名為憂有義通二人天中者至豈不容捨彼定不成此義正理意地有苦亦通憂故於五趣中有差別故人趣天趣唯憂根者非尤重故若傍生趣及餓鬼趣雜受名憂純受名苦輕重可分故梵音捺落迦此云純苦趣純受尤重唯名苦故以證純苦唯是苦根瑜伽論說任運煩惱通三受者以證意地有苦相應以任運時不生憂故薩迦耶見此云身見謂瑜伽說俱生身見及邊執見唯無記性以證憂根非無記攝論主釋云彼身邊見既無記性不與憂俱此純苦處亦無記性應苦受俱非憂根攝復引證云論說憂根非無記故又瑜伽下復引純苦無憂根義諸根即五受根餘三下論主自釋謂彼論說餘三言即是樂喜憂根以純苦處必成現行捨受豈不容捨受樂喜憂三根定不成就以樂喜憂不與純苦捨受俱轉寧知彼文唯說容受至為第八者亦同此破寧知下意地無苦師難詞論言容受即捨受以容苦樂名捨受故謂汝寧知瑜伽論文唯說容捨受應不說彼定成意識相應樂喜憂根復云彼六容識有時無故六容識者即彼苦處相應捨受六種識也有時無故者謂若無捨受時亦有憂根不應下論主牒執難破謂不應彼論唯說容捨受通說意地有憂根者牒執意無異因故者是破詞謂苦樂捨同無記性是無分別共與一識相應若通憂根是有分別一識為因難通二義故云無異因故恐轉計云論依捨受說通憂根論主難云若依捨受通憂根者第八識與捨受相應如何說彼憂根定成第八相應根也若謂下復恐轉計前五轉識有間斷故非憂根俱唯第八識恆相續故與憂相應故純苦處亦有憂根論主難云悶絶等位第八相續寧有憂根若有憂根何名悶絶有執下結顯第八唯是捨根非憂苦故設執一形為第八者至故餘三言定憂喜樂彼謂形身第八執受則苦樂受宜與第八相應論主破云理亦不然形不定故謂彼地獄惡業所招隨業變化非謂一定有形體故彼由下釋彼業招容無形義謂五根門恆受業苦定成眼等五業報根別執一形無所用故非於下釋形無用義不求淫欲者顯無樂喜根由斯下結顯第八唯是捨受以破前執第八有苦根義如極樂下例明極苦無有憂根結顯論中說餘三言定憂喜樂餘處說彼有等流樂至恐文增廣故不繁述通釋餘義謂餘處說純受苦處有等流樂如熱地獄猛火暫歇或見清泉流水等境亦名為樂而實非樂故名等流依世流轉所說樂義或彼通說餘雜受處有等流樂非說無有異熟果報樂者無果報樂名純苦故然諸聖教下通釋前師所引教意戚受憂根依多分者顯有少分亦通苦根或依流轉憂戚說故無相違過瑜伽下釋前論說憂根相應皆依世間流轉門說非實憂根又彼下釋彼論說意俱苦受與憂同類假說名憂而實是苦復釋論意云或說苦根損身心故雖苦根攝依於心義而亦名憂其實是苦如近分喜依於身義而亦名樂其實是喜顯揚論等具顯此義者通結餘論亦如上義然未至地下釋上說樂皆是假說未至三禪無樂根故十一根者對欲界地初二禪說前五第六各四除樂共有八根第七八識各唯捨根共有十根地獄身心共是苦根故有十一唯據苦等五受根釋也或無漏位有十二根謂信等五根意喜樂捨共成九根三無漏根則有十二未至樂地故除樂根唯有十一或有漏位亦十二根謂眼等五根男女二根命根意根苦樂捨三則有十二未至樂地故除樂根唯有十一此據二十二根釋也以十一根義未有的據故三釋俱存俟更參考由此下結顯論說意地苦根相應無失此等下總結前義三苦樂有無竟下四舉執辨破有義六識三受不俱至諸佛已斷憂苦事故此中執意破詞俱與三性章中意同故不重釋四舉執辨破竟通上一略標六位竟下二廣顯差別分五一遍行別境分三一結前標問前所略標六位心所至且初二位其相云何此中結前略標六位義竟起後廣顯六位差別次第解釋故問其相云何一結前標問竟下二舉頌總答頌曰初遍行觸等至勝解念定慧所緣事不同舉頌答前問意初句頌遍行位第二三句頌別境位第四句釋別境義二舉頌總答竟下三解釋頌意分二一釋遍行論曰六位中初遍行心所至此等聖教誠證非一釋第一句頌中觸等五所如三卷中初能變下廣說體性業用差別故不重陳復申問答以明遍行教理可證三卷中云其遍行相後當廣釋文出於此此中下先引聖教證觸受想思四是遍行以從三和相應變故故此四法有遍行義又契經下引證作意亦是遍行以有作意識方生故餘經下復引餘經證此作意是遍行義作意是心所了別是心王以心心所不相離故顯是遍行此等聖教誠證非一者結顯聖教證五遍行誠非一種引教竟理謂識起必有三和至餘非遍行義至當說凡為格物必以理推今推觸所定是遍行謂根境識三法和合定有觸生而彼三和亦應觸有故心心所和合觸境必由觸力是遍行義令心觸境理應作意諸心心所由作意生故知作意亦是遍行受領順境令心等歡領違令戚領中令捨若無領受心等起時無隨三境各起一相此能令起故是遍行諸心於境取分齊相必由於想故想心所是遍行義正因等者等於邪因取正造善不正不善若無思時心等起位無隨邪正造善等義此能令取故是遍行引理竟由此下結上五所是遍行義餘非遍行者顯後別境無此義故一釋遍行竟下二釋別境分三一正釋五所次別境者謂欲至慧至由斯理趣欲非遍行總標五所名位次第復別釋義顯非偏行云何下問答以明欲心所體性業用雜集論云於所樂事彼彼引發所作希望為體正勤所依為業初有義下以可欣釋所樂故即問云於可厭事欲彼不合欲彼別離亦應有欲何獨可欣名希望欲論主答云此可欣欲但於求彼不合離時於自體上有可欣義非可厭事亦有欣欲故於下結顯欲非偏行以於可厭中容及不希望欲不起故中有義下以可求釋所樂於欣求合於厭求離皆有欲故於中容下結顯欲非遍行以中容境及不希望必無欲故後有義下以欲觀釋所樂謂欲觀察是所樂故若不下釋非遍行因境勢者隨現有境而為所緣非希望故故全無欲由斯下總結上來三義解欲皆非遍行於上三義詞雖有別義無乖反有說要由希望境力至故論說此勤依為業彼說未正謂心心所由欲生故執為遍行論主破云彼說不然等謂諸聖教唯說作意能生諸識不曾說欲生心心所如說下引經例破如經說言一切諸法以愛為本豈愛能生心心所耶應知欲為本者欲起一切事故或說善欲能發正勤勤行諸善欲為本故論說此欲勤依為業是為諸法以欲為本非欲能生心心所故云何勝解於決定境至此應復待餘便有無窮失問答以釋勝解心所體性業用印定持守為體餘緣不能引轉為業謂邪正下釋決定義邪正之教及邪正理證據之力於境審決印持異緣不能引轉說名勝解故猶豫下釋此勝解非遍行義以猶豫時及非審決無印持故有說下執為遍行謂心心所取自境時於所緣境無有拘礙名為勝解以遍心等是遍行義論主破云彼說非理謂能不礙者即所緣諸法境也所不礙者即能緣心心所也勝解發起者根緣作意緣也豈唯由境發勝解耶若由下牒執難破謂若由此境故彼勝解發起此境應復待餘心生便有心境互生之失心境互生展轉不已故云無窮云何為念於曾習境至足為後時憶念因故問答以釋念心所體性業用明記諸法念之性也由明記故因而定生念之用也謂數憶持下釋上明記及定依義於曾未受下釋念心所非遍行義以未受境及不明記念不生故有說下執念心所是遍行義以心起時必有念故論主破難云彼說非理勿於後時有癡信等前亦有故如七八識轉依位中前無有信信亦得生何用前有七前有癡後決不生豈前無因故立前因便為無用推之前有前無俱不得為因故以前亦有故雙難二計前心心所下明前因不在有念但想勢力足為因故又若前念令後念生即等無間緣此緣約主唯是心王念是心所非主義故云何為定於所觀境至便無定起故非遍行問答以釋定心所體性業用專注不散為體定久慧生為用謂觀下釋上專注不散智依為業義俱非者非得非失也即是對境無分別心故名為定心專注言下釋上專注非定一境以住境時無第二念故歷諸境皆名專注以其境自往來心恆專注若不下謂定心所亦非遍行以不繫心定不起故有說爾時亦有定起至如念慧等非即心故執定心所有遍行義謂不繫心時亦有定起微隱難知應說誠言者誠然有定故又若令心和合趣境是遍行義論主破云理亦不然是觸用故謂令心觸境是觸業用豈定用耶若謂下重執遍行謂定令心一剎那頃不得易緣定是遍行復破云一剎那心時之極少自然無易何定心所令無易緣若言下復執遍行又破云令心所緣唯是作意豈定心所令心所緣有說下謂定心所是假非實故說即心以經說定名心學故彼非下論主破謂彼引經非為誠證以定攝心令心一境故經說為心一境性五根五力及七覺支八聖道支皆攝此定如念與慧各別有體非即心故云何為慧於所觀境至定非遍行如信貪等問答以釋慧心所體性業用簡擇諸法慧之性也決斷疑情慧之用也謂觀下釋上簡擇斷疑推求釋簡擇決定釋斷癡於非觀境下釋非遍行以愚昧心慧不生故有說下執慧心所亦是遍行謂愚昧時慧相微隱故大受者不能知微觸等欲等名大地法觸既遍行欲亦應然故說對法大地法故諸部下論主以正理辨破部即位也對法者各配其類觸等欲等俱遍地故名大地法若論遍行簡去欲等若論別境簡去觸等故說對法展轉相違餘義如文茲不繁贅一正釋五所竟下二廣辨現起有義此五定互相資至謂不專注馳散推求初義未正謂互相資必俱起故次義正理謂五心所不定俱起瑜伽下引證四一切中無後二者是一切時及一切俱謂無同時及俱起義又說所緣之境有四能緣之心有五非定俱起應說下論主自立正義謂或時起一乃至或時起五或有五種俱不起時故云不定於所樂境唯起希望者無第二義勝解及念應知亦然初或於所觀下釋所觀境唯起專注以專注言即是定義謂愚昧者心多散亂為止散故專注所緣以愚昧故不能簡擇不同聖賢定慧等觀故於所觀唯起專注設有問云既無簡擇何有所觀論主答云謂彼於定起加行時少從聞思散亂方止取說等持緣所觀境言等持者即定也或依多分者非一境也說是言者是說定言戲忘天者欲界天也以欲樂時東戲忘西在前忘後雖名專一境然起貪瞋癡貪乃順境瞋乃違境癡非二境豈專一境而能起三以喻定名專一境而境非一也次或於所觀下釋唯起慧於所觀境馳散推求是簡擇義不同前定故無專注或時起二謂於所樂至及藏識俱此類非一或時起二乃至合有十二者謂於四境次第雙起有十箇二一欲解二欲念三欲定四欲慧五解念六解定七解慧八念定九念慧十定慧是於四境二所齊起定有十數頌曰欲兼解念定慧四解兼念定慧成三念兼定慧數當九第十定慧十二有或時起三乃至合有十三者謂於四境次第兼起有十箇三一欲解念二欲解定三欲解慧四欲念定五欲念慧六欲定慧七解念定八解念慧九解定慧十念定慧是於四境三所齊起亦有十數頌曰欲解逢念定慧三欲念復逢定慧參欲定逢慧數當六解念加定慧八數解定慧與念定慧合有十三數始足或時起四乃至合有五四者謂於四境次第兼起有五箇四一欲解念定二欲解念慧三欲解定慧四欲念定慧五解念定慧是於四境四所齊起唯有五數頌曰一起前四二除定三念四解五欲盡從慧逆除合五四前後論文誠可證或時起五下謂於四境齊起五種總為一數如是下結成總別句數謂欲等單起有五句起二起三各有十句起四有五句起五為一句共有三十一句或有心下釋成五所皆不起義謂有心位如非四境五皆不起或時四境率爾墮心五亦不起藏識於五非相應故亦不俱起故五不起此類非一二廣辨現起竟下三分屬諸門第七八識此別境五至不能推度無簡擇故此別境五於第八識有漏位無第七有漏唯有一慧二識轉依五俱相應如前第二能變識中已廣說故第六意識與別境五有漏無漏皆相應故有義未正謂前五識與別境五無相應理緣已得下釋此五所無相應義如次應知有義五識容有此五至五識皆有作事智故論主正義許前五識容五相應雖無下釋前五識亦有微細欲勝解念如次應知雖不下釋前五識有專注義設有問云五識散動何得有定故釋云遮等引故說性散動非遮等持故容有定等引者入定出定時也此時五識不容有故等持者住定時也以在定時現量取境同五識故故容有定雖於下釋前五識有簡擇義眼耳二通相應智性者證眼耳識與慧相應此二有慧餘鼻舌身三識準此有慧無失未自在下結前有漏五所或無起後無漏五所定有樂觀下釋自在位定有五所相應五識一一如次此別境五何受相應至諸門分別如理應思問答以明別境會通五受初有義未正謂欲一心所與三受俱除憂苦二受以憂苦境非所樂故餘解念定慧四心所通餘四受唯除苦受審決即勝解等者等念定慧以審決等五識無故者前五轉識是苦受識識既不與四心所相應苦受亦不與四心所相應次有義正理許欲等五五受相應由前師執憂根不與欲心所俱今引論證與欲俱起以愁戚時是憂根故求欲證者是欲心所前執苦根不與欲俱今引純苦希求解脫顯欲俱起又欲心所必通第六意識意地有苦前已說故亦顯欲與苦根相應論說貪愛下重引論證欲與憂苦共相應義前執苦根無審決等今引苦根與意相應意又相應審決等四故苦與四相應無失又五識下展轉破前審決等義由斯下結上欲等五受相應此五下結顯三性三界及三學等諸門分別一一如理詞不復現三分屬諸門竟通上一遍行別境竟
