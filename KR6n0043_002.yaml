body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前餘乘法執中正釋所執分三一色法二不相應行法三無為法二中分三一牒執總破二依執別破三舉執結餘二又分六一得非得二衆同分三命根四二無心定無想異熟首卷釋竟此中第五三有為分五一問答總破復如何知諸有為相至色心之體即色心故復如何下論主問契經下餘乘引經答如契經説者説一切有部云三有為相別有實體等言三有為者謂生住滅三法無常有轉變義故名有為此經下總破言第六聲者按開蒙引八轉聲中第六名屬聲如奴屬主故名屬聲奴主各別表異體故今言非第六聲者以色心體即生等體不同屬聲奴主體異若據因明中數異品名第六聲以有法為第一聲宗為第二聲因為第三聲喻為第四聲同品為第五聲異品為第六聲以彼異品異於同品是各別義不同生等即色心故故云非第六聲也一問答總破竟下別破能所非能相體定異所相至又住異滅用不應俱能相即生等所相即色心堅濕暖動四大性也地水火風四大相也堅等地等性相不異生等有為豈異色心有為無為相待有故無為一法能所雙非豈有所相異於無為意顯有為不異所相耳又生等下破能相體俱有也若彼餘乘執三有為三體俱有不必色心為三法體破云應一切時齊興作用言俱有者謂生體有住滅住體有生滅滅體有生住三法同體故名俱有言作用者生住滅法俱有作用各不相順故以齊興總破廣百論云法體生時住滅未有至住滅位生相已無而言體同極為迷謬若相違下以生住二法與滅相違破彼所執體俱有義先以生異滅破謂若生滅是相違法不能齊興則用如此體亦應然何執一體俱有生滅次以住異滅破謂若住滅作用各異亦不應俱何執體同故云又住異於滅用亦不應俱能相所相體俱本有至彼此異因不可得故此破能所體俱有也若謂有為能相必離色心所相實有故執能所二法體俱本有則體本有用亦應然何以故有色心體有有為用有有為體有生滅用以體與用無別性故何不頓興若謂下破轉計因緣生生等也若待因緣是因緣生何執離心別有實體故復破云又執生等離心實有便為無用若謂所相色心恆有生等有時而合遮前頓興之難則無為法亦是恆有亦生等合設許無為亦生等合彼此異因不可得故以無為法無生滅故二別破能所竟下三三世難破又去來世非現非常至故彼所執進退非理先破二世皆屬滅義過去已滅未來未生二世同無無即滅也論主破意謂生住且置又如去來滅法已滅非常未來非現體如空華何執離心有實自性生名為有下次以三世難破彼執生滅體俱本有也若謂生滅俱同體者生既名有寧同已滅之未來滅既名無應非已生之現在若許滅同已生之非無應許生同已滅之非有故執同體便違三世又滅下復破住法進與滅同退與生異俱非理也三三世難破竟下四正明假立然有為法因緣力故至後一是無故在過去結顯正義唯假立名本無下釋成假立四名前三下復合四法為二世意顯諸法皆是無常隨世遷流剎那假立四正明假立竟下五問答明表如何無法與有為相至是故四相皆是假立如何下餘乘問與共也謂滅是無法何共現在有為法相表此下論主答謂過去滅法表此現在生住異法後定是無為有為相有何過失生表下釋成表義復結顯表義不同此依下結前假立唯一剎那起後一期亦得假立一期者一生果報始終也初有下釋一期假立四相初有者初生時也後無者命終時也相似相續者謂既生已而後漸長長而後壯壯而後老容雖轉變體相相似總此長時通名為住於此住中相續轉變復名為異或但名住以攝異名是故下結成假立顯非實有五問答明表竟通上五三有為竟下六名句文身分二一問答廣破復如何知異色心等至此足能詮何用名等復如何下論主問契經下餘乘引經答瑜伽云云何名身謂依諸法自性自相隨起言説是謂名身如言眼耳各別詮故云何句身謂即依彼諸法自性建立染淨功德過失是謂句身如言眼能見色耳能聞聲義差別故云何文身謂即名句二所依止所有字身是謂文身又於所知所詮事中略想是文唯了音韻不能了達自性差別中想是名了達自性及了音韻廣想是句音韻自性及與差別皆悉了達佛所得者離名句相離文字相故名希有餘乘所計異色心外實有名句文身故引經為證此經下論主總破謂此經中唯説佛得希有名句文身不説離心別有實體為證不成若名下謂此名等為離聲有為依聲生若離聲有應如色等非實能詮以離音聲無能詮義若依聲生聲有音韻足成能詮何用別執名等實有為能詮耶若謂聲上音韻屈曲至執能詮異語天愛非餘若謂下以色處例破聲處也若謂依聲所生音韻屈曲即名句文然而離聲別有實體者則汝所見色上形量屈曲應離色處亦有實體然離色處無屈曲故又若謂下破彼轉計復難聲不能生名等也謂前執音韻屈曲不成離聲實有彼即知音韻屈曲如絃管聲非實能詮意在轉計依聲實有名等有能詮用故又破云此語音聲既如絃管不生名等何執依聲能生名等又誰説彼定不能詮者餘乘執辨彼字即聲字意許聲生名等為能詮聲若下論主牒破若許聲作能詮風鈴等聲應有詮用不爾此語音聲如風鈴等何執依聲能生名等若唯下論主方便顯理兼責執情謂迷執語聲生名等不悟唯語即能詮何理下餘乘詰謂將何理知語能詮者彼執名句文為能詮故也由彼不悟語及名等如錦繡之背面但左右不同耳寧知異語有能詮者意取他界為證決不許言語為能詮語不異下論主釋人天共了者謂人與天共聽語言曉了諸義天愛非餘者或有天中不用語為能詮如光音天叶持圓光成就教體是也一問答廣破竟下二正明假立然依語聲分位差別至妙香味等假立三故結顯正義唯假建立非實有體分位差別者即語聲中高低清濁縱奪抑揚一名多名短句長句依此分位假立三種自性者形名自體也差別者多名各別也單名為名多名為句文即是字為名句二法之所依文者彰義彰表二故設問云三既假立體即是聲何謂此三各別有體答云此三與聲不即不離三從聲有故不離假實各別故不即以聲塵是實有名等假立故由此下明假實各別清涼云法無礙解緣假名等詞無礙解緣實聲等雖二自性互不相離法對所詮故緣名等詞多對機故但緣聲耳聞聲己意了義故以其所對不同説二有異非體有異體即聲也聲與名等蘊處界攝者色蘊聲處聲界唯屬於聲聲是色法故行蘊法處法界屬名句文不相應行中有名等故且依下結成彼此皆假立義謂且依此土依聲假立名句文身非謂一切界土亦依聲立設問云餘界土中依何假立答云諸餘佛土亦依光明妙香味等假立名句文身以彼見聞覺知光明香味能了義故二正明假立竟通上二依執別破竟下三舉執結餘有執隨眠異心心所至準前理趣皆應遮止有執下舉彼執詞隨眠即貪等染心所隨是俱生義眠是種子義彼執貪等種子異心心所是不相應行破云彼執非理若執隨眠是貪等種如從種起貪等現行定與染心相應豈得名為不相應耶執別下總結餘行也有餘不相應行者即後未破十種謂流轉定異相應勢速次第時方數和合性不和合性準前理趣者謂前以理已破十四種謂得非得同分命根無想定滅盡定無想報生住異滅名身句身文身皆應遮止者亦如前理破後十也三舉執結餘竟通上二不相應行竟下三無為法分三一總破諸無為法離色心等至由彼彼用證知是有牒前科總標總破且定有法略有三種者將破無為先舉有為為例故標三種現所知法如色心者心是能緣色是所緣現在所知是有為義現受用法如瓶衣者瓶可受物衣可覆身現在受用是有為義如是二法世共知有不待因成者結上所知受用二法世人共知不待立量然後可曉故云不待因成也有作用法如眼耳者謂由眼等五根發識緣於五塵由彼彼根各各發識因發識用比量知有五勝義根不同前二不待因成此即現在有作用法亦是有為義無為非世共知定有至離色心等實無為性正破無為非實有也謂汝執無為非上二法世共知有世不共知而執有者與世相違又執無為非如眼等有作用故設有作用應是無常既是無常違自常宗故不可執無為實有然諸下結顯無為不實所知性者謂從聞説無為名領納心中有無為性所顯性者色心有為因果義盡或緣闕時無有為用顯是無為此所知性及所顯性如色心等皆是無常故不可執離心實有一總破竟下二別破又虗空等為一為多至執彼體一理應爾故又虗空等為一為多者先以一多總問然後別破謂虗空等諸無為法各為一體耶各為多體耶若體下先破虗空一體謂若體一一體虗空必許法合能合諸法既有多體所合虗空體亦應多何執體一故云一所合處餘不合故不爾諸法應互相遍者謂一體虗空若定能與一切法合應一切法各各互遍如虗空體法若不遍則此分寸之物豈合遍界虗空若謂下破彼轉計虗空不與法合以能容受故名虗空若不合法如餘無為何名虗空故又問云色等中有虗空不有應相雜雜則不分何名空色無應不遍何名虗空遍一切處次破擇滅及非擇滅各唯一體結法是思惑有八十一品分屬九部部即地也若此擇滅唯是一體斷一品時應得餘品何則體唯一故非擇滅者謂即諸法性本清淨不由擇力其體自淨或謂諸法緣闕不生顯諸法體是無生義若執體一一法緣闕不生應得餘法非擇滅性故復結云執彼體一理應爾故若體是多便有品類至應如兔角非異心等有總破無為各多體也若諸無為各有多體便有品類應如色等既如色等應是有為無實常義何執無為是實常有虗空又應非遍容受者單破虗空多體也空體若多多空多法各受各容何名虗空能遍容受以一容多名為遍故餘部所執者以彼小乘唯許前三今舉餘部或有所執後三種者謂不動滅無為想受滅無為真如無為準前應破者謂或執後三準同前破又諸下執諸無為離心實有不從因生既不從因亦無有果應如兔角以説兔角無因果故何執離心有實常體二別破竟下三引經正義然契經説有虗空等至無有變易假説為常然契經下引經標數謂曾聞下釋上依識變現義謂從聞説六無為名心上即變六無為相從此聞變數數熏習串習力久明記不忘凡遇能變心等生時變似六種無為相現此所現下釋上假立常名謂從識變六無為相自前聞説及後現時乃至中間數數變現其相相似無有變易假説無為有實常義非是離心實有自體二依法性假施設有至故諸無為非定實有釋依法性假有義謂人空無我所顯真如有無俱非者以不得言有不得言無也心言路絶者諸法自性心識不到言説不及與一切法非一異者性相各別故非一即性即相故非異意顯真如是諸法相真實理性故名法性離諸下別釋虗空等五無為皆假立義謂真如體廓然無際容受無礙假名虗空擇是簡擇滅是斷滅謂諸聖者知真如性被諸障染覆令不顯以無漏智擇滅諸惑惑障究竟能斷本智即證真如與真如體平等會合假立擇滅又真如體即諸法性本自清淨不由擇力斷滅所顯或於諸法緣闕不生顯此真如是無生義是故假立非擇滅名又第四禪離前三定出於三災八患無喜樂等動搖身心所顯真如此從能顯得名假立不動又無所有處想受不行即此假立名想受滅故此五種依真假立真如下復明真如亦假施設多種名義謂真如義離假離實非有非空戲論遠離絶諸對待何以名言詮斯妙義但為遮執假立諸名為遮撥無諸法性者假説為有為遮執有諸法性者假名為空言虗幻者虗即遍計幻即依他勿許有情説虗説幻故説真如是圓成實諸法真理實非倒妄即於此理假名真如不同下結破餘乘妄執離心諸無為法定非實有故諸無為但可假立三無為法竟通上二問餘乘竟下三總破前執外道餘乘所執諸法至如執外境亦是法執結破外道餘乘計心外法是彼一偏所取非實有性謂汝以心緣山河等執為心外別實有境何不緣彼境時即悟彼境是能取之心耶意在指點心外無法唯有能緣之心耳如緣下復破能緣之心謂汝能緣此覺諸心心所是依他起亦如幻事非真實有況計心外實有境耶意在能所雙非顯唯識義為遣下復破執有唯識理者謂唯識之義數量遠離心言永絶遣執假説但是遮詞因緣所生俱如幻事若執實有不揀內外皆名法執三總破前執竟下四總舉通執分二一標數然諸法執略有二種一者俱生二者分別一標數竟下二正釋分三一俱生法執俱生法執無始時來至勝法空觀方能除滅此中俱生及下分別法執與前我執文同但於執我執法生空法空之別耳故不重釋一俱生法執竟下二分別法執分別法執亦由現在至法空真如即能除滅二分別法執竟下三總結內外如是所説一切法執至依他起性如幻事等內法外法亦與我執中結詞同前引宗鏡以我法同釋故不重解然似下釋上諸法從緣生者是依他起有故如幻所執實法是遍計性定非實有故世尊下引聖言證使知諸法唯識所現勿執心外別實有也三總結內外竟通上二別問法執竟下三總結我法如是外道餘乘所執至習氣擾濁心故似彼而轉通結我法非離心有復立比量例明外色等者即彼所執心外法也實有體者即從緣生依他起也對彼妄執説依他實對圓成實説如幻事言彼聚者凡一有情必有八識五十一心所共聚故曰心聚謂彼人心聚雖是實有而非此人親所緣緣況離心外無別實體為所緣耶立量云他人心聚是有法非自識聚親所緣為宗因云他聚攝故同喻如非所緣心是能緣非所緣故同聚者謂自心所非自心王之所緣況心外法為所緣耳立量云同聚心所為有法亦非自識親所緣為宗因云自體異故同喻如餘非所取非所取者亦心法也以心是能取非所取故由此下結成上義復引經證之謂由二比量義應知外境實無唯有內識隨緣變現頌前二句謂愚夫分別外境其實皆無問外境實無何有內識似外境生答云由彼習氣擾濁內心故從本識變似彼執實境而轉三總結我法竟下四外難內釋分二一舉難詞有作是難若無離識至如何説心似外境轉由前二比量後論主結破云由此應知實無外境唯有內識似外境生故發此難謂有真事方有似事依此二事共相然後可説似事為假若無離識實我法者何有內識似我法生而説為假如有下舉喻體猛赤法者似火之相也法謂法則倣佛火耳此喻有真有似方可假説我法下合法結成難意一舉難詞竟下二破難意分五一總破彼難非理離識我法至假説火等俱不成故論主總破難意非理復標二種別破依類者同德也依實者共體也一總破竟下二依類破依類假説理且不成至故知假説不依類成此破依類不成假説也火以暖為德人猛赤相非暖德故既無類德假非依類若無下牒計難破謂若彼言但可假立不必共德故難云應於水等假説火等若謂下彼復轉計人火不離故可假説故復破云人類猛等現見與火互相離故類既無德又互相離者牒前已破兩節之意結顯假説不依類成也二依類破竟下三依實破依實假説理亦不成至由此假説不依實成此破依實不成假説也謂人火共體可名依實今人與火猛赤德相既非共體依實假説決定不成謂猛下釋成人火不共體義無共下牒前水火為難過若謂下彼復轉計人有暖德與火相似亦可假説故又破云説火在人是猛赤相非在暖德説人似火由此假説不依實成者結成假不依實三依實破竟下四依真破又假必依真事立者至是故彼難不應正理此破依真不成假説也真謂自相假智及詮俱非境者謂一切法具二種相一曰自相體即真如二曰共相名為增益假智即分別心也詮表也即言説相也謂智及詮俱不得以自相為境故謂假智下釋假智詮不得自相義如人緣火心分別時是為假智口説火時是為言詮火不燒口亦不燒心是假智詮俱不得自相何則火以燒物為自相故唯依共相轉者託質變影名為共相是假智與質共起之相於此相上方起名言故假智詮唯依共相亦非下謂離此共相之外無別方便施設自相為假智詮作所依止然假智詮下明聲不及處是自相義謂由聲故起假智詮聲不及處名法自相若無聲處假智及詮便不得轉能詮所詮俱非自相者能詮即言説所詮即假智謂假智詮不得自相故云俱非故知下結成假説但依似事似謂下謂所依相為本質變起影相為所緣是從相上增益其相故名為似聲起智詮唯依增益似相而轉故不可説假必依真是故下結破難義非理四依真破竟下五結成正義然依識變對遣妄執至故於識所變假説我法名結成前説假似義謂由彼執實有我法故於識變依他起上假説似言以遣之引經頌意證上假説破彼妄執故知假説決不依真五結成正義竟通上一釋前三句頌竟下二釋後三句頌分三一標舉三數識所變相雖無量種而能變識類別唯三識所變者即前我法以我有種種法亦有種種故曰無量種能變雖多格其品類唯列三種一標舉三數竟下二別釋三名一謂異熟即第八識至及言顯六合為一種第八是果報識故得異熟名此有三義一變異而熟厭故悅新改轉身形故二異時而熟前因後果不同時故三異類而熟此類彼類相各異故前一唯變易生死後二通分段生死恆審思量者恆無間斷審能執我思量即意以第七意念念執我故了境相粗者前五了境皆住外門第六識兼內外門轉故曰相粗及言顯六合為一種者及者連也第三能變六識合成故言及字顯連合義二別釋三名竟下三因果能變分二一標數此三皆名能變識者能變有二種一標數竟下二正釋一因能變謂第八識中至有漏善惡熏令生長習氣即種子故名因能變以熏習時受彼氣分名為習氣等流者同類也有親生義異熟者各別也有相助義等流習氣下謂前七識以三性力熏第八識成種生長後從種子生起前七現行因果同類故曰等流異熟習氣下謂前六識唯以有漏善惡二性熏第八識成善惡種令其生長後從善惡二業招第八識受苦樂果是無記性因果各別名為異熟二果能變謂前二種至名異熟果果異因故果隨因變故前二種習氣為因引生八識為果種種相者即八種識現行相也等流下別釋因緣生等流果也親因緣者從自種生自現行也即八種識各各親種各生現行故名等流因果同類名果似因異熟下釋增上緣生異熟果也增上緣者謂善惡業牽第八識酬他引業長時無間立異熟名若善惡業感前六識酬滿業者名異熟生以前六識從異熟起名異熟生由彼前六有間斷故不名異熟即前下牒前引滿二果同名異熟果若單名異熟即第八識若名異熟果八識全收以總報王果圓滿故此中且説我愛執藏至名異熟非謂一切結顯頌中名當熟義此中即前頌中也頌言異熟唯名受熏持種本識是能變義不同圓滿果中八識全收故云非謂一切二正釋竟通上略辨唯識竟下廣辨唯識分二一明三能變二答五外問一又分三即初二三種能變今初能變分三一結前標問雖已略説能變三名至且初能變其相云何由前所變我法各有種種故顯能變識類有三名雖已列義相未分必得次第廣明方了三種義別故又問云且初能變其相云何一結前標問竟下二舉頌總答頌曰初阿賴耶識至恆轉如暴流阿羅漢位捨答上問意以明初能變識名及行相相應受性未轉已轉相及義也前二句頌明第八識有三種名梵語阿賴耶此云藏以具三藏為自性故異熟者以能招業成果相故一切種者受熏持種為因相故不可知執受處了者謂初能變識緣境時行相微隱於執受及處俱難了別故常與觸作意受想思相應者此識於六位心所中唯與遍行位相應故唯捨受者無苦樂故是無覆無記者於四性中唯一性故觸等亦如是者心王心所俱同性故恆轉如暴流者體非斷常喻暴流故阿羅漢位捨者唯捨初名故異熟一切種最後方捨故二舉頌總答竟下三廣釋頌意分三一正釋頌意二別顯多名三證有識體一又分八一釋三名分二一正釋三名論曰初能變識至藏初過重是故偏説釋第一句頌阿賴耶名也大小乘教皆名藏識者以具三藏義故受熏義邊名為所藏持種義邊名為能藏七執為我名為執藏謂與下釋三藏義互為緣者釋能所二藏也執為我者釋執藏也此即下釋藏識名依自相立以攝因果是彼自相此識下簡別餘名非自相義藏初者頌中初名阿賴耶故此是能引諸界趣生至異熟實不共故偏説之釋第二句頌中異熟名也能招他業成就自果故名異熟勝異熟果者對彼異熟生故此名為勝命根等即不相應行及餘色心等法謂若離此第八識體餘法相續成果者不可得故此即下釋異熟名依果相立隨他業因成自果故此識下簡別餘名非果相義此能執持諸法種子至略説唯有如是三相此釋第二句頌中一切種名也能持諸種名一切種全取他名即有財釋餘法者即餘色心等法及二所顯不相應法或有間轉或無實體故離第八餘能持種不可得故此識下簡別餘名非因相義初能變下總結三名以顯多名皆此三攝一正釋三名竟下二別釋種子分四一正明種子一切種相應更分別至假法如無非因緣故前三名中唯種子名在因位故義相難知論主急於為人特標種相應更分別此中何法名為種子者徵問種子是何法也謂本識中親生自果功能差別者答明種子是生現行果法之功能故以功能名種子本識即第八識親生自果者從自種子親生現行果故功能差別者顯此種子非一種故此與下謂此種子與第八識及所生果不一不異體是本識果是現行識體望種為用現果望種為因故此三法理應不一不異也宗鏡云本識是體種子是用種子是因所生是果此之三法理應如是不一不異若即是一不可説為有因果法有體有法故若一向異應穀麥等能生豆等以許因果一向異故不爾法滅方應有用以許體用一向異故體用相似氣勢必同因果相似功能狀貌可相隨順非一向異雖非下釋難上言不一不異恐同菩提子計有法與有等性非一非異故自釋云而是實有以從自心變故假法即外所計心外有者如畢竟無非因緣故此與諸法既非一異至許則便無真勝義諦外人難謂此種子與識現行既非一異應如瓶等泥團與瓶非一異故必許瓶體是相狀假則汝本識同瓶是假識中無漏真如種子亦應是假便造自宗真勝義諦然諸種子唯依世俗至俱是善性攝故唯名為善論主釋然説識中諸法種子非一非異是實有者唯依世俗説為實有不同真如勝義有故以真如性離非一異戲論種故種子雖依下釋有漏種不同真如以有漏種第八所緣真如無漏種子非彼因中所緣後轉依時鏡智圓明方得緣故諸有漏下明種子與識非一異義謂種識同體俱無記性是名非異因果俱有下謂種子之因是能熏識皆通三性種子之果是現行識亦具三性故與本識説名非一此非一異説有漏種不説真如諸無漏下釋無漏種不同有漏意顯真如是無漏義故與本識必不同性若爾何故決擇分説至非無記性所攝異熟若爾下外人難問因上章云諸無漏種非異熟識性所攝故故發此問謂若無漏種子非異熟識性所攝何故瑜伽決擇分説三無漏根皆異熟種皆異熟生二十二根者即五色根男女二根命根意根五受根信等五根三無漏根雖名下論主釋謂雖決擇分説皆異熟種不與第八同無記性二十二法皆善性故謂彼諸法依異熟故名異熟種如眼等識依異熟故名異熟生皆是異性相依決不同性或無漏下又作一義釋名異熟謂無漏熏習轉變成熟立異熟名非是第八無記異熟故知無漏唯善性攝一正明種子竟下二舉執辨破分二一舉二偏執分二一執本有分二一立義引證此中有義一切種子至如是等文誠證非一此是清目等師唯立本有其義未正如契經下引證自立本有義惡叉聚者毒樹果也一枝三子生必同科經中取喻惑業苦三不相離故今引無始時來法爾而有者以證自然本有界即種子差別名者亦證種子無始本有不是熏生又説界是因義者皆證種子無始本有瑜伽下亦證本有兼明熏發三菩提者謂真性菩提實智菩提方便菩提或名聲聞緣覺無上為三般涅槃者此云入圓寂即無漏法因也今引論説從無始來有此法因一切種子具足無此法因便闕三種菩提種子以證種子決定本有非從熏生一立義引證竟下二以理自推又諸有情既説本有至如是建立因果不亂立者推明必唯本有也五種性者謂異生聲聞菩薩如來外道此五種性本來自有應知不假熏生三無漏根者謂未知當知根已知根具知根知者即是真見道義引地獄具此三根者亦推種子本有也法爾所得者自然成就也亦推真如無漏種子決定本有不從熏生由此下結顯無漏種子確成本有例有漏種亦本有故如是建立因果不亂者謂立本有因果義成若許新熏漏熏無漏無漏熏漏善與不善亦互相熏因果紊亂不成安立是故本有因果義成二以理自推竟通上一執本有竟下二執熏生分二一立義引證有義種子皆熏故生至如麻香氣華熏故生難陀立唯熏生理亦未正謂諸種子雖無始有亦從熏生以能所熏無始有故種子既是習氣下推明習氣從熏立種新熏理必無失故説喻云如西域胡麻本無有香以華熏之取油即香故知種子如油之香從熏有也如契經説諸有情心至是出世心種子性故引經論證種子必從新熏義經言積集者數數集成是熏習義論説內種即是識種定有熏習外種即穀麥假名為種子或有熏習者如以花香熏苣藤故或無熏習者如炭生苣藤牛糞毛等生青蓮等本非熏習而得生故三種熏習者謂名言我執有支引此以證有漏種生必由熏起無漏種下意牒有漏種必藉熏生例顯無漏亦從熏起故諸聖教説聞熏習淨法即法身界是因義等流即同類正法簡於邪謂聞無漏清淨法因同類正法而熏起者是出世心種子性故攝論釋云淨法界者諸佛法界永離一切客塵障故言等流者謂從法界所起教法無倒聽聞如是教法故名等流依此正聞所起熏習説名熏習即此熏習能生出世無漏之心名為種子如有説云諸初發心菩提薩埵所有正聞熏習種子雖曰世間應知即是法身所攝而能親作出世心種一立義引證竟下二牒破前執有情本來種性差別至依熏可生非已有體破前青目等師言有情本有五種性別之義而言依障建立者意在成就新熏理故以斷有漏即熏無漏如瑜伽下引證依障建立義於真如境者以真如是迷悟依故説為境諸染淨法依之得生故論言於真如境上有二障種者不得入圓寂立為異生性二乘不斷所知唯斷煩惱斷有利鈍故分為二聲聞根鈍三界九地地各九品品品別斷獨覺根利三界諸惑合為一聚九品別斷如來二障永斷二死永忘覺性圓滿名佛種性故知下結成種性差別依障建立成新熏義非是無漏種子定有定無所説下牒前青目等師言地獄成就三無漏種彼種亦依熏生非已有故二牒破前執竟通上一舉二偏執竟下二正兼二類分二一自立正義有義種子各有二類至此即名為習所成種護法正義兼前二種謂有漏無漏種生各有本有新熏二義一者下謂本識中自然本有能生五蘊十二處十八界之功能差別不同世尊下引證本有種子餘證如初者如前青目引證之義此本有種即名本性住種二者下謂現行八識能所熏習種子始起故名新熏復引世尊依此下亦證熏習成種義此始起種即名習所成種文中雖以二義別釋意在兩收方成種義故下雙破難陀青目各唯一義皆不應理自立正義竟下二舉執難破分二一破唯本有若唯本有轉識不應至故唯本有理教相違此破青目等師唯執本有義若唯本有能所熏習不名因緣若諸轉識與阿賴耶為因緣者亦有新熏何唯本有如契經下引證有因緣義諸法即前七識即第八識諸法於識藏者色心種子本識攝故識於法亦爾者本識藏在色心中故即如眼識緣色時雖是眼識現行亦不離本識若離本識是心外有心法不成唯識理心法既爾色法亦然後二句釋成前二句互為因果義此頌意言下論主釋頌意互為因果者前七能熏為因所熏第八為緣第八能生為因所生前七為果攝大乘下引證互為因緣義炷喻種子及本識焰喻現行及前七炷能生焰焰燒燋炷種生現行現熏種子前七熏本本起前七法喻兩齊立因緣義又如束蘆喻不相離唯依此二者即能所熏也若諸種子下牒責本有會上因緣證之非熏令長下難也謂若諸法本有種子熏令增長汝即説彼有因緣者則善惡業與異熟果亦作因緣以善惡業望異熟果是增上緣非因緣故例上熏令長者亦增上緣非因緣也又諸下牒上熏長若作因緣聖説種子由熏習生豈不相違一破唯本有竟下二破唯始起分三一以理正破若唯始起有為無漏至善等應為不善等種此破難陀唯執始起義若唯始起必熏習生有因緣時有為無漏由熏習生若無因緣有為無漏必不得生何得現有漏無漏種若無因緣有始起者漏無漏種應互相生善不善等更相為種許應諸佛有漏復生便成大過故云有漏不應為無漏等已上破詞意在顯種本有故以互生為難一以理正破竟下二引教辨破分五一彼部正義分別論者雖作是説至故無漏法非無因生此護法師引小乘大衆部一説部説出世部雞胤部此四部中正義彼既亦説有無漏種則彼妄執熏生必與自宗相違分別論者即彼四部中分別論議者心性本淨者謂真心體本自清淨顯是無漏種子本有也客因主立塵由空顯主空喻本有真如客塵喻新熏煩惱故離染時轉成無漏顯無漏種即此真如轉變名目所以論主復顯本有云故無漏法非無因生真如為因是本有義一彼部正義竟下二展轉難破而心性言彼説何義至勿善惡等互為因故此以空理三性展轉難破也而心性言彼説何義者論主問上心性本淨之言説為何義能為無漏之因若説空理者謂若二空之理有能所熏成無漏種名始起者故破云空非心因空是無情心因何有空是常法非諸法種體無轉變非能生義若即是心者謂若現前能分別心熏生無漏為無漏因應同數論彼執冥性恆一二十三法相有轉變同汝心體是一而有有漏無漏轉變惡無記心又應是善者謂無漏是善心通三性心是無漏因不善無記心應是無漏善若二心是善應與信等心所相應王所各別何名體一不許彼相應應非善心體心自不名善何為無漏因有漏下破有漏善心亦非無漏之因若有漏心為無漏因善惡等因應互相為故云勿善惡等互為因故若有漏心性是無漏至種子現行性相同故復以有漏無漏展轉難破也謂若有漏之心性是無漏故許有漏心為無漏因則無漏心亦應性是有漏亦互為因故又責云差別因緣不可得故若許有漏性是無漏則異生心性是無漏在異生位無漏現行應名聖者何名異生若謂異生相染不名無漏則心種子亦非無漏何則種子現行性相同故以聖種子現行必聖相狀有染性必染污以理推之種現必同何故汝論説有異生成就無漏種子此責難陀謂諸種子所熏能熏無始成就義二展轉難破竟下三釋彼正義然契經説心性淨者至有漏法種類此應知牒釋分別論者所説心性本淨正義以心性言顯是真如名真實性或説心體被煩惱污體非煩惱名性本淨非同汝執有漏之心性是無漏故名本淨由此下謂由經説真如是心應信真如是無漏種法爾成就何執熏生無本有種無漏法起下明展轉熏生義無漏法者即見道後所修無漏道法也以此為因者因證真如方修無漏故以真如為因復熏成種者從真如體生諸功德智種道種一切皆成言無漏者以智照境不起分別説能緣智不漏於境耳有漏法種類此應知者牒上無漏既是本有則有漏種亦本有故三釋彼正義竟下四釋教熏習諸聖教中雖説內種至方便説為出世心種牒破難陀偏執熏習撥無本有然本有下釋上諸聖教中説熏習者是增上緣非説因緣熏生內種其聞熏習下明無漏種亦由熏習令其增盛出世心者即是見道所證無漏心也以從真如展轉熏生是故聖教亦説此種名聞熏習聞熏習中有二種緣義熏生有漏感變易生死勝異熟果為出世法作增上緣是修所斷熏生無漏與出世法為正因緣非所斷攝以無漏法無盡期故此正因緣下結顯前説展轉生心即是真如無漏種子以方便故名出世心四釋教熏習竟下五牒釋依障依障建立種性別者至障有可斷不可斷義牒上難陀引瑜伽證依障建立種性別義文中一一釋成以辨種子本有也謂若下明依障建立異生性也非涅槃法即異生性法以諸異生無涅槃故無漏法種能害二障故無彼種二障永不可害若唯下釋依障建立二乘性也二乘種性唯斷煩惱不斷所知故所知障永不可害根有利鈍分為二種獨覺根利惑總斷故若亦有下釋佛種性佛無漏種能害二障故有佛種二障永害故由下結成論説種性別者唯依無漏種子有無方説障有斷不斷義然無漏種微隱難知至説熏可生亦定非理釋成約障顯有本有無漏種義若謂法爾有此障別者縱彼轉計自然障別則無漏種亦應自別何偏許障別而不許無漏由無漏種得生聖道由諸聖道能斷二障約斷二障立種性別若無無漏法種聖道斷障種性差別俱不得成既彼下牒上聖道永不生義既永不生説熏可生理不應爾五牒釋依障竟通上二引教辨破竟下三結破顯理然諸聖教處處説有至各有本有始起二類結破難陀執始起義理教俱違復顯護法自立正義三結破顯理竟通上二舉執辨破竟下三六義明種分二一正明六義然種子義略有六種至不可説有能生用故由前二師別執本有新熏護法正義兼之意謂不唯二義兼收更顯種子略有六義攝論頌云勝義諸種子當知有六種剎那滅俱有恆隨轉應知決定待衆緣唯能引自果一明生滅成種子義以生滅功能殊勝故攝論釋云剎那滅者生已無間即壞滅故無有常住得成種子於一切時無差別故雖剎那滅然非已滅此遮下謂常法不變種義全無故應遮止二果俱有謂與所生至故但應説與果俱有此明因果不離成種子義此遮下謂前種後種及相離法非俱有義故應遮止攝論釋云已滅生果不應理故如死雞鳴是故應許種子與果俱時而住現行種子雖是類別互不相違一身即現行能生即種子謂一身作用是種現同時故云俱有不同從種生種前後相違必不俱有也雖因下別明二義言現在因用是果俱有義未生已滅釋不俱義謂果俱有唯依種生現行立名不依前種引生後種是故但説因種現果俱時有也三恆隨轉謂要長時至此顯種子自類相生此明第八成種子義恆隨轉者謂要長時相續其性一類是無記故方名種子攝論釋云此恆隨轉剎那傳傳經於多時恆隨轉故此遮下謂轉識間斷無恆隨義故應遮止四性決定謂隨因力至生異性果有因緣義此明善惡業力決定成種子義異性因果即色心互生也此等妄執故應遮止五待衆緣謂此要待至故種與果非恆頓生此明因緣成種子義因非自有緣自因生殊勝功能必因緣合執自然因執緣恆有應恆頓生理不頓恆故應遮止顯所下結成待緣方成種義故無恆生頓生之過六引自果謂於別別至具斯六義成種非餘明引自果成種子義色心各引種果不亂一因多果色心互生皆是妄執故應遮止唯本識下結成六義成種方為內種正義一正明六義竟下二簡別外種外穀麥等識所變故至是共相種所生果故簡外種子唯得假名內外種子俱有生引二因外種望芽為能生因傳望莖等為能引因阿賴耶識是內種子親望名色為能生因傳望六處乃至老死為能引因譬如射箭放絃行力為生因自絃以往不即墮地為引因內種熏習生長者謂本有種親生現果是因緣性但熏令長説有熏習是增上緣外種熏習或有或無者無性菩薩云或有或無有分別不決定義如從其炭牛糞毛等隨其次第生彼苣勝青蓮花根及以蒲等非苣勝等與彼炭等俱生俱滅互相熏習而從彼生如是外種或無熏習又苣勝等與華鬘等俱生俱滅由熏習故生香氣等如是外種或有熏習如是分別外種不定是故説或故外種子熏習有無望於內種唯增上緣無因緣義辦所生下釋成外種成辦生果是諸有情依報所攝故必內種為彼因緣共相種者有情八識共所變故設問云若內心種生外果色應同異部色心互生之過耶答彼執互生此唯心變顯唯識理故無彼過二簡別外種竟通上三六義明種竟下四能所熏習分四一問答標數依何等義立熏習名至令種生長故名熏習問答能所熏義一問答標數竟下二正釋所熏何等名為所熏四義至可是所熏非心所等一明第八從無始來至究竟位一類堅住相續持種是所熏義轉識聲等是無常義故應遮止二明第八無覆無記平等一味不違善惡熏染是所熏義善惡力強不容熏染故應遮止由此下謂果上淨識非無記性故不受熏唯在因中受無漏熏名為舊種以唯是善違不善等三明第八心王有自在義無記虗疏無堅密理自在受熏得所熏義言自在者簡難陀許心所受熏是依他起非堅密者簡馬鳴許真如受熏是無為法二者無義故應遮止四明所熏第八能熏前七行相各別名為不即原為一體名為不離不即不離是和合性由和合故有所熏義他身前七與已第八無和合理故應遮止唯異熟下結成第八具上四義立為所熏非五心所及前七識有所熏義二正釋所熏竟下三正釋能熏何等名為能熏四義至具此四義可是能熏總問能熏文中別釋四種一明前七有間有轉有變易用生長習氣成能熏義無為法常無變易用故應遮止二明前七及諸心所有能緣用有強盛用是能熏義第八異熟及彼心所有能緣用其體劣弱無強盛用色法雖有強盛又無能緣不相應行二用皆闕故俱遮止攝即減義植即增義三明前七王所具此增減用故得能熏義佛果善法雖是強盛理無增減故應遮止彼若下釋成佛果善法非能熏義若作能熏便有增減以前熏後前佛德劣後佛德勝便違正理四明能所和合不即不離義如前説和合義成有能熏義他身第八與已前七無和合理故應遮止唯七轉下結成前七及彼心所具上四義説為能熏三正釋能熏竟下四通結前義如是能熏與所熏識至是謂略説一切種相結上熏習生長種子如熏苣勝者喻上熏習義苣勝是炭久理地中變生即西域胡麻也體非香臭子可作油若以華熏隨生香氣經中取喻無記性本非善惡受善惡熏能熏識等下明三法展轉義言三法者前後種子為二法中間現識為一法望前種子是能生望後種子是所生是故因果展轉同時如炷下喻上因果同時義前後燋炷喻前後種中間光焰喻現行識蘆束相依喻不相離法喻兩齊理不傾動士用是作者所作事成名果作者及所作事俱現在故名俱有因以喻種生現行因果同時因果相似名等流以喻前種生後種因果不同時此二下結成種生現種生種種於所生現種果法作因緣性除此二法餘非因緣但可假説是謂略説一切種相者通結前來一切種相應更分別下四科之義四通結前義竟通上一釋三名竟下二釋行相分二一問答標名此識行相所緣云何謂不可知執受處了問答以明行相所緣二義第八行相微隱故答不可知第八所緣三境故答執受處以執受中有種子根身二義處即器界一義是三所緣了字即是能緣行相文中自釋一問答標名竟下二正釋行相分二一執受處了分二一略釋了謂了別即是行相至行相仗之而得起故了謂下釋第八識行相是見分所攝以見分取境有了別用故名行相處謂下釋第八所緣以識恆取器世間相及種子根身為境根即勝義身即浮塵執受各具二義執二義者執為自體持令不散受二義者領以為境令生覺受同安危故第八望根身四義皆具同是無記性故第八任持此身令不爛壞故此根身是第八識親相分故或安或危皆同第八若望器界但為所緣非是執受即領以為境一義無餘三義諸種子下釋成種子義相即所緣相分名即能緣見分能所分別熏成業種故習氣名即種子義有根身下釋成根身義色根即勝義根依處即浮塵根以勝義必依浮塵故種子根身二法皆是第八執受執受及處下結答上問所緣義以第八識自體生時內變種根外變器界為所緣境成親所緣緣能緣行相仗之而起故頌中云執受處了一略釋竟下二廣釋分四一廣釋了字分二一正釋了字此中了者謂異熟識至此了別用見分所攝了者慧也別者解也此識見分於所緣境有能決擇分解義故一正釋了字竟下二偏正互辨分三一三師立義分三一難陀二分然有漏識自體生時至似能緣相説名見分由釋了字是見分攝必有所緣相分為境故有難陀立此二分以破安慧唯一分義然有漏者以未轉依必有二分似所能緣者謂依他二分似遍計所執二分而現相應亦爾者顯心所亦依心生故似所緣下釋成二分名言相分者通有四種一實相名相體即真如真實相故二境相名相能與心根而為境故三相狀名相唯有為法有相狀故通影及質識所變故四義相名相即能詮下所詮義故於上四種唯取後三為相分相言見分者通有五類一證見名見即根本智二照燭名見此通根識俱照燭故三能緣名見即內三分俱能緣故四念解名見以念解心解所詮故五推度名見即比量心推度境故於上五種除五色根及內二分餘名見分若心心所無所緣相至能覺所覺分各自然而轉此破安慧唯立一分義若無所緣應不能緣自所緣境若不緣自境應緣餘境故又難云或應一一心能緣一切境何則自境如餘餘如自故若無能緣如虗空等以虗空體無能緣用若心心所如虗空虗空應如心心所故又難云或虗空等亦是能緣何則以虗空如心心所故故心心所下結成自義復引經證前二句頌無外境第三句證見相二分即能覺所覺第四句顯從識變一難陀二分竟下二陳那三分文有三節一明外執三分義執有離識所緣境者至識受想等相各別故外人執外境是所緣所一分從境變起影像相分名行相為第二分能緣見分名自體為第三分心與心所下謂心心所同依根同緣境名為行相相似事即心王數即心所等者同名見分謂心心所雖同見分了別領納等相狀各異故識即了別為行相受想等即領納等為行相故各有異達無離識所緣境者至識受等體有差別故二明內立三分義謂通達離識無境者已解唯識義故宗鏡云唯識為宗不以本質為所緣亦非影像為行相故以相分為所緣見分為行相相分見分俱從自識變現故所依識體即自證分此若無者下謂必有自證分義意破難陀唯立二分謂如眼識由青色相引生見分緣青色時必有眼識自證分證青色謝去見分即滅以見分是青色引生有生滅故復有黃色引生見分緣黃色時必不緣青故憶所更青色境相唯自證分以自證分體無生滅恆相續故故無自證分必不能憶故心與心所下釋王所行相各別謂王所雖同根境而行相不同識之行相是了別受等行相是領納等以有緣總緣別作用異故不同前執變起影像相分為行相而言相似今言行相各別者即前事雖數等相各異等故復言之顯與前別然心心所一一生時至即能量及果彼三體無別三明陳那自立三分義所量即相分能量即見分量果即自證是心心所各有三分如集量論下引證三分義初句證所量相分第二句證能量量果是見分與自證分第三句成第二句義第四句顯唯識理二陳那三分竟下三護法四分又心心所若細分別至證自體者必現量故證者體也驗其事也證自證分即是真如以八種識不離真如故真如體能證八識此若無者下明必有第四分義謂第三自證分既同見分是心應皆第四證之又自證分應無有果者復以第三無果難破恐彼救云即用見分為第三果故先抑云不應等以見分通三量故云見分有時非量攝故不證第三證驗自體必現量故宗鏡云須具四義方為量果一現量二內緣三不變影四是心體三護法四分竟通上一三師立義竟二內外能所此四分中前二是外至此中見者是見分故相分見分於外門轉名為外性自證真如唯是內證名為內性故下頌云衆生心二性初唯所緣者相分非心分無有能緣用故唯是所緣後三屬心分通所能緣義謂第二分下釋前二分能所緣義以見分通三量故説現比等第三能緣下釋後二分能所緣義第三緣第二及第四者謂八種識各有自證分能緣見分及證自證分故不爾復立第五緣第四展轉無窮第四緣第三二皆現量故第四非緣第二者以彼見分通比非量既非果體故無有用故心心所下結成四分顯唯識理前立一分無能所故立二分者無自證故立三分者無量果故今立四分故無諸過又第三四互為量果過無無窮是故下引經證立四分義二性者外二分為外性內二分為內性一切分者即四分故內外各説各有所取能取纏縛唯見分通現比量等故云種種此頌下論主自釋前三句頌以明內外各二分義見有種種下釋第四句頌義二內外能所竟下三結歸唯識如是四分或攝為三至了別即是識之見分攝為三者自證真如原為一體但依真妄立二種名問既為三分應同陳那過耶答彼執唯三此但攝入故無彼過下文攝二攝一問過同此攝為二者唯一能所以後三分同能緣故皆見分攝攝為一者能所雙忘顯唯識理問既攝為一顯唯識理何又立四分耶答立四分者明唯識之行相攝為一者成唯識之有宗如入楞伽下引證唯識義前二句顯有能所後二句顯唯識理如是下釋成唯心之義總收心所復結前云了別是識行相之義三結歸唯識竟通上一廣釋了字竟下二廣釋處字分二一正釋處義所言處者謂異熟識至如衆燈明各遍似一處即有情依報皆諸有情共相業力所感外大種者對根色言以勝義根雖亦是色而非所緣故名內色塵是所緣故名外色內外二色皆大種成故説大種有內有外雖諸下謂從本識變似根身器世間相而有四句一共中共變如山河等非唯一趣獨能用故二共中不共變如己田宅非鬼見猛火人見為水等三不共中不共變如眼根等唯自識依非他依故四不共中共變如自浮塵根他亦受用故今言所變各別者是共中不共變如己田宅如衆燈明者喻共中共變如山河等一正釋處義竟下二問答辨明誰異熟識變為此相至諸業同者皆共變故此問界相誰變答中二義未正第二答義以理破前若謂一切共所變者聖凡淨穢互相雜亂有違正理若許聖者變雜穢土彼居淨界不更下生此復何用是故下自立意云決定住者方能變故經依下釋前師引經證義但以同業説一切言有義若爾器將壞時至此變為彼亦何所益正義破前若謂定當住者才變此土器將壞時何不定住若器壞時必無人住此殘缺界何識所變又諸下以生無色為難若謂現居及當生變厭有色界生無色者則無色身預先所變有色世界復何所用設許無色界中有身與有色界粗細相乖此變粗器於彼細質有何所益然所變土本為色身至鬼人天等所見異故自立正義然所變土不為自變唯是自居本為一切色身依持受用故於色身可有持用便變為彼器世間相由是下謂由不專於己故無前難如人造屋本為人居非專己任人居人去屋亦可存器壞器成有情何預故云雖無有情而亦現有世界相故此説下結顯共與不共變義若別受用者且如一色人見唯水鬼見膿河或成猛火天見琉璃魚龍窟宅共一色體不共見故二問答辨明竟通上二廣釋處字竟下三廣釋執受分二一執受種子諸種子者謂異熟識至如真如性不違唯識有漏種子同異熟識是無記性第八見分恆取所緣無漏善性不同無記第八見分自性虗妄不緣真如以無漏種依真如故設問云既非所緣應同心外別有法耶答云雖非所緣是第八識所持種子不離識故真妄總該成唯識理一執受種子竟下二執受根身有根身者謂異熟識至彼餘尸骸猶見相續根即勝義根身處浮塵根不共相種及內大種依勝義根説唯勝義根是不共相名內色故又言身處亦內色攝名共相種自他身處更相變故受用即所緣義若不互變應不互緣此中下錯解中邊論義謂勝義根亦互相變其理未正有義下破前謂互相變唯變浮塵不變勝義他根於己無受用理以非己識所依緣故似自他下釋辨中邊論文説自他識各自變義豈以互變濫自變耶故生下結成前説共相種變義生在他地是緣他身般涅槃時即緣尸骸是受用彼義言相續者謂彼尸骸不即壞故攝論頌云此外內種子能生引應知枯喪由能引如任運後滅無性釋云如是外內二種種子俱為生因及為引因若外種子親望於芽為能生因傳望莖等為能引因阿賴耶識是內種子親望名色為能生因傳望六處乃至老死為能引因生因且爾云何引因為答此問故説枯喪由能引言若二種子唯作生因非引因者收置倉等麥等種子不應久時相似相續喪後尸骸如青瘀等分位隨轉亦不應有何則才死即應滅壞如任運後滅者是説譬喻譬如射箭放絃行力為能生因令箭離絃不即墮地為能引因以喻尸骸相續或青瘀等或枯稿長年皆相續義二執受根身竟通上三廣釋執受竟下四結顯二變前來且説業力所變至及墮法處所現實色結前問答辨明及廣辨執受等三科之義若定等下謂諸聖者定力神力所變身界等事多不決定所變身器下釋成不定義變身器者自身他身天堂地獄淨穢等界是依報等皆從定力神力及顯現等堅固變現化利有情一劫多劫展轉相依故恆相續聲光説法多分暫明隨彼機緣擊發變現略説下重結前義十有色處即內五根及外五塵是十色處法處所攝色有假有實今言實者結上定力所變身器等色何故此識不能變似至彼識亦緣此色為境問能變識何不變似心法為所緣境答中分為二種因緣變者謂由先業及名言實種唯任運心即前五第八隨其增上異熟因為緣名言種為因故變為境分別變者謂作意心生即六七二識隨自分別作意生故由彼六七分別變起影像相分無有實體未必有用故但為境若第八識因緣所變色等諸法皆有所緣真實用故若第八識因緣所變心心所等無有所緣實用相分心等不能緣故者謂所變心等之相第八因中不能緣以無所緣實用須彼實用別從此生者須者意所欲也若欲當其所緣實用別從此第八因緣變生色等方有所緣實用變無為等亦無實用者若實無為因位未證若假無為無體用故故異熟識不緣心等者結答問意以明第八因中不緣前七心心所故亦不緣無漏種故故説心等及無為無所緣實用設問云因中第八不緣心等轉依位中許能緣否答云至無漏等勝慧即圓鏡智智體澄淨時雖無分別而於前七所有分別心心所法亦現彼影以佛遍智真妄有無一切諸法皆能緣故故有漏下結顯第八因中不緣見分唯緣三境在欲色下釋成三界所緣有別謂欲界色界俱緣種子根身器界三境無色界中唯緣有漏種以無漏種因中不緣故四結顯二變竟通上一釋執受處了竟下二釋不可知不可知者謂此行相至無想等位當知亦爾轉識論云此識行相及境不可分別一體無異若爾云何知有答由事故知有此識此識能持一切煩惱業果報事譬如無明相境不可分別亦有欲瞋等事知有無明本識亦爾相境無差別但由事故知其有也或此下又於所緣上解不可知義外人問若許此識取所緣境云何又説行相難知引喻答上問意云如滅定中不離身識應信是有既信滅定有不離身識是有情攝應有所緣既有所緣如有心時如何不知彼不可知故知本識行相微隱難可了知滅定如是無想等位當知亦爾二釋不可知竟通上二釋行相竟
