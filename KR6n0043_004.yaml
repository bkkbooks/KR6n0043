body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前引理章中正釋引理分十一引持種心二引異熟心三界趣生體四有色根身五壽暖識三六生死時心七引緣起依已上七科三卷中釋竟此中第八引識食體分二一正釋識食又契經說一切有情至以變壞時色無用故引經推義以證第八為識食體識食者以識為食食是資益義任持義謂第八識資益任持有色根身無色界中任持種子復引經中說四種食食有形段或食有時故名段食唯欲界有以香味觸三塵為體以上二界無此三故於變壞時能為資益任持食事故此段食變壞為相問色聲二塵何不為體答眼耳二識離中取境色聲二塵不與根合不能資益諸根大種故不為體鼻舌身三合中取境香味觸三境與根合故能資益諸根大種所以唯取三塵為段食體大論云此中段食當言香味觸處所攝由香味觸若正消變便能長養不正消變乃為損減色等餘法既無長養損減消變是故說彼非段食性諸可食物於吞咽時令心歡喜諸根悅豫但名觸食若受用已增長喜樂安隱消變乃名段食若諸段物於吞咽時無上二義都不名食由此色處者即十二處中一處也此明三科中色類不攝段食義以色蘊色界同色處故二者觸食觸境為相至及順益捨資養勝故觸謂觸對乃六識中相應觸數所對前境色等諸塵柔軟細滑冷暖等觸而生喜樂俱能資益諸根大種正受用時名為觸食設有問云觸遍八識何以觸食唯通前六答云此觸雖與八識相應今取食義偏勝謂前六識相應觸所行相粗顯以能攝受喜樂受故能生順益身之捨故是偏勝義七八俱觸境微細故全不能生喜樂受故雖生捨受但不為損而非益故故七八俱觸及餘識俱憂苦受非順益捨即非食體不資養故如有男女相對為觸觸能資身故得食名三意思食希望為相至意識於境希望勝故思是遍行心所在有漏位與別境欲俱於境起愛能為資益任持食事故說思食希望為相如言懸砂充饑望梅止渴其思食之謂與問既與欲俱轉欲何非食耶答思慮益根非欲能故問思通諸識何唯第六答思與欲俱方有食義意識於境希望既勝故此思食唯屬意識四者識食執持為相至一類相續執持勝故識是心王有漏位中或由段觸思食勢力能為資養任持食事故說識食執持為相問諸識識義既同何獨第八名為識食答云此第八識執持義勝獨名識食由是集論說此四食至於持身命非遍非恆此引集論證有四食於三蘊五處十一界攝三蘊攝四食者謂除色蘊及想蘊故段食變時色無用故想於觸思義各別故故段觸食攝屬受蘊觸食亦通識蘊所攝論說觸食屬六識故於行識蘊當攝思食以思於行為主勝故論說思食屬意識故於識蘊中容攝識食識蘊識食識義同故又云五處攝四食者於十二處簡去七處前五根處及色聲處無食義故唯香味觸攝段觸食法塵處攝意思食故又意根處是第七識宜與識食定相屬故十一界攝四種食者亦除七界同前七處段觸二食亦香味觸三界所攝觸食復能通六識界以論明言屬六識故思食亦與法塵界攝及意識界論說思食屬意識故識食總攝七種心界謂意根界及六識界諸識自證分通第八體故此四下結成食義段食下簡前三食不能該於一切有情故於三界有遍不遍眼等下簡別轉識於有心無心位中俱有間轉於持身命非遍非恆不可為食一正釋識食竟下二牒執難破諸有執無第八識者至不相應法非實有故此破外執顯唯第八是識食體言過去者未入定時也未來者已出定時也彼執無心定位兩頭有心即為無心位者之食破云過去已滅非常未來未生非現猶如空華豈為食性復恐轉計能引定心與入定者作持身食破云住無心時能引定心已滅非有將何為食既屬過去前已破故亦恐轉計無想滅盡二定是不相應行即為入二定者之食破云段等四食不說無想等食不相應行既非實有無能持用不可為食有執滅定等猶有第六識至衆同分等無實體故引彼執詞總斥非理後當廣破者第九章中廣明滅盡定義上二界者色界無色界也彼二界身皆有漏故若執無第八唯有第六者六起無漏時無有有漏識執持有漏身故云無漏識等破壞有故不可為食恐彼轉計無漏六識有有漏種以有漏種能為彼食破云無漏如涅槃不持有漏種故持有漏種唯許第八識又恐轉計上界有情以身持命以命持身即互為食破云彼四食中不說身食及與命食又無色界既無色身命無能持以何為食衆同分等無實體者總破不相應行俱非食義由此定知異諸轉識至彼識即是此第八識結顯第八有恆持用故能為食恐彼難云佛亦依食應是有情釋云唯依有漏五取蘊故建立有情佛無有漏非有情攝佛說有情依食住者示現而說非佛依食住亦實是有情既前所說異諸轉識有異熟識恆持身命是識食性勝前三食應知彼識是第八識二牒執難破竟通上八引識食體竟下九引滅定心分二一引經正破又契經說住滅定者至依何而說識不離身引經推義證第八識決不離身謂入滅定人身語心行無不皆滅出入息是身加行尋伺是語加行受想是心加行與前六識相應在滅定中皆悉滅故而壽不滅者即第八識種上有連持果報色心不斷功能名壽亦不離暖者暖觸是第八識相分即此二法皆不離第八識既在滅定中六識身語心加行皆悉不行而有壽暖在者明知即是第八識與壽暖為依謂眼等下釋成入滅定者為滅眼等識故故此位中轉識皆滅若不許下謂彼執無第八識者彼契經中依何義說識不離身一引經正破竟下二牒計辨破分三一牒計總破若謂後時彼識還起至離託餘身無重生故縱彼轉計謂入定時滅第六識後出定時第六識起如瘧暫愈瘧不離身此識亦爾名不離身破云若後還起名不離身契經不應說心行滅心與心行起滅同故既曰已滅云何不離壽暖諸根滅不復起如識還起便成大過故壽暖等在滅定位皆不離身識亦如壽暖實不離身不同轉識滅已還起又此下縱彼轉計此位無識既全無識非是有情彼經何說住滅定者說住滅定必有情故又異熟識下謂前執無識諸識皆無故以瓦礫為破此執無識但無異熟顯有第六出定還起復以無識執持諸根壽暖為破既如死尸識不還生若謂此位識滅還生是有間斷彼經何說識不離身然異熟識捨離此身投託餘身無復重來生此身理又若此位無持種識至決定有識實不離身重破彼執滅已還起故云無識持種後識不生過去未來下總簡已滅未生諸法無持壽暖不離身義然滅定等結顯此位識不離身必是此中第八識體若謂此位有第六識至可了知識入此定故縱彼轉計滅盡定中有第六識故彼經中名不離身破云亦不應理此定立名無心定者是無第六豈有第六又名無心又轉計云名無心者唯無五識非無第六難云應一切定皆名無心何則凡入定時眼等五識必不生故意識攝在六轉識中者展轉破第六謂無五識意識亦無以第六識同轉識故或此位下謂此位識行相微隱故不可知如壽暖等不離身故非第六識有如是義若有第六行相所緣即可知故復恐轉計此位有識行相可知破云應如餘位非此無心定位所攝何以故本為止息粗動想心入此定故豈入定已猶有此心一牒計總破竟下二有識有所又若此位有第六識至如何可說彼滅心在問此定中心所有無然後難破心行即受想受想即心所經既說滅何執為有若有心所豈不違經此定加行下執者辨救諸心所中獨以受想說名心行故滅定中唯滅受想有餘心所原不相違論主例破云若但厭受想名滅彼定者無想定中唯厭粗想應唯想滅有六識在然汝不許又能資助心所既滅所資助心理亦應滅何執此位有第六識如身行下執者轉救謂如身中出入息滅而身不滅寧責心王同心行滅例難云若謂身行滅時其身不滅例心行滅心亦不滅亦應語行尋伺滅時語亦不滅未有不起尋伺能言語者故云而非所許然行於法下論主正明加行有遍非遍勿互相例違害正理三種行中身行非遍語行心行皆名遍行故云見息滅時身猶在故尋伺滅時語定無故受想滅時心定隨滅如何可說彼滅心在意顯無則俱無也以是遍行應同滅故又許思等是大地法至想亦應生不相離故復明轉展皆無以破有餘心所之計思等者思與欲俱等於欲等五所以他處言遍行別境十所是大地法信等十一是大善地法貪等二十六所是大染地法故難破云又許思等是大地法受想二法滅時餘大地法應滅既滅大地法信等大善地法亦無非大地法滅餘可在故如何可說唯受想滅有餘心所既許下復以有則俱有為難又此下釋成有則俱有義觸所既與諸法為緣若有思等必應有觸觸既緣受應有受生受想不離想應不滅豈有餘法在而受想滅耶如受緣愛非一切受至亦不得成滅受想定執者轉救謂受緣愛由樂受生若緣苦受愛不生故喻如觸緣受有不生受者論主質云有差別故謂佛下釋成有差別義謂佛經中自有簡別唯簡受緣愛有不愛者曾未有處簡觸生受有不受者又言無明觸者是生受之緣故若有觸必有受生受想不離其理決定或彼轉計餘有心位受想不滅執滅定位亦有思等諸心所故破云許有心所違害經說心行滅言亦不得成滅受想定二有識有所竟下三有識無所若無心所識亦應無至如何有識而無心所若許滅定無心所者勿執此中有第六識心與心所不相離故遍行心所滅心法隨滅故若謂有心無受等者受等應非大地法故以大地法攝十心所若無心所應無大地受等法故此識應非相應法故者以無心所無相應故若許有識必無心所此識應無所依緣等以三和時必觸為依若無觸所三不和合又心生時作意為緣若無作意識不生故若許此心無所依緣應如色法亦非心故復引經證有心位中必有心所若此下釋成經意責彼妄執若謂餘時三和有力至不爾如何名無心定縱彼轉計餘時根境識三和合有力成觸生觸能起受等定中不然何則由此定前加行厭患粗動心所在定位時三事無能不成生觸亦無受等故此定中無諸心所論主難云若由定前厭患心所故此定中無心所者應名滅心所定如何契經但說此定滅受想耶又縱轉計定前厭時唯厭受想是故立名滅受想定餘心所法是隨滅故故不立名復難云既厭受想餘法隨滅心亦應滅以餘心所隨受想滅心王如餘所亦隨受想滅若不滅心如何此位名無心定又此定位意識是何至故無心所心亦應無先問定中意識於三性中為是何性復牒破云定中意識不應是染及無記性諸善定中無此染與無記事故染無記心必有心所違汝前執無心所義又在定前厭染散亂豈在定中翻起不善染心所耶攝論云又此定中不離身識決非意識以善不善及無記性皆不成故若此定心是善心者應與善位心所相應亦違汝執無心所義又云善根既有想受二種何不現行若有想受又不應名滅受想定此心下恐彼轉計故先抑之自性善是信等十一法勝義善是真如涅槃自宗是彼所執善心無心所既修滅定自無心所應非善根等心所相應尚在因位故非涅槃攝論釋云又非此心是自性善以自性善唯善根等入其數故又此善心非勝義善唯有解脫是決定故既在因位不名解脫若謂此心是等起善者謂果中聖人以加行善根發起神通等事名等起善違自宗者彼執滅定有心無心所為宗既許有心如餘善心無間而起無貪等三性善根如何善心而無心所由前等起故心是善亦由善根力故如何有心獨無心所如是推徵眼等轉識至無想等位類此應知結成此位無諸轉識唯第八識契當彼經不離身識入滅定下釋成滅定唯止息彼散動轉識不為止息行相微隱極成寂靜執持識故滅定既爾無想等位類此應知三有識無所竟通上九引滅定心竟下十引染淨心又契經說心雜染故至諸已斷者皆應起故引經推義證有第八名染淨心謂染淨下釋成經中義染淨法者即諸世間有為無為善不善等皆以第八為本因第八而生前七現行依第八住第八識體即受彼熏持彼前七三性種子故此第八名染淨心復舉雜染略開三種即惑業苦三煩惱即惑是十二緣中無明愛取三支業即是業即行有二支果即是苦即識等五支并生等二支由惑發業由業感果故惑業苦種類別故種為現行之因現行為種之果若無第八持煩惱種有情三界九地往還煩惱現行盡時復起煩惱皆應無因如頭藍弗生非非想已無染心命終之後墮飛貍身上食林鳥下瞰淵魚此等煩惱現行豈無因種餘法不持種者去來心等非實有體無持種義若諸下謂三乘聖果永斷煩惱方得證故若諸煩惱無因而生聖果永絶以彼煩惱無因生故若無此識持業果種至此不成故後亦不成諸業果者三界九地善惡業感異熟果也若無此識持業果種前業果盡後業果起亦應無因餘法因種前已遮故異類法者六道三途善惡果也三界業果盡盡無餘名無餘依既許業果無因常生煩惱亦應無因常起亦復永無三乘聖果又行緣下以十二緣義難破謂無明緣行行緣識等若無此識行非為緣行即是業由熏習成識是所熏故說為緣若無此識何者受熏轉識受熏前以遮故結惑引生第八趣果名結生染識亦名行感識若無此識亦非行感以行緣識識緣名色若無此識應說名色與行為緣復難云時分懸隔無緣義故既無緣義不成因緣此不成故後諸因緣亦不得成諸清淨法亦有三種至是則應無三乘道果舉清淨法亦開三種謂世間淨道出世淨道轉依斷果三種別故以修道者從異類中來滅異類心方起淨法若無此識持二道種彼二淨法起即無因餘法持種前已遮故淨道是因涅槃是果因行永盡果德圓滿若無因生二道盡已還復應生能依淨道既無因生所依煩惱等亦應無因生既有煩惱何名涅槃以證涅槃無煩惱故出世間道必從本有無漏種生若無此識持法爾種則出世道初不應生有漏無漏二類各別非彼因故無因而生非識種故以出世道必從種生無漏法種定有識持豈執無因生出世道出世道因初既不生後所證果亦不應生是則應無三乘道果若無此識持煩惱種至唯此能持染淨種故轉依斷果因斷煩惱方得成滿若無此識持煩惱種斷果無因何得成就謂道下釋成無識持種則無煩惱現行意謂對治道起煩惱種現俱永斷盡方得轉依斷果既無煩惱斷果不成染淨下簡別諸法無持種義謂第六識於修道時與道相應自名為淨不得為染亦不得持煩惱種子淨心寂靜猶如涅槃煩惱散動豈不相違去來之心不相應行非實有故餘法持種理亦不成所斷是煩惱能斷是正智若無此識持煩惱種是無所斷無所斷故能斷亦無依誰所斷由誰能斷而立轉依清淨斷果若彼轉計由對治道有勢力故後惑不生即立斷果破云則初道起應成無學初見道時名初道起此時唯斷分別現種剛入聖流直至九地俱生斷盡方成無學豈入聖流即立斷果若於初果即證無學應無藏識含藏雜染後九地中諸煩惱種皆已無因永不生故既永不生如何經說九地煩惱各有九品若許有此第八識者一切因果無不皆成唯此第八能持種故十引染淨心竟通上二引正理竟下三勸信受證此識有理趣無邊至諸有智人應深信受此是第三結勸信受通上初能變竟下二能變分三一結前標問如是已說初能變相第二能變其相云何初能變相即前所說含藏自相異熟果相持種因相了境細相相應所相任運捨相無覆淨相乃至如暴流等非斷非常種種諸相如前已說復問第二能變所有相狀云何開示一結前標問竟下二舉頌總答頌曰次第二能變至阿羅漢滅定出世道無有次第二能變是識名末那者單頌名梵語末那此云意以有恆審思量義故名為意依彼轉者頌所依根以第七識依彼第八而得生故緣彼者頌所緣境以第七識恆緣第八執為我故思量為性相者頌自性行相第七自性及了境行相皆思量故四煩惱常俱者頌與根本四種煩惱相應謂我癡我見并我慢我愛者頌四種名義於論中自釋及餘觸等俱者頌與餘十四心所相應餘名餘義論中自釋有覆無記攝者頌四性中唯是有覆無記性隨所生所繫者頌界地隨第八所生何界即於彼界所繫繫者不離義以念念執為我故阿羅漢滅定出世道無有者頌此三位無末那阿羅漢位不執我故滅定位中伏現行故出世道中初轉智故因此三位皆無末那二舉頌總答竟下三解釋頌意分三一總釋頌意分八一總釋名論曰次初異熟能變識後至為近所依故但名意釋前二句頌謂初能變識後理應進辨第二能變識相謂此第二能變識聖教別名末那者以有恆審思量業用勝餘七種識故第八恆而非審第六審而非恆前五非恆非審以有間斷無分別故唯此第七亦恆亦審故勝餘識此名下問此名意識第六亦名意識有何分別答云謂此第七是持業釋以識體上親持恆審思量用故如藏識名者謂第八識親持三種含藏業用亦名體持業用持業釋故此識體即是意故彼第六識名依主釋意根為主是識所依如眼為主眼識所依俱名能所依彰依主釋故彼識體異於意故然諸下釋聖教立名無相濫義又標下釋立名有簡別義謂第八名心有積集義前六名識有了別義唯此第七劣於前後故但名意或顯此識與第六為近所依根此但名意彼名意識一總釋名竟下二釋所依分三一正釋所依依彼轉者顯此所依至恆依彼識取所緣故彼字即第八聖教說第七依彼藏識故有義唯依識種者未正謂此第七以彼第八識種為依不依現行此無間斷不假彼現亦得生故有義種現俱依者正理謂此第七俱以第八種子現行為俱有依既名轉識有轉易故必假現識方得生故流轉者謂第八識隨善惡業流轉諸趣此第七識恆依第八取為所緣境執為自內我一正釋所依竟下二傍通餘論分二一略釋三種諸心心所皆有所依至名有所依非所餘法謂八種識及諸心所生必有依然依義別開為三種因即是緣以因為緣故名因緣因是種子緣是生義對現行果故名為因以能生現復名為緣謂從種子生現行故是故現行望自親種有因緣義有為法者即色心等有作用法必託因緣而得生故問因緣依與因緣何別答依狹緣寬緣具種生種種生現現熏種三義故寬依唯種生現一義故狹此種生現一義是因隱果現不同現行熏種以現行之因非隱熏成種果非現又因緣依因果同時不同種子生種因果各別增上緣者相助增長義或不為損義或順或違有力無力皆是增上因此增上有親有踈故增上緣寬而不狹增上緣依狹而不寬唯取有力親能引生即內六處內六處者即俱有根以心心所依彼轉故等無間緣者等者齊等前後識生行相齊故中間無隔故名無間前識滅時能引後識故名為緣又名意者以第七意念念思量恆無間斷故等無間名前滅意又名開導者以有開闢引導義故問等無間緣與依何別答若論緣義總收心王心所故寬若論依體唯取心王故狹是為別義問此三依中言生轉起別相云何答生約依種現果方生轉約隨順與力令轉起約前開令後得起是三別相問何故三緣別立為依唯所緣緣不立依耶答三緣各有常義為緣主義為依所緣緣者唯有常義無主義故唯心心所下結顯三種所依唯心法有非餘色法具足三故一略釋三種竟下二廣釋三種分三一釋種子依初種子依有作是說至定各別有種子所依說者未正謂要種子滅已現行果法方生集論二卷有二十四種已生十二有種已生十三無種已生說者取十三已生為種滅現生之證種與芽等不俱起者亦引外種證所立義有義下正理破前執義謂彼引集論為證不成彼集論說無種已生是依引生後種說故以種生種不同時故種生芽等說穀麥等非內種故焰炷下論主明正義焰喻現行炷喻種子炷能生焰焰燒燋炷以喻種生現行現行熏種故互為因然而種生自類後種因果不俱種子現行互生決定俱有故瑜伽下引證前義無常法者即是種子有轉變故雖引自他二義此中唯取他性種現證因緣依也攝大乘下復引證前種現同時義染法即前七識與第八識作能所熏互為因緣又說種子與現行果不相離故設有下釋他處說種子與果有前後者是隨流轉道理非勝義說是故心心所法決定各有種子是因緣義一釋種子依竟下二釋俱有依分二一三師辨破次俱有依有作是說至要託末那而得起故俱有依者識為能依根為所依俱時而有名俱有也有作下此說未正謂前五識唯以意識為俱有依無別眼等為此所依以眼等根是識種故所引之頌宗鏡六十三卷有釋前二句是論主假將五識種為依答經部師以彼許有種子故又謂眼等識生似色等境相而轉後二句是佛密意破外道執身為一合相我故遂於無言之法強以言分別說有根塵十處令彼一一觀察悟入我空耳今說者不知論主假說及佛密意引此以證自所執義豈以識種為色根耶彼頌意下執者自釋頌意謂識種為根相分為境以證無別眼等為根觀所緣緣論中陳那菩薩自釋云以能發識比知有根此但功能非外所造故本識上五色功能名眼等根亦不違理此根功能與前境色從無始際展轉為因謂此功能至成熟位生現識上五內境色此內境色復能引起異熟識上五根功能彼頌意下執者自釋頌意以辨前五識無眼等五根為俱有依唯許能生色識種子名色功能說為根義又七八識不許有依唯許第六末那為依通上皆第一師執義有義彼說理教相違至便與一切聖教相違此第二師破前師義理教相違有九章謂六根塵及六種識成十八界各別有種生各現行豈以識種為五根耶若五色下破違理然十八下破違教此違理教一也二以五識相見二分問定難破若執見種為五根者應識蘊攝便違聖教眼等五根皆是色蘊若執相種為五根者應外處攝以汝自釋頌云五識相分為色等境豈非外耶若爾又違聖教是內處攝此違理教二也三以緣義難破種是因緣根名增上若根是種應無增上豈不違經此違理教三也四以界地無定難破謂識種子皆通三界識之現行有起不起既執識種為根以有根處即應發識難云則應鼻舌唯欲界繫以根種隨現識不得通三界或應二識通色界繫以現識隨根種亦得通三界聖說二識唯欲界繫豈不相違眼耳下根種現識同前難意故曰亦然此違理教四也五難根識性無差別識種為根根非無記此其違理五也六謂根有執受識無執受若以識種為根則應五根非有執受此違正理六也七謂末那與意識為根以同五根引生五識之法既執五根是五識種第六識種應是末那若爾八識種現各少一數識種即末那應少第六種末那即識種應無第七識此亦違理七也八引論說具三依破依但應二者唯有因緣依及等無間緣依無增上緣依以根即種故此違理教八也九引根通種現難破根既唯識種根應無現行若種起現行又名現行識不得名為根豈不違理又違教耶此違理教九也有避如前所說過難至妙符二頌善順瑜伽感五識業是增上緣不同因緣生五識種今以業種為五色根妙符前引二頌善順瑜伽三依彼有虗言都無實義至故彼所言非為善救論主破業通善惡根唯無記若以業種為根根亦理應善惡何名無記此亦違理同前第五又彼下應非二字貫下三義既執業種為五色根執受色蘊內處三義皆無此違理教同前第六無執受及第二章非色蘊非內處義鼻舌下既以業種為五色根業力有定可許五根各有定地以免第四章中理教相違不定之過然感五識業為五根應感意識業是末那此中違理同前第七八識種現各少一數眼等不應通現種者謂既以業種為五色根不但無眼等現行亦無眼等種子以彼原是業種故此亦同前第九唯種無現理教相違也又應眼等非色根者謂業非色法又不可名五色根故單破業種非色根義眼等五識必通三性若是業感應唯無記性以無記性能招業故三性五識既非業感應無眼等為俱有依彼執業種為五色根若非業感不得為根同前第八無增上緣依故彼所言非為善救者結破轉救非理彼以業種轉救第八增上緣依而犯一切違理教者豈為善救又諸聖教處處皆說至非謂色根即識業種總結教理俱違也又諸下責彼違教許眼下責彼違理故復責云如斯迷謬深違教理然伽陀下釋前師引證義種子是前頌中義功能是後頌中義為破外道執離識外實有色根故於識變似眼根等五勝義根以有發生五識用故假名種子及色功能非謂色根即五識種及與業種又緣五境明了意識至由此彼說理教相違牒破前師執意以為自立前案謂前五識既以意識為依意識亦應前五為依故云彼此相依勢力等故又第七下破前師不立第七有俱有依今以轉識例同必應許現行第八為彼依故如瑜伽下引證彼論下推釋兼破前執識種為俱有依不爾者反上意牒前師不許第七有俱有依故云應說有藏識故第六意識得轉由此下結破是故應言前五轉識至自能立故無俱有依第二師立義已上破詞雖正立俱有依猶未盡理有義此說猶未盡理至亦依能熏餘如前說此第三師破第二師執第八無有俱有依義許現起下意雖破彼亦為自義前案謂現行既依種子種子亦依現行以種子初生時依能熏識既熏習已即依所熏故云能熏前七識及所熏異熟識為生長住故又異熟下復明第八亦依色根如契經下引經證依色根義瑜伽下復引論證異熟識決定依止有色根身或所立因有不定失者立量云異熟識是有法決定執受有色諸根是宗因云不遍依止故同喻如六識若異熟識不遍依止有色諸根則是因於宗上不轉引喻不齊故有不定失也是故下第三師立義猶未盡理一三師辨破竟下二正義破前有義前說皆不應理至或所依為依皆隨宜假說此義正理破前不知能依所依有差別故依謂下總明能所依義故以王臣為喻王喻所依臣喻能依若法下單明所依具四義故一者決定正簡前五識與第六為依夫為所依者須決定有故今有第六時不定有前五亦簡五色根與第八為依亦是不決定如生無色界即無色根故又簡將能熏七現與種子為生長住依此能熏現識必有間斷故豈有決定義二者有境所言有境者即內六處是有境義根是能照境是所照故說能照有所照境此簡四大種及命根五塵并一切種子雖有決定義而闕有境義不得為所依以彼非能照故無所照境三者為主言為主者亦是心王及五色根決定有境而為主故此簡遍行五心所法雖具決定有境二義闕主義故亦非所依四者令心心所取自所緣言取自所緣者謂取所依與能依法為所緣故此簡第八現行不得與識中種子為俱有依以彼種子無緣慮故不能自取第八現行為所緣唯第八現亦具決定有境為主三義唯與心心所為所依以心心所是能緣故故取八現為所緣也故諸下引證能依唯是心法以色法等非能緣故雖說能依唯是心法而心法中亦通能所大約心王互通能所心所唯能以非主故然有下釋餘處說能所依未了差別皆是假說都無實義由此五識俱有所依至依止心及意餘轉識得生護法師自立正義謂前五識俱有所依定有四種一五色根與識同境故二第六識是分別依三第七識是染淨依四第八識是根本依故云所依別故聖教下釋教意以五識與五根近而相順又是不共所依之根故唯說五根為依不說餘三依也第六意識有俱有依唯二種者謂第七識與第八識雖五下破第二師執前五為第六之俱有依以非定有故非所依聖教唯說依第七者唯取同轉識攝及近順義第七識有俱有所依唯有一種謂第八識如伽陀下引證第七以第八為俱有依唯前二句後二句亦顯七八二識定與前六為俱有依心即第八意即第七餘即前六阿賴耶識俱有所依至若作是說妙符理教第八識有俱有所依亦唯一種謂第七識復引論證唯以第七為俱有依義而說下釋成末那有無言三位者即阿羅漢滅定出世道也論說此三位無末那者但無染污非無第七識體以此三位有覆煩惱不起故如言四位者阿羅漢獨覺菩薩如來此四位中但無含藏雜染之名非無第八識體此亦應爾前第三師執第八亦依色根以有色界根義有用無色界中定無色根故非所依又執識種以現行識為俱有依故此破云識種無能緣不取自現境唯依持種識故可有能依不取異熟果而云無所依第四義云令心心所取自所緣不說種子心所所依隨自心王有所依義復各加自相應之心則前五心所有五所依第六心所有三所依七八二識相應心所各二所依若作是說妙符理教者結顯正義理教不違二正義破前竟通上二釋俱有依竟下三釋開導依分二一舉執辨破後開導依有義五識至但以自類為開導依開導依者即各識前念開闢引導後念生故有義下難陀立義未正謂前五識中以一識為自餘識為他已生未滅為前已滅未生為後名不相續五識自類既不相續必由第六引生故唯第六為開導依又謂第六意識雖是前念引生後念自能相續亦由五識所引故以前滅前六種識為後第六一識之開導依七八二識自類開導乃正理也唯前六識義有過失有義前說未有究理至故非二識互相續生此是安慧總破難陀前六識義先破前五轉識云謂前五識未轉依時遇非勝境可許汝說不相續義若自在位諸根互用不假尋求寧不相續等流五識者謂緣境時有五種心一率爾心二尋求心三決定心四染淨心五等流心率爾等流二心通前六識尋求決定染淨三心唯通意識如說諸字時有率爾尋求二心然未定知諸字所屬故無決定次說行字由先熏習連帶解生有三心起謂率爾尋求決定以決定知諸字所屬一切行故聞諸行字雖知自性然未知義為令知義復說無字亦但二心謂率爾尋求未有決定以未定知無字所屬後說常字由前字力展轉熏習連後字生如是諸行無常四字圓滿方能解義今言等流五識者是舉前五為等流心以同類故故曰等流既為下破難陀許意識引生五識義決定染淨是第六識之二種心及作意緣引生五識若引生已專注於所緣境上頃刻未捨故知意識與前五識有多念相續義如何不許故瑜伽下引證意識與前五識未能捨頃義謂於意識決定心後有染淨心染淨心後有等流心之眼識善不善轉而彼不由自分別力者證眼識於境未能捨頃乃至此意不趣餘境者證意識於境亦未捨頃經爾所時下釋眼意二識於善染境有相續義如眼下結成五識生起義同彼意下釋瑜伽中意顯眼意二識自生起來俱相續轉無前後義既眼下牒瑜伽中說眼識生必有意識以破難陀執前六識互開導義識若前後許互引生既必同時豈互開導若增盛境相續現前至何假五識為開導依此顯五識遇增盛境有相續義如熱地獄戲忘天等者喻上境增盛義熱地獄中乃不善增盛境也戲忘天乃善道增盛境也二境增盛於五根門應接不暇豈有間斷不相續耶故瑜伽下引證開導依正義彼論意言若此現在六識滅時各各為彼當生六識作等無間緣者即施設此前滅六識名為意根施設者假名也意根者意有不斷義故以此緣假名意根若五識下牒前師執義難破若執五識前滅後生定有意識為開導者彼論應言若此前滅一識為彼後生六識作等無間緣即施設此名為意根或彼應言若此前滅六識為彼後生一識作等無間緣亦名意根既彼論中不如是說故知五識有自相續義五識起時下以難陀執第六識亦由五識導引故此破云五識起時既有意識即此意識能引後念意識令起何用五識為開導依無心睡眠悶絶等位至皆不違理由前說故此中例難為後自義前案謂第六識於無心等五位斷已而後起時第七八識既恆相續亦應與第六為開導依若彼第六用前自類為開導者五識自類何不許然謂第六識既不許七八二識為開導依此前五識云何以第六為開導依也平等下次破第七識亦為自義前案謂第七識初轉依時必由第六入二空觀導引彼智現前故應第六為開導依圓鏡智下次破第八亦為自義前案謂第八識初轉依時必由妙平二智方便引生未轉依位恆依第七染意為根或依悲願相應第六善心故第八識宜以六七二識為開導依由此下結破難陀理未究竟亦顯自義方為盡理應說下安慧立義猶未盡理由前說故者謂前破難陀已有自立之義前無心睡眠平等性智圓鏡智俱三節即此自立之義耳一舉執辨破竟下二總破前非有義此說亦不應理至便同異部心不並生護法論師總破前義先明開導依具三義即有緣法為主是也一者有義簡不相應行其體是無二者緣法即是能緣此簡色及無為非能緣故三者為主主是心王簡諸心所非主義故具上三義是故能作等無間緣此於下釋開導依名此但屬心非心所等者謂心所法色法不相應行法諸無為法皆非此依義故唯八心王有此依義若總收心所即是等無間緣依但心王緣兼心所是二別義若此下縱彼執意一身下以理縱破謂八種識若不俱起說此已起與彼未起有開道力為開道依若容八識有時俱起理非前後何執異類為開導依若許八識互為開導應八種識不容俱起既不俱起便同異部心不並生異部即小乘部也又一身中諸識俱起至心所此依應隨識說恐彼轉計八識俱起多少不定即將已起引生未起故容互作等無間緣此牒計也若容下難云色等應爾以色等五塵亦多少不定俱起故若許色等有此緣者便違聖說唯心心所有此緣義恐彼質云攝大乘說色亦容有等無間緣釋云然攝大乘謂經部師作如是執從前剎那色後剎那色無間而生從前剎那心後剎那心及彼相應法無間而生此中因果道理成就何容復計阿賴耶識是諸法因即前初能變下持種章中執詞為遮此執故大乘論師以縱奪言破之縱云汝謂色心自類無間前為後種縱許汝作等無間緣奪云若無異熟持彼種子無因緣故不爾者牒彼不許色心等無間緣是假縱必執諸識多少不定應互開導所以難云等言應成無用以立等言是齊等義若許異類引生是則前後力用不齊何名等無間緣復恐轉計所立等言非遮多少但表同類難云便遮汝執異類識作等無間緣以立等字有二義故一遮異類二表同類若依遮義遮前異類若依表義表顯同類如何汝執異類開導是故下結顯自立正義深契教理復明心所無主義故非開導依隨識開導說為依故此下展轉難破有四章設有難云心所既與諸識相應同前異類俱起之義何故復說異類為開導依下文答釋雖心心所異類並生至諸識不然不應為例一釋諸識相應難謂心心所雖是異類俱起並生而互相應和合似一若生若滅亦必同時言事業者事即體事業即業用謂心與所既同體事於所緣境業用亦同由此一心得開導時餘心所法亦得開導故展轉作等無間緣諸識不然前滅後生各為主故不應為例設又難云心所亦有生滅應各為緣何不自類開導而隨識耶下文答釋然諸心所非開導依至諸心心所皆四緣生二釋應各為緣難謂諸心所雖有生滅於所引生無主義故何得自類為開導依以開導依必是主故主得開導心所隨之何必心所自類開導若謂心王自類開導便執心所亦唯自類則第七八識初轉依時相應信等十一心所此自類緣便應闕少以彼因中無信等故何得自類為開導依若闕此緣則違聖說諸心心所皆四緣生以闕等無間緣唯有因境增上三種緣故設又難云前六轉識入無心時必有七八二識相應後起定時何不由他二識為依下文答釋無心睡眠悶絶等位至何煩異類為開導依三釋後起由他難無心睡眠下釋正義無異類下釋無間義彼先下釋開導依何煩下封彼執情謂前五第六雖有間斷無問遠近唯各自類為開導依以彼轉識俱是心王各為主故無異類心異字原是自字宗鏡釋云無有自類心於中亦有隔者既無隔礙故名無間今改異類者謂彼滅已無異類心於中為隔名無間故亦不害義文理且暢故兩存其釋又若彼定中有第七八識於出定時即此二識以為開導故又釋云彼先滅時等謂彼前念心王臨欲滅時即作能引後念令生起力用已然後方滅此乃現在一念即有引後功能為法體非取過去已滅無體法為依故云彼先滅時已有力用何煩七八異類為開導依也設有難云諸經論中皆說諸識互相引起汝若不許便與聖教相違下文答釋然聖教中說前六識至故自類依深契教理四釋聖教相違難謂諸聖教說引生者是增上緣非等無間既有緣義原不相違但為執者錯解緣義瑜伽論說此識無間諸識定生又此六識為彼六識等無間緣皆是言總意別言總者是總言六識也意別者是許六識各各前念將欲滅時已與各各後生起識有開導方令彼得生故說此緣不假他力唯自類耳故自類依深契教理者結顯此緣唯以自類為開導依不違理教二總破前非竟通上二傍通餘論竟下三正釋頌意傍論已了應辨正論至或開導依易了知故結前傍論三種依竟應辨頌中依彼轉言唯詮二種故曰正論能變識者第七識也三所依者即前親因緣依增上緣依等無間緣依也依彼轉言但顯前二者頌意唯說因緣及增上緣為顯此識依緣同故者釋上頌中所顯之義依即增上緣即因以第八識是真實種緣擊便生轉識波浪故說依緣同第八識又前二依有勝用故者謂因緣依有親生勝用增上緣依有引生勝用是故頌中正顯此二或開導依易了知者以前滅後生之義人易了知故前頌言不顯彼義三正釋頌意竟通上二釋所依竟下三釋所緣分二一問答正釋如是已說此識所依至聖說此識緣藏識故結前已說所依根種二緣復申問答以明第七即緣所依彼藏識故一問答正釋竟下二舉執辨破分二一三師辨破有義此意緣彼識體至如唯識言無違教失難陀立義未正謂此第七緣彼第八及彼心所執我我所論說下釋上執我我所義謂緣心王執之為我緣心所時執為我所故說如次然諸下釋成心所不離心王以言心王必有心所如說唯識必攝諸法故於聖教無相違失有義彼說理不應然至識為體故不違聖說火辨破難陀執緣心所義謂曾無有處說第七識緣觸等五應言下火辨立義猶未盡理謂緣見分執之為我緣相分時執為我所相見下釋成相見不離識體以緣識時即緣相見執我我所理不相違有義此說亦不應理至非實有物不違聖教安慧總破火辨執相分義五色根境非識蘊者彼執相分即色根境非是識蘊謂第七識以心緣心是識蘊攝豈得又緣色相為境若執第七緣相分境應同五識緣外境相便違聖說第七內緣若執第七緣相分色應同第六與前五識緣共相境何名第七一向內緣若緣相分為我所者無色界中無色相分應無我所設問云生無色界何無色相答云厭色生彼不變色故應說下安慧立義亦不應理謂緣藏識執之為我及緣種子執為我所以種下釋成種子是識功能與識不離故緣識時即緣種子執我我所無違教失一三師辨破竟下二正義破前有義前說皆不應理至我我所執不俱起故護法論主總破前義復牒安慧執緣種子難破若色種子非識蘊攝以第七識唯緣識故執種非實又違論說種子實有種子若假又非因緣故彼所說皆不應理又此下總難三師同執我我所義薩迦耶見即身見也以第七識俱此身見任運恆緣無轉變義何容別執我及我所無一下釋成謂斷常見雖依身見起不同時故無一心別執常我及斷我所而俱轉義若謂前執為我後執我所亦不應理以此第七一味恆轉無有前後應知下論主自立正義唯緣見分執之為我非前三師執餘心所相分種子為我所也彼無始下釋成第八無始相續恆與諸識為所依緣此唯執彼下釋成第七唯執為我不執我所論說我所者是乘語勢故或此下又解謂能執第七為我所執第八亦我故於一我見說二義言若作下結成立義理教不違未轉依位唯緣藏識至彼既極成此亦何咎明第七識轉與未轉所緣別義平等下釋成轉依位中緣諸法義十種平等性者一增上喜愛平等二領受緣起平等三遠離異相非相平等四弘濟大慈平等五無待大悲平等六隨諸衆生所樂示現平等七一切衆生敬受所說平等八世間寂靜皆同一味平等九苦樂一味平等十功德究竟平等謂第七識證此十種平等性已現身說法能緣一切此中下釋頌中言緣彼者依未轉位說故但緣藏識設問云同一末那何未轉依唯緣藏識得轉依已能緣餘法答云悟時無我通而不局故能遍緣迷時執我局而不通所緣不遍理必應爾如何此識緣自所依者問第七識依第八生何故即緣第八為境如有下引喻答謂等無間意即為後念所緣此亦應爾二正義破前竟通上三釋所緣竟下四釋性相頌言思量為性相者至亦審思量無我相故牒前頌詞標舉正義明以一思量釋三種名也唯一思量釋性釋相兼釋末那故知第七識名恆審思量又明轉與未轉皆共思量因此思量為性為相四釋性相竟下五釋相應分三一根本煩惱分二一問答正釋此意相應有幾心所至不能出離故名煩惱言且與者以有餘心所故故且說與四種根本煩惱常俱此中下釋答詞中四種煩惱常俱義謂第七識在有漏位與彼相應恆緣藏識執之為我其四者何問於六根本中是何四種謂我下答四種名復釋四種義云我癡者即無明以不明了第八之體本無我故而恆執我迷無我理謂之我癡我見者即我執執者封著義妄取義由於非我妄取為我謂之我見我慢者即倨傲憍倨自傲是為慢義以恃我故心自高舉謂之我慢我愛者即我貪以貪著我恆不捨故謂之我愛并表下釋頌中并字義謂此并字表顯見慢與愛俱起以遮薩婆多部執見慢愛三不俱起義此四下釋四種名煩惱義內心第七識也外轉識前六識也謂我癡等四種常起則內外心恆成雜染故於輪回不能出離立煩惱名一問答正釋竟下二問答簡別彼有十種此何唯四至故彼此文義無乖反問此煩惱原有十種謂貪瞋癡慢疑并餘五見此第七識何唯四種答云謂此第七有我見故餘見不生者以見即慧故無一心多慧俱起如何此識要有我見者復問也答詞在後二取下釋上餘見不生之義二取即見取戒取也及邪見三但分別生唯見所斷此第七俱我見煩惱唯是俱生修所斷故此明生斷不同也我見所有邊執見等依我見生此第七識相應我見不依彼之邊執見起故有我見餘見不生言恆內執有我故要有我見者答上如何要有我見之問由見審決下答上此何唯四之問見慢愛三如何俱起者問也由薩婆多部執見慢愛不俱起故故有此問行相無違俱起何失者答也行相無違釋義在後執者復引論文難問云瑜伽論說貪令心下慢令心舉寧不相違論主釋行相無違併答二問謂見有分別俱生貪有內境外境慢有所陵所恃三者粗細俱各有殊是彼行相不相違義故彼瑜伽與此論文義無乖反二問答簡別竟通上一根本煩惱竟下二餘及觸等分二一問答總標此意心所唯有四耶不爾及餘觸等俱故問答以明第七相應諸心所法不唯我癡等四亦有餘及觸等俱故一問答總標竟下二偏正互辨分五一執唯九所分二一正明執義有義此意心所唯九至一類執我故非彼俱此義未全然此意俱心所十八今但九俱闕餘九故即觸下釋觸等五所名顯與第七決定相應前說下釋頌中餘字義理亦未正謂此觸等與異熟俱是無覆性今俱第七同有覆性故置餘言顯此異彼復釋頌中及字義同聚集前四煩惱與觸等五聚集相應故唯九所此意何故無餘心所者問也謂欲下別簡別境五所俱不與第七相應唯簡慧不相應猶未盡理以第七識必與慧俱方起我執善是淨故非此識俱者總簡善位十一心所不與相應隨煩惱下簡小中大隨俱不相應理猶未止以第七識必與八大隨俱惡作下通簡不定位中四種心所不與相應一正明執義竟下二牒破餘義有義彼釋餘義非理至故此餘言顯隨煩惱此中正義破前餘義非理謂此餘言不是簡無覆以有覆言頌別說故故此餘字顯隨煩惱以根煩惱必有隨故二牒破餘義竟通上一執唯九所竟下二執十五所此中有義五隨煩惱至而癡位增但說為癡分說隨煩惱唯五相應餘互相違義猶未盡如集論下引證此五相應染心若離下復以理推明此五所必與染心相應無堪任性即沉性等者等餘掉舉不信懈怠放逸謂若離沉等五所染污性成無是處故又推貪等煩惱障起心必染污故染污位必有五所何以故煩惱若起必由沉等五所故言囂動者即掉舉也設問云掉舉一法遍諸染心何唯四煩惱中俱掉舉下答復引喻明三性心者即貪瞋癡也謂眠與悔雖遍三心而癡位增說癡相應以喻掉舉雖遍諸染心但說貪分設問云餘處所說隨惑相應何不同此下文答釋雖餘處說有隨煩惱至義有差別故開為二謂有說六說十遍者俱依別義非同集論說五實遍謂依下釋上說六隨煩惱遍染心義解通下簡不遍謂小隨十粗第七識細第七無記性中隨二是不善性大隨中掉舉障定沉障慧第七於定慧中亦恆執我故於十四隨煩惱中粗細等相顯唯與大隨六種相應依二下釋上說十相應義二十二者於前二十復加邪欲及邪勝解粗細同前簡去小十二性同前簡去中二唯說十隨第七相應故此彼說非互相違者結成此五彼六及十各具一義互不相違然此下結顯相應唯十五所前九同前五隨者沉掉舉不信懈怠放逸增別境中慧成十五數設問云我見即慧何又慧俱答云我見雖是等義差別者我見唯染慧通善染故宜別開何緣此意無餘心所至無餘心所義如前說問第七識以何緣故唯與十五心所相應而無餘三十六諸心所法謂忿等下簡小隨十所無慚下簡中隨二所散亂下簡大隨餘三今唯簡二者闕簡忘念以彼要緣曾受發起忘念此唯現緣無曾受故非彼相應無餘心所義如前說者即別境五中前四及不定位中四所并根惑瞋疑信等十一前師已簡故云義如前說二執十五所竟下三執十九所有義應說六隨煩惱至非諸染心皆能遍起說隨煩惱唯六相應染污第七義猶未盡即前說六依別義者瑜伽下引證此六決定恆與染心相應忘念下復以理推明六隨煩惱必與染心俱唯言忘念等三不言不信懈怠放逸三者以此三所前師不取故特釋之要緣下釋上忘念等三所定相應義曾受境即忘念所緣境也惡慧即不正知故名邪簡擇貪等煩惱即根本惑彼起必由忘念惡慧故又心流蕩皆由散亂故此三所必與染心相應沉下簡彼二法不遍染心沉靜義掉舉動義以動違靜靜復違動故互相違論說五法遍染心者至無餘心所如上應知此簡前後二師說五說十遍染心者俱依別義粗細簡小隨義如前釋違唯善者中隨不善唯與善法相違忘念散亂不正知通不善有覆二性名純隨煩惱不與第七無記相應說十遍言如前釋義然此下結顯相應有十九所前九同前六隨煩惱者不信懈怠放逸忘念散亂惡慧并念定慧及加沉成十九數設問云念即忘念何更相應又定沉復加何意論主答云此別說念準前慧釋者忘念唯染念亦通淨故如慧所別開為二餘文可知無掉舉下此相違者此即惛沉以惛沉時無掉舉故無餘心所者即根本十煩惱中餘六心所別境位中欲及勝解隨煩惱中小及中二不定中四前師已簡故云如上應知三執十九所竟下四二十四所有義復說十隨煩惱至無餘心所如上應知謂隨煩惱十種相應義猶未正即前說十依別義者瑜伽下引證此十決定恆與染心相應言邪念者即忘念也若無下復以理推明此邪欲及邪勝解決定恆與染心相應要樂合離即邪欲也印持事相邪勝解也以有此二貪等煩惱方得起故由起煩惱心染污故故染污心必有此二諸疑理下謂第七俱根本煩惱雖唯四種或餘所執不止於四今以此節觀之即此論師必執第七與疑相應以前論文不取餘執故闕此文謂疑理者心極精察故於粗淺必無猶豫理無猶豫名正勝解事無猶豫是邪勝解今第七是疑相應心正解自無然邪勝解決定相應於所緣事亦猶豫者問也非煩惱疑如疑人杌者答也以煩惱疑必疑理故既能疑理於事必決今以事疑如疑人杌非疑理也杌者木短出貌木短無枝即疑為人粗淺可知矣問餘處不說邪欲勝解遍諸染心此何說遍答云餘處不說此二遍者等緣者因也因非愛疑相應謂非愛相應心無邪欲非疑相應心無邪勝解故於餘處不說此遍今說遍者是貪與疑相應染心故云邪欲勝解非粗煩故餘互有無義如前說者總結前義一一已辨此意下結顯相應心所有二十四無餘心所釋義同前四二十四所竟下五正十八所有義前說皆未盡理至若作是說不違理教此義正理總破前非且疑他世為有為無者破第四論師所執邪欲及邪勝解從分別起有生滅故義通三世以現在為此世去來二世為他世故難云為有為無謂過去已滅未來未生於他二世有何邪欲及邪勝解執與第七恆相應轉煩惱起位下謂沉掉舉二心所前第三師不許相應故此辨破若染心中下謂散亂失念不正知此三心所前第二師不許相應此亦辨破不辨不信懈怠放逸三所者以前第二第三第四三師互許故故染污下論主立八大隨決定恆與染心相應復釋忘念及不正知各有二性若以念慧為二性者不遍染心以染污心任運現緣無曾受故一類執我無簡擇故又念與慧亦通淨故若以無明為自性者遍染心起前說無明遍染心故然此下論主正義唯十八所餘互相違前九同前八隨亦爾并別境慧成十八數論三文者第二師引集論第三第四師俱引瑜伽故有三文俱如前釋若作是說不違理教者論主總結自立正義教理無違五正十八所竟通上二餘及觸等竟
