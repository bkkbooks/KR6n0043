body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮科從七卷中答外問分五一假說我法二種種分別三生死相續四經說三性八卷竟此五法無自性分三一牒義標問若有三性如何世尊說一切法皆無自性若有三性者牒大乘不離唯識立三種性正義如何下是難詞一牒義標問竟下二舉前八句頌總答以後四句頌屬顯性唯識分故頌曰即依此三性至常如其性故即唯實性前四句正答問意謂佛說無自性者即依此遍計等三性立彼三種無性故佛世尊密意說彼一切諸法皆無自性言密意者但是言陳未申意許中四句釋立三無性義謂依遍計所執性立相無自性性由彼體相畢竟非有如虗空華繩上蛇故次依依他起性立生無自性性此如幻事託衆緣生無如妄執自然性故後依圓成實性立勝義無自性性謂即勝義由遠離前遍計所執我法性故又言由遠離前者是離依他起遠離所執我法者是離遍計執言性者顯是圓成故下文云非性全無後四句頌唯識性故基法師分為顯性唯識分二舉頌總答竟下三解釋頌意分四一總釋頌意論曰即依此前所說三性至於有及無總說無性總釋前入句頌謂即相生勝義無性者釋總立彼三無性義相即虗妄遍計之相立相無性生即依他從緣生故立生無性勝義即圓成二空所顯故立勝義無性以佛密意說立彼三種皆無自性非性全無者謂依他是如幻有圓成是勝義有此二性非謂全無但遍計是愚夫妄執決定非有為破彼故總說為無說密意下釋上非性全無以顯密意是非了義於有及無總說無性者依圓是有遍計是無一總釋頌意竟下二問答別明云何依此而立彼三至而濫第二故此不說問答以明立三無性義也立相無性是顯了說故云畢竟非有立生無性是密意說故云非性全無立勝義無性亦密意說故亦云非性全無問太虗喻圓成衆色喻依他喻中衆色無性所顯太虗法上應說依他無性顯圓成實何言勝義無性耶答云雖依他起非是勝義亦得說為依他無性以顯勝義而濫第二故此不說依他無性唯說勝義無性以第二依他自無性故二問答別明竟下三別釋前科通上第二依教廣成分下前二十四頌名辨相唯識分竟二十五一頌名顯性唯識分即此別釋前科義也此性即是諸法勝義至此諸法勝義亦即是真如言此性者是牒頌中上文云後由遠離前所執我法性之性字以顯唯識性義故云是一切法勝義諦故然勝義下釋勝義別分四種言勝義者簡於世俗今先明世俗亦有四種一世問世俗亦名假名無實諦謂瓶盆軍林等但有假名而無實體二道理世俗亦名隨事差別諦謂蘊處界等隨彼彼事立蘊等法三證得世俗亦名方便安立諦謂預流等於苦集等由證得理而安立故四安立世俗亦名假名非安立諦謂二空理依彼空門說為真性由彼真性內證智境不可言說名二空理但假說故勝義四者一世間勝義宗鏡云體用顯現諦謂蘊處界等有實體用過初世俗說名勝義隨事差別說名蘊等故名顯現二道理勝義宗鏡云因果差別諦謂苦集等智斷證修因果別故三證得勝義宗鏡云依門顯實諦謂二空理過俗證得故名勝義依空能證以顯於實故名依門四勝義勝義宗鏡云廢詮談旨諦謂一實真如體妙離言已名勝義又真不自真待俗故真即前三真亦說為俗俗不自俗待真故俗即後三俗亦名為真至理冲玄彌驗於此此中下結顯勝義不依前三故說真如即諸法性前三即世間道理證得三勝義後三即道理證得安立三世俗真謂真實顯非虗妄至為簡世俗故說實性真謂下釋上真如二字即是勝義真實名故亦言下復釋頌中亦字為顯勝義不但名真如亦有法界實際等名如餘論中廣釋此性下釋成實性即唯識性故於前後二種義中簡別虗妄及世俗有三別釋前科竟下四結非了義三頌總顯諸契經中至總撥諸法都無自性結警無犯以防空見耳謂前二頌雖言密意尚未極成以後一頌明唯識性即諸法體知無性言誠非了義四結非了義竟通上二顯性唯識分竟下三行位唯識分分二一問答總明如是所成唯識相性至方能漸次悟入唯識如是所成唯識相性者結前所明三種能變及見相等種種所變是唯識相諸法勝義及真如等是唯識性誰於下正是問詞謂何等人於幾位中如何悟入唯識相性謂具下論主如次答上三種問意何謂下外人復問答中一本性住種性之性當作姓性者體也姓者類也若本有體性安住菩薩種類姓故若本無體性聞大乘法熏成大乘種類姓故問何等人名為具本性住種姓人答外凡人是何名外凡曰雖具此性未發堅固大菩提心名外凡位問何等人名為具習所成種姓人答內凡人是何名內凡曰此性定在發心已後約初入劫名內凡位云何入劫謂發心後修十千劫方八十信言入劫者乃三僧祇之初首名為入劫問具此二性當幾類人答定性菩薩二乘回心問二乘五果回心向大及頓悟人至初入劫修習劫數同別多少答下從初果上至五果回心向大至入劫位乃經八萬六萬四萬二萬十千劫至資糧初頓悟發心亦十千劫至資糧初問何故初果劫多五果劫少答煩惱有無修證多少故今云本性住種性者是諸有情性分自有成佛種子故云法爾所得無漏法因習所成者謂諸有情聞大乘法熏習成故要具下結答問意何謂悟入唯識五位至謂住無上正等菩提何謂下問所入位何名為五一資糧下釋五位名義此位菩薩已具二種種姓發大菩提心勤修六種殊勝妙行名資糧位真見道後斷盡煩惱種子證解脫果名解脫道此中雖非真見道及斷煩惱於修大乘資糧時意在取果故名順解脫分以近見道伏除二取故名加行真見道後決擇所知障種名決擇分此中雖非真見道而加行時亦能決擇分別二障故名順決擇分得真見道能所平等善達法界故名通達以無分別智斷所知障種轉唯識性故名修習諸漏永盡非漏隨增性淨圓明故名究竟云何漸次悟入唯識至復令悟入唯識相性問答以明悟入唯識漸次謂諸菩薩於資糧位能深信解唯識相性非染非淨於加行位能漸伏除唯識相性上能取所取在通達位如實通達唯識相性體即真如修習位中如前所見唯識相性之理數數修習至究竟位唯識相性出障圓明復化有情悟入唯識相性一問答總明竟下二依位別釋分五一資糧位分三一牒科標問初資糧位其相云何瑜伽云云何菩提資糧略有二種一者福德二者智慧略說福即三波羅密多謂施戒忍智即一波羅密多謂般若精進靜慮各通福智雜集云何等資糧道謂諸異生所有尸羅守護根門飲食知量初夜後夜常不睡眠勤修正觀正知而住一牒料標問竟下二舉頌總答頌曰乃至未起識至於二取隨眠猶未能伏滅前二句頌資糧位分際謂從初發心乃至未起加行時名資糧位後二句頌此位中功行謂此位中雖欲求證唯識性而無伏滅二取功能言二取者謂名言取我執取即是所知煩惱二障二舉頌總答竟下三解釋頌意分三一釋前二句論曰從發深固大菩提心至多住外門修菩薩行論曰下釋資糧位分際順決擇者加行位也謂彼發心到加行邊是資糧位為趣下釋立解脫名正等菩提者究竟位中極果也勝資糧者六度所攝福智二事也為求此果修習資糧益自身故為有情故勤求解脫者菩薩發心不同二乘樂獨善寂取證涅槃今此菩薩依解脫果伏斷煩惱入我空觀已發大心度有情故解脫果者涅槃果也煩惱解脫而證得故此位菩薩雖未證得亦依彼修故名為順此位下釋功行攝論云能悟入中大乘多聞熏習相續此乃因力也已得奉事無量諸佛出現於世即善友力已得一向決定勝解非諸惡友所能動搖名作意力謂由三力已善能積集諸善根等名資糧力又菩提心為因菩薩為友勤求佛果為作意六度為資糧言能取者即能緣之心也所取者即所緣之境也能取有二一名言取即所知障二我執取即煩惱障隨眠即二障種子外門即散心外行未能得定故論云此位菩薩依四勝力於唯識義雖深信解由未了達能所取空多住外門修有漏行故於二取種子未有伏滅定力而不能使彼不起現行耳一釋前二句竟下二釋後二句故於二取所引隨眠至即是所知煩惱障種故於下牒前二句中義猶未下發起解第三句義此二下釋頌中二取隨眠是所知煩惱障種此二取言顯二取取者謂名言取我執取為能取見分相分為所取故云執取能取所取性故二取下釋隨眠或隨增過者隨有種子增長現行過失故煩惱障者謂執遍計至能障菩提名所知障釋煩惱障即是所執實我云何百二十八根本煩惱頌曰根本煩惱貪等十欲界四諦各具十於上二界各除瞋七十二合百十二謂貪等十煩惱欲界四諦各具十種共有四十上二界除瞋八諦各九有七十二共前四十為百一十二此皆見道所斷於迷諦時是分別起各別取數若修道斷者是俱生惑於迷諦時任運堅固唯取三界總數頌云修道再除疑三見欲界總加六數算上二除瞋各有五百二十八頭頭現謂欲界中除去疑及邪見二取四數唯有六數上二界中又各除瞋一界唯五總合十六共前見所斷惑有百二十八數此是見修所斷根本煩惱亦各有隨惑故云及彼等此皆下釋名煩惱義所知障即是所執實法清凉大師云若見疑無明愛恚慢等辨出頭數與煩惱同煩惱障粗有多品類二乘所斷唯是不善有覆性故以數來顯今所知障細無多品類唯菩薩斷亦是異熟無記性攝故不顯數又顯法執無明唯一住地名不染污不同煩惱四住地攝故不顯數言慢等者亦等隨惑言所知境者即有為無為言無顛倒性者即真如理此所知障決定不與至有勝有劣斷惑前後論與八識相應唯第八識體性微劣不與無明慧心所俱故所知障決不相應轉法空智與第八俱或少或多如煩惱說者第七所知唯是俱生根隨染惑亦但十二故名為少第六所知兼通分別根隨煩惱總二十六故名為多應知二障皆是染所執我執法義有別故眼等五識無分別故雖有二障不起二執法見疑等者法即法執見疑等者即七根本并十小隨俱有分別與五定不相應餘由意力皆容引起者謂貪瞋癡及中大隨五識雖具由同時意識所引生故此障下論通三性以所知障與無明俱非善性故煩惱下會通二障體同用別前後斷者謂此二障俱以慧為性故曰體同執我執法故曰用別先斷煩惱後斷所知故有前後此於無覆無記性中至伏二現行通有漏道會通四種無記謂所知障與六七俱六七又依異熟識起名異熟生故於四中唯屬異熟生無記非餘威儀工巧變化三無記問前說此障覆所知境何名無覆無記性答名無覆者望二乘說唯斷煩惱不障彼智若望菩薩亦是有覆障彼智故若所知下問謂所知障有見疑等多種煩惱經何說唯無明住地無明下答隨增勝說非無見疑等如煩惱下例明四住地者謂見一切住地欲愛住地色愛住地有愛住地如是下會通見修及漏無漏斷伏別義二乘但斷煩惱者樂獨善寂故菩薩俱斷二種者發大心故伏二現行通有漏者煩惱地前伏所知七地伏二釋後二句竟下三別釋解行菩薩住此資糧位中至後一唯智餘通二種謂我法執分別現行有粗有細資糧位中唯伏粗現細及俱生止觀力微未能伏滅故頌云猶未能伏滅後勝下謂此位時長雖分前解後修總是解行地攝以攝大乘論約三僧祇唯立四位前一僧祗名解行地解攝資糧行攝加行故云後勝解力修諸勝行以一解行攝二位故所修下問修勝行以何為相答中謂福與智是此行相且依下以六度分屬福智若論通相六度皆通福智二種若論別相前五通福第六唯智或復下又以前三為福後一唯智精進禪定福智俱通復有二種謂利自他至皆是此中所修勝行異前福智復明二種謂自他行亦有通別如論自釋四攝事者布施愛語利行同事四無量者慈悲喜捨如是下結成勝行此位二障雖未伏除至堅固熾然修諸勝行總標此位有三勇猛文中別釋一聞下謂聞菩提卒難得證心便退屈於退屈時引已證者練磨自心勇猛不退偈云十方世界諸有情念念速證善逝果彼既丈夫我亦爾不應自輕而退屈二聞下謂六波羅蜜甚難修故心便退屈於退屈時省察先已得此殊勝意樂能行施等練磨自心勇猛不退謂由得此殊勝意樂施等波羅密多任運而轉頌云汝昔惡道經多劫無益勤苦尚能超今行少行得菩提大利不應生退屈三聞下謂佛轉依難可證故心便退屈於退屈時引他粗淺微因小善況己六度勝大妙因練磨自心勇猛不退頌云博地一切諸凡夫尚擬遠證菩提果汝已勤苦經多劫不應退屈却沉淪三別釋解行竟通上一資糧位竟下二加行位分三一牒科標問次加行位其相云何雜集云何等加行道謂已積集資糧道者所有順決擇分善根謂暖法頂法順諦忍法世第一法云何暖法謂各別內證於諸諦中明得三摩地鉢羅若及彼相應等法云何頂法謂各別內證於諸諦中明增三摩地鉢羅若及彼相應等法云何順諦忍法謂各別內證於諸諦中一分已入隨順三摩地鉢羅若及彼相應等法云何世第一法謂各別內證於諸諦中無間心三摩地鉢羅若及彼相應等法一牒科標問竟下二舉頌總答頌曰現前立少物至以有所得故非實住唯識前二句頌此位中行相少物即帶相觀心若謂此心是唯識性故以後二句頌破之二舉頌總答竟下三解釋頌意分四一通釋加行分二一總釋名論曰菩薩先於初無數劫至非前資糧無加行義菩薩下結前資糧位中義為入下正釋立名既名加行而又名順決擇者以真決擇在見道後即擇法智也決簡疑品擇簡見品疑則擇而不決以猶豫故見則決而不擇非正見故若得正智二義皆具今此位中雖非親證真決擇智而能發起四尋思智歷觀名義自性差別之境亦是依彼決擇智修故名順決擇分已得一分決擇義故餘如文釋一總釋名竟下二別釋義暖等四法依四尋思至二二相同故合思察初後建立者尋思為初故立暖頂實智為後故立忍位及世第一攝論六卷云依如先說為悟入具發起如實所作方便因相說名尋思了知假有實無所得決定行智方便果相名如實智四尋思者謂尋思名尋思義尋思自性尋思差別四如實智者謂名等四法依識現起若離識時不但非有所現四法能現本識亦非有故如此遍知名如實智名義相異故別尋求者攝論云此中名者謂色受等亦攝名因名果句等尋思此名唯意言性義尋思者如名身等所詮表得蘊處界等推求此惟唯假非實二二相同故合思察者上二字即名與義下二字即自性差別謂名與義各有自性差別二相若知名之自性差別是非實有則知義之自性差別亦是假立故云合思瑜伽云於彼名義或離相觀或合相觀依止名義合相觀故通達二種自性假立差別假立依明得定發下尋思至尋思位極故復名頂先釋暖位攝論云明謂能照無有義智所求果遂故名為得此定創得無義智明故得明得三摩地下尋思者初獲方便故謂此下釋無所取故云實不可得初獲下釋明得名師此下釋名暖位攝論云譬如鑽火暖為前相依明下釋成頂位明相轉增故名明增重發方便名上尋思餘義俱如前釋依印順定發下如實智至此最勝故名世第一法先釋忍位印前順後名印順定初獲智果名下如實智於無所取決定印持者以此忍智印前二位所取境空無能取中亦順樂忍者即以忍智順後能取識亦得空既無下釋上二空義印順下釋立印順及忍位名依無下釋世第一位由此見道名無間定二空雙印名上如實智此法最勝故名第一如是暖頂依能取識至世第一法雙印空相總釋四位謂前二位但觀境空不能印境以無智故忍位有三下忍印境中忍順識上忍印識三忍印順俱各別故唯世第一境識雙印忍各別者有三品故下品名印忍印所取無故中品名樂順樂無能取順修彼故上忍名印順印能取無順觀彼故故論云印順忍時總立為忍印順俱定名印順定忍即智也二別釋義竟通上一通釋加行竟下二正釋頌意皆帶相故未能證實至次能取亦無後觸無所得皆帶相故未能證實者結前四種加行俱有所得故說下正釋頌意猶於下釋第一句心上變如名為少物謂是下釋第二句以彼下釋第三句非實下釋第四句彼相滅已方實安住者謂過此位即入見道實證真如依如下引證前二句總頌四種加行帶相觀心攝論云定所行影唯是內心如經云我說識所緣唯識所現故次二句總頌暖頂二位觀所取空攝論云謂審觀察如是似法似義唯我定心之所變現次三句別頌忍及世第一位雙印能所攝論云謂先已了所取是無如所取性既無所有所取上能取之性亦不得成最後一句即上彼相滅已方實安住之義此即見道證唯識故攝論云謂從此後證無二性所得真如二正釋頌意竟下三別釋行相此加行位未遣相縛至非如二乘唯觀安立釋此位中斷障行相未遣相縛者以有觀影故粗重即分別惑種唯伏除者未得永斷故與見道相違於俱生下釋未伏滅此位下釋此位中學觀行相大論云諦有二種一安立諦謂四聖諦二非安立諦謂真如菩薩雖通用二種為所行境而非安立諦是正所觀以未至通達位如理作意思惟真實但見真如相不見實真如故非安立諦名非觀真如三別釋行相竟下四別釋界地菩薩起此暖等善根至未證唯識真勝義故釋修加行能入見道暖等善根四加行也方便時者七方便也七方便者一五停心謂多貪者作不淨觀多嗔者作慈悲觀多癡者作十二因緣觀著我者作界分別觀尋思者作息想觀二別想念謂身受心法四各別想三總想念即上四法總是無常苦空無我名總想念四暖位五頂位六忍位七世第一法第四成滿者將入見道必託第四捨念清淨地為最勝依故唯依下釋初起四加行界趣此位下結成二位唯一地義謂攝論中唯立四位資糧加行合為解行地故四別釋界地竟通上二加行位竟下三通達位分三一牒科標問次通達位其相云何雜集云何等見道若總說謂世第一法無間無所得三摩地鉢羅若及彼相應等法又所緣能緣平等平等智為其相又遣各別有情假法假遍遣二假所緣法智為相若別說見道差別謂世第一法無間苦法智忍苦法智苦類智忍苦類智集法智忍集法智集類智忍集類智滅法智忍滅法智滅類智忍滅類智道法智忍道法智道類智忍道類智如是十六忍智是見道差別相一牒科標問竟下二舉頌總答頌曰若時於所緣至爾時住唯識離二取相故前二句謂菩薩得真見道時於所緣境及無分別智俱無所得後二句謂菩薩得住唯識真實性者遠離能所二取相故二舉頌總答竟下三解釋頌意分七一總釋頌意論曰若時菩薩於所緣境至有所得心戲論現故若時下釋前二句爾時下釋後二句智與真如平等平等者以離能所故故云能所取相皆是戲論有所得心一總釋頌意竟下二執辨二分有義此智二分俱無至故應許此定有見分初義謂無二分理未正故次義謂有二分義亦未正有二不成唯識義也帶彼相下破無相分難以色智名聲智者以無所緣智無別故若無見下破無見分謂若無見分應不能緣境聖教寧說緣真如智智即見分真如即境若無見分豈真如為境又名能緣故應許有見分有義此智見有相無至故應許此有見無相此義正理許有見分顯唯識義雖有下釋有見分雖無下釋無相分以真如境不離本智故說挾帶真如相起無外相分如小乘正量部立相分師造謗大乘論七百偈破古大乘師所緣緣義云汝若言己相是相分將為所緣者且如汝大乘宗無分別智緣真如時不帶起真如相分以無分別智自不變帶真如相其真如望能緣智見分應無所緣緣義必若言本智緣如亦有相分者即違汝自宗一切經論如何會通古大乘師被此一難當時絶救奘大師救云我宗大乘解帶有二義一者變帶二者挾帶若變帶者即變帶似質之己相起是相狀之相今根本智緣如時即無若挾帶者即有根本智親挾帶真如體相而緣更不變相分故成所緣緣也如自證下喻明上義謂同體自證分緣見分時親挾帶見分是親所緣喻根本智緣真如境亦是挾帶親所緣義變而下顯非根本故說如後得應有分別故以疏所緣必託本質分別變故二執辨二分竟下三通結二名加行無間此智生時至初照理故亦名見道釋此位中立二種名此智即根本智不離真如既得智生即會真如故名通達真如即理以初照理復名見道三通結二名竟下四廣明見道然此見道略說有二至由意樂力有堪能故總標二種文中別釋無分別智即根本智非從外得故名根本實證真理者十真如中分證一種也實斷隨眠者永斷分別種子也雖多下謂見道時雖說一心而由四道方能親證謂加行道一剎那修於無間道一剎那見勝進道中一剎那入解脫道中一剎那證故說多剎那事方究竟而真如相等總說一心初義下說由相入真故有漸次粗淺即相見道斷我執證人空深細即真見道斷法執證法空次義下說真不復相一斷永斷名真見道由意樂力有堪能故者意樂即願樂也此顯欲證即證無漸次故二義雖別俱不違理二相見道此復有二至以真見道不別緣故復開二種文中別釋觀非安立諦者不緣四諦唯以三品心觀察也有情即所遣人執假緣智即能遣之心人粗易斷故名軟品即下品也諸法即法執法細於人故名中品言遍遣者總收前二為第三心故結云前二名法智各別緣故以名法者各別數也第三名類智總合緣故以名類者是同類義法真下釋立相見道名法者取法之義清涼大師云倣學為義問真見道中有相見二分何以但言法真見道之見分耶答真見道中雖有二空自證而見分親緣真如所以法之然見分中有無間解脫二道隨斷二障隨證二空各有二見分無間道中斷惑別故人法二見分各別法之立前二心解脫道中證理同故人法二見分總合法之立第三心故云別總建立名相見道初義未正謂此三心是真見道次義正理謂三品別緣是相見道二緣安立諦有十六心至差別建立名相見道此中總標緣安立諦復開二種文中別釋一者下標數所取即真如能取即正智言法類者法即現法各別義也類即種類即同現法種類性故謂於下釋成苦法智忍者忍是勝解即智之因謂於現法正智勝解現觀真如能斷煩惱而未能證解脫實智故云謂觀等二十八種分別隨眠者欲界苦諦具十煩惱色無色界除瞋各九共二十八苦法智者智即印持是忍之果由前忍故此智現前智現前故觀前真如證前解脫故云謂忍等苦類智忍者類即同類謂苦法智無間即有無漏勝解慧生名苦類智忍於法忍智各別內證者以此類忍證法忍通後類智證法智故云言後聖法皆是此類謂後聖法依止前法即後類智類此忍故顯揚論云前為後後之所依止故亦名類四苦類智同前類忍謂前第三智忍無間即有第四無漏智生審定印可第三智忍如於下結成十六種心八觀真如即是八忍八觀正智即是八智忍能斷惑智能證果故有前後又云四法忍斷惑四法智證果四類忍證法忍法智四類智證類忍法真下釋立相見道名此亦取法真見道見分自證分差別建立相見道名無間斷惑即前法忍法智於真見分各別法之解脫證理即後類忍類智於真自證分差別法之二者依觀下上諦境至分別隨眠名相見道言下上者欲界為下名現前界色無色界為上名不現前界俱以四諦為境故云苦等各有二心者謂下上界諸四諦中各有忍智二心故成十六瑜伽五十五云於一諦二種智生謂忍可欲樂智及現觀決定智法真下釋立名百一十二分別隨眠者顯揚十七云謂欲界見苦諦等所斷各有十種色無色界見苦等斷各有九種謂各除瞋如是欲界四十色無色界各三十六名為一百一十二煩惱若依廣布聖教道理至由此九心名相見道此明他處不言十六唯言九種亦依前義差別建立二十六種者謂安立諦前有十六後有十六故名前後二番十六種也謂法下釋立九種心謂法類品忍智者法是現法有忍有智類是種類亦有忍智故一諦中有此四心四四十六今合說者是合法忍為類忍又合法智為類智於四諦中各唯一忍各唯一智故說忍智各有四觀即為八心若謂有觀必應有止故說八止總為一心問何故八止總說為一答云此見道中觀順見義故開為八止非見義故合為一共成九心名相見道諸相見道依真假說至二中初勝故頌偏說釋二見道立名次序謂若立名必先依真而後假說世第一法無間而生者謂真見道從世第一法無間現前方生相見道名此立名之次也及斷隨眠非實如是真見道後方得生者謂加行位已有相見道心能伏分別現行於見道位根本智起能斷分別隨眠此伏斷之次也謂相見道於非安立諦三種心能伏煩惱隨眠及安立諦十六種心令煩惱更不復起此後剎那名真見道非如立名之次真見道後方得生起相見道故非安下是難詞謂若真見後復起相見是斷隨眠後又伏隨眠故云非安立後又起安立何以故分別隨眠真已斷故前真下釋二種見道於唯識性相各別證義頌偏說者謂頌中云若時於所緣智都無所得是真見道無分別義四廣明見道竟下五會通二智前真見道根本智攝至不執著故說離二取釋二見道二智攝義復申問答以明二分有無答中二義俱偏一雖有見無相分故有義此智二分俱有至由斯後智二分俱有正義謂後得智必有二分說此思惟是有見分似真如相有相分故不見真實真如性者明後得智不親緣如又說下此智分別說有見分自共相等證有相分又說此智下復引經證難破前執無相分義身土名似色說法名似聲轉色蘊下牒計難破若謂轉色蘊依不應現身土等色轉四蘊依應無受等心四蘊者受想行識也佛果位中若無受等應如木石何名聖者又若下破識無定所緣也變似境者變色似色境變聲似聲境若不變似境則色離色境體聲離聲境體故云離自體法應非所緣法若離體緣色等時應緣聲等又緣下破無生識之緣也以法無體不能生故由斯理趣後得智品二分俱有五會通二智竟下六攝六現觀此二見道與六現觀至謂盡智等究竟位智問答明攝六種現觀瑜伽云決定義是現觀義思現觀者乃是最上喜受相應思所成慧名思現觀上品喜受即初地中受也諸法即色心等共相即無常等謂此思慧於加行位引生暖等此慧觀察力用最猛立現觀名問暖等四法何非現觀答暖等不能等信現觀者信非是觀令觀不退故立此名無漏戒者即道共戒破戒垢染故必除之戒亦非觀以戒能令觀體增明立此名故現觀智即緣非安立諦三品心也諦現觀即安立諦苦等智也瑜伽云即由此心勢力故於苦等安立諦中有第二現觀位清淨無礙苦等智生當知依此智故苦集滅道智得成立即前三心并止觀品能證見斷煩惱寂滅能得永滅一切煩惱及所依事出世間道是名現觀智諦現觀現觀即第四現觀也第四現觀邊智名諦現觀者方是第五現觀名瑜伽云謂此現觀後所得之智名現觀邊智又云從前現觀起已於下上諸諦中二二智生是名現觀邊智諦現觀究竟現觀者佛果位中智也盡智等者煩惱所知二障永盡故云究竟位智瑜伽云謂由永斷修所斷故所有盡智無生智生或一向出世或通世出世於現法中一切煩惱永斷決定於當來世一切依事永斷決定名究竟現觀上釋六種現觀竟下與二見道相攝此真見道攝彼第四至而非性故不相攝第四觀中有根本智有後得智此真見道唯通根本故云少分第五觀中世出世智此相見道唯世間智及第四觀中後得智亦云少分第二信觀第三戒觀雖與此二見道俱起但助不退及觀增明而實非是現觀自性故不相攝論中不言第一第六俟更參考六攝六現觀竟下七結成見道菩薩得此二見道時至能盡未來利樂一切結成見道斷惑證果位次達法界者通達位也諸平等者攝論第六云得三平等謂一切衆生平等一切菩薩平等一切諸佛平等七結成見道竟通上三通達位竟下四修習位分三一牒科標問次修習位其相云何雜集云何等修道謂見道上所有世間道出世間道軟道中道上道加行道無間道解脫道勝進道皆名修道云何世間道謂世間四禪四空由四種相應廣分別謂雜染故清白故建立故清淨故等云何出世間道謂於修道中法智類智品所攝苦智集智滅智道智及彼相應諸三摩地者云何軟道謂軟軟軟中軟上云何中道謂中軟中中中上云何上道謂上軟上中上上云何加行道謂由此道能捨煩惱是名修道中加行道云何無間道謂由此道永斷煩惱令無所餘云何解脫道謂由此道證斷煩惱所得解股云何勝進道謂為斷餘品煩惱所有加行無間解脫道是名勝進道又謂展轉進趣引發勝品功德亦名勝進道一牒科標問竟下二舉頌總答頌曰無得不思議至捨二粗重故便證得轉依無得不思議者謂無所取名為無得及無能取名不思議是出世間智者以斷世間故捨二粗重者以斷二障種子故便證得轉依者以能證得二種果故二舉頌總答竟下三解釋頌意分四一釋頌轉依論曰菩薩從前見道起已至即十地中無分別智釋第一句頌言餘障者俱生二障也遠離所取說為無得離能取者名不思議是出世間下釋第二句所斷二取是世間本故能斷智名出世間依二義者一體無漏二證真如唯根本智具此二義餘智所無故云不然此根本智即十地中能斷俱生所知障種者名無分別智數修此故捨二粗重至證得如斯二轉依果釋第三句頌謂數修此無分別智方捨二障違細輕者以種子名粗重故與無分別細輕智相違此能下釋第四句頌廣大轉依者轉捨依他起中煩惱所知二種粗重轉得依他起中菩提涅槃二種大果故說依字是依他起餘義如文由數修下釋上轉捨轉得義由轉下顯二果名無上覺即無上菩提果也成立下名大乘所立唯識一切有情平等共有所謂世間有漏無漏若因若果唯識所具則知有情於此位中二轉依果亦應證得或依即是唯識真如至在大牟尼名法身故又作一義解上依字即是真如愚夫下釋生死依真如聖者下釋涅槃依真如由數修下復釋轉捨轉得義言依如生死及依如涅槃者上云生死涅槃依真如故設問云真如性淨何有生死雜染所依答云如雖性淨而相雜染者謂此真如是諸法體應知諸法是真如相則彼二障二種生死是此真如雜染相故設問云既此位中已得證果何要別立究竟位耶答云雖於此位亦斷所知分證菩提而非此中頌意所顯頌意但顯轉捨唯識相轉得唯識性問轉唯識相得何等身答二乘滿位轉唯識相名解脫身在大牟尼轉唯識相名法身故一釋頌轉依竟下二修斷證義分三一問答標數云何證得二種轉依至二種轉依由斯證得問答以明二種轉依必從地中修行斷障漸證真如於二轉依方能證得一問答標數竟下二依數別釋分四一十聖地言十地者一極喜地至合令相應極難勝故初地中三義名為極喜一者獲聖性得聖位故二者證二空味真理故三者益自他成利行故攝論云由此最初得能成辦自他義利勝功德故唯約第三義說十住婆沙云始得法味生大歡喜故唯約第二義說解深密云成就大義得未曾有出世間心生大歡喜故唯約第一義說二地言離垢者即離前地以前歡喜名為垢染故說遠離煩惱垢故尸羅即戒名道共戒深密經云遠離一切微細犯戒是故第二名離垢地清凉大師云性戒成就非如初地思擇護戒婆沙云雖云行十善道離諸垢故亦不異戒三地由得勝定發修慧光由得總持教法發聞思光彼無邊慧即是三慧深密經云由彼所得三摩地及聞持陀羅尼能為無量智光依止是故第三名發光地四地煩惱必依所知障起故斷所知煩惱亦斷深密經云由彼所得菩提分法燒諸煩惱智如火焰是故第四名焰慧地名𦦨慧者菩提如火智慧如焰從喻得名五地謂真諦智是無分別俗諦世間工巧等智是有分別故說互違深密經云由即於彼菩提分法方便修習最極艱難方得自在是故第五名極難勝地六現前地住緣起智至令得生長故名為地六地深觀緣起悟一切法無染無淨於無相觀能引現前深密經云現前觀察諸行流轉又於無相多修作意方現在前是故第六名現前地七地遠行有三義一到無相邊二功用至極三望前超過深密經云能遠證入無缺無間無相作意與清淨地共相鄰接是故第七名遠行地八地由任運故功用不能動由無分別智相續故相不能動總由上二煩惱不能動深密經云由於無相得無功用於諸相中不為現行煩惱所動是故第八名不動地九地四無礙者謂法無礙解義無礙解辭無礙解樂說無礙解深密經云於一切種說法自在獲得無量廣大智慧是故第九名善慧地十地中粗指雲重指水如空者謂智雲德水廣大無邊如虗空故深密經云粗重之身廣如虗空法身圓滿譬如大雲皆能遍覆是故第十名法雲地已上十地若約寄位初之三地寄同世間通攝五乘中之四地寄三乘法後之三地唯寄一乘從前差別進一乘故如是下結成地義能生能長功德勝行故名為地一十聖地竟下二十勝行十勝行者即是十種波羅蜜多此中總標下文別釋有十二章一釋名二釋性三釋相四釋不增減五釋次第六釋修七釋攝八釋果九釋三學十釋位十一釋別名十二總結施有三種謂財施至受用法樂智成熟有情智梵語檀那此云布施撤己惠人名之為施財施能令資生無畏令得安樂法施令得法忍梵語尸羅此云持戒防非止惡名之為戒言律儀者談法式也於不善法而能遠離及防護故攝善法者無善不修饒益有情無生不度梵語羼提此云忍辱堪受諸法不忘不懷名之為忍忍外障曰耐怨害忍內障曰安受苦諦察法忍忍無生故梵語毗梨耶此云精進練心於法名之為精精心務達目之曰進被甲則勇悍防惡攝善則方便進趣利樂精進度生無足梵語禪那此云靜慮靜簡散心慮簡無慧止觀均故安住則常在禪定引發則定能生慧辦事則利樂有情梵語般若此云智慧推求諦理名之為慧能斷我執故名生空能斷法執名為法空二執俱斷名俱空故方謂方法便謂便宜以有方便能轉悲智運大智故回前六度向大菩提運大悲故亦前六度拔濟有情不捨生死求菩提名菩薩行希求要誓名之為願希求菩提自利願也誓度有情利他願也不可屈伏任運成就目之曰力思但役心徐而細故擇與慧俱急而粗故二者並用緩急得中令前六度無間現前復於諸度任運修習不由擇力而決了者名之為智由前六種成就此智名受用法樂復由此智助滿前六名成熟有情一釋名竟此十性者施以無貪至一切俱行功德為性無貪即善十一中一法要由無貪相應思於自身財方能惠捨戒以受學菩薩戒時三業為性大論四十卷謂律儀戒以七衆別解脫戒為體謂苾芻戒苾芻尼戒正學戒勤䇿戒勤䇿女戒近事男戒近事女戒即在家出家戒名菩薩戒與聲聞共故若攝善法戒者謂諸菩薩受律儀後一切所作為大菩提由身語意積集諸善以為其體總上律儀及攝善法共名攝衆生戒即饒益有情戒也忍以無瞋精進審慧及彼所起三業為性無瞋精進即善十一中二審慧即別境五中慧所以有此三者大論四十二云自無憤㪍不報他怨亦不隨眠流注相續是名菩薩耐怨害忍即以無瞋及三業為性若安受苦忍即精進三業為性若諦察法忍即以審慧三業為性故此三業通於三忍精進以勤及彼所起三業為性精進即善十一中之一數也勤即精進以勤行三業為體靜慮以等持為性等持即三摩地雖是別境心所之一今約定說不通散心故不說三業對法論云起三業自在用時所有一切種常安住即通三業以約用故慧波羅蜜通後五種皆以擇法為性說是根本後得智故以根本智為第六體後之四體皆後得智八以欲解及信為性者信於前境方有印持信解現前隨生樂欲由此三故而發要誓故願波羅以信解欲為彼體性此說自性者總結前說各別性故若并下顯助伴義故以一切俱行功德為性二釋性竟此十相者要七最勝至一一皆應四句分別總舉十波羅蜜以七最勝攝受為相文中別釋七種最勝者一以大乘二種種性為安住二以大菩提心為依止三以悲愍有情為意樂四以萬行為事業五以無相智為巧便六以無上菩提為回向七以永斷二障為清淨若非下結顯施等必攝七義方到彼岸由斯下明施等對十波羅蜜有差別義施等十種唯是有為有漏性攝十波羅蜜到彼岸故無漏無為性所攝故故云由七最勝方可建立波羅蜜多四句分別者有施非波羅蜜有波羅蜜非施有亦施亦波羅蜜有非施非波羅蜜三釋相竟此但有十不增減者至證十真如無增減故此明十波羅蜜不增減義謂於一地唯斷一障及二種愚證一真如地地皆然義無增減復次前六不增減者至諸菩薩道唯有此二此明前六波羅蜜多不增減義六種相違者布施違慳貪持戒違毀戒忍辱違瞋恚精進違懈怠禪定違散亂智慧違愚癡六種波羅蜜多是諸佛法布施等六種成熟有情能所相準名不增減又施等下明二道攝六波羅蜜顯不增減增上生道顯唯自利故云感大財體及眷屬故決定勝道自他俱利故云成熟有情及佛法故諸菩薩道唯有此二者以攝六種無餘事故名不增減又前三種饒益有情至由此前六不增不減復以二利攝六波薩蜜多顯不增減謂以布施施彼資財持戒不損惱彼忍辱堪忍彼惱是前三名利他行精進等三對治煩惱名自利行以精進修善則煩惱不動靜慮觀心現行不起智無分別永斷隨眠是故此三於諸煩惱能伏能斷二利各三不增減故又由下明六種共為無住涅槃資糧顯不增減施等三種假觀利生不住涅槃精進等三能斷煩惱不住生死生死涅槃二皆不住故云無住處涅槃資糧生死涅槃各不住三名不增減無住涅槃即佛所證大涅槃果由此下結成前說六不增減後唯四者為助前六至如解深密廣說應知釋後四種助前六義四中前一通助前三以施等三無巧方便不能行故精進等三四中後三各別相助大論第七十八云於前三種波羅蜜多所攝有情以諸攝事方便善巧而攝受故安住善品意云巧用施等以攝物也願助精進者大論云由此願故煩惱微薄能修精進力助靜慮者大論云由此力故於內心住有所堪能故說力度助於定也智助般若者大論云由此智故堪能引發出世間慧故說智為慧助是以後四助於前六令前六度修習圓滿前六不能助後四也四釋不增減竟十次第者謂由前前至釋總別名如餘處說此明十種波羅蜜多次第有四門別一引發二持淨三粗細四易難言引發者深密經云能為後後引發依故謂諸菩薩若於身財無所顧吝便能受持清淨禁戒為護禁戒便修忍辱修忍辱已能發精進發精進已能辦靜慮辦靜慮已便能護得出世間慧是故我說波羅蜜多如是次第言持淨者能為前前持淨依故雖行布施攝益有情由淨戒力施得清淨由忍力故戒得清淨由精進故忍得清淨由靜慮故精進清淨由般若故靜慮清淨言粗細者前前為粗後後為細於諸行中施為最粗故先建立智為最細故後方陳言易難者義同粗細以前望後立前為粗顯易修故以後望前立後為細顯難進故一一相望故有前前及後後義初一唯前後一唯後中之八度遞為前後五釋次第竟此十修者有五種修至如集論等廣說其相總舉五種修修十波羅蜜文中別釋任持修者力能任持故有四種謂種姓力自體力大願力大智力具此四力方能任持作意修者心能作意亦有四種謂勝解心愛味心隨喜心願樂心具此四心作意修習施等諸行意樂修者復有五種謂無厭意樂廣大意樂歡喜意樂無染意樂善好意樂隨諸意樂修諸行故方便修者亦有三種即三輪清淨無分別智而觀察故二利善巧是方便義自在修者亦有三種一身自在自性受用二種身故二行自在現變化身同法行故三說自在宣說諸法無滯礙故釋義出雜集十二卷文繁不引六釋修竟此十攝者謂十至後四皆是後得智攝緣世俗故此中總明十種互相攝義文中別釋前後及純雜修依修前下明引發謂修前一引發後九故云前攝於後必待前故此引發門必前引後非後引前故云後不攝前不待後故依修後下明持淨謂修後一持淨前九故云後攝於前持淨前故此持淨門必後持前非前持後故云前不攝後非持淨故若依下此名純雜修習謂有純修一者有雜修餘者有不修者故云展轉應作四句一純修非雜二雜修非純三亦純亦雜四非純非雜此實下明開合與二智相攝合為六者第六通二智開為十者第六唯根本後四通後得以緣世俗故七釋攝竟此十果者有漏有四至或互相資或二合說此明十波羅蜜所證之果異熟唯有漏離繫唯無漏故此二果各唯一位等流士用增上三果有漏無漏二位俱通或互相資或二合說者是兼有漏無漏二位說故八釋果竟十與三學互相攝者至甚深廣大如餘處說總舉十波羅蜜與三學相攝文中別釋三學別義戒學有三皆言正者以正遠離及正修證學正度生非邪戒故此與二乘有共不共者前一是共後二不共以彼聲聞唯共律儀無攝善法饒益有情故說不共甚深廣大者攝大乘論云復次應知略由四種殊勝故此殊勝一由差別殊勝謂即此戒三品別故二由共不共殊勝戒與聲聞共不共故三由廣大殊勝學處福德修行證果俱廣大故四由甚深殊勝所學尸羅逆順甚深難可測故已上四種揀異小乘故云殊勝定學有四一大乘光明定至如餘處說定學四者一學發大乘理教行果四種智慧定故二學無邊廣大福德自在王定故三學守賢善法之定故四學勤行度生定故言健行者君子自強不息之謂此四下攝大乘論云略由六種差別應知一由所緣差別謂大乘法為所緣故二由種種差別謂大乘光明集福王定賢守健行等三摩地種種無量故三由對治差別謂一切法總相緣智以楔出楔道理遣阿賴耶識中一切障粗重故四由堪能差別謂住靜慮樂隨其所欲而受生故五由引發差別謂由引發一切世界無礙神通故六由作業差別謂能振動熾然等諸大神通故已上六種俱異小乘故名差別今此四者即彼論中第二種種差別也慧學有三一加行無分別慧至所餘處說慧學三者一學修因慧故二學證果慧故三學度生慧故此三下攝大乘論云謂無分別智若自性若所依若因緣若所緣若行相若任持若助伴若異熟若等流若出離若至究竟若勝利若差別若作事若甚深應知三種無分別智各具此十五種相名增上慧殊勝自性者謂無分別智離五種相為自性一離無作意不同睡醉悶等無作意故二離過有尋伺地不同二禪及上諸地無尋伺故三離想受滅寂不同滅定等名無心定故四離色自性不同色法頑無知故五離於真義異計度不同計度有分別故故有頌曰諸菩薩自性遠離五種相是無分別智不異計於真二所依頌曰諸菩薩所依非心無分別也而是心又能照境是無分別智非思議種類此所依心不問思議種也三因緣頌曰諸菩薩因緣有言聞熏習聞大乘為因故是無分別智及如理作意順理起智也四所緣頌曰諸菩薩所緣不可言法性法無自性性是無分別智無我性真如五行相頌曰諸菩薩行相復於所緣中是無分別智彼所知無相六任持頌曰諸菩薩任持是無分別智後所得諸行為趣進增長得智任持諸行增長七助伴頌曰諸菩薩助伴說為二種道施戒忍進為資糧道禪定為依止道是無分別智五到彼岸性即前五波羅蜜八異熟頌曰諸菩薩異熟於佛二會中受用變化二佛會中是無分別智由加行證得異熟有漏由加行證九等流頌曰諸菩薩等流於後後生中等於前前故是無分別智自體轉增長十出離頌曰諸菩薩出離見道名出離得成辦相應修道為成辦是無分別智應知於十地十一究竟頌曰諸菩薩究竟得清淨三身是無分別智得最上自在十二勝利有三一加行無染勝利頌曰如虗空無染喻也是無分別智種種極重惡是無染處由唯信勝解信無分別發起勝解於惡不染二根本無染勝利頌曰如虗空無染是無分別智解脫一切障得成辦相應修道名成辨如見道而修說為相應三後得無染勝利頌曰如虗空無染是無分別智常行於世間非世法所染世法有八利衰譽毀稱譏苦樂十三差別頌曰如啞求受義啞喻無分別求受喻加行如啞正受義正受喻境智平等如非啞受義喻後得智有分別故三智譬如是復有愚及五識未解人目四喻四頌文繁不引十四作事頌曰如末尼天樂無思成自事無思總喻智無分別種種佛事處常離思亦爾十五甚深頌曰非於此非餘此即依他是有分別餘非依他是無分別非智而是智有無雙非顯甚深義與境無有異心境一如智成無分別彼論尚有餘文不復繁引如是三慧初二位中至加行現種俱已捨故設問云即此三慧於五位中若種若現云何有無答云如是三慧於初資糧及加行位種具有三現唯加行以前二位未得見道故無根本及後得故於通達位現二種三者以時促故無加行義於修習位前七地中種現俱三者以前七地有漏無漏二智間起斷惑證果有加行故八地以去後三地等現二種三以無功用違加行故問既無加行何趣上地答所有進趣皆用後得問既皆後得何用根本答無漏觀中任運趣故亦有根本究竟位唯以根本證真如理後得利生盡未來際故於加行種現俱捨上釋三慧攝五位竟下文總釋三學與十波羅蜜相攝若自性攝戒唯攝戒至定攝靜慮慧攝後五言自性者即各自體無相雜義故云戒學攝戒定學攝靜慮慧學攝後五施忍勤三學不攝若并助伴皆具相攝者謂隨互相助力於三學中一一皆攝十波羅蜜若隨用者用即業用依體起故故云戒攝前三資糧自體眷屬性故謂此戒學以戒為體施為資糧忍為眷屬精進三攝遍䇿三者謂精進一法三學共攝精進即勤以勤行三學故云遍䇿三故隨顯攝者顯即顯現義現前故故說前三如前戒攝亦攝精進守護戒故九釋三學竟此十位者五位皆具至若現若種俱唯無漏此明十種波羅蜜多位次謂於五位十種皆具唯修習位其相最顯以十地中必以施等為正行故然初下釋十波羅蜜多各有有漏無漏種子現行以明諸位簡別謂初二位頓悟菩薩未伏分別惑故於無漏現行不起漸悟菩薩已得生空四如實智故漏無漏種現俱通通達位中於一剎那得真見道故於有漏不起現行修習前七現種俱通以漏無漏相間起故八地以去種二現一者以彼有漏惑永伏不起故究竟位中有漏種現俱永斷故十釋位竟此十因位有三種名至及煩惱種故未究竟此明十波羅蜜多因位三名即三僧祇修勝行義一名波羅蜜者謂資糧加行二位歷一僧祇名為初劫於彼長時施等力微未伏煩惱不覺現行於唯識性雖解希求未實安住而於一行唯起一行由未見道故但有名耳二名近波羅蜜者謂通達位及修習位前七地中歷一僧祇名第二劫於彼長時施等漸增能伏煩惱雖未究竟住唯識性而由見道分證真理雖於一行起諸勝行由於加行方得現前未得無功自在現故故名為近由斯下謂雖起煩惱無煩惱過失以度生故方現貪等名為故意三名大波羅者謂從八地乃至等覺歷一僧祇名第三劫於彼長時施等轉增能畢竟伏一切煩惱永不現行能於一行自在顯現一切行故故名為大問既永不起煩惱現行何不名佛答猶有所知微細現種及煩惱種故未究竟要至等覺金剛喻定現在前時究竟斷故十一釋別名竟此十義類差別無邊至而皆攝在十到彼岸總結十種義類無邊略示綱要問十行十地何依何修答十於十地雖實皆修而隨相增地地修一問十地行門差別無量何唯十種答雖十地有無量門而皆攝在十到彼岸十二總結竟二十勝行竟下三十重障分二一正釋十種十重障者一異生性障至是故二性無俱成失總舉二轉依中所斷十種重障文中別釋異生性障者依彼分別二障種立若斷彼種轉名聖性應知此障唯在地前三賢六道名異生性唯斷一種者二乘見道時唯斷分別煩惱即入聖流名為聖性菩薩具斷二種者當作俱字彼見道時俱斷分別煩惱所知障種即入聖位名得聖性後十卷廣大轉中具能通達亦當作俱字二真下明凡聖二性不俱生義雖大小乘斷分別惑有狹有廣見道俱真故名二真見道猶明下喻不俱生如稱下喻無間斷以智起時惑即除滅故云低昂時等諸相違法理必應然者謂智與惑違未有有智而容有惑未有有惑而亦有智故云二性無俱成失論意異薩婆多宗彼宗所立見道之前斷異生性無間道起無惑種俱說言斷耳彼即難云既依見道斷種立名即無間道有惑種俱異生未斷如何凡聖無俱成失故此釋云見道起時彼種不成猶如明生不與暗並故凡聖性無俱成失無間道時已無惑種至總說為愚後準此釋問答明斷惑證果期心別也無間道即見道時謂既見道已無惑種後起解脫復為何用答云斷惑證滅期心別故者無間道時但能斷惑解脫道時方得證果故云期別後智斷惑本智證果故云心別為捨彼品粗重性故者釋起解脫道之所以也復自云無間道時雖無分別惑種而未捨彼俱生惑種俱生性細名無堪任為捨彼故及證此品擇滅無為故起解脫言此品者即此已斷分別種也設問云真見道生已名聖者何有異生諸業果耶答云雖見道生亦斷業果而今初地說斷煩惱是諸惡趣業果根本故說初地斷二種愚及彼種子以粗重言即種子義一執下釋上二愚總是分別我法二執但以因果有別分作二種故云愚品總說為愚後準此釋者初地既爾後九同故或彼唯說利鈍障品至唯依十地修所斷說又作一義解釋上意煩惱是染污性故利所知是無記性故鈍彼粗重言顯彼利鈍二障種子此據已斷者說或二所起無堪任性者又顯二種是俱生義此據現斷者說如入下引喻以明已斷者謂入無想滅盡定者俱斷苦根以二定中無苦受故於入定時雖無苦根現行種子而名入定斷彼粗重此初地中亦爾雖初下通釋地上所斷言雖二障意取所知經說十種無明即十障品愚非是煩惱染污性故二乘亦能斷煩惱障是與菩薩共故非此菩薩獨斷品中所說又前經說十種無明不染污者唯依十地修所斷中所知障說故知地上唯斷所知設問云初地所斷既通二障何非染污下文答釋雖此位中亦伏煩惱至將成佛時方頓斷故此是釋詞謂於初地雖亦頓伏俱生煩惱不起現行亦可假說斷彼粗重而非正意故此不說斷煩惱種理實下結顯十地唯斷所知問煩惱隨眠何時方斷答云住滿地中時既淹久理應進斷所應斷障三時者三阿僧祇劫也資糧如行歷一僧祇名漸伏頓斷道漸伏俱生頓斷分別故通達修習前七地中歷一僧祇名頓伏漸斷道頓伏煩惱漸斷所知故修道後三至究竟位歷一僧祇名永伏永斷道煩惱所知究竟斷故是三道別住滿地中時既淹久者是後僧祇於此長時應斷餘障若不爾者三時斷道應無別故復引經證得現觀者現量觀也謂見道後親證真如是現量境不同地前但得比量故說菩薩得現觀已唯斷所知以留煩惱助願度生不同二乘斷盡煩惱速趣涅槃故修道下論主釋引證義二邪行障謂所知障中至或唯起業不了業愚瑜伽七十九云云何邪行障當知略說後後引發有八種相一者能退智邪行退故妄念邪行妄故壞百法邪行壞故惡意現邪行惡故難調伏邪行難調故行非道邪行行非故不賢良邪行不賢故不如義邪行攝論云謂於身等邪行障彼言身等即是三業共有十惡名邪行障即前初地生大歡喜故能誤犯三業名為邪行是故論中自釋云謂所知障中俱生一分及彼所起誤犯三業此簡煩惱及分別起唯顯俱生所知由有誤犯障淨尸羅得登二地便能永斷彼障下明斷二愚同前釋義微細誤犯為因種種業趣為果故分為二或唯下又以起業不了為二愚起業愚者即彼發起誤犯三業不了愚者即於彼業不能了知虗妄自性而執實有故名為愚三暗鈍障謂所知障中至能障總持聞思慧者忘失三慧故名暗鈍即二地中極淨尸羅以純修戒無定慧故故論釋云謂所知障中俱生一分令所聞思修慧忘失彼障下明斷二愚同前釋義一欲貪愚即是煩惱故有問云上云所知障中俱生一分今何得舉欲貪煩惱答謂彼所知多與欲貪俱時轉故名欲貪愚今得定慧所知障斷欲貪隨伏以此貪欲無始時來恆依所知而得轉故陀羅尼者此云總持以持一法得一切法故名為總前障勝定修慧為因今障聞思二慧為果故分為二四微細煩惱現行障至故能永害二身見等由貪定慧故名煩惱即三地中勝定總持故下二種愚名定愛法愛論主自釋云第六識俱身見等攝謂此煩惱唯第六俱非第七者以彼煩惱八地方伏最下品者無記性攝故不作意緣者任運而起故遠隨現行者從無始來故具此三義故名微細以有身見不能觀身為不淨等故起貪愛煩惱今得菩提便能永斷問既云所知障中俱生一分何名微細煩惱答云彼所知障昔與我執煩惱同起說煩惱名今得菩提彼所知障便能永滅依所知起我見煩惱亦永不行又問云前之三地何不爾耶答云初二三地等二身見者所知煩惱俱依身見等起故名為二寧知此與第六識俱至煩惱二愛亦永不行問此我執見等何唯第六識俱答中謂第七識相應煩惱前七地中猶得現起與餘六識相應煩惱為依止故以前七地非無漏道故至八地方永不行此第六粗彼第七細伏有前後故此地中所伏煩惱第六相應身見下釋上所說身見等言攝定法愛三地增者愛修勝定及總持故四地永斷違菩提故由斯下釋斷二愚攝定法愛等至即定名定愛愚愚即無明遍染心等故與愛俱定愛定愚如是相攝法愚法愛相攝亦爾所知障攝定法二愚無明斷故煩惱相應定法二愛亦永不行以不執我能修定法是斷煩惱不執勝定大法實有是斷所知愛定為因愛法為果故開為二五於下乘般涅槃障至即是此中樂涅槃者求證菩提必厭生死以有欣厭故名為障即前四地求出世心故同二乘有欣厭義彼障下釋斷二愚即是欣厭以有欣厭即障五地真俗等觀無差別道入五地時得此道故便能永斷欣涅槃為果厭生死為因故分為二六粗相現行障至未能多時住無相觀有染有淨名為粗相即前五地無差別道真俗等觀染淨相現名粗現行彼障下釋斷二愚即染淨相以有染淨障無淨染故於六地無染淨時二愚永斷觀察流轉者即是因緣流轉門故云染分攝故相多現行即是因緣還滅門故云取淨相故二相未泯故云相觀多行未能多時住無相觀若住無相方名六地無染淨道觀察流轉為因相多現行為果故開為二七細相現行障至未能空中起有勝行有相觀滅無相觀生名細相現行障即前六地無染淨道住無相觀名細現行彼障下釋斷二愚即細生滅以生滅相障妙無相故於七地永斷二愚純於無相作意勤求者謂前六地雖是純於無相作意勤求未能空中起有勝行空中即無相中也若無相中而有勝行方是七地妙無相道生因滅果開為二愚八無相中作加行障至生空智果不違彼故加行障者障無功行即前七地空中勝行故障八地無功用道不任運起問觀相有無諸地何別答云前之五地等相觀有無義如文釋設問云既純無相即恆相續無功用義何障第八無功用耶故答云雖恆等相即是身土是器界以第七地現身器時後得智中作意加行方得現故如是下釋斷二愚即是加行能所二相謂有加行障無功用加行滅已現身現土任運現前故云得二自在一於無相作功用愚者即前七地能現身土加行功用二於相中不自在愚者即前所現身相土相不自在義故復釋云令於相中不自在故此亦攝土相一分故問二道二障後三地中有無何別八地下答謂於二道純是無漏非有漏道故云任運起故於二障中唯存所知無煩惱障故云永不現行生空智果不違彼故者謂第七識煩惱方伏故得人空法執猶存以人空智不違彼故九利他中不欲行障至皆是此中第九障攝任運自在名不欲行即前八地無功用道樂修己利故於利生不欲勤行彼障下釋斷二愚即是能障四無礙者故第一種愚障三無礙解於無量所說下釋三種無礙解義所說之法即所詮義名義無礙解能說名句即能說法名法無礙解能所之後復有展轉辨論言詞名詞無礙解陀羅尼者此云總持各於一中現一切故二辨下釋第二種愚障第四無礙解以能隨宜巧為說故名辨無礙愚能下總結二愚障四無礙名第九障十於諸法中至障大法智雲及所含藏者諸法未得自在障者亦前八地無功用道雙障二地心法自在故於九地障心自在名不欲行於十地中障法自在名於諸法未得自在通觀所有諸地障法皆前地行能障後地今觀九地心自在行非障十地法自在者應知此障亦從八地中來以無功用障心法故彼障下釋斷二愚即是能障神通等者謂大法智及大法雲含藏一切神通等事皆是十地法自在義未登十地被愚所障不得現前入十地時得法自在便能永斷大神通者即所含藏神通事業悟入微細祕密者即能含藏大法智雲大智普觀大雲普覆故於諸法皆能悟入愚能障之故說應斷問此障既斷何不名佛下答云此地於法雖得自在至證大涅槃大菩提故此地於法雖得自在而有餘障未名最極謂有下釋有餘障即二障種由前所說住滿地中時既淹久理應進斷所應斷障彼以等覺名為滿地故說金剛喻定現前頓斷餘障入如來地由斯下釋斷二愚即有餘障佛地說斷者是說已斷非佛地斷以有餘障等覺斷故極細著者即所知障以有所知多執著故極細礙者即煩惱障以有煩惱多障礙故故集論下引證斷障證果義成阿羅漢唯斷煩惱所得涅槃有餘無餘非無住處及成如來證大涅槃大菩提者二障永斷二死永亡證大涅槃名無住處證大菩提名圓滿覺一正釋十種竟
