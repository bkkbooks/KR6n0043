body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前初能變中正釋頌意分為八科一釋三名二釋行相二卷中竟此中三釋相應分三一問答總釋此識與幾心所相應至以是遍行心所攝故問答以明王所相應也謂此藏識從無始來至第八地名未轉依前七地中及三賢六道名一切位於諸位中恆與此五心所相應以五心所是遍行故故與藏識遍一切位一問答總釋竟下二別釋五所分六一釋觸心所分二一體性業用觸謂三和分別變異至引觸起時勝彼識境根境生識故名三和變異是三和之功能分別是分取之義謂觸分取三和中一分功能故能令心心所觸境為性餘心所法皆依觸生故説受等所依為業謂根境下釋上三和與觸互為緣義觸依下釋成謂觸依三和而得生三和由觸而得合故説為彼互相生義彼即三和也三和合位下釋上分別變異變異是三和生心所之功能觸所亦似三和能生受等故説觸所分別三和中變異功能也三和功能唯根勝者有四義一由主故二由近故三由遍故四由續故境雖能生心心所以非主非近故心雖是主近生心所不能生心又非遍故境與識皆闕續義故唯根勝一體性業用竟下二經論差別故集論等但説分別至如受等性非即三和故集論下引證根力獨勝兼釋觸所體性業用起盡經説者據五蘊論云行蘊有七十三數謂五十一心所中除去受想二蘊餘四十九法合不相應行二十四法共有七十三數皆名行蘊今言受想行蘊一切者是除觸法則有七十四法以觸為緣識觸受等二三四生者謂根境二法生識根境識三法生觸根境識觸四法生受受以下一切心所皆四法生瑜伽中唯言思不言行蘊者思於行蘊為主舉思一法以攝餘集論但説觸為受依者以觸境時必有領納受所依近勝故偏説謂觸下釋上觸受近勝義然觸下因他處謂觸性即三和非實有體論主特顯觸體實有謂觸於六位中是心所性六位南北藏皆訛為六六今從義改正於四食中是觸食攝七十四法用觸為緣故知觸體是實喻如受等各別有體非即三和二經論差別竟通上一釋觸心所竟下二作意心所作意謂能警心為性至應非遍行不異定故釋作意心所體性業用謂心未起警心令起心既起已引令趣境謂此下釋上所言體用是顯作意之名設有問云作意亦能引起心所此何獨名引心耶答心是主故但説引心心所在焉回趣是不遍義遍行是普周義持心令住是定義論主舉他處執詞文中逐一難破彼俱下謂二執違義故言俱非若言回趣回此趣彼應非遍行若令心住不異定故何名作意二作意心所竟下三釋受心所受謂領納順違俱非至名境界受不共餘故釋受心所體性業用以受有三領順境時名樂受領違境時名苦受領俱非境為捨受受為欲所依故起愛為業能起合離非二欲者釋上起愛隨受有三非二即苦樂俱非捨受義也有作下謂他處説餘相即是境界以境界受領所緣境故俱即三和觸即觸所謂受從三和并觸四法生反領能生俱觸名自性受以唯是受自相不同境界受共餘相故彼説下論主破受於三和境雖可緣決不緣觸故云受定不緣俱生觸故若似觸生下謂彼受果同彼觸因似三和生令三和合故執受果從觸所生能領於觸則諸世間似因之果應皆受性亦應領因以因生果多似因故既謂觸是受因受能領觸應名因受何名自性受耶若謂如王下王喻自性食諸國邑喻受此意雖喻自性受不能喻領能生之觸以王非諸國邑生故是故破云違自所執以彼執領能生故不自證者亦非證成領能生義若謂受不捨自性觸名自性受則一切法是受自性以一切法不離自性故故彼所説但誘嬰兒者結破非理然境界下牒釋境界受不共餘相義謂領順境時其順境相定屬於己名順境受此領順時不領違捨若領違捨於順亦然故境界受定屬於己不共餘相故三釋受心所竟下四釋想心所想謂於境取像為性至方能隨起種種名言釋想心所體性業用想以取像為體安立名言為業謂要下釋上義安立即取像由取方圓等分齊相已然後隨起方圓等名言四釋想心所竟下五釋思心所思謂令心造作為性至驅役自心令造善等釋思心所體性業用造作即思惟籌度是思體性役心心所為思業用故他處云作意如馬行思惟如騎者謂能下釋成上義謂取境正事邪事為因然後役心令造五釋思心所竟下六總結五所此五既是遍行所攝至所緣事等故名相應釋遍行宜與藏識相應藏識亦遍一切位故其遍行相後五卷中當廣解釋言行相異者識以了境為行相作意以警心為行相乃至思以造作為行相而時依同所緣事等者謂心王心所同時起同所依根同所緣境同一自證分體事故名相應六總結五所竟通上二別釋五所竟下三問答簡別文在捨受後如何下一章四釋捨受此識行相極不明了至如無記法善惡俱招捨受五相與此第八行相皆同故宜相應五相者一不明了無慧念故二不分別緣中境故三者微細相不顯故四者一類無易脫故五相續轉無間斷故又此下釋成捨受相應義唯是異熟者簡非異熟生謂異熟無記隨先業引不待現在善惡業緣任先世善惡業力所轉故唯是捨受苦樂二受非相應義異熟生者是前六識苦樂二受待現緣起與彼相應非此第八可與相應又由下謂第八是捨受故無轉變無轉變故有情念念恆執為我若與變易受俱隨彼轉變有情何得念念執我故此但與捨受相應者結成相應唯是捨受若爾下外人難問云第八與捨受相應捨受是寂靜法應同禪定寂靜如何此識亦招惡果若謂捨受不招惡果汝前既許善業能招捨受此惡業招理亦應然捨受下論主答捨雖寂靜不同禪定能斷障染故於苦樂俱不相違如無記法善惡俱招四釋捨受竟下釋前相應下三問答簡別如何此識非別境等至有間斷故定非異熟問答以明不與餘心所相應義別境中欲是希望故此識任業故無有欲本識瞢味不能印持無勝解義昧劣之識明記遠離故無有念任運之心心非專住故無定俱微昧簡擇決不相應故藏識俱無慧心所此識唯是異熟性者總釋善染二位互相違義異熟性即無記性故與善染無相應理惡作下釋不定位中心所相違義謂彼心所雖同無記而有間斷非異熟俱以異熟識無間斷故是故但與五遍行俱三問答簡別竟通上三釋相應竟下五釋無覆法有四種謂善不善至無覆無記異熟性故此中先標四種性復申問答以明初能變識唯與一性相應也問何故他處説通善染下文答釋異熟若是善染性者至故此唯是無覆無記以他處言第八識是善不善性論主牒計難破流轉是染門還滅是淨門由業故流由苦故轉由修故還由證故滅以第八體是無記性受善染熏得成流轉及還滅法若是善染自性強盛不受他熏則此二門俱不成就又此下復以所依所熏難破互相違者善違不善不善違善自性無記容善染依自若善染俱不容故極香喻善極臭喻染體非香臭受香臭熏極臭極香何容熏習無熏習故因果皆無覆謂染法障聖道故至此非善惡故名無記覆謂下釋名無覆義謂此第八持無漏種故不障道真如所依又不蔽心故名無覆無記下將釋無記先明有記然後例顯無記也謂愛是善果非愛是惡果彼二俱有強盛善惡自體可記可別此識無彼故名無記五釋無覆竟下六釋同性分二一正釋同性觸等亦如是者至故説觸等亦如是言標舉頌詞牒釋以明王所必同性故謂此藏識是無覆無記性觸等亦爾相應心所性必同故又觸等下重釋頌意異熟即無記性所緣行相俱不可知者識以了別為行相以微隱故而不可知觸等以令心等為行相亦微隱故而不可知不可知者即是無記故言緣三種境五法相應無覆無記是故頌中説觸等亦如是一正釋同性竟下二廣辨失錯有義觸等如阿賴耶至如何同識能持種子此義偏執亦如是者謂觸等亦有如是異熟一切種下六句頌中義故云無簡別故彼説下先破不能受熏持種謂心所非心王故不自在貪是不善信等是善善染既不受熏觸等亦不受熏如何同識能持種子又若觸等亦能受熏至六眼識等俱時生故此中縱彼受熏復以多種難破先破六種生一果謂若五所受熏同根本識則有六種種既有六唯生一果理不應然若説下破從一種生謂既從一生餘五俱無用何同受熏不同生果亦不可下破次第生果謂熏時勢力相等果起必齊何容次第又不可下破齊生六果若謂六果一時頓生則一有情眼識有六根塵亦然十八界種成百八界既不如是何容頓生誰言觸等亦能受熏至亦如似火無能燒用誰言下外人辨因論主以受熏持種為難故彼異謀矯遮前過不爾下論主反詰謂既不執觸等受熏如何説觸等如識名一切種謂觸下外人辨救似種相者謂第八識緣種子時相應觸等託種變相名似種相即此似種名一切種所緣等者謂彼心王緣種子時五心所法必同緣故無色下證成本識必緣種子宗鏡云無色界即無色可扶託故無疏所緣是顯第八親所緣義又云第八五所託心王三境為質而緣故此顯心所是疏所緣此似下結明不當以無因緣為難也似眼根等者亦是本識緣眼根等時相應觸等託根為質變似眼等非識所依以有親根為所依故似火無燒亦喻似種無能生用彼救非理觸等所緣至隨所應説非謂一切論主破謂觸等所緣似種似根等相於後執受及處方與本識而有親踈相例何於一切種中即言似相後執受者對前一切種説由後執受中有所緣種前説一切種言定名受熏若不名受熏亦名所緣種者本頌應犯重言過失以執受中又有所緣種故安得已説所緣似種相已又言似種相耶又彼下牒前執詞難破謂若執言咸相例者應説觸等法法如識故復破云勿觸等五亦能了別勿觸等五亦各與觸等五所相應由此下結明頌中亦如是言隨其所應非謂一切皆如本識二廣辨失錯竟通上六釋同性竟下七釋引喻分二一問答正釋阿賴耶識為斷為常至猶如暴流因果法爾問答以明初能變識性非斷常也恆謂下釋恆字義無始一類恆無記故長時相續恆無間故三界五趣恆為本故性堅持種恆不失故轉謂下釋轉字義生滅變異皆名轉變非同外道執一執常無轉變義恆言下結顯恆轉遮彼斷常復引喻釋成因果法爾自然相續如暴流水非斷非常至故説此識恆轉如流如暴流下釋喻體明非斷常義謂相續長時明非斷有所漂溺明非常此識下以法合喻初又如下喻果生非斷風等喻衆緣波浪喻轉識而恆相續顯非斷義次又如下喻因滅非常漂水上草喻人天善趣漂水下魚喻三途惡趣習氣即業觸等法是善惡趣境恆相隨轉是非常義如是下總結法喻顯非斷常謂此下釋成上意以顯因果非斷非常是緣起理宗鏡云緣起者順性無分別即是相即相融顯平等義正順第一義諦體也一問答正釋竟下二外難內釋過去未來既非實有至常亦不成緣起正理外人難由論主立果生是現在因滅是去來故攝去來二世為難謂此二世所有識性既非實有唯是非常何又非斷非常即斷斷豈得成緣起正理又去來世所有識性若是實有應同未滅唯是非斷何又非常非斷即常常亦不成緣起正理豈斥他過己義便成至應信大乘緣起正理論主將釋外難先白己意謂此立論非是徒衒虗名空爭人我意在摧邪顯正化利有情耳前因下正釋緣起果生因滅如稱兩頭低喻因滅昂喻果生生滅非常如流非斷何假去來二世實有方成非斷因現下以三世破無因果先破因根隔世謂有因無果因不名因有果無因果不名果不名因果非斷即常既執斷常遠離中道若有下破因果同世若謂因時已有現果果不待因果不待因因義亦無因義既無果義不立不立因果又是斷常執斷執常亦非中道因果義成下意顯因果不成徒為詰難體既本有下恐彼轉計云前説已有後果但有果體待有因緣果用方現破云果體既本有果用亦本有用若待因生體亦有本故若定本有亦是執常常無轉變非因果義由斯下結勸諦信緣起正理謂此正理深妙離言至諸有智者應順修學謂此緣起正理正順第一義諦故云深妙聲不能及故曰離言釋成因果之言皆假施設初觀現在下釋假立果名也以彼果未現前對現因而説當果次觀現在下釋假立因名也以彼因已謝滅對現果而説曾因假者謂從現起分別識上變似因果相現是知因果原無實體理趣顯然如是下結勸智者應當遠離斷常二邊隨順修學有餘部説雖無去來至誰有智者捨此信餘由前論主假立因果故有餘部執因果體決定實有方恆相續謂現在下釋恆相續義極迅速者如石火電光類雖則迅速猶有生時酬因滅時引果之別時雖二別法體是一前因下釋成因果生滅同時實有體性如是下結顯離難意反破前故云誰有智者捨此實有因果而信餘處假説言義彼有虗言都無實義至同依一體理必不成論主總破義理無實極迅速者唯在一念豈一念中又有二時生滅相違寧同現在者重破彼執生滅同世滅若現在下以三世反常難破謂滅本過去執為現在生是現在應名未來汝何不許若言生非未來是現在有滅非現在是過去無何執已滅名為現在滅若非無下復以生滅互相例難苦體非樂樂亦非苦生滅體一苦樂亦然故抑云非苦樂等見有是事若執生滅其體是一又不應説生滅二時若執生滅其體定異如何又説生滅體同語自相違義無的據故生滅下結破前執非理經部師等因果相續至因果相續緣起正理因果相續理必受熏從熏成種從種起現現又熏種依他緣起是相續義經部師等不許第八受熏持種而言因果相續理定不成由此下結勸有情深信勿疑二外難內釋竟通上七釋引喻竟下八釋捨位分三一正釋捨位此識無始恆轉如流至永不復受分段生故問答以明捨識位次初入預流即名聖者煩惱未盡不名羅漢至都盡位方得此名梵語阿羅漢此云無生煩惱不生不續後有名阿羅漢粗重即種子此識含藏雜染種子究竟斷故説之為捨所藏種子既盡能藏之名亦無三乘者謂獨覺聲聞菩薩彼三乘人至無學位俱盡煩惱事業皆同故云皆已永害煩惱賊者以彼煩惱劫法財故應受世間妙供養者堪作福田故永不復受分段生者唯有變易生死故一正釋捨位竟下二廣辨執疑有二一問答疑辨云何知然決擇分説至成阿羅漢及如來故云何知然者外人問上通攝三乘義決擇分下論主引論答謂鈍根利根二種羅漢及諸如來皆捨藏識故集論下復引論證阿羅漢名攝菩薩衆此中斷煩惱有三一頓斷分別現種即得初果二分斷俱生現種得中二果三成阿羅漢時俱生現種俱永斷故菩薩登八地時但斷現行名阿羅漢成如來時方斷種子若爾菩薩煩惱種子至亦不成就阿賴耶識外人疑難若謂菩薩得菩提時方能頓斷煩惱則菩薩位煩惱未斷應皆成就阿賴耶識何故論説不退菩薩不成就阿賴耶識彼説二乘無學果位至此亦説彼名阿羅漢論主辨明謂決擇分説二乘斷盡煩惱回趣大乘必不再起煩惱故名不退以彼趣求菩提名為菩薩説彼不成就阿賴耶識即攝在此頌中所説阿羅漢中故彼決擇分論文不違此集論中義不動以上者通後三地法駛流即是法執以所知障未曾斷故謂諸菩薩登八地時一切煩惱永伏不起雖有種子隨法駛流任運而轉不障因故能諸行中起諸行者化利之功展轉不已剎那剎那轉增進者無有一念有漏退墮故此位中亦名不退然此下釋成八地以上菩薩雖未斷煩惱種彼之七識相應我見愛等不執藏識為我由不執故説彼不成阿賴耶故此頌中亦説彼名阿羅漢一問答疑辨竟下二執辨七地有義初地以上菩薩至故亦説彼名阿羅漢此義偏執謂前七地諸菩薩等已證二空已得二智已斷分別我法二障亦於一行能起諸行雖起煩惱為利生故不為過失故此亦名不退菩薩然此下釋上前七地中雖未斷盡俱生煩惱分別我執永斷不執藏識為自內我亦説不成阿賴耶故此頌中亦應説彼名阿羅漢故集論下引證執義呪喻禪定藥喻智慧毒喻煩惱雖有種子被禪定智慧所伏不為煩惱過失由彼論説一切地中如阿羅漢以證前七地中亦名阿羅漢義彼説非理七地已前至許便違害諸論所説論主破謂七地已前我執常起定執藏識為我如何説捨阿賴耶名若彼下論主例難若諸菩薩但斷我見愛等即捨藏識預流果人亦應已捨阿賴耶名以預流果永斷分別我見愛故地上菩薩所起煩惱至由此故知彼説非理執者辨救謂地上菩薩為度生故示起煩惱無實過咎非預流等亦有如是利生事故得與菩薩為一例耳彼六下論主通釋菩薩六識所起煩惱可為正知無有過失第七有漏念念執我寧不與彼預流等同故知彼説前七地中名阿羅漢決定非理二執辨七地竟通上二廣辨執疑竟下三結顯有體然阿羅漢斷此識中至爾時便入無餘涅槃結前正義由有煩惱常起我執斷盡煩惱不執賴耶為自內我即捨此名故頌中説阿羅漢位捨設問云若捨藏識所知障種及色根身何識能持答云非捨一切第八識體若捨識體最後身智無能執受故云勿阿羅漢無識持種爾時便入無餘涅槃以彼斷盡煩惱身智未泯但名有餘依未得無餘故三結顯有體竟通上一正釋頌意竟下二別顯多名分二一正釋多名然第八識雖諸有情至此等諸名通一切位此中標舉識體雖一而隨積集依止等義立種種名謂或下先釋四種名通一切位謂或名心者以此識體受染淨法熏成種子起現行故或名阿陀那者此云執持以能執持種子及與根身令彼不散不壞故或名所知依者依是第八識所知有五種謂色法心法心所法不相應法諸無為法即此五法皆依第八故第八識名所知依攝論釋云所應可知故名所知依謂所依此所依聲簡取能依雜染清淨諸有為法不取無為由彼無有所依義故所依即是阿賴耶識是彼因故能引彼故如其所應或名種子識者下此識因中持新舊種念念受熏故名世間果上唯持舊無漏種不受新熏名為出世此等下結上四種名凡聖諸位皆通或名阿賴耶攝藏一切至圓鏡智相應次釋後三種名各有定位阿賴耶者依自相立名攝藏雜染為自相故一切異生聲聞有學七地菩薩皆共此名三乘無學無此名故異熟識者依果相立名異熟果名唯除如來一切位中皆共有故無垢識者依淨相立名識既無垢能依諸法皆是最極清淨無漏故唯如來地有餘位第八持有漏種未善淨故如契經下引證無垢識名唯如來地有阿賴耶名過失重故至心等通故隨義應説釋成捨名先後含藏之名雜染粗重宜先捨之故頌中説阿羅漢位捨者是捨此名不捨異熟及一切種菩薩位中異熟果者是最後身觸等五所相應捨異熟時五所即轉大圓鏡智相應無垢識體證大菩提無餘依者是二乘最上果初盡煩惱時最後異熟苦果未盡名有餘依有餘生死所依故若捨異熟即入無餘依以彼身智俱泯故無垢下謂前所捨者但捨其名以彼名中多雜染故今不捨者不捨其體以此體無垢染法故心等四名通後三名隨染淨義説通三種一正釋多名竟下二傍通二位然第八識總有二位至鏡智遍緣一切法故標舉因果二位以明相應性境不同有漏因位性唯無記相應唯五心所境但有三以執受中是種子根身二境處是器界一境無漏果位性唯是善相應心所增十六數遍行是因中原具五所增別境五及善位十一與一切心恆相應者釋遍行五心所義常樂證知下如其次第釋別境位五心所極淨信等常相應者釋善位十一心所總上釋果位相應二十一心所竟無染下簡別不相應心所無染污者簡染位根隨二十六心所不與此識相應無散動者簡不定位四心所亦不與相應此亦下謂因果位中皆唯捨受故云此亦唯與捨受相應以一切法為所緣者謂果中不同因位唯緣三境以轉鏡智能遍緣故二傍通二位竟通上二別顯多名竟下三證有識體分二一問答標定云何應知此第八識至聖教正理為定量故云何下以外道餘乘唯知前六故發此問聖教下答論云此第八識非是世間現量所見之境唯憑聖教言量及以真正道理而知有故一問答標定竟下二引聖教理分三一引聖教分三一大乘四頌謂有大乘阿毗達麼至顯與流轉還滅作依持用第一引頌證有第八識體梵語阿毗達磨此云無比法無始時來界者謂第八從無始來能持一切諸法種子又能與力令生現行即第八與一切種子為依持生起二因也一切法等依者謂第八識能變為身器作有情依能與一切有漏現行而為所依以能執受五色根身與第七現識為俱有依即第八識能與一切現行色心等法為增上緣依也由此有諸趣及涅槃證得者此第八識不獨與有漏流轉法為依持用兼與一切無漏順還滅法為依持用此第八下論主標頌中以因緣依止作用而顯第八識之體也頌中下釋上標中因緣依止二作用義界是因義即種子識至是謂此識為因緣用界是因義等釋第一句頌中因用證有此識依是緣義等釋第二句頌中緣用亦證有此識謂能下二句釋成緣義復顯因緣云變為彼者是因義及為彼依是緣義器是器界為根身之所依根是勝義身是浮塵為轉識之所依以能下釋上所變根身與轉識作依止義謂此本識持五色根依五色根引生五識本識所變末那意根依此意根引生意識末那意識轉識攝故等者謂六七二識同五轉識俱許有根第八識性既同亦應第七作所依根前七依八第八為因前七為緣八依第七第七為因第八為緣是故第八有因緣用上釋前二句頌竟由此有者有此識至是與流轉作依持用由此下牒第三句頌略釋謂由下廣釋順流轉法即有漏位中善惡法也由第八識持善惡種種起現行復熏成種故令有情生死不絶設有問云趣及惑業皆是流轉何獨名諸趣不名諸惑及諸業答云雖惑業生皆是流轉果勝偏説惑業生者生即趣也或諸下又以趣通能所解諸趣義能趣惑業即是資具名諸趣因所趣苦樂名諸趣果既通能所凡言諸趣因果皆彰故言諸趣亦得惑業諸惑下結顯流轉依持作用亦證有此第八識體及涅槃證得者由有此識故至是與還滅作依持用牒第四句頌略釋涅槃亦由此識而有也謂由下廣釋順還滅法即是無漏善業法也由有此識持無漏種種起現行展轉熏生得證涅槃設問云既有藏識何證涅槃答云此中但説等謂頌言涅槃證得者但説證涅槃之道不説涅槃以有藏識無涅槃故初或此下謂此涅槃是正所求非即證得故但説涅槃亦無有過失次或此下謂道與涅槃攝還滅品二者雙説亦無過失謂涅槃言等者釋上還滅品類所攝義滅即涅槃道即正智正智起時斷盡煩惱方證涅槃故此二者皆還滅攝能所斷證者能斷所證也結顯還滅依持作用亦證有此第八識體又此頌中初句顯示至離第八識皆不得有重釋頌意無始時來界顯示無始恆有顯示染淨二法一總二別皆以第八識為所依止雜染下釋染淨法通四諦能所集諦是因即能趣業惑苦諦是果即所趣之生道諦是因即能證之道滅諦是果即所證涅槃彼二下結成染淨唯依此識或復下亦釋頌中無始時來界是相續義一切法等依是依他起由此有諸趣是遍計執及涅槃證得是圓成實今此下結顯頌中因緣等義唯依第八餘識所無即彼經中復作是説至故説此識名阿賴耶第二引頌即前阿毗達磨經中復説之頌前三句顯第八識含藏諸法種子名阿賴耶第四句顯為菩薩乘説得真見道方名勝者由此本識等通釋前三句頌非如勝性等簡數論執常一為宗謂因體常一果用轉變今之識種與果體俱非一能依所依俱生滅故又非常義與雜染下重釋此名有三藏義識藏雜染名為能藏受雜染熏名為所藏七執為我名為執藏互相攝藏者本識能持一切種子是諸法藏於識中即一切法以明本識是本識藏諸法中以一切法不離識故若離此識即心外有法已入見道諸菩薩衆至非諸轉識有如是義釋第四句頌真現觀者即見道後所起根本後得無分別智得此智已能證能解阿賴耶識方名勝者世尊正為彼説此識名阿賴耶或諸菩薩下通收地前亦名勝者資糧位中已能信解唯識性相發起最勝猛利樂欲希求見道轉依世尊亦為彼説非轉識下結顯頌中唯詮第八餘轉識等無此義故解深密經亦作是説至唯第八識有如是相第三引頌證有第八識梵語阿陀那此云執持以執持之義微隱故曰深細一切種子如暴流者謂種子有生住異滅不停如暴流水恐彼凡愚執為實我是故世尊不與開演以能下釋執持有三義謂此第八一執持種子二執受根身依處者根依於身也三執取結生相續結猶繫也此第八識於母胎中一念繫之故名結生通上諸義故名執持無性者謂凡夫無有聖性不能窮底以第八如淵海轉識若波濤人見波濤不見淵底凡夫唯知見聞覺知之轉識未窮第八之淵底故説甚深趣寂者謂二乘樂獨善寂不通第八隱微行相故名甚細上釋第一句竟是一切下釋第二句謂此第八親生諸識是真種子餘雖名種皆是假立以諸種子皆可斷故凡即下釋後二句謂若分別執藏為我憎愛隨生由憎愛故墮諸惡趣是故世尊不為開演唯第八識有如是相者謂上頌中所説諸相唯第八識有餘識所無亦證必有第八識體入楞伽經亦作是説至如增一等至教量攝第四引頌證有第八識前四句正明喻體後四句以法合喻藏識如海境等四緣如風恆起轉識如浪現前見聞覺知是作用而轉眼等下結成頌意亦證別有第八識性此等下結顯前所引頌皆是大乘正義以證第八決定實有諸大乘下釋成大乘經中所説之義謂諸有情數數造業取諸惡趣皆是執我佛於大乘説一切法皆無有我既順無我故違我執棄背流轉趣向還滅者謂大乘説唯向還滅非流轉門讚佛法僧毀諸外道者大乘所説三寶必讚外道必訶勝性數論所執言等者攝餘外道所執之法蘊等即五蘊十二處十八界於大乘中表如幻有故遮勝性實有等法樂大乘者下結上大乘所説理無顛倒求大乘者方許開示如增一等至教量攝者謂上廣引大乘證有第八識體如小乘部中增一等經皆是至教量攝亦密意説有此識一大乘四頌竟下二慈氏七因又聖慈氏以七種因證大乘經真是佛説此中標舉下文別解由前引大乘説有第八識體今引七因證大乘經真是佛説則顯藏識亦是佛説愚者何執無第八識一先不記故若大乘經至諸可怖事先預記別謂小乘人説大乘經不是佛説佛滅度後有餘人為壞小乘正法故説此大乘慈氏破云何故世尊先不授記諸可怖事者佛於經中説末法世時有諸魔王入我法中著我袈裟破我正法法必滅盡諸如是等可怖之事佛先授記若説大乘壞小乘正法應先授記何故不説二本俱行故大小乘教至寧知大乘獨非佛説大乘小乘本俱流行何許小乘是佛所説獨言大乘不是佛語既非佛語何又俱行三非餘境故大乘所説至故大乘經非非佛説謂大乘教唯大根黠慧人知非餘人境界豈有餘人能解是經彼經論中曾未與説説亦不信故知大乘決是佛説四應極成故若謂大乘至是佛所説其理極成今佛餘佛均是佛故大乘若是餘佛所説真是佛説其理極成五有無有故若有大乘至非大乘教不應正理若許有大乘即是此佛所説大乘離此之外無大乘可得若無大乘小乘亦無何則以依大乘修得成佛佛出於世説大小乘故許小乘是佛所説非大乘教理不應然六能對治故依大乘經至故應信此是佛所説佛化有情令斷煩惱斷煩惱者必無生智此智必依大乘修得應信大乘是佛所説七義異文故大乘所説至是故大乘真是佛説大乘妙趣意在言外不可隨文取義誹謗大乘謂非佛語離言至教非聖莫談故知大乘真是佛説如莊嚴論頌此義言至極成有無有對治異文故引論總頌已上七種因名次第如文此不重釋二慈氏七因竟下三小乘四部餘部經中亦密意説至非眼等識有如是義密意説者恐彼分別起執故密其意許而不顯説今論主指出皆是此中第八識體大衆部是小乘經中部名阿笈摩是大衆部中經名謂此經中密意説此第八識為根本識以是眼等所依止故樹根喻第八莖等喻眼等以彼執無第八論主破云非眼等識有根本義上座部經分別論者至唯此恆遍為三有因經是上座部中經分別論者是解經之論謂此經論俱密意説名有分識即此第八有恆遍義為三有因化地部説此名窮生死蘊至唯此識名窮生死蘊引化地部中密意説為蘊法之語證有第八攝論釋云於彼部中有三種蘊一者一念頃蘊謂一剎那有生滅法二者一期生蘊謂生乃至死恆隨轉法三者窮生死蘊謂乃至得金剛喻定恆隨轉法離第八下論主釋義謂彼説蘊法必是第八離第八外餘別蘊法皆間斷故謂無色界諸色間斷者釋色蘊不窮生死無想天等餘心等滅者釋受想識三蘊不窮生死不相應行下釋行蘊不窮生死唯此第八能窮生死故顯第八是彼部説窮生死蘊説一切有部增一經中至令我自在受快樂故説一切下引彼經中密意説為愛樂欣喜阿賴耶名謂阿賴耶下論主釋義攝論釋云阿賴耶者此句總説貪著阿賴耶識樂阿賴耶者樂現在阿賴耶識欣阿賴耶者欣過去世已生阿賴耶識喜阿賴耶者喜未來世當生阿賴耶識此性於彼極希願故由樂欣喜是故總名愛阿賴耶有情下謂諸衆生念念執此第八為我故唯第八是真愛處謂生一向下釋成不愛餘取蘊義餘取蘊者一切身也連持色心不斷為命五蘊和合名衆同分總此五蘊名苦身心謂一向受苦者於餘取蘊恆生厭逆念我何時當捨此命得自在樂故知餘蘊皆非真愛著處唯此第八是真愛處五欲亦非真愛著處至定唯顯此阿賴耶識五欲非真愛者謂離欲者即不愛故雖不愛欲而愛我故樂受非真愛者第三禪天是離喜妙樂地離三禪者不愛樂故雖厭妙樂而愛我故身見非真愛者有身見者念念執身有學聖人既信無我不愛身見雖於身見不貪猶貪我故轉識非真愛者有學聖者念念滅心不愛轉識雖求滅心而愛我故色身非真愛者四空天人既離色染不愛彼故雖厭色染而恆執我及識無邊等故知第八是真愛處不相應行非真愛者彼無自體愛不生故總前我愛唯是異生及有學者於前所簡餘蘊法中雖有愛及非愛而於第八我愛定生故名真愛著處由是下結顯小乘經中説彼四種阿賴耶名定唯此中大乘所説阿賴耶識三小乘四部竟通上一引聖教竟下二引正理分二一結前標科已引聖教當顯正理謂前已引大小乘教證有第八識體今當顯示正理以明第八決定有體一結前標科竟下二正釋引理分十一引持種心分二一引經比量謂契經説雜染清淨至非但違經亦違正理雖謂顯理亦引經中佛所説義以理比量故引經説集起名心之義若無下論主推經顯理謂經言集起者集有漏無漏種子起染淨現行故名為心若無第八彼經所説持種之心不應有故謂諸下簡別轉識間斷不當契經所説心義根境作意者生轉識之緣也善等類別易脫起者謂諸轉識從衆緣生於善等三性轉變不常故名間斷如電光等不堅住者喻無常也非可熏習等釋成轉識非經所説持種心義此識一類下結顯第八方契彼經所説心義若不下結前違經起後違理謂諸所起染淨品法至故持種心理應別有以正理破熏時無種也謂諸轉識雖是能熏若無第八熏不成種所起能熏則唐喪其功矣染淨下復破生時無因也謂既無因種轉識生時是無因生應同外道自然生義上破轉識下破色及不相應行非持種義色法非心不相應行但從心顯又非心性如聲一剎那如光無實體豈得受熏能持種耶又彼下重破前義色是識所變不相應行是識所顯彼二離識無實自性既無實性非種所依轉識相應諸心所者簡別心所非持種義謂諸心所如識間斷既名心所無自在義又非心體豈有受熏能持種義故持種心理應別有者結顯離轉識等別有第八名持種心一引經比量竟下二牒執辨破分四一同類受熏有説六識無始時來至何要執有第八識性謂有餘乘説前五是能熏第六是所熏前五現行事雖轉變與第六識自類無別故第六識是所熏性又能持種反破大乘執有第八彼言無義所以者何至別類必同別事性故論主先以假實難破非理也若執類實則同數論事雖轉變而體是一若執是假何理能持真實種子又執下問三性中屬於何性若屬善惡善惡強盛必不受熏又善惡性是有記法定有念故念如擇滅如何受熏若屬無記善惡心時無記心斷類亦應斷如何受熏非事下恐彼轉計故先抑之若事善惡類可無記應是別類若是別類必同別事何成所熏能熏所熏類必同故又無心位此類定無至故彼亦無能持種義復以間斷同類難破無心位中無六轉識是有間斷無堅住義受熏持種事類不成若許六識同類受熏羅漢異生識類既同應互相熏羅漢同異生應雜染法熏成羅漢異生同羅漢應無漏法熏成異生許互相熏便有過失又若六識同類受熏應眼等根類同餘法亦互相熏眼等同餘法應於餘法熏生眼等餘法同眼等應於眼等熏生餘法然汝不許故不應執識類受熏攝論釋云謂眼等根清淨色性皆根種類之所隨逐意根亦應成造色性根義等故今言所餘法者即彼攝論意根義故又六識下重破互熏義前六俱生滅何法為所熏以所熏識無生滅故前後二念者謂六轉識或有前滅後生必不同時是生滅念隔豈互相熏以能所熏必俱時故攝論釋云若言前念熏於後念成熏習者此義不然以其二念不俱有故若執俱轉成能所熏前以理破六種轉識俱有間斷無堅住義亦非受熏何得持種一同類受熏竟下二前為後種有執色心自類無間至非所熏習前已説故謂有執前已滅色法為後生起色法之種中無間隔以遮前章隔念之難色法既爾心法亦然是則前因後果義立反破先引契經中説染淨種子集起名心為證不成彼執下論主破既執自類無能所熏熏習既無從何有種故不可執前為後種既執無間前為後種則間斷者應不更生二乘無學最後色心是有漏攝必定永斷故不可説死位有漏色心為後無漏色心之種亦不應下謂色心等非所熏習前既已破不應轉計二前為後種竟下三三世因果有説三世諸法皆有至一切因果皆不得成謂執過去諸法能感為因現在諸法所赴為果現在能感為因未來所赴為果三世因果自然感赴何勞別執第八持種然經下執者釋前論主引契經中義彼説下論主破過去已滅法非常住何執為因未來未生法非現在何執為果故以空華喻非實有又去來世既無實體亦無實用何成因緣因是種子必實體故緣是現行必實用故若無下結顯因果必從種生種子必從持種識有若無第八種與因果俱不得成三三世因果竟下四遣相空理有執大乘遣相空理至彼心即是此第八識大乘經意隨事遮遣衆生執有佛説為空以遣有執愚者不解以為究竟依似比量撥無一切彼特下論主破謂撥無此識違害前來所引大小乘經説有此識又撥起智斷惑修因證果染淨俱無成大邪見世尊説為不可治者外道下謂空見全撥無毀謗但非實優劣顯然一切法者生死涅槃菩提資糧是一切類若總非有菩薩不應精勤修習誰有下引喻石女不育兒必定無豈有智者用必定無之軍旅以除幻敵智者喻菩薩幻敵喻生死軍旅喻菩提資糧既曰不應又曰誰有則知一切因果等法非是全無必依第八持種心現安得無第八為持種之心故應下結勸應信四遣相空理竟通上一引持種心竟下二引異熟心又契經説有異熟心至復依何法恆立有情引經推義證有第八識體謂眼等下簡別眼等轉識不當異熟心義如電光等喻轉識無常斷已更續顯是轉識有起滅義彼命根等無斯事故者簡不相應行無有善惡業感事故眼等下謂眼等識雖滿業感但名異熟生以真異熟心恆相續故眼等如聲非恆相續定應下結顯真異熟心體是恆遍能變身器為有情依以諸有情內依根身外依器界不相應下牒前所簡諸法無實又非恆有若無第八誰變身器若無身器復依何法安立有情又在定中或不在定至彼心即是此第八識此舉身受驗有異熟心也勞損是苦受怡適是樂受顯無苦樂并在定中及無思慮是捨受不在定時及有思慮是苦樂受若不恆有真異熟心彼上諸位身受誰有轉識間斷有時無故恐彼難云佛無異熟何起善心釋云非佛起餘善心等位必應現起真異熟心如許現起異熟心時決非是佛是有情故由是下結顯恆有真異熟心故彼經説有異熟心善惡業感者即是此中第八識故二引異熟心竟下三界趣生體又契經説有情流轉至實恆遍無雜是正實趣生引經推義證有第八流轉趣生謂要下釋成趣生要具四義一實有二恆三遍四無雜第八具上四義可立正實趣生先破雜亂云若非四義異熟法者趣生雜亂何則住此趣中復起餘趣趣生法故顯異熟識住此必不離身故諸異熟下次簡色法不遍義異熟色者五根色也業所感者五塵色也無色界中無此色故故云不遍諸生得下次簡善業無恆義生得善者即俱生善業意識業感者是分別善業遍趣生者業通三界故無雜亂者善必善報故不恆有者業有盡故次簡不相應行體非實有無趣生義唯異熟下總顯第八王所具四義故是正趣生此心若無生無色界至故知別有此第八識善等位者善與無記有漏位也無色界中唯有種子是趣生義若無異熟持彼種子故説無色應非趣生設許下謂無色界中有漏且置無漏心時無異熟識應證菩提既證菩提應非趣生若無色界總非趣生便違正理理應有界必趣生故前過即雜亂不遍不恆無實四種之過此失即無色無趣生之失許有異熟識體具上四義方無前後兩重過失由是下引證無漏心時無異熟法必證菩提非趣生故出三界者應非趣生苦集諦是世間因果因果不忘名戲論種唯佛永斷意顯在三界者必趣生故正實下結顯所辨異熟心等即此第八應知別有此第八識三界趣生體竟下四有色根身又契經説有色根身至唯異熟心故作是説引經推義證第八識是能執受謂五色根下釋成經中有執受義五色根者勝義根也彼依處者浮塵根也過去已滅未來未生故無執受唯現在世定有執受彼定下謂彼色根定有執受是異熟心此異熟心是先善惡二業所引故善惡趣有色根身唯彼執受眼等下簡別轉識無執受義此言下論主自釋上義此中但總標後文方釋恐彼難云佛無異熟諸佛色身應非執受答云非顯能執受唯異熟心無垢白淨識亦能執受諸佛色身故然有漏身唯異熟心是能執受故契經中作如是説有色根身是有執受謂諸轉識現緣起故至彼心即是此第八識釋上此言意顯下一節謂諸轉識現在衆緣引起不同異熟先業所引如聲風等喻無常義彼善染等非業引者謂彼轉識自性善染非他業引如非擇滅者自性清淨非斷他惑顯性淨故轉識亦爾自性善染非他善染引善染故轉識唯依異熟體生是善惡性非如異熟唯無記性非遍依者轉識不遍無心位故不相續者有間斷故如電光等喻無常故依上諸義不能執受有漏色身諸心識言下簡別心所非能執受意謂心王既無執受心所隨之凡言唯識攝一切法故云如唯識言義攝心所非諸下簡別色根不相應行無執受義若以色根自能執受應無所執有色根身無所執受應無所緣不相應行色心所顯原無實體如虗空等故應下結顯彼經説執受心即此第八四有色根身竟下五壽暖識三又契經説壽暖識三至唯識不然豈符正理引經推義證第八識能持壽暖壽是識種暖是相分識是現行謂諸下簡別轉識無力能持壽暖唯異熟下顯第八能持壽暖如壽暖者同無記性一類相續經説下破外執無第八識體唯以第六執持壽暖然第六識是有間斷不同壽暖一類相續故云唯識不然豈符正理雖説三法更互依持至彼識即是此第八識餘乘難三法之中既許暖法不遍三界何故不許第六意識亦有間轉獨許暖法有間轉耶以無色界既無色質暖相亦無故云不遍論主總答此於前理非為過難者以意許為理不拘言陳過難謂若下牒前所引經中義謂壽暖識三法無間及無轉變可恆相持若轉變者無恆持用經義如此是正理也前以下釋答詞中非為過難義論主舉處有二意一言陳二意許言陳雖説三法相持意許唯在一識上説謂説識言非詮轉識今舉暖法不遍豈壞意許前理前理不壞是極成矣又三下破餘乘執第六識能持壽暖謂壽乃連持色心不斷功能是第八識種子暖是第八識之相分二種俱屬有漏若許第六有漏能持生無色界起無漏心亦是第六能持之心既成無漏又將何識持有漏壽以第八因中恆屬有漏故故能持壽暖由此下結顯第八能持壽暖五壽暖識三竟下六生死時心分二一總明生死又契經説諸有情類至名生死心不違正理引經推義證第八識名散有心謂受生時及命終時諸心分離唯此心在名散有心非無心定者以無心定入定無心出定有心今生死時心生有身中必不無死無身中必不有故非無心定又宗鏡云生死之事必住散動之心經謂散亂寂靜二途皆依本識而有謂生死下簡六轉識非生死時心極悶絶者生死時也如睡無夢喻生死時此時轉識必不現起又此位下釋上生死位中轉識不起轉識行相極粗猛故有必可知真異熟下正顯第八行相所緣俱不可了於生死時雖有此心如無心故言一期者一報始終時也此識始終無轉變故一總明生死竟下二別生死有説五識此位定無至極成意識不如是故餘乘轉計謂生位中無第六識者由無前五識故以他教説前五轉識是意識因生位既無前五為因雖有意識不起行相故不可知意顯必無第八識體若爾下論主難破若謂意識必前五識為因方生生無色者後時意識應永不生何則他教中説彼無色界五識必無引定散心無由起故若彼定心必由意引應知意識非五為因若謂下縱彼轉計引定散心由久慣熟習故將出定時率爾現前論主難云彼初生無色時寧不現起謂無色界初受生時雖有意根而不明了無意識故若由串習彼界出定意識現起又欲色界初受生時串習意識亦應現起既初生時現起意識行相所緣俱有所知何名散心俱不可了若由下復縱轉計生時雖有意識由昧故初未現前破云此昧相即前第八本因何勞別説有意識在有餘小乘部中執生死等位是微細意識論主釋云應知微細即此第八若謂行相所緣俱不可了極成意識不如是故又將死時由善惡業至故知定有此第八識引經論證死時冷觸起事有第八識方得成就雜寶藏經頌云頂聖眼生天人心餓鬼腹傍生膝蓋離地獄腳板出此驗六趣差別也瑜伽及攝論中頌云善業從下冷惡業從上冷二皆至於心一處同時捨此明善惡兩途也意謂第八不執受冷觸起有暖相處第八識在轉識下簡轉識不起冷觸各別依者謂前五識別依五根非共依故或不行者隨衆緣生有時無故不住身者謂第六識依心根故不依色根無身義故境不定者同五識緣不定一境遍五識身相續轉故具上諸義不應冷觸由六識生唯異熟下結顯第八既恆且遍相續執受故捨執受冷觸便生以識與暖不相離故由不執受冷觸方起即同非情雖是第八所變亦可緣彼為境而不執受非有情故由前義故應知定有第八識體二別明生死竟通上六生死時心竟下七引緣起依又契經説識緣名色至故彼識言顯第八識引經推義證有第八與名色為緣識緣名色者識即第八識名即受想行識四蘊色即色蘊二法者識是一法名色共是一法蘆束者喻彼二法俱時轉義謂彼下論主引彼經中釋詞梵語羯邏藍此云凝滑初胎之相故名色蘊眼等下簡別轉識非名色所依恐彼救云名中識蘊是眼等五識識支是第六識論主抑云亦不可説名中識蘊謂五識身名色外識支謂第六識羯邏藍時無有五識以無五根無能發故應知名中識蘊唯是意識又諸下結顯轉識無恆唯有第八當彼經中所説識義七引緣起依竟
