body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮科文分五一釋論題成唯識論者由論能詮成立唯識故名成唯識論梵語毗若底云識麾怛喇多云唯悉底云成奢薩怛羅云論應翻識唯成論譯為成唯識論者緣方詞倒順能所先後故唐梵次序不同也今順梵文先解識字蓋識名義有殊名有九義有五名有九者一眼識二耳識三鼻識四舌識五身識六意識七末那識八賴耶識九淨識義有五者一自相二所變三相應四分位五實性於九名中各具五義若約同門自相不可分別若約異門共相名義各有差殊總不離識故立識名次釋唯字有三一揀持義謂揀去遍計所執我法持取依他圓成二性二決定義謂決無離心之境定有內識之心三顯勝義謂但彰心王之勝以該心所之劣具此三義故有唯名次合釋唯識者唯謂揀詞遮無外境識謂了別詮有內心以顯境空心有故合名唯識問唯識以何為體答體有二一所觀二能觀所觀體者總取五位一百法為體以通觀有為無為法故用識性相合為唯識體故能觀體者總取心心所為體心所與識常相應故若約唯識觀中即取了境慧為體於所觀境觀察勝故又作釋云唯以遮無為用識以詮有為體攝用歸體唯即識持業釋也又明唯識差別有十種義一者遣虛存實義謂遣除虗妄存留實有遣虗曰唯存實曰識名實唯識二者捨濫留純義謂捨離相濫存留純一捨濫曰唯留純曰識名純唯識三者攝末歸本義謂攝相見分歸自證分體名本唯識四者隱劣顯勝義謂心王體勝心所用劣王所雖俱隱劣顯勝名勝唯識五者遣相證性義謂遣事相用證理性體名性唯識六者境義謂能觀所觀心境一故名境唯識七者教義謂能詮教體説唯識義名教唯識八者理義謂道理唯識名理唯識九者行義謂觀行唯識名行唯識十者果義謂智果唯識名果唯識如上十義皆不離識已釋唯識二字竟今當釋成字成者安立之義樞要云安教立理名之為成問成立唯識有何義利答我佛法中以心為宗因凡夫外道背覺合塵馳流生死菩薩憫之故造此論成立唯識令歸本源解脫生死所以成立有大義利問以何方便得歸本源答有五觀門令自觀心得本源故五觀門者即前十義中遣虗存實為初觀捨濫留純為二觀攝末歸本為三觀隱劣顯勝為四觀遣相證性為五觀也次釋論字賓主較言決擇性相激揚宗極藻義收歸垂範後昆名之為論問論題四字何字能所答論字唯能唯識唯所成字能所雙通問當作何釋答若成目能成成屬論字唯識之成論或能成唯識之論依主釋也或論體上有能成之用以用墮體成即是論持業釋也若成目所成成屬唯識唯識即成或所成即唯識亦持業釋也問論既唯能唯識唯所則論有本論末論何論為能答本末皆能若本論為能成佛經唯識為所成若末論為能成本論唯識為所成也問此論以何為宗答以識為宗謂識定有而非空境決無而非有故以識為宗以何為體答能詮所詮文義為體問論有宗論釋論此論是何答此宗論也以正憑諸經橫該大藏明唯識理故為宗論不單解釋別一部經故非釋論問教有三藏一素怛囕經藏二毗奈耶律藏三阿毗達麼論藏此於何攝答此當第三對法藏攝問教説一乘或説三乘謂菩薩聲聞緣覺或説五乘加人與天此屬何乘答正是一乘三中菩薩乘五中第一故一釋論題竟下二釋造頌人天親菩薩造頌按婆藪槃豆傳云北天竺富婁沙富羅此云丈夫國彼土有國師婆羅門姓嬌尸迦有三子同名婆藪槃豆此云天親原為帝釋遣弟生閻浮提名毗搜紐天王降阿修羅故有此苗裔故名天親雖同一名復立別名顯之第三子於薩婆多部出家得阿羅漢果別名比鄰持跋婆此云母兒長子是菩薩根性亦於薩婆多部出家於後修定即得離欲思惟空義不能得入欲自殺身賓頭盧阿羅漢在東毗提訶觀見此事從彼方來為説小乘空觀如教觀之即便得入意猶未安因此乘神通往兜率陀天問彌勒菩薩為説大乘空觀還閻浮提如説思惟即便得悟於思惟時地六種動既得大乘空觀因此別名阿僧伽譯為無著爾後數上兜率陀天咨問彌勒大乘經義隨有所得還閻浮提為餘人説聞者多不生信無著法師即自發願我今欲令衆生信解大乘惟願大師下閻浮提解説大乘令諸衆生皆得信解彌勒即如其願於夜時下閻浮提放大光明廣集有緣衆於説法堂誦出十七地經隨所誦出無著法師隨解其義經四月夜解十七地經方竟雖同一堂聽法唯無著法師得近彌勒菩薩餘人但得遙聞因此衆人皆信大乘第二子婆藪槃豆亦於薩婆多部出家博學多聞遍通墳籍神才俊朗無可為儔戒行清高難以相匹兄弟皆兼別名菩薩但名婆藪槃豆後住阿踰闍國遍通十八部義妙解小乘執以為是不復信有大乘宗教無著菩薩見弟聰明過人識解深廣該通內外恐彼造論破壞大乘示疾遣使召弟天親菩薩隨使還國與兄相見咨問疾因兄曰我今心病由汝而生聞汝不信大乘恆生毀謗必墮淪溺故我愁苦命將不全天親菩薩聞已且疑且懼即殷勤請兄方便開示菩薩頴達殊有深識即便解悟大乘宗旨於是就兄廣學大乘悉得通達憶昔毀謗深自克責詣兄陳過欲自截舌以謝其罪兄止之曰汝昔用舌善巧毀謗大乘欲滅此罪還用此舌善巧讚嘆大乘耳因此廣造諸大乘論及唯識三十論即此三十頌也二釋造頌人竟下三釋造論人護法等菩薩造論梵語達磨波羅唐言護法本達羅毗茶國大臣之子少而爽慧弱冠之後王愛其才欲妻以公主菩薩久修離欲無心愛染將成之夕特起憂煩乃於佛像前請祈加護願脫茲難志誠所感有大神王携負而出送離此城數百里置一山寺佛堂中僧徒來見疑之為盜菩薩自陳其由聞者驚嗟無不高尚其志因即出家爾後專精正法遂能究通諸部間於著述獨超衆表等者等於親勝火辨德慧安慧難陀淨月勝友陳那智月九大論師也唯識開蒙云佛圓寂後九百年中天親造頌親勝火辨同時造釋千一百年後餘八論師相次造釋各成十卷故卷有百奘師翻譯糅成十卷掌中樞要云天親作後復有護法等菩薩賞玩頌文各為義釋雖分峰昆岫竦幹瓊枝而獨擅光輝頴標芬馥者其唯護法一人乎菩薩果成先劫位克今賢撫物潛資隨機利見春秋二十有九知息化之有期厭無常以禪習誓不離於菩提樹以終三載禪禮之暇注裁斯釋文邁旨遠智贍名高執破畢於一言紛解窮於半頌文殊水火則會符膠漆義等江湖乃疏成清濁平郊弭弭聳層峰而接漢堆阜峨峨夷穹以坦蕩俯鑽邃而無底仰尋高而靡際疏文淺義派演不窮浩句宏宗陶甄有極功逾千聖道合百王時有玄鑒居士識鳳鵷之斂羽委麟龍之潛迹每罄所資恆為供養深誠固志物竭積年菩薩誘接多端答遺茲釋而誡之曰我滅之後凡有來觀即取金一兩脫逢神頴當可傳通終期既漸奄絶玄遵菩薩名振此州論釋聲超彼土有靈之類誰不懷歡朝聞夕殞豈吝金璧若市趨賢如丘疊貨五天鶴望未輒流行三釋造論人竟下四釋翻譯人唐三藏法師奉詔譯唐者李氏有天下之號以其奮迹晉陽為陶唐氏故都故國號唐焉三藏者經律論也譯梵為唐令人通曉故名法師慈恩傳云法師姓陳陳留人也漢太丘長仲弓之後曾祖欽後魏上黨太守祖康以學優登仕齊任國子博士父慧英傑有雅操早通經術有四男法師即第四子也幼而圭璋特達聰悟不群年八歲父令生凡側口授孝經至曾子避席忽整襟而起問其故對曰曾子聞師命避席某今奉慈訓豈宜安坐父甚悅知其必成第二兄先出家住東都淨土寺察法師堪傳教法將詣道場誦習經業俄而有勑於洛陽度二七僧時業優者數百法師以經少不預取限立於門側使人大理卿鄭善果見而奇之問曰子為誰家答以氏族又問曰求度耶答曰然但以習近業微不蒙比預又問出家意何所為答曰意欲遠紹如來近光遺法果深嘉其志及賢其器貌故特取之為官僚曰誦業易成風骨難得若度此子必為釋門偉器但恐果與諸公不見其翔翥雲霄灑演甘露耳既得出家與兄同止時有景嚴二法師執卷伏膺遂忘寢食一聞將盡再覽無遺年十三歲乃令升座覆述抑揚剖暢傋盡師宗美聞芳聲從茲發矣復從兄投長安遊西蜀學滿七年究通諸部年二十歲就於成都受具學律復返長安既遍謁諸師傋䬸其説詳考其義各擅宗途驗之聖典亦隱顯有異莫知適從年二十六乃誓從西方以問所惑結侶陳表有詔不許諸人咸退唯法師不屈孑身獨邁遍歷艱辛至於席氷而寢懸釜而炊具載傳中文不繁録樞要云大師睿發天資識假循謁無神迹而不瞻禮何聖教而不披諷閲斯妙理殷俯諦求玄鑑居士記先聖之遺言必今賢之是囑乃奉茲草本并五蘊論釋大師賞玩猶覩聖容每置掌中不殊真説年四十三歲還朝翻譯此論梵本百卷文義浩繁基法師殷勤請曰群聖制作各馳譽於五天雖文具傳於貝葉而義不傋於一本情見各異稟者無依況時漸人澆命促慧舛討支離而頗究攬殊指而難悟請錯綜群言以為一本楷定真謬權衡盛則久而遂許故得此論行焉四釋翻譯人竟下五正釋論文論文十卷有三十二頌依頌分科約為三分前後各一頌乃護法等菩薩所造故以前一頌名宗前敬敘分即同常經序分也後一頌名釋結施願分即流通分也中三十頌乃天親菩薩所造故名依教廣成分即正宗分也初宗前敬敘分分二一陳頌詞稽首唯識性滿分清淨者我今釋彼説利樂諸有情稽首皈敬義利樂悲益義此乃護法菩薩將造論時先申敬益之誠而後解説也上二句敬仰三尊以唯識之法僧佛本同而證有分滿所以佛為滿淨僧為分淨下二句悲益有情以一心之旨聖凡各別而業有迷悟所以迷為忍苦悟為利樂故瑜伽釋云有二因緣故説此論一為如來無上教法久住世故二為平等利益安樂諸有情故一陳頌詞竟下二釋頌意分二一總釋今造此論為於二空至所知障故得大菩提迷者昧於二空謬者執於我法不知我法本無是迷二空妄執我法實有是成二障故今造論必使有情通達斯義生正解故二空我法後文自釋上使生解意在斷障故云生解為斷二重障故由我法下釋上生解斷二障義執我即生煩惱障執法即生所知障得二空智名證二空智起惑除故名隨斷上使斷障意在證果故云斷障為得二勝果故由斷下釋上斷障證二果義真解脫果即入圓寂大菩提果即圓滿覺煩惱能續生死斷彼得真解脫名入涅槃所知能礙正解斷彼得圓滿覺名證菩提已上總釋頌意一科發明利樂有情之梗槩一總釋竟下二別釋分三一舉凡外又為開示謬執我法至於唯識理如實知故開我法本空勿使謬執示唯識實有令達二空一舉凡外竟下二舉四師復有迷謬唯識理者至或執離心無別心所復有迷謬唯識理者標舉四師執義迷於唯識圓滿之理謬起一隅別執之見故舉四種皆於唯識理中起執或執外境如識非無者有宗依十二處教執境如心俱有或執內識如境非有者如清辨等依密意空教撥識如境亦無或執諸識用別體同者有大乘一類菩薩言八識之用雖別而體唯一或執離心無別心所者經部覺天師等所計以經言士夫六界染淨由心無別心所士夫謂作者心能造物名作者六界謂地水火風空識各別曰界二舉四師竟下三結前意為遮此等種種異執至得如實解故作斯論種種異執即上凡夫外道及餘乘等以彼不悟唯識深妙之理故於深妙理中別執一隅認為宗極然而識體不住有無亦非不住原非非有亦不非無無同無異非一非多豈以俱有俱無同異一多而能詮之者哉智詮不及徒自執為今造此論令悟唯識得如實解一宗前敬敘分竟下二依教廣成分分三前二十四頌名辨相唯識分第二十五一頌名顯性唯識分後五頌名行位唯識分初又分二初一頌半名略辨唯識分次二十二頌半名廣辨唯識分略辨分三一牒義標問若唯有識云何世間及諸聖教説有我法論主假設問詞發起教意謂若唯有識一切法皆無云何世人及聖教中共説有我及有法耶一牒義標問竟下二舉頌總答頌曰由假説我法至謂異熟思量及了別境識答上問意以明我法假説非實有體前二句總答彼以我法實有為問菩薩答以由假説三字破之雖是假説亦有相狀轉變故云有種種相轉中二句釋上我法為所變顯識為能變後二句釋能變三名第八名異熟以果體能受新熏故第七名思量以性相俱為能執故前六名了境以緣境能成業有故體既受熏性能執我業種生現所以三種俱名能變也二舉頌總答竟下三解釋頌意分二一釋前三句頌分二一釋頌意略辨我法論曰世間聖教説有我法至轉謂隨緣施設有異宗鏡云主有自在力宰有割斷力義同我故主是我體宰是我用或是我所軌謂軌範可生物解持謂任持不捨自性此言我者是主宰義證取一身為我我所隨之故有我必有我所如眼緣色時必執能緣為我所緣之色為我所是執實有我我所義法者是軌持義堪任事理為法法則兼之故有法必有法則亦如緣色執能緣實是眼所緣實是色各不捨自性是執別實有諸法義今云假立則知世間及諸聖教所説我法唯是名言假施設耳已上釋第一句頌竟彼二俱有種種相轉者釋成我法各有種種相狀轉變主宰之義凡聖皆具凡有知者曰情命通指六凡故謂有情異生摩納縛迦養育者數取趣者命者生者知者見者作者受者神我等皆是隨情妄所執義初破惑者名預流等該四聖故謂三賢十聖三乘五果等皆是聖教所説假施設義軌持之義內外皆通實德業者是勝論所計六句蘊處界者是餘乘所執三科亦各等餘計執故有種種轉謂隨緣施設者施設即假立義隨主宰緣假立為我隨軌持緣假立為法上釋第二句頌竟如是諸相若由假説至緣此執為實有外境問答以釋第三句頌問我法相從何處有而言假説答云謂彼諸相依識轉變假立諸名非是離心別有實體識謂了別者釋頌中識字謂顯了分明辨別境相故名為識此中識言亦攝心所者以心王心所定相應故然此中識即八種識亦攝五十一心所故下頌云此能變唯三變謂下釋頌中變字謂諸識自證體上各各轉似相見二分如外境現故名為變依斯下釋假立也彼二即我法此字作相見謂依相見二分上假立遍計我法之名即是分別假故云彼二離此無所依也或復下釋從緣生也又釋我法由熏習力從識體生名依他起性即是因緣假諸識下釋上分別熏習力也謂諸識生展轉分別熏習為緣而有我法似外境現緣此執為實我實法者此字指上遍計假名依他假相愚者妄執謂實有體患病也以患病時顛倒境故患與夢喻諸有情未悟二空皆是無明所蒙名長夜生死如患夢者於患夢境皆執實有若患除夢覺方知是假愚夫所計實我實法至所依事故亦勝義有愚夫下結上妄執決定非有但以假名內識下結上識變是如幻有故亦名假所言似者如外現也既名外現不同彼執實我法性外境隨情而施設者顯境空故故云非有如識謂此外境非有自性如識是有內識必依因緣生者明心有故故云非無如境謂此內識非無體用如境是空彼執境有為增又執心空為減今立境空心有二執俱遮境依下結顯二種有也世俗即假也事即體也境依識現其體本空唯是假有識為所依雖現諸法亦勝義有所言亦者義兼二有隨緣施設名世俗有寂然不動名勝義有一釋頌意略辨我法竟下二舉問答廣辨我法分二一總問總答云何應知實無外境至實我實法不可得故問答以明我法無別實體可得由彼雙執我法實有答以不可得三字破之一總問總答竟下二別問別答分四一別問我執分五一舉外道三種如何實我不可得耶至潛轉身中作事業故別問實我何不可得答中總標外道三種別陳執義一者執我之體常而遍故量同虗空以同空故隨處造業受苦樂等即勝論數論二宗所計二者執我體常隨身轉變身大則我體舒身小則我體卷故云不定即無慚外道及尼犍子二宗所計三者執我之體常而細故故以極微為喻潛轉身中顯常體也作諸事業顯常用也即獸主遍出二宗所計宗鏡云大約邪見有三一佛法外外道二附佛法外道三學佛法成外道今此三種是佛法外外道佛法外者佛未出時已有三四共成七種佛既出已即有六大論師共前成十三種今之三種即六大論師也初且非理所以者何至所修證法一切我合故此破第一種執義執我常遍量同虗空者牒彼執意應不隨身受苦樂者論主破詞謂同空體廣大無涯變易苦樂無由所加豈隨小身受諸苦樂又常遍故應無助轉者謂常且遍充塞彌滿不能轉動既無動義何得隨處能造諸業又所下復立二岐詰難隨執一義皆非正理若一我體同一切我體既不異業用亦同故一作業乃至解脫應一切我一齊解脫便成他作我受之過若一我與一切我異異則不同應各各遍各各周遍體應相雜雜則是同是故如前應名一切所作所受若謂下縱彼轉計謂彼作彼受此作此受作業受果於諸我中不相紊亂無他作我受之過又破云理亦不然業果及身與諸我合屬此非彼不應理故謂所作受之業果及能作受之身於相雜諸我中唯於此我合不合餘我者不應理故何則如一室千燈光光相雜所照之物唯屬此光不屬彼光理豈然乎一解脫時一切應解脫者謂我相雜彼此難分業果及身必與我合應合諸我既合諸我一我解脫時餘一切我應得解脫何則所修證法與上相雜諸我合故中亦非理所以者何至故彼所言如童豎戲此破第二種執義我體常住者牒彼執意不應隨身而有卷舒者論主破詞槖籥謂韝也以皮作囊為吹火之器體既常住何有卷舒既有卷舒如槖籥風卷則入於中舒則出於外有出有入何名常住此以卷舒破常也又我下謂隨身即身可分非一執我體一竟不可得此以隨身破一也復結彼言祇為兒戲不應正理後亦非理所以者何至諸有往來非常一故此破第三種執義我量至小如一極微者牒彼執意破云既許小至極微何理能令大身遍動若謂下牒轉計旋火輪者喻速巡身似遍動者謂微小之我似身遍動即知雖小而速巡身則所執我非一非常者論主破既執我常應無動轉何如火輪若執我一應守一體何速巡身故速巡身如火輪者違汝自宗是常一義諸有往來非常一者釋上非常非一義若法有往不守一體若法有來非是常存故計往來違自常一一舉外道三種竟下二舉餘乘三種又所執我復有三種至故彼所執實我不成別舉餘乘所執三義一即蘊者蘊是聚義聚為身故亦是覆義覆真如故即色受想行識五法合聚為身彼所執義即身為我離身之外無我義故二離蘊者彼執我體離蘊別有以別有故方知是實三與五蘊非即非離者彼執我體即蘊非即離蘊非離則知蘊有生滅我體常一初即蘊我理且不然者牒第一計總破我應如蘊非常一者常與一是餘乘自宗若執即蘊蘊即色心蘊稱聚義違自常宗色心合成又非一義又內下以本質色例破相分色蘊也色蘊既爾心蘊亦然不續非常緣生非實色是心影心正名行色心之外皆名為餘餘行即得等二十四法名不相應行餘色即光影等色行非質礙故如虗空色非能緣故非覺性中離蘊我理亦不然者牒第二計總破應如虗空無作受者作謂作業受謂受果我既離蘊非色非心非色無質非心無知正如太虗頑無所識必執為我亦何所為後俱非我理亦不然者牒第三計總破許依蘊立非即離蘊者謂非即蘊又非離蘊彼所執義依蘊立我故云非離我非是蘊故曰非即正如作瓶泥團成瓶非離泥團瓶非泥團非即泥團故知泥可言實瓶決定假則汝蘊可言實我決定無又既不可説有為無為者有為是即蘊無為是離蘊不可説者非也謂既於蘊非即非離何又執我有是非是故彼下結成非理二舉餘乘三種竟下三論主總辨有三章及二比量又諸所執實有我體至故所執我理俱不成又諸下詰執我體思慮有無若有思慮應是無常者謂思慮有無方於起滅既有起滅寧非無常故又釋云非一切時有思慮故若無思慮應如虗空者謂造作根於思慮起滅本乎有為若無思慮應是無為故同虗空無有起滅不能作業亦不受果故所執我理俱不成者結上有思無思俱不應理一章竟又諸所執實有我體至故所執我二俱不成又諸下詰執我體作用有無若有作用如手足者謂所執我若有作用如手能執如足能奔性是所作我定無常何執我體有實常義若無作用如兔角者用依體起體必有形兔角唯名喻無作用作用無故實我不成故所執我二俱不成者結上有用無用俱不應理二章竟又諸所執實有我體至正見翻令沉淪生死不者不定義詰諸我見於我體上緣與不緣若非下牒計難破取境清明方知實有既非我見親取所緣云何知實若是下牒計述成由我起見見從虗妄生因見執我我從遍計有故佛説法一切無我於無我中妄生我見是謂顛倒不如實知今者既執我體是實又為我見所緣則應我見性非顛倒成如實知若爾下牒非顛倒之意難破謂汝小乘既許我見能緣實我是則我見性非顛倒成如實知云何汝等所信至教皆毀我見稱讚無我而不相違言無我見下釋成聖教稱讚無我及毀我見義豈有下難以反常也若許我見性非顛倒應證涅槃邪見既證涅槃正見宜沉生死豈有翻令者責以反常之義難破三章竟下立二比量總破又諸我見不緣實我至隨自妄情種種計度先破能緣我見虗妄則不得以實我為所緣故以我見為前陳有法不緣實我為宗有所緣故為因如緣餘心為喻意顯能緣我見虗妄所緣之我亦虗妄故何以故虗妄我見有所緣故能緣所緣相待假故豈曰實然如緣餘心者謂除實我之外三界心心所法皆以虗妄分別為自性故餘既虗妄則所緣實我亦虗妄矣我見下次破所緣之我不實而由虗妄我見為能緣故以所緣為前陳有法定非實我為宗是所緣故為因如所餘法為喻意顯所緣之我不實由能緣我見自妄故何以故不實之我是所緣故所緣能緣相待假故豈實我耶如所餘法者謂除實我之外餘色心等一切諸法俱從分別緣所生故餘既從緣則所緣之我亦不實矣是故下結成我見不緣實我其所緣者但於依他起上妄生計度豈以妄度之境為實我體三論主總辨竟下四總舉通執分二一標數然諸我執略有二種一者俱生二者分別總舉世間沙門婆羅門等所有我執品數雖多約而言之不出俱生分別二種一標數竟下二正釋分三一俱生我執俱生我執無始時來至勝生空觀方能除滅釋上標中俱生義由無始來不待邪教由內因力不待邪分別恆與身俱即任運而轉具上諸義故名俱生此復二種者總一俱生隨能緣識開為相續間斷二種相續無間義第七八識無始恆轉故名相續起自心相者謂第七緣第八見分時託彼見分為本質第七從自證體上變起影相執為實我此名真帶質境以唯緣心故間斷不恆義以第六識託衆緣生緣闕則斷又第六入無記時不起我執亦名間斷第七雖是無記彼是有覆念念執我故彼相續此名間斷識所變者謂本識中變現色心蘊法第六意識或總緣五蘊為我或別緣一蘊為我此中心相釋義同前或名獨影境以兼緣色故此二下結顯難斷內因力成故名為細從無始來故説難斷於登地後前七地中數修此觀登八地時我執永伏不起現行故名生空言勝生者對分別起俱生為勝我空人空即生空故一俱生我執竟下二分別我執分別我執亦由現在至生空真如即能除滅釋上標中分別義執有內外等從緣生故曰亦由現在外緣即邪教分別然後方起故非身俱唯在第六意識有者簡前第七無分別義此亦二種者總一分別隨所緣境開為二種一者邪教蘊相離心實有不同依他起性唯心所現從因緣生緣彼邪説從自心上變起影相復執為實故云計度二者邪教我相亦離心有即僧佉等神我等類緣邪教説亦從自心變起影相妄執為實此二下結顯易斷對前俱生故名為粗初見道時即能除滅故名易斷以分別惑地前漸伏由加行力頓斷證真一真見道邪見頓除人空智生我執永斷二分別我執竟下三總結內外如是所説一切我執至一切皆緣五取蘊起宗鏡云心外執我執法者有兩種一者如外道執離心等別有一物是常是一名之為我此乃遍計所執其體都無二者踈所緣緣本質之法能緣之心親緣不著亦名心外此即依他起性其體是有又云自心外蘊第七計我心外唯有第六計我心外之蘊或是於無自心內蘊親所緣緣也不問即離計為我者影像必有今詳宗鏡第二義解內外蘊從本質上説為外蘊以能緣之心親緣不著則本質是心外法故名踈所緣緣從影像上説為內蘊以是能緣之心自變自緣則此影像不離能緣之心故名親所緣緣復推此段總是結前外道餘乘所起我執皆緣無常五取蘊起但於所執蘊法有內有外故諸執者於外蘊法或有或無於內蘊法一切皆有言外蘊者即是邪教所説蘊相及彼所説我相即宗鏡云此乃遍計所執其體都無以邪教説離心別有故名心外或有或無者謂彼分別邪教蘊相由論中云唯在第六意識中有第七無故言內蘊者即是緣自第八及緣識變五取蘊相即宗鏡云此即依他起性其體是有以是俱生不離識故故名心內一切皆有者謂此俱生不離識蘊一切有情六七二識皆共有故然諸下釋上諸蘊從緣是依他起故如幻有妄所執下釋上諸我從蘊橫計是遍計性定非實有故契經下引聖言證使知我見必從蘊起三總結內外竟通上四總舉通執竟下五外難內破有三章實我若無云何得有至於汝有失非於我宗實我下外人難憶識誦習者憶謂思量過去識謂了別現在誦習謂想引未來益我為恩損我為怨彼謂益我損我皆不離我遍於三世若無實我恩怨等事云何得有所執下言前後者前即過去是已滅無故名非有後即現在是已生有故名非無論主牒彼常宗實我之義破云所執實我既是常宗應無轉變無轉變故三世皆同同則後應如前即現在恩怨等事如過去已滅非有前應如後即過去恩怨等事如現在已生非無何以故以後與前實常我體無差別故若謂下縱彼轉計用即恩怨等事體即所執實我謂我用變易非我體者以遮前後相同之過又破云理亦不然用不離體用亦應常何名變易體不離用體應變易何得名常然諸下正明憶識等事生因非由實我而後有也謂由本識持熏習種能生三世恩怨現行於現行中種種憎愛憎愛生故煩惱種生由煩惱種復起現行展轉虗妄原無實體何必實我方得恩怨故所下結成前難自招過失非於大乘正教有損上破外難一章竟若無實我誰能造業至造業受果於理無違外人難謂業是所造果是所受若無實我誰能造業誰能受果所執下論主破造業受果是轉變義實我無轉變如空非所作何執我能造業受果變易是非常義若有變易應是無常又違汝宗是常一義然諸下結成正義發業潤業原於無明愛取生果熟果必由行有所招業果從心虗造妄受何必實我作受方成上破外難二章竟我若實無誰於生死至愚者於中妄執為我外人執難謂我輪生死我證涅槃實我若無誰輪誰證所執下論主破謂汝宗執我常無生滅今謂我能生死輪回是害我體無生滅義又我常如空則非苦所惱今謂我能捨苦求樂是害常如空義故彼所言常為自害然有下釋成正義身滅身生名身相續心滅心生名心相續於相續中貪愛心起有漏業生成輪回見厭患心起無漏業生成涅槃想故知生死涅槃俱妄生滅何待實我而後兩成由此故知實我定無然生死涅槃唯從諸識妄生妄滅熏成因果亦幻相續耳由妄所成似我相現愚者於中妄生計度執為實有破外難第三章竟五外難內破竟通上一別問我執竟下二別問法執分二一總問答如何識外實有諸法至所執外法理非有故問答以明法執非有也彼以諸法實有為問答以理非有故破之一總問答竟下二別問答分四一別問外道二別問餘乘三總破前執四總舉通執一別問外道答中分六一數論神我計一分五一數論執詞外道所執云何非有至是實非假現量所得徵明外道所執云何理非有故且數下出彼執意外道者心遊道外不順真理外於佛道故名外道清涼大師云西域外道九十五種束為十一宗唯識開蒙云有十三種大外道所計不同開蒙依於此論現有計詞次第標數故有十三但詞有廣略耳然十一宗不順此論名目次序故總分六科以該開蒙清涼之數今數論者開蒙清涼俱為第一梵語僧伽此翻為數數即慧數數廣諸法根本立名從數起論名為數論論能生數亦名數論其造數論及學數論者皆名數論師本源即是迦毗羅此云黃赤色髭髮面色並黃赤故時世號為黃赤仙人其人從空而生自然四德一法二智三離欲四自在得此智已將二十五諦依大悲説先為阿修和仙人説阿修和傳般尸訶般尸訶傳褐伽褐伽傳優樓佉優樓佉傳跋婆和跋婆和傳自在黑第三般尸訶廣説此智有六十千偈其自在黑見大論難受略抄七十偈此婆羅門初入金耳國以鐵葉葉腹頭戴火盆聲王論鼓求僧論義因諍世界初有後無謗僧不如遂造此七十論申數論宗王意朋彼以金七十斤賜之外道彰己令譽遂以金七十標名言二十五諦者由黃赤仙人精修禪定有神通力知八萬劫中事八萬劫前冥然不知謂之冥諦從冥初自性生智大乃至神我開成二十五諦合為九位一冥初自性謂此外道以八萬劫前之事冥然不知之處昧為自性故稱冥性亦名勝性未生大等但住自分名為自性二智大亦名覺大大者增長之義謂冥初之際覺知增長故云從冥初生智大三我心亦名我執我慢謂由覺知生我慢心故云從智大生我心四五唯亦名五微即色聲香味觸也以色等五種由我執之心方現故云從我心生五唯五五大即地水火風空也此五種性遍一切處故名為大由極微而生故云從五唯生五大六五知根即眼耳鼻舌身五根謂之知者以此五種皆有知覺故因五大而成故云從五大生五知根七五作業根即口與手足小便大便謂之作業者以此五種能作業用故亦因五大而成故云從五大生五作業根八心平等根心乃肉團心即意根也謂之平等者以此根能遍一切根境而生分別故此亦五大所成故云從五大生心平等根并前五知五作業共為十一根也九神我即第八識彼不知有第八識故執神我能生諸法常住不壞是二十五諦中之主也我思勝境冥性即變二十三諦為我受用我既受用為境纏縛不得解脫我若不思冥性不變即得解脫名為涅槃問自性云何能與諸法為生因答三德合故其三德在冥性中眠伏不起在大等二十三位便有覺悟故二十三一一皆以三德合成言三德者薩埵剌闍答摩也梵語薩埵此云有情亦云勇猛今取勇義剌闍此云微牛毛塵等亦名塵坌今取塵義答摩此云暗即暗鈍之暗三德應名勇塵暗若傍義翻舊云染粗黑新云黃赤黑舊名喜憂暗新名貪嗔癡舊名苦樂癡新云苦樂捨敵體而言即是三毒能生三受謂貪嗔癡生樂苦捨黃赤黑者是其色德貪多輕光故色黃嗔多動躁故色赤癡則重覆故色黑由此自性合三德故能生諸法故説大等三事合成執為實有皆現量得一數論執詞竟下二現量所得彼執非理所以者何至如何可説現量得耶論主總破前非徵釋非理大等下破現量所得現量者取境清明也林者衆木所成衆木各分無林可得軍萬二千五百人為軍氏族各分軍無別體多事即三德謂大等既許三事合成如軍若林有名無體何有清明之境而言現量所得二現量所得竟下三是實非假又大等法若是實有至轉變非常為例亦爾本事即三德三德雖無實體既在能變且許是實故云大等是實應如本事若如本事非三合成薩埵等三下謂大等如三德三德即大等既即大等應三合成何名本事轉變非常為例亦爾者牒上兩轉互同之義結破奘大師云自性既常應如我體何能轉變作大等法又所計我其性若常應如自性不應是我若如自性其體非我不應受用二十四諦是則我非能受二十四諦亦非所受能所既無諦義安立三是實非假竟下四三事合成又三本事各多功能至總別一故應非一三又三下能體例破也謂三本事各具多能功能既多體應非一何則功能與體無差別故三體下以齊生難破因前難彼體亦應多復計三體能遍餘法故又破云若謂三體遍二十三法中一法才生時餘二十二法亦應齊生無次第生何以故以能生體無差別故既無次第又違汝執從冥生覺覺生我心等許此下破體相各別因難彼體無別復計各別體相體即能變之體相即所變之相各別者能所各自本有也若相各別何待合成若體各別應不和合故又抑云不應合時成一相已還與未合三體無別若謂下破違自宗前以和合破彼體相各別故又轉計體異相同既以一為宗又言體異相同者違自宗矣體應下破一為宗冥然者總相是三體上假合也顯然者三體各自本有也以一為宗則體與相一體一於相三體應冥然是一相一於體一相應顯然有三有三無一有一無三三一互無故不應言三合成一又三下重成應非一三之義別即是三體總即是一相總別若一應非名一應非名三下文躡此兩句作兩轉破此三變時若不和合至應失本別相體亦應隨失躡上應非名一難破云若應非一此三變時應如未變如何現見是一色等色等即所變大等也躡上應非三難破云若應非三三合成一應失本別既失能成本別所成一相亦應隨體而失相體俱失何名一三不可説三各有二相至體亦應各三以體即相故不可説三各有二相者恐彼轉計貪嗔癡三各有大等貪等二相故先抑言不可説等總即下牒破轉計若一體中有二相者應互相即若總即別總應有三如何見一若別即總別亦應一如何見三若謂下牒彼轉計別相中各具三相以遮三一不齊之難謂貪中有嗔癡瞋中有貪癡癡中有貪嗔三法和雜故各見一又破云一體三相何唯見一三各三相復如何異若彼下牒上三體各具三相難破非理一一即貪等謂一貪法既具三相應一貪法能成色等何所闕少又待嗔癡而後方成體亦應各三以體即相者結上一一應變之義又大等法皆三合成至皆應無異便為大失復以法無差別破彼三事合成謂大等法能變既同其所變相決定無別是則下釋上無差別相言唯量者即五唯量大即五大根即十一根通見相分色心各別理必應然彼執諸法皆三合成理應無別若爾者準上體相無別義體既無別用亦應然故云一根應得一切境以一切境皆三合故或應一境一切根所得以一切根亦三合故世間下結顯三合成一之過四破三事合成竟下五結妄情計度故彼所執實法不成但是妄情計度為有總結數論所計實法不成五結妄情計度竟通上一數論神我計一竟下二勝論六句計異分五一勝論執詞勝論所執實句義等多實有性現量所得清涼大師云梵音吠世史迦薩多羅此云勝論開蒙清涼俱為第二言勝論者以六句義最為勝故或勝人所造論故其造論人成劫之末人壽無量外道出世名嗢露迦此云鵂鶹晝避聲色匿迹山藪夜絶視聽方行乞食時人以為鵂鶹鳥故名鵂鶹仙人即百論優樓佉也或云羯拏㒒羯拏云米臍㒒翻為食先為夜遊驚他稚婦乃不夜乞取場碾粳粃之中米臍而食故時號為米臍仙人多年修道謂證菩提便欣入滅但嗟所悟未有傳人愍世有情癡無慧目乃觀七德授法令傳一生中國二父母具足婆羅門姓三有般涅槃性四身相具足五聰明辨捷六信行柔和七大悲心經無量時無具七德後經多劫波羅痆斯國有婆羅門名摩納嚩迦此云儒童其童有子名槃遮尸棄此云五頂頂髮五旋頭有五角其人七德具足根熟稍遲既染妻奴卒難化導經無量歲伺其根熟後三千歲因入園遊與其妻室競華相忿鵂鶹因此乘通化之五頂不從仙人且返又三千歲化之不得更三千年兩競尤甚相厭既切仰念空仙仙人應時神力化引騰空迎往所住山中與説所悟六句義法一實二德三業四大有五同異六和合實者諸法體實德業所依名之為實德業不依有性等故德者道德業者作用實有九種一地二水三火四風五空六時七方八我九意德有二十四一色二香三味四觸五數六量七別性八合九離十彼性十一此性十二覺十三樂十四苦十五欲十六嗔十七勤勇十八重性十九液性二十潤二十一行二十二法二十三非法二十四聲業有五種一取二捨三屈四申五行大有唯一實德業三同一有故離實德業外別有一法為體由此大有有實等故同異亦一如地望地有同義望於水等有異義地之同異是地非水水等亦然亦離實等有別實體和合句者謂法和聚由和合句如鳥飛空忽至樹枝住而不去由和合句故令有住此六是我所受具未解脫來受用前六若得解脫與六相離稱為涅槃今論中舉彼六種句義彼執六句皆有實體是現量得一勝論執詞竟下二總破六句彼執非理所以者何至應非離此有實自性總破前非徵釋非理言且常者意兼無常先牒彼計常之義以生果不生果二義難破若許是常性非所作既能生果是有作用果從種生定非常有故云如所生果若作比量無常為宗因喻如次兔角不實故不生果常住實有宜有果生若不生果應如兔角何名常住諸無常者下牒彼無常之義即以有礙無礙難破質礙之法理必可分析至極微體非實有軍林之喻不實可知法無質礙理必同心心本無形何離識有二總破六句竟下三兼破三句又彼所執地水火風至許色根取故如地水火風此中牒彼所執無礙兼破實等三句立二比量反覆徵難謂彼既許諸句無礙則實句中地水火風應非有礙以本有礙而執為無名應非有既屬無礙實句義攝身根所觸故如堅濕暖動豈地等之相堅等之性俱能觸身應立量云地水火風為有法應非有礙為宗因云實句義攝身根所觸故同喻如堅濕暖動彼以無礙為宗今以堅等為喻過在有礙不得為無礙也即彼下謂地等既如堅濕等堅等亦應如地等堅等本無礙若如地等即成有礙故云應非無礙既成有礙德句義攝身根所觸故如地水火風復立量云堅等為有法應非無礙為宗因云德句義攝身根所觸故同喻如地水火風其過又在無礙之法不得為有礙也地水火下責上堅等如地等義勝宗十句論云如是九實幾有色幾無色三有色謂地水火六無色謂風空時方我意今言對青色等者謂地水火三形色對青黃等之顯色俱眼所見若執堅等如地等者準此應責以彼堅等非眼見故故知下結上反覆比破應知地等堅等更互無也亦非眼見實地水火風者結上責詞中地水火三對青色等雖許眼見但如幻事亦非實有又彼下復牒有礙於計常者作二比量別破先破常宗云實句有礙德句無礙既執有礙礙如粗地分析非粗常義何有故立量云皆有礙故為因如粗地等為喻應是無常為宗諸句下次破有礙色根所取者乃諸句中光影等色皆眼所見是無礙故若許眼取執為有礙應如地等然而有礙無礙現量可知豈以無礙為有有礙為無耶故立量云色根所取無質礙法為有法應皆有礙為宗許色根所取故為因如地水火風為喻三兼破三句竟下四別破三句又彼所執非實德等至故彼有性唯妄計度牒彼第四大有句義立比量破之大有性者彼計實德業三同一有故離實德業外別有一法為體又彼所執非實德等者即大有性也彼執大有非實非德非業攝故又執離心別有實體故破云應非離識有別自性以非實等三句所攝如石女兒畢竟無體立量云大有性為有法應非離識有別自性為宗因云非實攝故同喻如石女兒此破所有也非有實等者謂非有性所攝實德業也彼執實德業三與大有句其體各別又執離心別有實等三句故破云應非離識有別自性既非有句所攝如空華等定非實有立量云非有實等為有法應非離識有別自性為宗因云非有攝故同喻如空華等此破能有也因執離心別有實體故以心外無法為宗破之由彼又執離實德業別有大有句義故彼所下復以離實德業無有有性為宗破也彼所執有者大有性也應離實等無別自性者破也許非無故者謂彼自許有性非無如實德等者例破也意謂若許有性非無應如實句有相德句有性業句有用然後可執有句實有立量云有性為有法應離實等無別自性為宗因云許非無故同喻如實德等若彼必執離實德業決有有性故復破云若離實等應非有性若汝必許異實等故如畢竟無等等者等餘四種無也謂未生無已滅無更互無不會無立量云有性為有法若離實等應非有性為宗因云許異實等故同喻如畢竟無等如有下即以有性例破實等外別有有性義如有非無者是許有有性然有性之外無別有性唯一有性而已如何實等之外有別有性若離下復以無法例破有性謂汝若許有法之外有別有性應無法外有別無性法既本無內外相絶何無法外又有無法彼既不然此云何爾者成上無法既不其然此有法之外何有有性也故彼下結成大有句義妄計不實又彼所執實德業性至故同異性唯假施設彼執同異離實德業別有實體能令實等諸法和聚為同各別為異又彼所執實德業性者同異性也異實德業理定不然者謂離實等諸法別有同異其理不然勿此亦非實德業性異實等故如德業等者謂不可説此同異性亦同前執非實等之大有性許異實等如德業與實異也又應實等非實等攝者此明理不當異應説實德業三顯同異性則非實等之同異性應攝實等實等亦應攝同異性異實等性故如德業實等者謂若實德業三異實等性之同異如德業與實各別有體然後可説同異性與實等異地等下例明性即堅濕暖動體即地水火風若知堅等外無地等地等外無堅等準此應知實等外無同異同異外無實等如實下即以實等與同異合上地等堅等之義實性等者即實性德性業性也實等性者即同異性也又言實等亦即實德業也初句牒破實德業外無同異性如地等之外無堅等性次句牒實德業外無實德業如堅等之外無別地等體若離下即以同異例破實等外有同異言非實等者即同異性也若離實等有同異性應離同異之外復有同異性彼既不爾此云何然者成上同異外既無同異此實德外同異何然故同異下結成妄計又彼所執和合句義至由前理故亦非實有次牒和合句義難破彼計由和合故諸法方得合聚而和合性體是別有非諸法所攝故論主立比量破之和合句義為前陳有法定非實有為宗因云非有實等諸法攝故同喻如畢竟無謂若非是實等諸法所攝如畢竟無以離諸法無和合義何執和合別有實體彼許下例明實句有體德句有性業句有用謂彼三句容現量得若以理推實句可析德句無礙業句無常皆非實有和合句義既離諸法非現量得不實可知況彼自許和合句義非現量得而可實有設執和合同前實等是現量攝前以理推現量非實此亦應然四別破三句竟下五結破能所然彼實等非緣離識至亦是隨情妄所施設然彼實等者總牒六句義為所緣境非緣離識實有自體現量所得者謂見分所緣實等六句非是現量所得許所知故如龜毛等者謂彼六句唯許妄情分別所知故以龜毛為喻立量云實等六句為有法非緣離識實有自體現量所得為宗因云許所知故同喻如龜毛等又緣實智者牒能緣實句義之智非緣離識實句自體現量智攝者謂所緣實句非現量境則能緣之心亦非現量智攝假合生故如德智等者謂能緣之智與實句義假合而生如緣堅等德智俱從心想所生非現量得立量云能緣智為有法非緣離識實句自體現量智攝為宗因云假合生故同喻如德智等廣説乃至者略其德等中四句之智比量同前詞不繁出緣和合下謂和合智亦非現量亦假合生如實智者亦非現量以緣實智如德智故故勝論下總結諸句妄計不實五破能所竟通上二勝論六句計異竟下三天能生物計常總有八種有執有一大自在天至生一切法皆同此破塗灰外道所計開蒙清涼俱為第三彼計天有四德一體實二遍三常四能生諸法又計天有三身一者法身能生萬物二受用身在色天上三變化身隨形六道教化衆生彼執下論主總破徵釋非理若法能生必非常者能生之法是有作用常非所作何執能生若許能生定非常理諸非下展轉牒破法既非常理無周遍真實之義展轉皆無體既下牒計難破因彼執天體常難以一切時生因彼執天體遍難以一切處生待欲或緣方能生者欲謂樂欲即是心法緣謂衆緣亦兼色法若謂待色心生違一因論彼以一大自在天為因故或欲下復縱轉計緣不須待若謂因緣頓起無有所待則因常有果應常生生滿世間何所容納餘執下總舉七種外道各計常住實有功能生一切法皆同塗灰中義破之一梵天者即圍陀論師此云明論師開蒙清涼俱為第四提婆菩薩破外道小乘涅槃論云彼計從那羅延天臍中生大蓮華華上有梵天祖翁謂梵天為萬物之祖彼梵天作一切有命無命物從梵天口生婆羅門淨行兩臂生剎利王種兩䏶生毗舍商賈兩腳生首陀農種二時者即時散外道開蒙為第五清涼為第六執一切法皆從時生謂彼見草木等物有時生華有時結果時舒時卷時榮時枯時雖細不可見以觀華實等則知有時是故計時是常是一是萬物因是涅槃因三方者即方論師開蒙為第六清涼為第七計方生人人生天地滅後還入於方故方是常是一是萬物因是涅槃因四本際者即安茶論師開蒙為第七清涼為第五本際即過去之初首謂計世間最初唯有大水時有大安茶出生形如雞卵金色後為兩段上為天下為地中生一大梵天能作有命無命物是故天是萬物因五自然者即無因論師開蒙為第八清涼為第十一計一切萬物無因無緣自然生自然滅故此自然是萬物因是涅槃因此計一切無淨染因如棘刺自纖烏色非染鶴色自白六虗空者即口力論師開蒙清涼俱為第九謂虗空為萬物因別有一法是實是常是一是萬物因從空生風從風生火從火生暖暖生水水生凍堅作地地生五穀五穀生命命沒還歸空是故虗空能為萬物因是涅槃因七我者即宿作論師計一切衆生受苦樂報皆從往日本業因緣是故若有持戒精進受身心苦能壞本業本業既盡衆苦盡滅衆苦盡滅即得涅槃是故宿作為一切因開蒙為第十清涼不録今舉我宗等攝餘宗皆執能生諸法之義故總立一科以上七種外道所執皆同大自在天難破三天能生物計常竟下四聲能詮表計常有二種有餘偏執明論聲常至聲體如瓶衣等待衆緣故明論聲即言議聲也依聲發言表詮諸法易世不改能為定量故計為常開蒙列為第十一清涼不録一切聲即鐘鼓等聲也待緣者如鐘鼓待扣鳥獸待呼詮表者如鳴鐘集衆擊鼓升堂鳥鳴定吉凶風響知晴雨雖則待緣聲唯一體故計為常開蒙列為第十二清涼不録已上二宗同名聲論故總立為一科彼俱下論主總破二計常聲徵釋非理且明論聲下單破前計常無所作能作亦無能所雙非方為常義故立比量破之明論聲為有法應非常住為宗因云許能詮故同喻如所餘聲謂有能所體必非常餘聲待緣亦非常義餘聲下破第二計彼計聲體是常待緣顯發復立比量破之餘聲是有法亦應非常為宗待衆緣故為因聲體如瓶衣等為喻四聲能詮表計常竟下五四大能生計常有外道執地水火風至如何可説極微常住此即路迦耶論師此云順世外道開蒙列為第十三清涼為第八彼計一切色心等法皆用四大極微為因然四大中最精靈者能有緣慮即為心法猶如火大雖皆是火而燈發光餘則不爾故四大中有能緣慮其必無失所生下正舉執詞因量即極微無常即粗果謂從極微生還歸於因量故云實有彼亦非理下論主總破徵明非理破文有二先破能生極微次破所生粗色所執下先破極微若有方分如蟻列行伍曲直無恆以喻方分極微可析非常若無方分應如心法心法無形聚何生色法若能生是有轉變所生之法今有本無能所二義既是非常極微亦爾上破極微竟下破粗果文有四節一破不越因量又所生果不越因量至由此亦非色根所取又所生下謂果同因量自然非粗眼等色根必不能取執生粗色豈不相違一破不越因量竟若謂下破量德合故量德即極微體中所具粗德由體具故合則成粗色根能取此牒執義所執下破或應下復牒計如粗下正破謂因果粗相既同因果處應無別二破量德合故竟又若謂下破因非一故自因即極微謂極微中原具果相但不能顯多極微聚方可名粗破云因體非一果體亦多如多極微處各別故既爾者牒上在因之義果既在因粗相自無色根定不能取三破因非一故竟若果多分合故成粗至但是隨情虗妄計度上許多因集而未合今以多因合故成粗破云多因非細足成根境粗色有對何用汝執能生果為多成不實理必應然前因計常後果不實故自相違又果下牒破各別因果義因有質礙果亦質礙如二極微如何和合若謂下牒彼轉計因果相受難破果受因如沙受水因入果如藥入銅遮前因果各別之難故破云誰許沙銅體受水藥謂沙體圓滿鎔銅質密水藥何能入也或應離變者謂前因果不能容受復計離因變果又違一常之執不越因量是一離則違之極微體實是常變則違之又粗下破執體一粗色果者一切果也得一分者緣一境也謂若體一緣一境時餘境應得何則彼此俱一故不許一得一切便違果體是一之理許緣一得一切又違彼此各別之事故彼下結破妄計進退即上許與不許四破多分合故竟五四大能生計常竟下六總舉通執計一異等然諸外道品類雖多至色等應無青黃等異前以九十五種束為十一宗或十三宗今又束為四種若再束之即是有無二因種也廣百論云一切世間句義名言所表心慧所知情執不同略有四種謂有非有俱許俱非隨次應知配四邪執謂一非一雙許雙非計一者謂因中有果也有法者即前陳一法有等性者即一法之外一切諸法其體定一者謂此一法與一切法定是一體如數論者彼以冥性具三德能變二十三法原即冥性一體亦是計一彼執下論主總破徵釋非理勿一切法即有性者謂莫説一切法即是汝執一有法若謂諸法皆一體者一違自宗二違世間又若下牒計難破色等等餘聲香味觸也青黃等等餘清濁好惡甜苦冷暖也謂若轉計色與青等一乃至觸與冷等一五塵既別以遮違世差別之難破云則汝色法無青黃赤白聲塵無清濁高低乃至觸塵無冷暖澀滑若爾亦與世間相違以諸世間青等諸色各差別故廣百論釋云數論外道執有等性與諸法一即當有句此執非真所以者何若青等色與色性一應如色性其體皆同五樂等聲與聲性一應如聲性其體皆同香味觸等類相應爾眼等諸根與根性一應如根性其體皆同應一一根取一切境應一一境對一切根又一切法與有性一應如有性其體皆同又樂苦癡及與思我與有性一應如有性其體皆同是則汝宗所立差別皆不成就故彼所執決定非真二執有法與有等性至應如聲等非眼等境二計異者謂因中無果也有法有等同前其體定異如勝論者以彼計實句為體德業所依而德業必異於實實等為體大有句所依而大有必異實等同異和合亦然又異於有者必是無句故下破詞多以無句為難彼執下總破所執徵釋非理勿一切法非有性者謂莫説一切法無汝所執有法之體法與有法體定異者如滅無體則違六句自體非無亦違世間現見有物又若轉計色體上青黃赤白定異色體故云非色等等字等餘四塵亦顯五塵之體現有遮上違世有物之難故又破云既非色性應如聲等非眼等境廣百論釋云勝論外道説有等性與法非一當非有句此亦非真所以者何若青等色與色性異應如聲等非眼所行五樂等聲與聲性異應如色等非耳等境又一切法非有性者應如兔角其體本無是則應同空無我論或同餘道邪見師宗豈不有性非即諸法法雖非有而有有耶所依法無能依豈有又有性上無別有性應不名有所餘識法雖有有性非有性故其體應無是則一切所立句義皆不得成便同撥無邪見外道故彼所執決定非真三執有法與有等性至而執為實理定不成三計亦一亦異者謂因中亦有果亦無果也彼執下論主總破徵釋非理若執一異同前二執之過一異二法相既相違體應差別若執同體二俱不成何則同異非一同一非異故不可説一切諸法皆同一體或應下許假非實説一説異但是假名若於一法假名為一又假名異原無過難而執為實理定不成廣百論釋云無慚外道執有等性與彼諸法亦一亦異當於亦有亦非有句此亦非真所以者何若有等性與色等一同數論過與色等異同勝論失一異二種性相相違而言體同理不成立一應非一即異故如異異應非異即一故如一一異既不成有非有焉立一異相異而言體同則一切法皆應無異異相既無一相何有一異二相相待立故若謂一法待對不同名一異者即應一異二並非真或障一假一法二相互相乖違俱言是真必不應理故彼所執決定非真四執有法與有等性至諸有智者勿謬許之四計非一非異者謂因中非有果非無果也彼執下論主總破徵釋非理非一即異非異即一故同一異非一異言為遮為表者問定遮表之義若唯表者表是顯義謂非一顯異非異顯一既是雙非何名為表若但是遮遮是止義但遮止而已何執為實若執亦表亦遮表不容遮遮亦非表故互相違遮亦非遮表亦非表豈非戲論又非下總責違世違自宗過是故下結警後賢勿生輕信廣百論釋云邪命外道執有等性與彼諸法非一非異當於非有非非有句此亦非真所以者何若有等性與法非一同勝論過與法非異同數論大又一異相世共知有汝獨撥無違世間失又汝所説非一異言為但是遮詞為偏有表若偏有表應不雙非若但是遮應無所執有遮有表理互相違無表無遮言成戲論汝執諸法性相非空而説雙非但為避過此雙非語亦不應論違汝所宗法性相故若諸法性一一俱非此俱非言亦不應説舉言必有俱非性故是則汝曹應常結舌發言便壞自論所宗默亦不成以俱非故語默俱失一何苦哉誰有智人而不悲愍故彼所執決定非真如是世間四種外道邪論惡見擾壞其心虗妄推尋諸法性相皆不中理競執紛紜於諸法中起四種謗謂有非有雙許雙非增益損減相違戲論是故世間所執非實六總舉通執四種竟通上一別問外道竟二別問餘乘法執分二一問答標舉餘乘所執離識實有至及諸無為理非有故論主假設問詞發起餘乘執意答中總破非理開蒙謂餘乘於大乘百法中止許七十五法謂色法十一不相應法十四無為法有三心所法四十六心法唯一共七十五故下破詞於不相應及無為法唯舉所執之數破之餘則不舉心所四十六者謂大地法有十即遍行別境各五大善地法有十即信等十一除無癡大煩惱地有六即根本惑中癡及大隨中放逸懈怠不信沉掉舉大不善地有二即中隨二小煩惱地有十即小隨十不定地有八謂根本惑中貪瞋慢疑及不定中悔眠尋伺共四十六此中先破色法餘後文中種種辨破一問答標舉竟二正釋所執依數分三一色法分二一正舉對無對色分二一標數且執所色總有二種至二者無對非極微成此總標色法分為二種言有對者即五根五塵十種色也根乃五識各別所依故名五根塵乃五識各別所緣故名五塵根塵二色從色種生有質礙故故名有對言無對者即法處所攝色也唯是意識所緣名法塵故故稱法處所攝色而有五種一者極略色謂以假想觀分析根塵之色至極微位立極略名二者極逈色亦以假想觀分析空間光影等色至極微位立極逈名三者受所引色謂於受戒闍黎師處引起思心種子發起防發功能現行之色立受所引名四者遍計所執色謂意識周遍計度種種色法以為實有立遍計名五者定果色謂諸聖者定中現起種種境界立定果名已上五種俱是能緣識智所變從心種生故名無對一標數竟下二正釋分二一破有對分四一能成極微彼有對色定非實有至云何和合承光發影將破有對先破極極微微不實有對必無謂諸下謂有礙如瓶無礙非色實義俱無又諸下謂有分可分無分非色非色云何和合無分云何承光有分容許承光可分又非實有日輪才舉照柱等時至由此極微定有方分釋上承光發影極微原非根識所取許和合故於隙光中必有影現光自東來有分承光影從西現有分發影體處不同定有方分又若下重明極微必有方分或承光中見觸壁等或和合物即諸極微其有方分義可知矣又諸下展轉推明彼執極微許共和集方分不無或相涉入者牒彼轉計許共和集互相涉入遮上便無和集之難餘塵涉入粗色不生是故破云應不成粗涉入者如一塵為主餘塵俱入一塵但無餘塵不無一塵本體由此一塵定有方分執有對色即諸極微至故有對色實有不成謂執粗色既許有礙能成極微必有方分若無方分便非障礙有對是故下結成能所俱無有實一能成極微竟下二正義識變五識豈無所依緣色至謂能引生似自識者五識下外人問意謂五識所依所緣必有實色若無有對五識豈無所緣緣耶論主答意謂雖有色非同汝執極微所成而是內識變現謂識下釋上識變義識生時八識現起時也內因緣者能所熏也眼等即根名為所依色等即境名為所緣故所依緣皆是識變問若識生時皆緣內色如何亦説眼等為緣故答云然眼等根非現量得乃至此但功能非外所造者所造即色也功能即根也根色無二原一識生亦同一體但以有知無知分根境二以有知故故能發識以無知故故能為境外有下答上所依之問此眼等下答上所緣之問引生似自者自即是境境能牽心心似境轉故名似自境生之識二正義識變竟下三牒執辨破汝執彼是此所緣緣至不和合時無此相故此舉外執難破彼字指極微非但能生者謂不獨為生因亦有作所緣之意此上舉外執下難意云既破汝執極微無實則無所緣緣莫得汝將因緣等無間緣增上緣作此識之所緣緣故觀所緣論云如眼根等於眼等識無彼相故如是極微於眼等識無所緣義故知極微非五識境眼等五識乃至和合似彼相者相字即識轉變相分色和合即外宗所執離識色應云但緣似彼和合相分色故此即內色如外現義非和合相至定不生者破外計和合不實無生識用是無緣也觀所緣緣論云彼無實體不能生故如是和合於眼等識無有緣義彼和合下結顯非實不得為緣復以第二月喻和合無生五識之用非諸極微下破極微共和合位無所緣境極微和合原是極微故眼等識無所緣義觀所緣緣論云眼等識上無彼相故色等極微諸和集相理亦應爾彼俱執為極微相故又非諸極微下破極微體具和合亦非所緣故云不和合時無此相故非和合位與不合時至與未集時體相一故釋上極微體無差別和合位與不和合位於眼等識無所緣義有執下舉執詞釋上極微體中具和合義色等五塵也一一亦五塵各別也謂一一五塵之極微不和集時雖具和合相此相不顯非五識境極微輳集更相資助粗相方顯為此識境粗相顯現由體具有和合相故當知體具和合與和集原同和集或細和合或粗彼相實有者謂是極微體中具故能作五識所緣彼執下論主總破謂諸極微集與未集其體無別何有粗相為五識境陳那菩薩頌云和集如堅等設於眼等識是緣非所緣許極微相故瓶甌等物極微等者至況無識外真實極微復舉外宗轉計難破觀所緣緣論云執眼等識能緣極微諸和集相復有別生彼論轉計極微體中具和合相論主頌以如堅等破之故又轉計和集之相即是極微以和集為境極微生識是所緣緣義復頌以瓶甌等破之今此舉者是彼論中釋頌破詞謂瓶甌等物大小等者能成極微多少同故緣彼覺相應無差別共和集下若謂瓶甌生識故有差別相者則共和集瓶甌等位應離極微圓滿相故若離極微瓶甌假相豈生識耶故彼論云非瓶甌等能成極微有形量別捨微圓故粗相瓶甌也細相極微也若謂不捨極微極微生識不離瓶甌似瓶甌相故有差別破云非粗相識緣細相境謂非粗細二識互緣若互相緣餘識亦爾故又抑云勿餘境識緣餘境故若緣餘境復難彼云一識應緣一切境故許有下結成識外無極微義由此定知自識所變至衆多極微合成一物結成五識正所緣緣義見託彼生是緣義帶彼相起是所緣義觀所緣緣論云外境雖無而有內色似外境現為所緣緣許眼等識帶彼相起及從彼生然識下結顯識所變相兼破心外有法隨量者隨其業力境量故所變色小大不同非別下破外執三牒執辨破竟下四明極微假立為執粗色有實體者至皆識變現非極微成明極微之説是權非實故無識外真實極微瑜伽梵語此云相應以佛説法相應一切依教奉行亦名相應假想慧即分別心也以分別心遍計粗色展轉析除成極微想故諸聖教假説極微雖此下重重模寫假想觀中光景耳由此下結破前義四極微假立竟通上一破有對竟下二破無對餘無對色是此類故至而可説為真實色法此類者指上極微假想之類餘無對色也假許有色名為無對猶如心法又非實色上有對色許識變現唯可假説離識之外決定非有況無色相為實有耶二破無對色竟通上一正舉對無對色竟下二傍問表無表色分二一破有表表無表色豈非實有至表示心故假名身表表即表顯相可見故無表反此且身下論主問定然後別破表色有二一身二語故問身表何為實有之性若言下破有宗計形為身表謂若是形必可分析理非實有長等下釋上可分析義謂析長作短析大為小乃至極微不可得故若言下破正量部計動為身表謂若以動為身表色動非常理滅無動義有為即動義動以風為因有因不更待因而動無無因不必待因有滅生滅動如流何待風有無故云滅若待因應非滅故今言因者以顯身表是果果必待因因盡果生果生因滅故執動義非身表色以動滅不待因也若言下有宗轉計謂有色法非影顯色非是形色從心引生能動手等瑜伽云有對色有三種謂顯色形色表色顯色者謂青黃赤白影光明暗雲煙塵霧及空一顯色形色者謂長短方圓粗細正不正高下色表色者謂取捨屈伸行住坐臥等既云非顯非形即詮表色理亦不然者論主總破此若下謂動如前破風亦非表所計有色於何所似上破根非有表色也又觸下破塵非有表觸者身塵也唯無記性不同身業通善惡性性既不同觸非身表非顯香味者謂香味塵亦非表顯身業類觸者亦無記性故身下結成不實然心下結顯正義但約心變即異小乘言生滅相續者即動作相也如手上下如足前後上相既生下相即滅前相才滅後相即生故名相續似動表心但何假名決非實義語表亦非實有至假名語表於理無違總舉語表不實復破聲無詮表剎那者時極少也仁王經云一念中具九十剎那一剎那中具九百生滅以多剎那聲集成一字一字成名多名成句方有詮表若執聲為語表者故破云聲性一剎那聲無詮表故多念成語又非實故外有對色前已破者復破色法又非語表也然因心下結顯正義唯識所變一有表竟二無表表既實無無表寧實至現行思立故是假有以有例無不實可知無表色者他處云受所引色以是受戒引生色故思受戒法願樂護善遮惡故有善惡分限色現但無表示名曰無表謂此下釋立無表義身語思即三業也以受戒時是最勝三業雖無表示戒色種子自知增長故立此名惡現行者即身行惡事口出惡言顯現色聲容為止息唯能發作身語之思是無表示必在定中方能止息亦名無表通上二種俱是假名何執為實世尊經中説有三業至唯有內識變似色生外人引經難問言身業者約所依立身謂色身業依身起故名身業言語業者約自性立語即業故言意業者依等起立業即是思與意相應意等引起名為意業不撥為無但言非色者論主答上問意謂經説三業不無但非汝執實色能動下釋上三業非色義業即是思思即是心以顯三業唯心故以動身發語之思名身語業也審決二思即審慮思決定思也與意相應顯唯是心作者發作語言動者能動身手皆是意故説名意業起身語下釋立業名是審決下審決思即意也以身語處意所遊履又此業道通引苦樂具此二義復立道名故前七業道亦思為自性者通釋業道唯心故説思為自性前七者即身三口四也思即意也身口二業以意為體故名自性或身語下釋上表色亦業道攝以身語表無思不發聽思往來故名所履由此下結破表無表色非心外實有體唯內識所變現二無表竟通上一色法竟下二不相應行法分二一牒執總破不相應行亦非實有至如餘假法非實有體不相應行亦非實有者牒執總破問何名不相應行答得等非能緣不與心心所相應非質礙故不與色相應有生滅故不與無為相應故名不相應行得非得等下總破不相應行體非實有得者成就義非得不成義等者等餘二十二法此不相應行即色心所顯故無體相如色心等亦無作用異色心等由無體相及無作用故知非實但有假名此定下謂彼得等離色心等必無實體應知行蘊攝不相應決定不離色心所顯故云許蘊攝故又心法心所色及無為四中不攝體畢竟無餘實法者即真如實際等彼既不攝是假非實一牒執總破竟下二依執別破分六一得非得且彼如何知得非得至現在必有善種等故且彼下論主問也契經下餘乘引經答梵語補特伽羅此云數取趣謂數數造業取善惡趣即異生性十無學法即正語正業正命正念正定正見正思惟正精進正解脫正智十種皆正故名聖法異生處染聖法全無羅漢出纏煩惱永斷經不説此至為證不成者論主依經總破亦説下引經例難顯不離色心而有得也七寶者輪寶象寶馬寶摩尼珠寶女寶主藏臣寶主兵臣寶又云青食樹寶黃食樹寶赤食樹寶白食樹寶飲樹寶衣樹寶乘樹實謂彼經中亦説輪王成就七寶豈即成就他身非情者他身異色非情異心豈即者謂不異色心而有得既不異色異心何執離心實有得耶若謂下餘乘轉計得等必異色心謂於寶上有自在力假説成就得不在王何難不離色心而有得義論主徵云於善惡法何不許然而執實得若謂寶有自在力則善業亦有自在力何不依業假説成就而偏執離心實有得等若謂七寶在現在故而可假説寶有得義寧知善惡離於現在以善惡業通三世故亦可依善假立得名離現實法下釋成善惡現在必有縱不起現行而種子常存也又得於法有何勝用至得實無故非得亦無又得於法有何勝用者論主徵問得於諸法勝用何似若言下牒計難破已失者過去也未得者未來也非情是無為對有情説以有情是有為故能起者即能生也謂得若有能生勝用應生無為若謂無為無有起滅既不得起一切非情亦是無為應永不起去來二世亦是無為亦永不生若謂二世俱生以得為因而生起者執二無因便為無用言二生者彼謂本有而生本無而生皆無因生今以得為因而計未得已失俱生者是有因生故彼所執二無因生便為無用故廣百論云若本無而生先無何不起本有而生者後有復應生又具下重破上俱生義謂去來世以得為因而俱生者若具三性三性現行應頓現前若待餘因次第生者執俱生因便為無用若得下牒餘乘轉計謂得是諸法不失之因由有此得成就彼法破云若謂有情成就諸法應知諸法不離有情若離有情實不可得汝等云何執離色心有得等耶故得於法俱為無用者結破得法勝用俱無得既實無非得亦無矣然依有情可成諸法分位至於諸聖法未成就故然依下正義總顯得與非得皆是假名種子業因也自在業力也現行業果也此類下釋成非得義見所斷種即分別惑若斷此惑成就聖法由未永害非得聖法名異生性一得非得竟下二衆同分復如何知異色心等至分位差別假立同分復如何下論主問契經下餘乘引經答謂天與天同人與人同故知有同分此經下論主總破同智言者智即分別言即言説若因同分使天言與天同人言與人同則草木等應有同分何不草言與草同木言與木同若由同分方起言説亦由同分別起同分別起同分既云不爾於同起説何然若謂下牒彼轉計欲者樂欲也謂此欲與彼同彼欲與此同以同分為因方起同欲破云理亦不然宿習為因起同事欲宿習種子也同事欲現行也謂如曾見人熏成種子後復見人起同現行以曾見善熏成種子後復見善起同現行人與人同是身相似善與善同是心相似應知理從熏生勿勞別執有因也然依有情下結成正義假立無別實有二同分竟下三命根復如何知異色心等至住時決定假立命根復如何下論主問契經下餘乘引經答識是第八見分暖是第八相分壽是第八種子今舉命根即是種子此經下論主總破先已成者前所論之理也色法尚不離識何執命根離識別有又若下喻非實義受等心所與心相應容説為異念念生滅體應非實心所離心既非實有以喻命根離心非實若爾下餘乘難云經説有三何無別體論主答義別説三如四正斷謂第八見分名識相分名暖種子名壽義雖有三其體無別如四正斷未生善令速生起已生善令其增長未生惡令彼不生已生惡令速除滅義雖有四原是一精進體故以為喻住無心位壽暖應無者餘乘難謂既許壽不離識住無心位應無壽暖豈不經説識不離身者論主釋以契經説識不離身是知壽暖識三有不離義餘乘復難云既説識不離身如何名無心位論主答彼滅轉識名無心位非無第八後當廣説者下二定文中及第三卷廣顯此義此識下結破前義謂唯此本識足為三界五趣受果之體無勞別執離識之外有實命根然依下結顯正義唯是假立住時決定者壽數有限也功能差別者業力不等也親種即第八種子也依此種子假立命根三命根竟下四二無心定無想異熟復如何知二無心定至如提塘等假亦能遮復如何下論主問若無下餘乘難詞謂上三位若非實體以何法遮心心所法不起現行若無下論主以無色定難彼無心定義無心定名世共知有無色名定理所未聞又遮礙下重破難義顯假能遮謂提塘假作亦能遮水何須實法遮礙於心謂修定時於定加行至故此三法亦非實有謂修下總釋二定立名正義粗動心者前六識也不言第七者以二定同釋唯就無想義故勝期願者勝願心起期生靜處細微者粗想已除故微微心時者是熏習已成義故云成極增上厭心等種由此下明依位假立非實有體伏滅粗想種通善性故此二定俱名為善無想下別釋無想異熟立名正義謂修定時求彼天果熏成種子招異熟識受天報果依之下釋立無想得異熟名故此下總結二無心定無想異熟三法非實唯依色心分位假立四二無心定無想異熟竟
