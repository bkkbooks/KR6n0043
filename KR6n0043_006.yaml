body:
  text: 天親菩薩造頌護法等菩薩造論唐三藏法師玄奘奉詔譯明西蜀沙門明昱俗詮前第三能變分二一牒科標問二舉頌總答分三一能變本識二相應心所分三一略標六位二廣顯差別分五一遍行別境二位五卷中已竟此第二善位分三一結前標問已說遍行別境二位善位心所其相云何善心所者雜集有十三種善此即第一種乃十三種中體也何為十三一自性善心所有法故二相屬善彼相應法故三隨逐善彼習氣故四發起善發身語業故五第一義善謂真如故六生得善俱生善故七加行善方便修習故八現前供養善圖寫尊容書治法藏故九饒益善以四攝事故十引攝善因果互引故十一對治善厭壞等諸對治故十二寂靜善永斷障染故十三等流善勝品神通因果等故一結前標問竟下二舉頌總答頌曰善謂信慚愧至勤安不放逸行捨及不害此中總頌善位十一心所以答問意第一句頌有三謂信慚愧第二句頌有三謂無貪無瞋無癡三名根者生善勝故名為善根第三句頌有三謂勤即精進安即輕安及不放逸第四句頌有二謂行捨不害二舉頌總答竟下三解釋頌意分三一正釋心所有十一章論曰唯善心俱名善心所至愛樂證修世出世善總釋善所唯與善心相應定數十一云何為信下一釋信心所體性業用令心心所俱得清淨是信自性樂為衆善是信業用然信差別略有三種者總舉論說實德能三深忍深樂深欲之意一信實有下釋深忍諸法即內身外器等各有自相名實事理以諸法自相言詮無所加心識不可到唯信忍可名信實有二信有德下釋深樂三寶德者佛以法身為德法以般若為德僧以解脫為德以此三法處染常淨故名真淨由信三德而起好樂名深信樂三信有能下釋深欲世間善有漏能引無漏出世善無漏能引無為故云深信有力能得在心能成在事有為曰成無為曰得信上諸善而起希望故名深欲由斯三信即能對治彼不信心以此信心愛修諸善彼不信心障諸善故忍謂勝解此即信因至信正翻彼故淨為相問答以明信心所因果自性也問前所說忍及樂欲是信因果何名自相論主答云適言心淨為性即是自相問者復申難詞云猶未了彼心淨言義若淨即心有心無所故云應非心所若作釋者體持業用持業釋以心體上持淨用故若令心淨心所令心慚等亦然故云慚等何別以慚等法亦令心淨若作釋者能所依彰依主釋以心所為能令心王為所令也心俱淨法者是心同心所又同慚等故云為難亦然若作釋者居近鄰強鄰近釋以彼心所近心王故論主答云此信心所自性澄清能淨於他心心所法以心勝故但言心淨心所在焉如水下以信心所喻珠餘心心所喻濁水耳上難云若淨為相慚等何別故此釋云慚等雖善非淨為相此淨為相無濫彼失又諸染法下復以染淨相翻義勢相等以明淨他心等為信自相有說信者愛樂為相至由此應知心淨是信小乘上座部云信者愛樂為相論主破云應通三性信是善性愛是染性樂通無記既通三性體應即欲何名信體唯是善性又苦集諦是信所緣若謂信相是愛樂者苦集二諦是誰愛樂故云又應苦集非信所緣大乘異師復執信者隨順為相破云三性俱通何唯名善又據順義有二種別一者印順即勝解故二者樂順即是欲故離印及樂無順相義此勝解欲既在別境何與善位心所為相結云由此應知心淨是信云何為慙依自法力至對治無慚息諸惡行二釋慚心所體性業用自即自身法即教法謂我如是身解如是法敢作諸惡耶故以崇賢重善為體止息惡行為用謂依下釋上自法及崇重義謂依自身尊貴教法增上於賢欽崇於善敬重於過惡事自生羞耻能以慚心治無慚心諸惡自息云何為愧依世間力至對治無愧息諸惡業三釋愧心所體性業用世人譏訶名世間力輕有惡者而不親拒惡法業而不作愧之體也對治無愧止息惡行愧之用也謂依下釋世間力及輕拒羞耻義同上羞耻過惡是二通相至於己益損名自他故此辨慚愧互通羞耻過惡為體以他處言羞耻一法為二別相論主牒辨若一羞耻為二別相慚愧二法應為一體以彼羞耻唯一體故若一體法就二法者則此二法定不相應以就於慚不應於愧就於愧者不應於慚此不相應非受想等有此羞耻義故若待自他下自是自法力他是世間力恐彼轉計慚愧別者待自他故破云應非實有以依自他是假非實又聖教說慚愧體實與教相違若許慚愧實是一體別起為二復違論說十遍善心以論中說十一善法輕安不遍餘十俱遍慚愧若一數應唯九故違論說崇重輕拒下外人難謂崇重緣善輕拒緣惡緣一境時不應俱生崇重輕拒二心則知羞耻緣善緣惡緣一境時不應俱生慚愧二心能令羞耻為二別相崇等羞等過失既同何乃偏責羞等誰言二法所緣有異者論主質辨也不爾如何者外人復問也善心起時下論主釋謂於善惡境中隨緣何境有崇重時必有輕拒慚愧俱起所緣無異豈不前說羞耻過惡有此通相汝執下責破前執慚愧體同何理能遮前引十遍善心之難然聖教說下釋成說自他義或即下又以善惡為他益損為自無貪等者等無瞋癡至對治愚癡作善為業總釋頌言無貪等三種善根三不善根即貪瞋癡以無貪等治貪等故初云何下四釋無貪體性業用有即三有謂欲有色有無色有此即是果有具是因於三界中若因若果俱無貪著為無貪性自性無貪對治貪著恆作善事為無貪用次云何下五釋無瞋體性業用苦即苦諦是果苦具即因即是集諦於苦集諦俱無瞋恚為無瞋性自性無瞋對治瞋恚恆作善事為無瞋用善心起時下釋上二種有俱起義於有等者即是有及有具苦及苦具故言無著無恚觀有等立者唯以智觀非專境在以無貪時必有無瞋是故如前慚愧二法但觀善惡亦不在境以俱遍故後云何下六釋無癡體性業用癡即無明迷暗事理今云無癡是無無明即能明解為無癡性自性無癡能治愚癡恆作善事為無癡用有義無癡即慧為性至由此無癡必應別有初義偏執謂此無癡依慧假立集論下引證報即所聞教即所思證即所修智即是慧名能聞能思能修故云如次皆是決擇慧為性問既即是慧何名無癡答此雖即慧於善品中屬三善根功能勝故無癡唯善慧通善染如煩惱見唯是染性故復別開次義正理謂此無癡別有自性正翻無明是善根攝復引論證非根攝者謂大悲非信等五根中慧根攝也若執無癡以慧為性大悲如信等五力應名慧根攝何名無瞋癡攝根唯生善力但拒惡豈同大悲又若下復以假實證之三世俗者謂不放逸及彼行捨是依精進三根假立不害一法依無瞋假立無癡若假應論中說四世俗有然集論下釋前論意無癡以聞思修為因生慧為果明解為性如忍為信因欲為信果心淨為性理必應爾以貪瞋癡下復舉通別斷惑證此無癡必因別有勤謂精進於善惡品至即顯精進唯善性攝七釋勤精進體性業用勇表下釋上勇悍各有所簡勇簡不善悍簡無記顯此精進唯是善性此相差別略有五種至無間解脫勝進別故此以精進別開五種引經證論故云如次應知被甲則護善遮惡故謂有勢加行乃復修殷重故曰有勤無下則趣操猛極故曰有勇無退則直進不屈故曰堅猛無足則智願有餘故曰不捨善軛此五下釋上五種別者由自行中三品別故謂初發心直至究竟名自分勝進行於中有三品攝五種精進或初下釋第一品即被甲有勢之義自發心來唯以菩提心為因恆求正果未得斷惑及正利生故云長時無間等或資糧等五道別故者釋第二品即無下有勇之義由有勇故遂從資糧經歷加行見道修道及究竟道差別門故二乘下釋第三品即論說加行無退無足及經說有勤堅猛不捨善軛之義二乘欣菩提是無退及堅猛義諸佛利樂他是無足及不捨善軛義或二者即上二乘諸佛二種也此釋因位斷障別義故云加行等別者謂二乘根鈍漸斷障時必各別起無間解脫二道加行勝進二道或別或總菩薩根利漸斷障位非要別起無間解脫剎那剎那能斷證故菩薩於加行等四道剎那剎那前後相望皆容具故安謂輕安遠離粗重至令所依止轉安適故八釋輕安體性業用調暢者身心俱安也以此身心堪可任受調暢義故謂此下釋輕安能伏沉障定之法令所依止身心適悅故不放逸者精進三根至非根遍䇿故非此依九釋不放逸體性業用精進一法及三善根於所斷惡防令不起於所修善修令增長是不放逸性自不放逸能治放逸成滿諸善是此業用謂即四法下釋不放逸即四功能非別有體於防下釋上防修即四功能離四功能無防修用設問云餘信慚等亦有此能何獨彼四故答云雖信慚等各有功能而方彼四非同三善根非精進遍䇿故非不放逸之所依也豈不防修是此相用至故不放逸定無別體豈不防修是此相用者外人問謂防修是不放逸之相用執不放逸各別有體防修何異下論主質謂上防修即前四法何勞別說彼上四法決定要待此不放逸方有作用此不放逸待餘慚等有無窮失以彼非根非遍䇿故勤唯下外人難謂勤唯䇿進善法三根但善所依何有防修用汝防修用其相云何者論主反詰若普下一一難破普者遍也汝謂根但為依若遍依持又即無貪等三根何別有體録者收也若收於遍䇿不異精進亦何別有若防修用止惡進善即總四法何勞別說若防修用具上等持觸念三義應屬遍行別境大地法故何唯善位等持即定也如是下結破外辨顯不放逸依四假立云何行捨精進三根至所令寂靜即心等故十釋行捨體性業用言行捨者不居功也此行蘊捨非受蘊捨以捨受唯無記行捨是善性是故揀之平等為初離沉掉故正直為次於染不怯故無功用住為後即寂靜住亦曰無動安住自能靜住能治掉舉是彼業用謂即四法下重釋體用四法即精進三根令心遠離等名行即前不放逸靜住名捨即此位本名故言行捨令心以前行捨故平等正直下辨捨三位差別復自釋云由不放逸先除雜染此即令心離沉掉也捨復令心寂靜而住即靜住名捨此無別體下釋成無體依四假立能令下復以能所顯四法為實有行捨為假立云何不害於諸有情至慈悲賢善是無瞋故十一釋不害體性業用於他不損惱能拔苦也於已不生瞋大悲心也謂即下釋不害即上無瞋以無自體依彼假立無瞋不害二義別者謂彼無瞋翻對根本六中瞋故能與樂即是慈義今此不害正違小隨中害故能拔苦即是悲義據此二義粗相有別理實無瞋有體不害假立問既同一體何又別立答為顯慈悲二義別故利樂有情慈悲勝故有說下外人執辨不害實有非是假立論主詰云此相云何外人答謂不損惱論主責云即是無瞋寧有別性謂於下釋於諸有情不為損惱即是慈悲賢善性故一正釋心所竟下二釋及字義及顯十一義別心所至隨應正翻貪癡一分故頌云行捨及不害以此及字顯十一義外別有心所謂欣厭等善心所法十一義者皆染心所正翻中間猶兼攝者如不忿等頌中及字正顯此義欣謂欲俱者簡非邪欲故依無瞋善根一分假立以所欣境不憎恚故不忿不恨不惱不嫉亦依無瞋假立以小隨中忿恨惱嫉依瞋假立故論中說小十大三是假非實厭謂慧俱者簡非惡慧故依無貪善根一分假立以所厭境不染著故不慳不憍等亦依無貪皆正翻染貪一分故不覆不誑不諂三是無貪無癡但分皆正翻染貪癡分故有義不覆唯無癡一分至如觸欲等無別翻對有義不覆唯無癡者義猶未正下文說覆貪癡一分恐失利譽覆自罪故今說不覆唯無癡者不合下文染淨相翻義無異故三義釋不慢三義釋不疑俱順正理不散亂下四善心所攝入別境定慧念三淨一分故悔眠尋伺四種心所如觸等五及欲等五通善不善無別翻對若唯善染有翻對義何緣諸染所翻善中至故於染淨不應齊責何緣下是問詞原天親於瑜伽六百六十法中提綱挈領唯取百法以該之故此論中翻染成淨唯立十一善心所法餘欣厭等不別建立因發此問論主答云信等十一相用各別故別立名餘欣厭等善根等攝相用無別故不別立又諸下釋上建立不建立義諸染法者謂根本位貪瞋癡中隨位無慚無愧大隨位不信懈怠沉掉舉放逸此十遍前六識勝故翻之別立善法慢等見疑忿等恨覆惱嫉慳憍誑諂此十二法唯意識俱故不別立設問云害亦唯意識何翻名不害故釋云害雖亦然等勝因悲者謂修無上乘者以大悲為勝因又以不害為悲苦失念等三攝入別境者即前所說正念正定及正慧三攝入彼中淨一分義染淨相翻淨寧少染者問也淨勝染劣下論主答為有勝劣故少敵多解理通者善心所也故勝迷事局者染心所也故劣二釋及字義竟下三分屬諸門有九章此十一法三是假有至餘八實有相用別故一假實門如前說者前謂不放逸行捨依四法立不害依無瞋立餘八實有體相別故有義十一四遍善心至攝衆生時有不害故二遍與不遍門其理未正慚愧同類者牒自類俱起義依處各別下執者辨詞謂能依是慚愧所依處是境有善惡別緣善境時唯生崇重但有慚義無第二愧緣惡亦然故云不遍餘義如文俱顯不遍論說下謂瑜伽云善法依處有幾種答略說有六一決定時二止息時三作業時四世間道時五出世清淨時六攝受衆生時問如是諸法互相應義云何應知答於決定時有信相應止息染時有慚與愧顧自他故善品業轉時有無貪無瞋無癡精進世間道離欲時有輕安出世道離欲時有不放逸及捨攝受衆生時有不害此是悲所攝故執者引此以證遍不遍義六位中起者一謂決定方有信起二謂止染方有慚愧顧自他故已上二位證三心所是不遍義三善品位證精進等四法遍善心故四世間道方有輕安五出世道方有行捨及不放逸六攝衆生時方有不害故已上三位證四心所是不遍義有義彼說未為應理至哉彼所說定非應理有義下論主總非謂推事理未決定心原非善心是染心故與疑相應淨信自無何執以為信不遍也慚依自法愧依世間故名依別隨緣何境二法俱起是名境同俱遍善心前已說故何名不遍彼執世間斷煩惱時有輕安故出世無有此破云輕安覺支是無漏道若出世道輕安不生豈世間道反得無漏彼執不放逸捨無漏道時方得起故世間道無此破云掉舉放逸在世間道起若無行捨誰伏掉舉無不放逸誰伏放逸有漏善心既具能顯精進三根如出世道應有所顯不放逸捨何執世間道無不放逸捨彼執菩薩悲愍有情方有不害餘時無故此破云然能損法即是害義凡善心起皆不損物與害相違有不害故何執餘時必無不害論說下釋彼引論證義彼彼增者六位也此此說者心所也各隨義勝分六位故故彼所說四遍善心餘七不定定非應理應說信等十一法中至信等十一通一切地應說下論主自立遍與不遍正義如文應知決擇下引證輕安不遍餘位唯定地有有義下未正謂學修定加行功用得定地名微有調暢是輕安義復引瑜伽本地分說證此欲界有輕安故有義輕安唯在定有至通有尋伺等三地皆有故此義正理謂此輕安唯在定地有資養義復引論說破執欲界亦有輕安說一切下釋本地分中義有尋伺等三地者謂初靜慮未入定時名有尋有伺地已入定時名無尋唯伺地二禪已上共有七地總名無尋無伺地論言一切地者唯說有尋伺等三地不說五趣雜居地故知欲界無有輕安此十一種前已具說至成所作智俱必有輕安故三八識門隨位有無者七八二識因位無故轉依位中二識皆具第六意識若在定位十一皆具餘無輕安有義五識無輕安者未正有義有輕安者正理定所引善者謂由定心引善五識亦有調暢轉依位中與智相應必有輕安此善十一何受相應至餘門分別如理應思四五受門此善下問也答中謂十善法五受相應輕安一法除憂苦受以有逼迫無輕安故此與下第五別境門信等唯善性別境通善染以有善性亦不相違十一唯善者是第六三性門於三性中唯善性故輕安非欲餘通三界者第七三界門唯一輕安非欲界故餘十善法三界皆通皆學等三者第八三學門一有學二無學三非有無十一皆具同善性故非見下第九見修門謂十一善非見所斷是修所斷言六根者即信等五根未知當知根也瑜伽云信等六根唯修所斷已知具知二根非所斷故餘門下結顯餘門分別如理詞不復現三分屬諸門竟通上二善位竟下三根惑位分三一結前標問如是已說善位心所煩惱心所其相云何煩惱如稠林故有根本枝葉之說而立為根隨二位煩惱以有根故隨生枝葉根有六種或開為十隨有二十更分為三根之六者一貪二瞋三癡四慢五疑此名五鈍使也第六惡見若開此一又有五名一身見二邊見三邪見四見取五戒禁取此名五利使也前名鈍者於所緣境頑嚚無決故此名利者於所緣境果決割斷故十皆名使者為心王之所使故名心所使隨惑分三下文自釋已上根隨擾惱心王不自在故得煩惱名欲廣解釋煩惱行相結前善位已說復問煩惱心所其相云何一結前標問竟下二舉頌總答頌曰煩惱謂貪瞋癡慢疑惡見頌根本煩惱六種名總答問意論中一一別釋其義二舉頌總答竟下三解釋頌意分二一正釋心所分二一五鈍使論曰此貪等六性是根本至能招後生雜染法故論曰下總釋六種心所共得煩惱為名以彼俱是根本義故初云何下釋貪所體性業用有有具者善位已釋謂由愛力取蘊生故者釋上生苦義愛即是貪取蘊是苦由有貪故生苦為業又取蘊者執取五蘊而為我故次云何下釋瞋所體性業用苦及苦具善位已釋身心熱惱釋不安隱起諸惡業釋惡行所依後云何下釋癡所體性業用癡即無明不因境起名獨頭無明多迷諦理是分別義因境起者名相應無明任運迷事是俱生義由迷暗故故名為癡謂由下釋上雜染所依疑及邪見根隨煩惱總顯俱生分別一切染法皆依無明以此無明遍諸染故云何為慢恃己於他至慢類由斯起亦無失釋慢心所體性業用謂若下釋上生苦謂有慢者於諸無德及有德人俱不謙下人我相陵集業輪轉衆苦從生七慢者謂單過慢增邪我卑為七種單慢者於劣計己勝於等計己等稱境為單不敬為慢理雖相等將己評他故為慢也過慢者於勝計己等於等計己勝單加一等故成過慢慢過慢者於勝計己勝單加二等名慢過慢增上慢者於他劣等勝三計己展轉得增上故邪慢者於己無德妄計有德於他有德言彼非德我慢者於自執我稱量高舉陵蔑他故卑劣慢者於他多勝計己少劣情雖似謙不敬彼故故名為慢九種慢者謂我德處各有三品故為九種一於我勝等劣二有我勝等劣三無我勝等劣勝謂強勝我勝彼故等謂齊等等於他故劣謂卑劣我劣彼故我既如此德處亦然我即所執之我德即所修之德處即受用處所已上七慢九種一切皆通見修所斷聖位下結顯我慢凡聖皆具於一切時不可不察然於聖位起亦無失以菩薩乘利生為本故於敬慢起必有為為隨所宜運大悲故故不為失言慢類者將我德處有無及勝等劣類前七種有三一於勝等劣各計我勝等劣二於勝等劣各計有勝等劣三於勝等劣各計無勝等劣今一計我者於勝計我勝是慢過慢類於勝計我等是過慢類於勝計我劣單慢類此從他勝計我也於等計我勝過慢類於等計我等單慢類於等計我劣單慢類此從他等計我也於劣計我勝單慢類於劣計我等於劣計我劣俱是單慢類此從他劣計我也二計有者於勝計有勝慢過慢類於勝計有等過慢類於勝計有劣單慢類此從彼勝計有也於等計有勝過慢類於等計有等單慢類於等計有劣單慢類此從彼等計有也於劣計有勝單慢類於劣計有等於劣計有劣俱是單慢類此從彼劣計有也三計無者於勝計無勝於勝計無等俱是單慢類於勝計無劣言無劣者非勝即等故有二類於勝計等是過慢類於勝計勝慢過慢類此從他勝計無也於等計無勝單慢類於等計無等亦有二類言無等者非勝即劣於等計勝是過慢類於等計劣是卑慢類於等計無劣亦有二類言無劣者非勝即等於等計勝是過慢類於等計等是單慢類此從他等計無也於劣計無勝是卑慢類於劣計無等亦有二類言無等者非勝即劣於劣計勝單慢類於劣計劣是卑慢類於劣計無劣亦有二類言無劣者非勝即等於劣計勝單慢類於劣計等卑慢類此從他劣計無也云何為疑於諸諦理至末底般若義無異故釋疑心所體性業用不疑即餘善心所以有疑故障善品中不疑為業何障善品謂猶豫者善不生故有義下執疑無體依慧假立猶豫是疑簡擇是慧謂正疑時有慧簡擇故說為體毗者益也益助於慧梵語末底秦言慧故名簡擇此引梵語證慧為體般若云智亦是例同有義此疑別有自體至是故此疑非慧為體此義正理謂疑有體令慧不決復引論證六根本中惡見是假即慧為體餘貪瞋癡慢疑五所俱實有故何偏執疑以慧為體毗助末底下論主例難梵語若南若字音惹秦言智謂若執慧為疑亦可智為識界由助力義便轉變者反顯義無轉變界是因義謂由識助智因義轉疑慧亦然是故此疑非慧為體以顯慧不轉變為疑也一五鈍使竟下二五利使云何惡見於諸諦理至六十五等分別起攝此釋惡見體性業用顛倒推求惡見體也招苦為業惡見用也此一惡見分為五者以彼業用各別有故皆於諦理顛倒推求染慧為性名五利使故此五見體性是同業用各別薩迦耶見此云身見執身為我故餘見皆依五蘊身起故云一切見趣所依為業此見差別下明身見有差別義二十句者如計色是我我有色色屬我我在色一蘊有四五蘊合二十句六十五者如計色為我於餘四蘊各有三我所謂我瓔珞我童僕我器即有十二色為一我合有十三五蘊總有六十我所五箇我見共成六十五數二邊執見謂即於彼至七斷滅論等分別趣攝謂此邊見即於身見執斷執常自執斷常不能出離即障所修出離中行為此業用此見下明邊見差別謂諸外道總六十二皆從五見差別妄計清凉大師云此六十二以邊見邪見為自體見取戒取為眷屬依於身見為根本故名差別諸見趣也有執前際四遍常者一觀心境二觀四大三觀八識四觀陰理總計為常以生滅想心已滅理中自然成不生滅一分常論者亦有四種一觀心對衆生生滅二觀境見壞不壞三觀我心對身生滅四觀四陰前滅今常各計一分常一分無常及計後際有想十六者計色是我等四相四蘊合說有十六相此計畢竟煩惱乃至各不相觸等無想俱非各有八論者謂無想有八論計死後無想通觀四陰現在因亡未來果滅因果合論故有八相俱非有八論者謂色受想中見有非有行遷流處觀無不無四陰合說各有有非有各有無非無名八俱非七斷滅者欲界人天二處色界四禪無色界總為一處觀此七處現前銷滅死後無復計為斷滅三邪見謂謗因果作用實事至諸如是等皆邪見攝謂邪見者撥無因果及四見外諸餘邪執皆是此義如增上緣名義遍故餘緣不攝者皆此緣攝以喻四見不攝者皆邪見攝此見下明邪見有差別二無因者觀八萬劫前無因自有為本無因劫中性非遷改為末無因四有邊等者一觀三世以現在為有邊去來為無邊二觀見聞以見聞處為有邊非見聞處為無邊三觀遍知其知無涯為無邊其境有極為有邊四觀一身中生滅以一身為有邊生滅為無邊不死矯亂者亦有四種一觀變化元分為八義謂變恆生滅增減有無故答前人云亦生亦滅等二觀心無唯答一無字三觀心有唯答一是字四有無俱觀故答前人云亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰顯不錯答得生不死天也五涅槃者欲界及四禪計此五處安隱為勝淨依立為涅槃或計下自在即欲界頂天世主釋梵者釋即帝釋乃欲界天主梵即大梵乃大千界主故總名世主彼計此天及餘物類其體實常而不變易或計自在等是一切物因此即計彼實常能生諸法或有橫計諸邪解脫者妄執為果也非道為道者妄執為因也諸如是等皆邪見攝四見取謂於諸見及所依蘊至說為邪見非二取攝見取者取他見義為自見也諸見即前三見謂此見取執彼三見及彼所依五取蘊身皆為最勝能得能證清淨涅槃由執取故各各爭執故云一切鬪諍所依為業戒禁取者取他執行為自戒也諸見同前由此戒故一切外道受持拔髮塗灰等苦故云無利勤苦所依為業然有下釋餘處執義差別謂執最勝者是非果計果名為見取執能得淨者是非因計因名為戒取論主釋云是影略說或隨轉門謂說最勝影略清淨說清淨時影略最勝理實因果二義皆具不爾下謂若不是影略謂為因果別計者應說是邪見非是二取攝以邪見者因果別故二五利使竟通上一正釋心所竟下二分屬諸門有十章如是總別十煩惱中至自審思察方得生故一俱生分別門言總別者總即六根本別開十煩惱以一惡見開為五故六通俱生及分別者貪瞋癡慢身見邊見也任運釋俱生思察釋分別二義皆具故云俱得生故疑後三見者即邪見二取為三見也四唯分別無俱生義惡友邪教外緣也自審思察內因也內因外緣方得生故邊執見中通俱生者至皆恐我斷而起驚怖此義未正謂俱生邊見唯斷非常常見分別無俱生義瑜伽下引證何邊執見是俱生者是彼論問詞謂斷見攝者是彼論答詞引此以證俱生唯斷見學現觀下推廣俱生唯是斷見學現觀者初地菩薩也唯有俱生無分別惑今者我我何所在耶顯是斷見諸禽獸等亦唯俱生無分別起皆恐我斷亦證俱生唯是斷見有義彼論依粗相說至或是俱生或分別起此義正理謂此俱生亦通常見復引禽獸為俱生常見之證搆巢安處就穴積糧意在常存豈非俱生亦有常見復引諸論證俱生分別皆執斷執常何執俱生唯斷見攝此十煩惱誰幾相應至貪與五見相應無失二更互相應門分為六節一辨貪與諸所相應除癡在最後第六節論愛憎二境必不同者釋貪與瞋不俱起也以愛釋貪憎釋瞋故於境不決無染著者釋貪與疑不俱起故不決釋疑貪即是染或得相應者亦有不相應義所愛即貪於境親所陵即慢於境疏境非一故說不俱起貪於所染慢於所恃於境俱親說得相應五見愛執於貪境同故貪於五見相應亦無失瞋與慢疑或得俱起至如次說瞋或無或有二辨瞋與諸所相應除貪癡或得俱起者亦有不俱義所瞋於境踈所恃於境親故瞋與慢說不相應慢於所蔑瞋於所憎二境俱踈故得俱起疑初猶豫瞋未憎彼故說瞋疑無俱起義疑久不決瞋便發憤故瞋與疑說得相應疑順無瞋說不相應疑違憤發說得俱起故云隨應亦爾二取愛執無憎彼義瞋與二取故不相應此與三見者此字即瞋三見即身邊邪於有樂下釋邊常見不與瞋起於有苦下釋邊常見與瞋相應斷見翻此說瞋有無者翻苦樂蘊也苦蘊起斷見無瞋相應樂蘊起斷見有瞋俱起邊見起斷常必依五蘊身是故身見影略不說邪見下釋邪與瞋或有或無誹撥惡事瞋不相應誹撥好事與瞋俱起慢於境定疑則不然至與身邪見一分亦爾三辨慢與諸所相應除貪瞋癡於境定者陵蔑不移疑不然者猶豫改轉故不相應五見執取於境不移是故展轉與慢相應然與斷見不俱生者執我斷時慢無陵恃慢與身見一分亦爾者斷從身起名身一分慢與邪見一分亦爾者二無因等邪見所攝邪見一分故身邪見各有一分與慢不俱餘皆俱起疑不審決與見相違故疑與見定不俱起四辨疑唯與五見相應除前貪瞋癡慢今云不俱起者疑無審決見不猶豫相應自無五見展轉必不相應非一心中有多慧故五辨五見自類展轉除前貪瞋癡慢疑不相應者五見共慧為性故云無一心中有多慧故癡與九種皆定相應諸煩惱生必由癡故六辨癡與貪等皆相應者以此無明遍諸染故此十煩惱何識相應至由稱量等起慢等故三八識門藏識無者白淨無記無善染故末那四者貪癡慢見恆相應故意識具十者無簡別故五識唯三者彼貪瞋癡無分別故問五識何無慢等答由稱量等起慢等故稱量等於猶豫推求慢等疑及五見謂慢由稱量起疑由猶豫起五見推求起故彼慢疑及與五見是有分別非五識俱此十煩惱何受相應至瞋遇順境喜樂俱故四五受門有五節一辨三根與五受相應不簡俱生分別俱相應故問貪與欲俱何通憂苦瞋常憎恚何通喜樂答貪會違緣憂苦瞋遇順境喜樂有義俱生分別起慢至要分別起能發彼故二辨慢與五受相應初義除苦於俱生慢猶未盡理問慢既除苦性又高舉何得憂俱答恃苦劣蘊憂相應故後義正理謂俱生慢亦苦俱起意既有苦應相應故又分別慢純苦趣無意顯雜受亦苦相應謂純苦處無邪師教分別自無然彼純苦唯屬俱生故不更造引惡趣業以能造之思唯是意識分別所起故曰要分別起能發彼故疑後三見容四受俱至爾時得與憂相應故三辨疑及邪見二取與四受相應唯除苦受問疑與欲俱宜無憂苦何唯除苦答欲疑無苦等亦喜受俱故猶豫不決展轉生憂故唯除苦又問云二取執為勝淨何得有憂故答云二取等有義俱生身邊二見至餘如前說此依實義四辨身邊二見與五受相應初義未正謂身邊見若俱生者但與喜樂捨受相應不同五識唯無記性不通喜受若分別者容四受俱唯除苦受問既除苦受何又憂俱答執苦俱蘊為我我所者釋身見與憂俱常斷見翻此與憂相應者釋邊見與憂俱謂常於苦蘊憂斷於樂蘊亦憂故言翻此者翻苦樂蘊也後義正理謂身邊見若俱生者亦苦受俱意顯分別唯除苦受純受下釋俱生見與苦相應以純苦處唯俱生故復引論證之餘如下結前實義隨粗相者貪慢四見至餘受俱起如理應知五總十煩惱與五受隨粗相配釋即前論中執義及注文中設問之意隨世流轉故云粗相貪慢四見者身邊二取為四見此六煩惱樂喜捨俱無憂苦故瞋唯苦憂捨三受俱起無喜樂故癡與五受相應邪見及疑四俱除苦已上名隨粗相說貪癡俱下釋煩惱相應樂受所通界地貪癡俱樂屬俱生故通下四地者欲界五趣雜居地及色界三禪為四地以九地中四居下故不通上地者上無樂故餘七俱樂者五見慢疑名為餘七不說瞋者瞋無樂故除欲通三者唯除欲界通上三禪以分別起樂最下地無故又疑心所獨行無明於欲界中唯憂捨俱餘受界地煩惱俱起如理應知此與別境幾互相應至見非慧俱不異慧故五別境門謂貪等四與別境五俱問煩惱何得有定答專注一境皆有定故疑及五見各容四俱者疑多猶豫故無勝解見即是慧理無重出此十煩惱何性所攝至雖數現起不障善故六三性門謂十煩惱瞋唯不善餘九亦通有覆無記故云通二又色無色二界煩惱定力所伏唯無記性若欲界中十種煩惱分別起者是不善性若俱生者能發惡行亦不善性以不善者損自他故餘無記攝細不障善者亦是無記非極損惱自他者不發惡行故當知下意在破前五受章中執義彼執俱生身邊二見但與喜樂捨受相應非五識俱唯無記故故此破之顯是無記此十煩惱何界繫耶至依多分說或隨轉門七三界門謂瞋唯在欲餘九通三界者總答界繫居義生下起上者未離下染上地煩惱不得現前得上地定容現前故問三界煩惱為同為異答雖諸煩惱皆偏三界而隨界繫各有所屬如上無瞋又無不善以諸煩惱雖名不善唯欲界有若至上地定力所伏轉名無記不名不善又上地中於五受根唯喜樂捨無憂苦故故不行瞋問何離下染上地煩惱現前答修上定故問何要修上定答論說欲界諸心心所由闕輕安名不定地下既無定不能離染故修上定能斷下染上地煩惱又得現前諸有漏下釋得彼地根本定義第七俱生說名為細有漏難斷唯伏第六俱生粗惑漸次可證上根本定彼但下釋斷粗惑唯任運起故但迷事事依外門故名散動由散動故正障於定得彼下釋成得定煩惱方現生上起下煩惱者上地定心本澄靜故於下煩惱皆容現起定心如水渾則容貌汩然淨則塵滓自現第四定者第四禪也彼中有無想天彼天中人天報已盡離脫天形現中有身由出定時謗阿羅漢當下地獄故將下時於中有中起下潤生俱生貪故此皆上地起下之類而言下釋餘處說但依多分不無少分亦起下故下地煩惱亦緣上地至彼依多分或別緣說此明下緣上地瑜伽下引證貪緣上地既說下以理推證瞋亦緣上上二界地俱名離欲總緣諸行下謂下身見總緣上地身器等行執我我所或斷或常及起我慢故身邊慢亦得緣上餘五緣上其理極成者謂貪等五所既得緣上其餘疑及無明邪見二取亦得緣上有言貪等不緣上者依粗相說或依別義意顯理實俱得緣上不見下他地法為我等者謂緣他相也邊見必依身見起者謂依他起也俱例下緣上地說生上者下引證慢亦緣下總緣諸行下諸行同前亦謂身邊二見及貪煩惱得緣下故疑後三見如理應思者總收四種亦得緣下不言瞋者上無瞋故不言癡者已遍染故而說下釋他處依多分說亦顯少分得緣下故此十煩惱學等何攝非學無學彼唯善故八三學門學與無學是善性煩惱不善故不相攝此十煩惱何所斷耶至以真見道總緣諦故九三斷門謂三斷中非是非所斷攝以非所斷是出世道及後得智并無為法俱非染故意顯是見修所斷此十煩惱四唯分別六兼俱生故分見修二種所斷又分別者地前已伏得真見道種現俱盡故粗易斷若俱生者前七地中猶間現起八地方伏等覺方盡故細難斷見所斷十由得真智總緣四諦一斷永斷然迷諦相有總有別至二唯迷苦八通迷四此明迷諦總別總迷唯見所斷以真見道總緣諦故別迷兼修所斷或細難斷修方斷故苦集二諦世間因果此十煩惱不離世間故名因依滅道二諦出世因果修道證滅必斷煩惱故云怖畏云何別迷二唯迷苦八通迷四此中總標下別釋相身邊二見唯果處起至迷諦親疏粗相如是先釋二唯迷苦身見邊見唯果處起者果即是苦苦即是身身實是苦故名苦諦別空非我者謂諸外道不達空無我理而起身邊二見執身是常別於空理執身有我別無我理今言別空非我者即是無始任運執身實常實我故屬苦諦是疏迷義謂疑下釋八通迷四疑及三見者即邪見二取為三總標此四親迷苦理下別釋義二取下別釋二取彼三見者即身邊邪也執彼戒禁及所依蘊以為最勝能得清淨由此執故於自起貪於他起瞋眷屬起慢此處當接疑及邪見等義順以前總標謂疑三見親迷苦理相應下謂此無明既共貪等不得為主不起分別任運迷事唯修所斷不共無明是獨行故分別迷理唯見所斷疑及邪見親迷集等者於集滅道俱起猶豫或撥為無不同二取及彼貪等唯迷苦理故又結云二取貪等唯苦應知然瞋下釋瞋亦親迷諦迷諦親疏粗相如是者結上二唯迷苦唯是疏迷八通迷四親疏兼具委細說者貪瞋慢三見至不違諦觀故修所斷釋別迷中兼修所斷即踈迷義貪瞋慢疑邪見二取此七煩惱有俱起義故名俱生不同修所斷之俱生也隨應如前親迷集等及親迷苦是見所斷身見邊見齊起亦名俱生及前所說與九同迷相應無明此三煩惱雖迷苦諦非見所斷唯任運起是踈迷義故細難斷修道方斷瞋餘愛等者等慢無明他處云恚唯欲界貪慢無明俱通三界此四煩惱於有漏事任運而轉長時堅固難可解脫故修所斷雖諸煩惱皆有相分至餘門分別如理應思十隨事立名門煩惱相分者貪以愛境為相乃至無明以迷境為相雖有相分不以為名但隨仗質有無故名有事無事煩惱彼親所緣下依有漏無漏立二種名如緣滅道是無漏義緣自地時親取其境相貌相似故名事境滅道他地曾未親證唯想相起非專境在故不相似名緣名境餘門分別如理應思者總結餘門別義一一如理詞不繁現二分屬諸門竟通上三根惑位竟下四隨惑位分三一結前標問已說根本六煩惱相諸隨煩惱其相云何一結前標問竟下二舉頌總答頌曰隨煩惱謂忿至放逸及失念散亂不正知總頌二十隨煩惱名前三句頌小隨十種第四句頌中隨二種後四句頌大隨八種體性業用論中自釋二舉頌總答竟下三解釋頌意分三一正釋心所分二一總釋類別論曰唯是煩惱分位差別至遍染心故名大隨煩惱論曰下釋立隨煩惱名也謂忿等十及失念不正知放逸是貪等差別位故無慚無愧掉舉沉散亂不信懈怠七法雖有別體是前根本之等流以同染故由煩惱為因此得有故故名隨煩惱此二十下釋小中大三種類別謂自類俱起偏染二性偏諸染心此之三義皆具名大具一名中俱無名小二性者不善性有覆性也忿等十法各別起故闕自類俱起唯是不善闕遍染二性既闕有覆不遍一切染心三義俱無故名小隨無慚無愧自類俱起具一名中掉舉等八自類相望得俱起故不可名小於染皆遍不可名中既遍染心即具遍染二性三義皆具故名大隨總釋類別竟下二次第別釋分三一小隨十云何為忿依對現前至離瞋無別忿相用故釋忿心所體性業用忿是不善能障不忿餘善品故謂懷下釋執仗為業仗謂器仗或於身手執持器仗名身表業此即下明體是假依瞋有故云何為恨由忿為先至離瞋無別恨相用故釋恨心所體性業用忿為先者過去違緣也由不捨故結怨為性謂結下釋上熱惱此即下釋自無體依瞋假立云何為覆自作罪至不可執為唯是貪分釋覆心所體性業用不覆者發露悔過也自性隱藏故能障之謂覆下釋悔惱為業有義癡一分者釋無自體依他假立但說癡分義猶未盡有義貪癡分者正理謂覆無體依貪癡立恐失利譽是貪分覆自罪故是癡分論說唯癡據遍染說亦如掉舉遍諸染心論唯說彼是貪分攝云何為惱忿恨為先至離瞋無別惱相用故釋惱心所體性業用戾勢也䖧螫音疽釋乃蜂蠆行毒也謂追往惡下重釋體用往惡現緣皆是違境囂暴凶鄙總名毒言緣瞋有三相忿緣現在恨緣過去惱兼上二故云謂追往惡觸現違緣又忿發身業云身表業故恨發意業云結怨為性惱發口業云凶鄙粗言也又忿與恨正對所瞋惱則施之於諫勸者故但發粗言拒之與忿恨不同此亦下釋非實體亦依瞋立云何為嫉殉自名利至離瞋無別嫉相用故釋嫉心所體性業用殉者從也以身從物曰殉謂於他有功德名譽心妬不悅不嫉者仁慈也嫉妬不仁故能障之謂嫉妬者下釋憂戚為業此亦下釋嫉是假依瞋有故云何為慳耽著財法至離貪無別慳相用故釋慳心所體性業用鄙陋也不慧也謂慳吝者下釋鄙畜為業此即下釋慳無體依貪假立云何為誑為獲利譽至離二無別誑相用故釋誑心所體性業用矯詐也不誑者愛敬也自性詭詐故能障之謂矯誑者下釋邪命為業不以直道養生故名邪命此即下釋誑無體依貪癡立云何為諂為罔他故至離二無別諂相用故釋諂心所體性業用不諂及教誨直道良友也性自諂曲故能障彼謂諂曲者下釋諂曲不任教誨此亦下釋諂無體依貪癡立云何為害於諸有情至瞋害別相準善應說釋害心所體性業用不害即悲能拔苦也性自損惱故能障之何名逼惱答謂有害者逼惱他故逼迫於人令他苦惱害之業用也此亦下釋害是假瞋為性故瞋害別相準善應說者彼謂無瞋翻對斷物命瞋不害正違損惱物害無瞋與樂不害拔苦是謂此二粗相差別云何為憍於自盛事至離貪無別憍相用故釋憍心所體性業用憍憐愛也不憍厭離也自性染著故能障之謂憍醉者下釋染依為業此亦下釋憍無體依貪立故小隨十竟下二中隨二云何無慚不顧自法至障慚生長諸惡行故釋無慚體性業用自即自身法即教法言不顧者心專惡行羞耻遠離謂於下釋上體用唯是輕賢拒善障礙慚耻於諸惡行日生日長矣云何無愧不顧世間至障愧生長諸惡行故釋無愧體性業用世間者他處云世間力也世人譏訶名世間力言不顧者心專惡行不顧譏訶謂於下重釋上義如慚應知不耻過惡是二通相至是彼等流非即彼性此中辨無慚愧互通不耻過惡為體者與善位慚愧同但以無慚無愧反上慚愧應知其相故不重釋二中隨二竟下三大隨八云何掉舉令心境至故不寂靜非此別相釋掉舉體性業用奢摩他此云止即寂靜義掉舉囂動能障彼止有義掉舉貪一分者未正謂掉舉無體依貪假立憶昔樂事掉舉生者顯是貪分有義掉舉非唯貪者亦偏謂掉舉相不寂靜者是諸煩惱共相攝故問如何論說唯貪分答雖依一切煩惱而貪位增故說貪分有義掉舉別有自性正理雖論中說遍諸染心如不信等體實有故論說世俗及隨他相者既隨他相豈是實說如睡眠等體雖實有隨他無明說為癡分掉舉別相即囂動者破前義執是不寂靜謂由囂動令與掉舉俱生心心所法不寂靜故若離煩惱無掉舉相論不應說障奢摩他由有囂動令不寂靜故不寂靜非此別相云何沉令心於境至正障輕安而迷暗釋沉體性業用毗鉢舍那此云觀即輕安義自性沉重故能障彼有義沉癡一分者未正謂沉無體依癡假立有義沉非但癡攝者亦偏謂沉體是一切煩惱無堪任為相離諸煩惱無別相故問何故論中唯說癡分答雖依一切煩惱而癡相增但說為癡分有義惛沉別有自性正理雖論名癡分依等流說如不信等及如睡眠亦證有體沉別相即懵重者破前義執是無堪任謂由懵重令與沉俱生心心所法無堪任故若離煩惱無沉相論不應說有能障體毗鉢舍那是輕安義必由懵重方能障之故無堪任非是此中沉別相言懵重者懵乃之別相重乃沉之別相不亦宜乎此與癡相有差別者由前義說沉即癡此顯差別破前執義言正障無癡及障輕安者顯用有別言非懵重非迷暗者顯性差別云何不信於實德能至是此因果非此自性釋不信體性業用於實事理不忍可於真淨德不好樂於善功能不欲行心多染穢為此體性性是不信能障淨信懶墮懈怠為其依止是此業用謂不信者下釋上墮依及實德能俱不信義翻入善位應知其相然諸染法下釋心穢為性由不信下顯離不信外無別有法令實德能不忍樂欲若於餘事下釋因果自性邪忍樂欲者是不信因果也若於實德能外餘法上而起邪忍及邪樂欲是不信之因果以顯不信心穢為性云何懈怠於善惡品至非淨非染無信不信釋慚怠體性業用善品不修惡品不斷是懶墮性能障精進性自懶墮染法隨增故云增染為業謂懈怠者下釋增染為業䇿勤者精進也於染事中勤行精進染法增長善法退墮亦名懈怠於無記下別明無進退義謂於善事䇿勤善品有進染事䇿勤善品有退若無記事而䇿勤者於諸善品無進無退是欲勝解非別有性者為欲勝解顯善性別於信作因果顯善性有進於不信作因果顯善性有退於無記法作因果非別有性復例云如於無記忍可樂欲非淨非染無信不信忍可是因樂欲是果若於無記忍可樂欲則此因果非屬於淨非屬於染無有信義無不信義云何放逸於染淨品至推究此相如不放逸釋放逸體性業用由縱蕩故惡業增長惡增長故善根損壞謂由下釋體是假依四法立懈怠一法及貪瞋癡為此性故設問云慢等亦有此能何獨彼四答云雖慢疑等亦能縱蕩不如貪瞋癡三障無貪等三善根故不如懈怠障彼精進遍䇿法故推此放逸如不放逸亦依精進三善根立故依彼四不依慢等云何失念於諸所緣至論復說此遍染心故釋失念體性業用由無明故不能明記由染念故散亂所依問何為散亂所依答謂失念者心散亂故有義失念念一分者有義失念癡一分者理俱未盡有義失念俱一分者此義正理前二義中引證論文俱影略說說念略礙非實無癡說癡略念非實無念故論復說遍染心者應知失念是假非實云何散亂於諸所緣至故掉與亂俱遍染心釋散亂體性業用馳散外緣故名流蕩以流蕩故正定全無說彼能障正定為業問云何惡慧所依答謂散亂者發惡慧故有義散亂癡一分者未正謂此散亂無自體故故說癡分有義散亂貪瞋癡者亦偏謂貪瞋癡共為此體由癡遍染心故論說癡分令心流蕩唯三法勝說為散亂有義別有自體正理餘論所說或隨等流或隨他相非即彼性散亂別相即躁擾者破第二義執流蕩是散亂別相由躁擾故令與散亂齊生心心所法皆流蕩故若離貪等無散亂體論不應說別障正定以三摩地翻為正定問掉舉散亂二用何別答彼掉舉令心易解乃境現於心此散亂令心易緣乃心遊於境問一剎那頃何有易耶答雖一剎那解緣無易而於解緣互相續生有轉易故又云易解境從心易緣心從境是二別相染汙心下釋二心所定有轉易無長時住故於染心念念解緣若制伏時唯得暫住由此掉亂俱遍染心非無自體云何不正知於所觀境至論復說此遍染心故釋不正知體性業用於所觀境起謬解者顯是慧分問云何毀犯為業答由不正知於善不善律不律儀皆不辨故故多毀犯有義不正知慧一分攝有義不正知癡一分攝俱未盡理有義不正知俱一分者正理影略說者說慧略癡非實無癡說癡略慧非實無慧故論復說遍染心故應知無體依二假立三大隨八竟通上一正釋心所立下二釋與并及與并及言顯隨煩惱至隨其類別如理應知釋頌中與并及三字攝餘染法顯隨煩惱非唯二十雜集論說貪等根本必有多種隨煩惱故既言多種定非二十隨煩惱名亦攝煩惱者謂前二十隨煩惱名亦攝其餘染汙煩惱以是根本煩惱等流餘染既與根本同類但名隨煩惱非是根本所攝問既有餘法何論唯說二十答論唯二十隨者謂非根本煩惱攝的餘染汙法唯染粗故故此不說此餘染法或此二十隨惑分位或此等流皆此所攝隨其分位等流類別如理應知二釋與并及竟下三分屬諸門有十二章如是二十隨煩惱中至所引理教如前應知一假實門大三者放逸失念不正知也及小隨十故有十三皆名為假以依根本分位立故中二大五七數是實掉舉等三教理既成應知如前亦是實有俱是根本等流性故二十皆通俱生分別隨二煩惱勢力起故二俱生分別門謂隨俱生根本煩惱起者即名俱生分別亦然以隨煩惱隨根本故此二十中小十展轉至以掉等違唯善故三更互相應門小十自類無相應義以性粗猛各別起故中二既與不善心俱隨應小隨大隨俱起大八論說遍染心者展轉小隨中隨俱起有處下釋餘論中說隨煩惱遍染心義說六遍者於八隨中除掉二說五遍者除不正知忘念散亂言掉等違唯善者與四卷中釋義不同彼云論說五法遍染心者解通粗細違唯善法純隨煩惱通二性故據彼所說俱是簡詞粗簡小隨以七細故違唯善法簡中隨二不善性故純隨煩惱通二性者簡不正知忘念散亂以第七識唯有覆故此掉等若是取義違唯善法彼是簡詞此若亦簡彼五法中有掉故故彼此文義難會合此唯染故非第八俱至中大相通五識容有四八識門第八唯無記故無不善性第七是有覆故八大隨俱取捨如上者第四卷終諸師辨義中大相通者自類俱起也不同小隨自類不俱以前五是自類俱起故亦容有由斯中大五受相應至中大隨粗亦如實義五五受門由斯中大五受相應者牒前中大與五識俱亦應中大五受相應以前五識五受俱故有義小十除三者未正謂小十中忿恨惱嫉覆慳害此七法與喜憂捨三受相應除苦樂受前除諂誑憍三憂喜樂捨四受相應唯除苦受有義忿等四俱除樂者正理謂忿等七是瞋分位故無有樂唯四受俱諂誑憍三與意識俱意有苦受此亦應爾此受俱相如煩惱說實義如是者結隨煩惱與受俱相如根本中受俱實義彼中云貪瞋癡三俱生分別一切容與五受相應此隨煩惱皆是貪等差別分位等流性故彼既五俱此亦應爾此雖忿等四俱除樂彼中釋云瞋遇順境喜樂俱故故知此中小中大三皆五受俱是如實義若隨下謂忿等五所憂捨俱者以是瞋分無喜樂故覆慳相應喜捨受者貪癡分故此雖與五別釋即前師解忿等七法唯喜憂捨三受俱義餘三者即諂誑憍若增樂受亦即前師喜樂憂捨四俱除苦以餘三是貪癡分攝故宜增樂中隨大隨隨粗相說如實義者前說中大五受相應是實義故如是二十與別境五至故亂與定相應無失六別境門謂隨煩惱與別境五皆不相違問染念染慧念慧為性何更相應答中謂染念染慧有二種性一念慧為性二無明為性故云而癡分者亦得相應問念緣過去忿對現前何得相應故答云念亦緣現等又問定恆專注散亂流蕩何得同起故又釋云染定起時心亦躁擾故亂與定相應無失中二大八十煩惱俱至行相無違貪癡分故七根隨相應門謂中隨二及大隨八皆與十種煩惱俱唯小隨十定非見疑俱起以小隨粗動見疑審細忿等者等恨惱嫉害五是瞋分不與恚俱又瞋恨時無貪愛故慳是貪分不與貪俱又貪愛時亦無瞋故憍是貪分唯與癡俱貪下慢舉故與慢別覆誑諂三同貪癡分與貪癡慢俱三中癡分與貪慢俱三中貪分又與癡俱故不同憍唯是貪分與慢解別慳是貪分與慢俱者所染所恃境可同故憍亦貪分與慢別者所愛所陵境非一故小七中二唯不善攝小三大八亦通無記八三性門小七者忿恨惱嫉覆慳害及中二隨唯不善性諂誑憍三及八大隨不善無記二性俱通小七中二唯欲界攝至憍不緣下非所恃故九三界門小七同前及中隨二唯在欲界以是瞋分上界無故諂誑欲界又通色界貪癡分故餘通三界者謂小隨憍唯貪分故及八大隨是貪癡等流分位攝故故通三界生在下地下明上下生起耽即貪也由貪上定起憍誑諂以彼三法是貪分故後十者即中大隨由謗滅道及下潤生而方起故與邪見俱即謗滅道與貪愛俱即下潤生故云邪見愛俱容起彼故小十唯是分位差別不同中大有等流性故非正潤及正謗滅無由起下中二下明上下互緣謂中大隨相應緣上貪等煩惱隨彼緣上有義小十下不緣上者未正有義嫉等亦能緣上正理嫉妬勝地是緣上義言嫉等者忿恨惱害俱瞋分故大八諂誑上緣下者謂與緣下慢等相應隨緣下故復引證云梵王於帝釋亦起諂誑故謂諂誑者意有所欺也憍與慢別者憍唯所恃慢兼所陵故慢緣下是所陵義憍不緣下下非憍所恃二十皆非學無學攝此但是染彼唯淨故十學無學門此二十染學無學淨故不相應後十唯通見修所斷至於滅道等生嫉等故十一見修二斷門謂中大隨與見所斷根本煩惱相應起者名見所斷修斷亦爾見所斷者下謂隨總別迷諦根本煩惱齊生皆通四部部即諦也迷諦親踈亦如相應根本煩惱中說前十即小隨唯修所斷此義未正有義亦通見修所斷正理謂十小隨依見修斷根本煩惱勢力起故緣他見修生忿等故故隨根本亦通二斷見所斷者下復釋總別迷諦義如後十皆通四部此中有義猶未盡理說十小隨緣煩惱生即上緣他見等生忿等義前說依二煩惱勢力起者顯隨見修則知忿等但緣迷諦根本惑生非親迷諦有義嫉等亦親迷諦正理謂十小隨親迷諦相故引嫉等證迷諦生然忿等十但緣有事至緣有漏等准上應知十二隨事立名門緣有漏等凖上應知者凖前根本煩惱中隨事立名而有有漏無漏分別事境分別名境多門名義此亦應爾故名準上三分屬諸門竟通上四隨惑位竟
